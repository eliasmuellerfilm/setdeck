            <input style={{ ...S.input, width: 140, flex: "none" }} value={p.label} placeholder="Bezeichnung" onChange={e => setResp(p.id, { label: e.target.value })} />
            <input style={{ ...S.input, flex: 1 }} value={p.value} placeholder="Name / Wert" onChange={e => setResp(p.id, { value: e.target.value })} />
            <button style={S.btn("danger")} onClick={() => remResp(p.id)}><Icon name="trash" size={13} /></button>
          </div>
        ))}
      </div>

      <div style={S.card}>
        <div style={S.ct}>Export-Dateinamen</div>
        {(() => {
            const TOKENS = [
              {value:'{titel}',  label:'Projekttitel'},
              {value:'{tag}',    label:'Drehtag-Nr.'},
              {value:'{datum}',  label:'Datum'},
              {value:'{modus}',  label:'Modus'},
              {value:'Dispo',    label:'"Dispo"'},
              {value:'Drehplan', label:'"Drehplan"'},
              {value:'Shotlist', label:'"Shotlist"'},
              {value:'Uebersicht',label:'"Uebersicht"'},
              {value:'_',        label:'_ Unterstrich'},
              {value:'-',        label:'- Bindestrich'},
              {value:'custom',   label:'Freitext...'},
            ];
            const DATE_FORMATS = [
              {value:'DDMMYYYY', label:'TTMMJJJJ (15092025)'},
              {value:'DDMMYY',   label:'TTMMJJ (150925)'},
              {value:'YYYYMMDD', label:'JJJJMMTT (20250915)'},
              {value:'YYMMDD',   label:'JJMMTT (250915)'},
              {value:'DD.MM.YYYY', label:'TT.MM.JJJJ (15.09.2025)'},
              {value:'DD.MM.YY',   label:'TT.MM.JJ (15.09.25)'},
              {value:'DD-MM-YYYY', label:'TT-MM-JJJJ (15-09-2025)'},
              {value:'YYYY-MM-DD', label:'JJJJ-MM-TT (2025-09-15)'},
            ];
            const DEFAULTS = {
              dispo:    ['{titel}','_','Dispo','_','Tag','{tag}'],
              drehplan: ['{titel}','_','Drehplan'],
              shotlist: ['{titel}','_','Shotlist','_','{modus}'],
              overview: ['{titel}','_','Uebersicht'],
            };
            const naming = s.exportNaming || {};
            const dateFormat = naming.dateFormat || 'DDMMYYYY';
            const getParts = key => naming[key+'Parts'] || DEFAULTS[key] || ['{titel}'];
            const setParts = (key, parts) => set('exportNaming', { ...naming, [key+'Parts']: parts, [key]: parts.filter(p=>p!=='custom').join('') });
            const formatDate = (fmt) => {
              const d = new Date(2025, 8, 15);
              const dd = String(d.getDate()).padStart(2,'0'), mm = String(d.getMonth()+1).padStart(2,'0'), yyyy = String(d.getFullYear()), yy = yyyy.slice(-2);
              return (fmt||'DDMMYYYY')
                .replace('YYYYMMDD',yyyy+mm+dd).replace('DDMMYYYY',dd+mm+yyyy)
                .replace('YYMMDD',yy+mm+dd).replace('DDMMYY',dd+mm+yy)
                .replace('YYYY',yyyy).replace('YY',yy).replace('MM',mm).replace('DD',dd);
            };
            const previewDate = formatDate(dateFormat);
            const makePreview = (parts) => parts.map(p => {
              if (p==='{titel}') return 'Projekttitel';
              if (p==='{tag}') return '1';
              if (p==='{datum}') return previewDate;
              if (p==='{modus}') return 'Drehreihenfolge';
              if (p==='custom') return '?';
              return p;
            }).join('');
            return (
              <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
                {/* Datumsformat */}
                <div>
                  <div style={{ fontSize:11, color:C.mid, marginBottom:5, fontWeight:600 }}>Datumsformat ({'{datum}'})</div>
                  <select style={{ ...S.input, fontSize:11, maxWidth:280 }}
                    value={dateFormat}
                    onChange={e => set('exportNaming', { ...naming, dateFormat: e.target.value })}>
                    {DATE_FORMATS.map(f => <option key={f.value} value={f.value}>{f.label}</option>)}
                  </select>
                </div>
                {/* Per-Dokument Einstellungen */}
                {[
                  ['dispo',    'Tagesdispo'],
                  ['drehplan', 'Drehplan'],
                  ['shotlist', 'Shotlist'],
                  ['overview', 'Übersicht'],
                ].map(([key, label]) => {
                  const parts = getParts(key);
                  const preview = makePreview(parts);
                  return (
                    <div key={key}>
                      <div style={{ fontSize:11, color:C.mid, marginBottom:5 }}>{label}</div>
                      <div style={{ display:'flex', gap:4, flexWrap:'wrap', alignItems:'center' }}>
                        {parts.map((part, pi) => (
                          <div key={pi} style={{ display:'flex', alignItems:'center', gap:2 }}>
                            {part === 'custom'
                              ? <input style={{ ...S.input, padding:'3px 6px', fontSize:11, width:90 }}
                                  placeholder="Freitext..."
                                  defaultValue=""
                                  onBlur={e => {
                                    const newParts = [...parts];
                                    newParts[pi] = e.target.value || '_';
                                    setParts(key, newParts);
                                  }} />
                              : <select style={{ ...S.input, padding:'3px 6px', fontSize:11 }}
                                  value={TOKENS.some(t=>t.value===part) ? part : 'custom'}
                                  onChange={e => {
                                    const newParts = [...parts];
                                    newParts[pi] = e.target.value;
                                    setParts(key, newParts);
                                  }}>
                                  {TOKENS.map(t => <option key={t.value} value={t.value}>{t.label}</option>)}
                                  {!TOKENS.some(t=>t.value===part) && <option value={part}>"{part}"</option>}
                                </select>}
                            {parts.length > 1 && (
                              <span onClick={() => setParts(key, parts.filter((_,i)=>i!==pi))}
                                style={{ cursor:'pointer', color:C.dim, fontSize:12, padding:'0 2px' }}>×</span>
                            )}
                          </div>
                        ))}
                        <span onClick={() => setParts(key, [...parts, '_'])}
                          style={{ cursor:'pointer', color:C.accent, fontSize:16, lineHeight:1, padding:'0 4px',
                            border:'1px solid '+C.border, borderRadius:4 }}>+</span>
                      </div>
                      <div style={{ fontSize:10, color:C.dim, marginTop:4, fontFamily:'monospace' }}>
                        Vorschau: {preview}.pdf
                      </div>
                    </div>
                  );
                })}
              </div>
            );
        })()}
      </div>
    </div>
  );
}

// ─── Drehtage ─────────────────────────────────────────────────────────────────
function ShootDays({ project, onChange }) {
  const drag = useDrag(project.shootDays, days => onChange({ ...project, shootDays: days }));
  const upd = (i, patch) => {
    const days = [...project.shootDays];
    days[i] = { ...days[i], ...patch };
    const updatedShots = project.shots.map(s =>
      s.type === "divider" && s.dividerType === "day" && s.shootDayId === days[i].id && patch.callTime
        ? { ...s, callTime: patch.callTime } : s
    );
    onChange({ ...project, shootDays: days, shots: updatedShots });
  };
  const add = () => onChange({ ...project, shootDays: [...project.shootDays, { id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" }] });
  const remove = i => onChange({ ...project, shootDays: project.shootDays.filter((_, j) => j !== i) });
  return (
    <div>
      <div style={{ ...S.row, marginBottom: 20 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Drehtage</h1>
        <button style={S.btn("primary")} onClick={add}><Icon name="plus" size={13} /> Drehtag</button>
      </div>
      {project.shootDays.map((day, i) => (
        <div key={day.id} onDragOver={e => drag.onOver(e, day.id)} onDrop={() => drag.onDrop(day.id)} onDragEnd={drag.onEnd}
          style={{ ...S.card, marginBottom: 10, opacity: drag.over === day.id ? 0.5 : 1 }}>
          <div style={S.row}>
            <span draggable onDragStart={() => drag.onStart(day.id)} style={{ color: C.dim, cursor: "grab", padding: "0 4px" }}><Icon name="drag" /></span>
            <span style={{ ...S.badge, flexShrink: 0 }}>Tag {i + 1}</span>
            <div style={{ flex: 1 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14 }}>
                <FG label="Datum"><input style={S.input} type="date" value={day.date} onChange={e => upd(i, { date: e.target.value })} /></FG>
                <FG label="Drehort-Adresse">
                  <input style={S.input} list={"sd-locs-"+day.id}
                    value={day.locationAddress||""} placeholder="Adresse oder aus Locations wählen..."
                    onChange={e => {
                      const matched = (project.locations||[]).find(l => locAddress(l)===e.target.value);
                      upd(i, { locationAddress: e.target.value, locationId: matched?.id||null });
                    }} />
                  <datalist id={"sd-locs-"+day.id}>
                    {[...new Set((project.locations||[]).map(l => locAddress(l)).filter(Boolean))].map(addr => (
                      <option key={addr} value={addr} />
                    ))}
                  </datalist>
                </FG>
                <FG label="Call Time" tip="Wird mit Shotlist synchronisiert">
                  <input style={S.input} type="time" value={day.callTime} onChange={e => upd(i, { callTime: e.target.value })} />
                </FG>
              </div>
              <FG label="Anmerkungen"><textarea style={S.ta} rows={2} value={day.notes} placeholder="Interne Notizen..." onChange={e => upd(i, { notes: e.target.value })} /></FG>
            </div>
            {project.crew.filter(p=>p.days.includes(i)).length + project.cast.filter(p=>p.days.includes(i)).length > 0 && (
              <div style={{ fontSize: 10, color: C.dim, marginTop: 4, display: "flex", gap: 14 }}>
                <span>Crew: <strong style={{ color: C.mid }}>{project.crew.filter(p=>p.days.includes(i)).length}</strong></span>
                <span>Cast: <strong style={{ color: C.mid }}>{project.cast.filter(p=>p.days.includes(i)).length}</strong></span>
                <span>Gesamt: <strong style={{ color: C.accent }}>{project.crew.filter(p=>p.days.includes(i)).length + project.cast.filter(p=>p.days.includes(i)).length}</strong> Personen</span>
              </div>
            )}

}

function CastingTab({ project, onChange }) {
  // Auto-compute cast days from scene assignments for display
  const cast = React.useMemo(() => {
    const computed = computeCastDaysFromScenes(project);
    return computed.cast || project.cast || [];
  }, [project]);
  const [lightbox, setLightbox] = React.useState(null);

  // Single unified drag state
  const dragRef = React.useRef(null); // { id: candidateId }
  const [dragOverId, setDragOverId] = React.useState(null); // candidate id being hovered
  const [dragOverRole, setDragOverRole] = React.useState(null); // role label being hovered

  // Derived: group cast by role (order preserved)
  const roleGroups = React.useMemo(() => {
    const seen = [], map = {};
    cast.forEach(p => {
      const k = p.role||'—';
      if (!map[k]) { seen.push(k); map[k]={roleLabel:k,candidates:[]}; }
      map[k].candidates.push(p);
    });
    return seen.map(k=>map[k]);
  }, [cast]);

  // ── updPerson: update + enforce one besetzt per role ────────────────────────
  const updPerson = (id, patch) => {
    let updated = cast.map(p => p.id===id ? {...p,...patch} : p);
    // If setting to besetzt: demote previous besetzt in same role to kandidat
    if (patch.castingStatus === 'besetzt') {
      const thisPerson = updated.find(p => p.id===id);
      updated = updated.map(p =>
        p.id!==id && p.role===thisPerson?.role && p.castingStatus==='besetzt'
          ? {...p, castingStatus:'kandidat'}
          : p
      );
    }
    onChange({ ...project, cast: updated });
  };

  const remPerson = id => {
    if(window.confirm('Kandidat entfernen?'))
      onChange({ ...project, cast: cast.filter(p=>p.id!==id) });
  };

  const addRole = () => {
    // Ensure unique role name
    const existingRoles = new Set(cast.map(p=>p.role));
    let newRoleName = 'Neue Rolle';
    let i = 2;
    while (existingRoles.has(newRoleName)) { newRoleName = 'Neue Rolle '+i; i++; }
    onChange({ ...project, cast:[...cast,
      { id:uid(), name:'', role:newRoleName, days:[], castingNote:'',
        castingPhoto:null, profileLink:'', showreelLink:'', castingtapeLink:'',
        castingStatus:'offen' }] });
  };

  const addCandidate = roleLabel => {
    onChange({ ...project, cast:[...cast,
      { id:uid(), name:'', role:roleLabel, days:[], castingNote:'',
        castingPhoto:null, profileLink:'', showreelLink:'', castingtapeLink:'',
        castingStatus:'kandidat' }] });
  };

  // ── Drag handlers ────────────────────────────────────────────────────────────
  const onDragStart = id => { dragRef.current = id; };
  const onDragOver = id => setDragOverId(id);
  const onDragEnd = () => { dragRef.current=null; setDragOverId(null); setDragOverRole(null); };

  // Called when dropping ON a candidate card (same or different role)
  const onDropOnCand = ({toType, toId, alt}) => {
    const fromId = dragRef.current;
    if (!fromId || fromId===toId) { onDragEnd(); return; }
    const fromP = cast.find(p=>p.id===fromId);
    const toP = cast.find(p=>p.id===toId);
    if (!fromP || !toP) { onDragEnd(); return; }

    if (fromP.role === toP.role) {
      // Same role → reorder
      const inRole = cast.filter(p=>p.role===fromP.role);
      const others = cast.filter(p=>p.role!==fromP.role);
      const fi=inRole.findIndex(p=>p.id===fromId);
      const ti=inRole.findIndex(p=>p.id===toId);
      const arr=[...inRole]; arr.splice(fi,1); arr.splice(ti,0,inRole[fi]);
      onChange({ ...project, cast:[...others,...arr] });
    } else {
      // Different role → move or copy
      if (alt) {
        onChange({ ...project, cast:[...cast, {...fromP, id:uid(), role:toP.role}] });
      } else {
        onChange({ ...project, cast:cast.map(p=>p.id===fromId?{...p,role:toP.role}:p) });
      }
    }
    onDragEnd();
  };

  // Called when dropping ON a role header zone
  const onDropOnRole = (toRole, alt) => {
    // Check if this is a ROLE reorder (roleFromRef set) or CANDIDATE move (dragRef set)
    const fromRole = roleFromRef.current;
    if (fromRole && fromRole !== toRole) {
      // Role reorder
      const order = roleGroups.map(g=>g.roleLabel);
      const fi=order.indexOf(fromRole), ti=order.indexOf(toRole);
      if(fi>=0 && ti>=0) {
        const arr=[...order]; arr.splice(fi,1); arr.splice(ti,0,fromRole);
        const sorted=arr.flatMap(r=>cast.filter(p=>(p.role||'—')===r));
        const rest=cast.filter(p=>!arr.includes(p.role||'—'));
        onChange({ ...project, cast:[...sorted,...rest] });
      }
      roleFromRef.current=null; setDragOverRole(null);
      return;
    }
    // Candidate move/copy to role
    const fromId = dragRef.current;
    if (!fromId) { onDragEnd(); return; }
    const fromP = cast.find(p=>p.id===fromId);
    if (!fromP || fromP.role===toRole) { onDragEnd(); return; }
    if (alt) {
      onChange({ ...project, cast:[...cast, {...fromP, id:uid(), role:toRole}] });
    } else {
      onChange({ ...project, cast:cast.map(p=>p.id===fromId?{...p,role:toRole}:p) });
    }
    onDragEnd();
  };

  // Role reorder (drag role header)
  const roleFromRef = React.useRef(null);
  const onRoleDragStart = label => { roleFromRef.current=label; };
  const onRoleDrop = toLabel => {
    const fromLabel = roleFromRef.current;
    if (!fromLabel || fromLabel===toLabel) { roleFromRef.current=null; return; }
    const order = roleGroups.map(g=>g.roleLabel);
    const fi=order.indexOf(fromLabel), ti=order.indexOf(toLabel);
    if(fi<0||ti<0){roleFromRef.current=null;return;}
    const arr=[...order]; arr.splice(fi,1); arr.splice(ti,0,fromLabel);
    const sorted=arr.flatMap(r=>cast.filter(p=>(p.role||'—')===r));
    const rest=cast.filter(p=>!arr.includes(p.role||'—'));
    onChange({ ...project, cast:[...sorted,...rest] });
    roleFromRef.current=null;
  };

  return (
    <div>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16 }}>
        <h1 style={S.h1}>Casting</h1>
        <span style={{ fontSize:10, color:C.dim, marginLeft:8 }}>
          Kandidaten ziehen zum Verschieben · ⌥+Ablegen zum Kopieren
        </span>
        <button style={{ ...S.btn('primary'), marginLeft:'auto' }} onClick={addRole}>
          + Rolle anlegen
        </button>
      </div>

      {roleGroups.length===0 && (
        <div style={{ ...S.card, color:C.dim, textAlign:'center', padding:40 }}>
          Noch keine Rollen. Klicke "+ Rolle anlegen" oder füge Darsteller in Cast & Crew hinzu.
        </div>
      )}

      {roleGroups.map((group, gi) => (
        <div key={group.roleLabel+gi} style={{ marginBottom:24 }}>
          {/* Role header — droppable + draggable */}
          <div
            onDragOver={e => { e.preventDefault(); setDragOverRole(group.roleLabel); }}
            onDrop={e => { e.preventDefault(); onDropOnRole(group.roleLabel, e.altKey); }}
            style={{ display:'flex', alignItems:'center', gap:8, marginBottom:10,
              paddingBottom:6, paddingTop:4,
              borderBottom:'2px solid '+(dragOverRole===group.roleLabel?'#4a7aab':'#2a2a3e'),
              borderRadius:4,
              background: dragOverRole===group.roleLabel ? '#12192a' : 'transparent',
              transition:'background 0.15s, border-color 0.15s' }}>
            {/* Role drag handle */}
            <span draggable
              onDragStart={e => {
                e.dataTransfer.effectAllowed='move';
                e.stopPropagation();
                // Clear any candidate drag state, this is a role drag
                dragRef.current = null;
                setCandOver(null);
                onRoleDragStart(group.roleLabel);
              }}
              onDragEnd={() => { roleFromRef.current=null; setDragOverRole(null); }}
              style={{ color:'rgba(255,255,255,0.5)', fontSize:16, flexShrink:0,
                cursor:'grab', padding:'2px 4px', userSelect:'none', WebkitUserSelect:'none',
                lineHeight:1 }}>⠿</span>
            <input
              key={'role-'+group.roleLabel}
              style={{ background:'transparent', border:'none', color:C.accent,
                fontSize:14, fontWeight:700, fontFamily:'inherit', outline:'none', flex:1 }}
              defaultValue={group.roleLabel==='—'?'':group.roleLabel}
              placeholder='Rollenname (Figur)...'
              onClick={e => e.stopPropagation()}
              onBlur={e => {
                const newRole = e.target.value.trim() || group.roleLabel;
                if (newRole !== group.roleLabel) {
                  onChange({ ...project,
                    cast: cast.map(p=>p.role===group.roleLabel?{...p,role:newRole}:p) });
                }
              }} />
            <span style={{ fontSize:11, color:C.dim, flexShrink:0 }}>
              {group.candidates.length} Kandidat{group.candidates.length!==1?'en':''}
            </span>
            <button style={{ ...S.btn('xs'), fontSize:10, flexShrink:0 }}
              onClick={e => { e.stopPropagation(); addCandidate(group.roleLabel); }}>
              + Kandidat
            </button>
          </div>

          {/* Drop zone for moving candidates to this role (when no candidates yet) */}
          <div
            onDragOver={e => { e.preventDefault(); setDragOverRole(group.roleLabel); }}
            onDrop={e => { e.preventDefault(); onDropOnRole(group.roleLabel, e.altKey); }}
            style={{ display:'grid',
              gridTemplateColumns:'repeat(auto-fill, minmax(190px, 1fr))', gap:12,
              minHeight: group.candidates.length===0 ? 80 : 0 }}>
            {group.candidates.map(p => (
              <CandidateCard key={p.id} p={p}
                updPerson={updPerson} remPerson={remPerson} setLightbox={setLightbox}
                dragOver={dragOverId===p.id}
                onDragStart={onDragStart}
                onDragOver={onDragOver}
                onDrop={onDropOnCand}
                onDragEnd={onDragEnd}
              />
            ))}
            {group.candidates.length===0 && (
              <div style={{ border:'2px dashed #2a2a3e', borderRadius:8,
                display:'flex', alignItems:'center', justifyContent:'center',
                color:C.dim, fontSize:11, minHeight:70, gridColumn:'1/-1',
                background: dragOverRole===group.roleLabel ? '#12192a' : 'transparent' }}>
                Kandidaten hierher ziehen
              </div>
            )}
          </div>
        </div>
      ))}

      {lightbox && (
        <div onClick={()=>setLightbox(null)}
          style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:9999,
            display:'flex', alignItems:'center', justifyContent:'center',
            flexDirection:'column', gap:12 }}>
          <img src={lightbox.src} alt=""
            style={{ maxWidth:'90vw', maxHeight:'88vh', objectFit:'contain', borderRadius:8 }} />
          {lightbox.caption&&<div style={{color:'#ddd',fontSize:14}}>{lightbox.caption}</div>}
          <div style={{color:'#888',fontSize:11}}>Klicken zum Schließen</div>
        </div>
      )}
    </div>
  );
}

function CastCrew({ project, onChange }) {
  // Drehtage automatisch aus Szenen berechnen (read-only Anzeige)
  const cast = React.useMemo(() => {
    try {
      const computed = computeCastDaysFromScenes(project);
      return computed.cast || project.cast || [];
    } catch(e) { return project.cast || []; }
  }, [project.scenes, project.shots, project.shootDays, project.cast]);
  const crew = project.crew || [];

  const onCrewChange = newCrew => {
    const resp = project.settings.respPersons;
    if (!resp) { onChange({...project, crew:newCrew}); return; }
    const crewMap = {};
    newCrew.forEach(cr => { if (cr.role) crewMap[cr.role] = cr.name||''; });
    const newResp = resp.map(r => crewMap[r.label]!==undefined ? {...r,value:crewMap[r.label]} : r);
    onChange({...project, crew:newCrew, settings:{...project.settings, respPersons:newResp}});
  };

  // Build ordered unique roles
  // Compute which days each role is needed — purely from scene assignments
  const roleDayMap = React.useMemo(() => {
    const map = {};
    const sceneDayMap = {};
    const groups = buildGroups(project.shots||[]);
    groups.forEach((group, gi) => {
      const sd = (project.shootDays||[]).find(d=>d.id===group.divider?.shootDayId);
      const di = sd ? project.shootDays.indexOf(sd) : gi;
      (group.shots||[]).forEach(s => {
        if (s.type==='shot' && s.scene) {
          if (!sceneDayMap[s.scene]) sceneDayMap[s.scene] = new Set();
          sceneDayMap[s.scene].add(di);
        }
      });
    });
    (project.scenes||[]).forEach(sc => {
      (sc.castRoles||[]).forEach(role => {
        if (!map[role]) map[role] = new Set();
        (sceneDayMap[sc.id]||new Set()).forEach(d => map[role].add(d));
      });
    });
    return map;
  }, [project.shots, project.scenes, project.shootDays]);

  const getUniqueRoles = () => {
    const seen = [], map = {};
    cast.forEach(p => {
      const role = p.role||'';
      if (!map[role]) { seen.push(role); map[role]=[]; }
      map[role].push(p);
    });
    return seen.map(role => {
      const besetzt = map[role].find(p=>p.castingStatus==='besetzt')||null;
      // Days: auto-computed from scene assignments (read-only display)
      const computedDays = [...(roleDayMap[role] || [])].sort((a,b)=>a-b);
      return { id: role||'__empty__', role, besetzt, days: computedDays };
    });
  };
  const roleRows = getUniqueRoles();

  const drag = useDrag(roleRows, reordered => {
    const newOrder = reordered.map(r=>r.role);
    const sorted = newOrder.flatMap(role => cast.filter(p=>p.role===role));
    const rest = cast.filter(p=>!newOrder.includes(p.role));
    onChange({...project, cast:[...sorted,...rest]});
  });

  const addCastRole = () => {
    const existing = new Set(cast.map(p=>p.role));
    let name='Neue Rolle'; let i=2;
    while(existing.has(name)){name='Neue Rolle '+i;i++;}
    onChange({...project, cast:[...cast,
      {id:uid(),name:'',role:name,days:[],castingStatus:'offen',
       castingNote:'',castingPhoto:null,profileLink:'',showreelLink:'',castingtapeLink:''}]});
  };

  const deleteCastRole = role => {
    if(!window.confirm('Alle Kandidaten für "'+role+'" entfernen?')) return;
    onChange({...project, cast:cast.filter(p=>p.role!==role)});
  };

  const renameCastRole = (oldRole, newRole) => {
    if(!newRole.trim()||newRole===oldRole) return;
    onChange({...project, cast:cast.map(p=>p.role===oldRole?{...p,role:newRole}:p)});
  };

  const setBesetzt = (role, name) => {
    let nc = [...cast];
    const existing = nc.find(p=>p.role===role&&p.castingStatus==='besetzt');
    if(existing) {
      nc = nc.map(p=>p.id===existing.id?{...p,name}:p);
    } else {
      const match = nc.find(p=>p.role===role&&p.name===name);
      if(match) {
        nc = nc.map(p=>p.role===role?{...p,castingStatus:p.id===match.id?'besetzt':'kandidat'}:p);
      } else if(name.trim()) {
        nc=[...nc,{id:uid(),name,role,days:[],castingStatus:'besetzt',
          castingNote:'',castingPhoto:null,profileLink:'',showreelLink:'',castingtapeLink:''}];
      }
    }
    onChange({...project,cast:nc});
  };

  const toggleDay = (role, di) => {
    // Use besetzt person if exists, else any person in this role (days stored on first)
    const b = cast.find(p=>p.role===role&&p.castingStatus==='besetzt')
           || cast.find(p=>p.role===role);
    if(!b) return;
    const days = b.days?.includes(di) ? b.days.filter(d=>d!==di) : [...(b.days||[]),di];
    // Store days on ALL persons in this role so they survive status changes
    onChange({...project, cast:cast.map(p=>p.role===role?{...p,days}:p)});
  };

  return (
    <div>
      <h1 style={S.h1}>Cast & Crew</h1>
      <div style={S.card}>
        <div style={{ ...S.row, marginBottom: 14 }}>
          <span style={{ ...S.ct, marginBottom: 0 }}>Cast</span>
          <button style={S.btn()} onClick={addCastRole}><Icon name="plus" size={14}/></button>
        </div>
        <table style={S.tbl}>
          <thead><tr>
            <th style={S.th}/><th style={S.th}>#</th>
            <th style={S.th}>Rolle / Figur</th>
            <th style={S.th}>Name (Besetzt)</th>
            {project.shootDays.map((_,i)=><th key={i} style={{...S.th,fontSize:9,padding:'2px 3px'}}>T{i+1}</th>)}
            <th style={S.th}/>
          </tr></thead>
          <tbody>
            {roleRows.map((row,idx)=>(
              <tr key={row.role} {...drag.row(row.id)}
                style={{background:drag.over===row.id?C.hover:'transparent',transition:'background 0.1s'}}>
                <td style={S.td}>
                  <span {...drag.handle(row.id)} style={{cursor:'grab',color:C.dim,fontSize:14,padding:'0 4px',userSelect:'none'}}>⠿</span>
                </td>
                <td style={S.td}><span style={{color:C.dim,fontSize:11}}>{idx+1}</span></td>
                <td style={S.td}>
                  <input key={'r-'+row.role} style={{...S.input,minWidth:100}}
                    defaultValue={row.role} placeholder="Figur / Rolle..."
                    onBlur={e=>renameCastRole(row.role,e.target.value)}/>
                </td>
                <td style={S.td}>
                  <input key={'n-'+row.role} style={{...S.input,minWidth:120,
                    color:row.besetzt?'#ccc':C.dim, fontStyle:row.besetzt?'normal':'italic'}}
                    defaultValue={row.besetzt?.name||''} placeholder="— noch unbesetzt —"
                    onBlur={e=>setBesetzt(row.role,e.target.value)}/>
                </td>
                {project.shootDays.map((_,di)=>(
                  <td key={di} style={{...S.td,textAlign:'center'}}>
                    <input type="checkbox"
                      checked={!!(row.days?.includes(di))}
                      readOnly
                      onChange={()=>{}}
                      title="Wird automatisch aus den Szenen berechnet"
                      style={{ cursor:'not-allowed', opacity:0.4,
                        accentColor:'#888', filter:'grayscale(1)' }}/>
                  </td>
                ))}
                <td style={S.td}>
                  <button style={S.btn('danger')} onClick={()=>deleteCastRole(row.role)}>
                    <Icon name="trash" size={13}/>
                  </button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <h2 style={{...S.h2,marginTop:24}}>Crew</h2>
      <PersonTable type="crew" list={crew} shootDays={project.shootDays} onChange={onCrewChange}/>
    </div>
  );
}


function Catering({ project, onChange }) {
  // Catering data: per person { id, diet: "fleisch"|"vegetarisch"|"vegan"|"" }
  const cateringData = project.cateringData || {};
  const setDiet = (personId, diet) => {
    onChange({ ...project, cateringData: { ...cateringData, [personId]: { ...(cateringData[personId] || {}), diet } } });
  };

  const allPersons = [...project.crew, ...project.cast];

  const DIET_OPTS = [
    { value: "fleisch",      label: "Fleisch",      color: "#c05030" },
    { value: "vegetarisch",  label: "Vegetarisch",  color: "#508050" },
    { value: "vegan",        label: "Vegan",        color: "#305880" },
    { value: "",             label: "-",            color: C.dim },
  ];

  // Summary per day
  const daySummary = project.shootDays.map((d, di) => {
    const presentPersons = allPersons.filter(p => p.days.includes(di));
    const counts = { total: presentPersons.length, fleisch: 0, vegetarisch: 0, vegan: 0, unbekannt: 0 };
    presentPersons.forEach(p => {
      const diet = cateringData[p.id]?.diet || "";
      if (diet === "fleisch") counts.fleisch++;
      else if (diet === "vegetarisch") counts.vegetarisch++;
      else if (diet === "vegan") counts.vegan++;
      else counts.unbekannt++;
    });
    return { day: d, dayIdx: di, ...counts };
  });

  return (
    <div>
      <h1 style={S.h1}>Catering</h1>

      {/* Day overview */}
      <div style={S.card}>
        <div style={S.ct}>Uebersicht nach Drehtagen</div>
        <table style={S.tbl}>
          <thead><tr>
            {["Tag", "Datum", "Location", "Gesamt", "Fleisch", "Vegetarisch", "Vegan", "Unbekannt"].map(h =>
              <th key={h} style={S.th}>{h}</th>)}
          </tr></thead>
          <tbody>
            {daySummary.map(s => (
              <tr key={s.dayIdx}>
                <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>{s.dayIdx + 1}</td>
                <td style={S.td}>{s.day.date ? fmtDate(s.day.date) : "-"}</td>
                <td style={S.td}>{s.day.locationTitle || s.day.location || "-"}</td>
                <td style={{ ...S.td, fontWeight: 700 }}>{s.total}</td>
                <td style={{ ...S.td, color: "#c05030" }}>{s.fleisch || "-"}</td>
                <td style={{ ...S.td, color: "#508050" }}>{s.vegetarisch || "-"}</td>
                <td style={{ ...S.td, color: "#305880" }}>{s.vegan || "-"}</td>
                <td style={{ ...S.td, color: C.dim }}>{s.unbekannt || "-"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {/* Per-person diet */}
      {["Crew", "Cast"].flatMap(group => {
        const list = group === "Crew" ? project.crew : project.cast;
        if (!list.length) return [];
        return [(
          <div key={group} style={S.card}>
            <div style={S.ct}>{group}</div>
            <table style={S.tbl}>
              <thead><tr>
                <th style={S.th}>#</th>
                <th style={S.th}>Name</th>
                <th style={S.th}>{group === "Crew" ? "Position" : "Rolle"}</th>
                <th style={S.th}>Drehtage</th>
                <th style={S.th}>Ernaehrung</th>
              </tr></thead>
              <tbody>
                {list.map((p, idx) => {
                  const diet = cateringData[p.id]?.diet || "";
                  return (
                    <tr key={p.id}>
                      <td style={{ ...S.td, color: C.dim, fontSize: 10 }}>{idx + 1}</td>
                      <td style={S.td}>{p.name || "-"}</td>
                      <td style={{ ...S.td, color: C.mid }}>{p.role}</td>
                      <td style={{ ...S.td, fontSize: 10, color: C.dim }}>
                        {p.days.length > 0 ? p.days.map(d => "T" + d+1).join(", ") : "-"}
                      </td>
                      <td style={S.td}>
                        <div style={{ display: "flex", gap: 6 }}>
                          {DIET_OPTS.map(opt => (
                            <button key={opt.value} onClick={() => setDiet(p.id, opt.value)}
                              style={{
                                ...S.btn("xs"),
                                background: diet === opt.value ? opt.color : "transparent",
                                color: diet === opt.value ? "#fff" : opt.color,
                                border: "1px solid " + opt.color,
                                opacity: diet === opt.value ? 1 : 0.5,
                              }}>
                              {opt.label}
                            </button>
                          ))}
                        </div>
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )];
      })}
    </div>
  );
}

        </div>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", marginBottom:6 }}>
          {assignees.map((a,ai) => (
            <div key={ai} style={{ display:"flex", alignItems:"center", gap:2,
              background:C.hover, borderRadius:4, padding:"2px 6px", fontSize:11 }}>
              <span>{a}</span>
              <span style={{ cursor:"pointer", color:C.dim, marginLeft:2 }}
                onClick={() => upd(t.id,{assignees:assignees.filter((_,i)=>i!==ai)})}>×</span>
            </div>
          ))}
          <select style={{ ...S.input, width:150, fontSize:11 }}
            value="" onChange={e => {
              if(e.target.value && !assignees.includes(e.target.value))
                upd(t.id,{assignees:[...assignees, e.target.value]});
            }}>
            <option value="">+ Verantwortliche/r</option>
            {crew.filter(p=>p.name&&!assignees.includes(p.name)).map(p=>(
              <option key={p.id} value={p.name}>{p.name}{p.role?" ("+p.role+")":""}</option>

          <button style={S.btn("danger")} onClick={()=>rem(t.id)}>Löschen</button>
          <button style={S.btn("primary")} onClick={()=>setEditing(false)}>Fertig</button>
        </div>
      </div>
    );
  }

  // Compact list view
  return (
    <div style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px",
      marginBottom:4, borderRadius:6, background:t.done?"transparent":C.card,
      border:"1px solid "+C.border, borderLeft:"3px solid "+tf.color,

    </div>
  );
}


function TodoTab({ project, onChange }) {
  const todos = project.todos || [];
  const crew = [...(project.crew||[]), ...(project.cast||[])];
  const updTodos = t => onChange({ ...project, todos: t });
  const addTodo = () => updTodos([...todos, {
    id: uid(), text: "", done: false, timeframe: "mittel",
    department: "", assignees: [], dueDate: "", notes: ""
  }]);
  const upd = (id, patch) => updTodos(todos.map(t => t.id===id ? {...t,...patch} : t));
  const rem = id => { if(window.confirm("To-Do löschen?")) updTodos(todos.filter(t=>t.id!==id)); };

  // Filter state
  const [filterDept, setFilterDept] = React.useState("");
  const [filterAssignee, setFilterAssignee] = React.useState("");
  const [filterTf, setFilterTf] = React.useState("");
  const [filterDate, setFilterDate] = React.useState("");
  const [showDone, setShowDone] = React.useState(true);

  const filtered = todos.filter(t => {
    if (filterDept && t.department !== filterDept) return false;
    if (filterAssignee && !(t.assignees||[t.assignee]).includes(filterAssignee)) return false;
    if (filterTf && t.timeframe !== filterTf) return false;
    if (filterDate && t.dueDate !== filterDate) return false;
    return true;
  });
  const open = filtered.filter(t => !t.done);
  const done = filtered.filter(t => t.done);

  const allAssignees = [...new Set(todos.flatMap(t => t.assignees||(t.assignee?[t.assignee]:[])).filter(Boolean))];

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:12 }}>
        <h1 style={S.h1}>To-Do ({open.length} offen)</h1>
        <button style={S.btn("primary")} onClick={addTodo}>+ Aufgabe</button>
      </div>
      {/* Filter row */}
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:14, padding:"8px 12px",
        background:C.hover, borderRadius:8 }}>
        <span style={{ fontSize:11, color:C.dim, alignSelf:"center", fontWeight:600 }}>Filter:</span>
        <select style={{ ...S.input, fontSize:11, width:130 }} value={filterDept} onChange={e=>setFilterDept(e.target.value)}>
          <option value="">Alle Departments</option>
          {TODO_DEPARTMENTS.map(d=><option key={d} value={d}>{d}</option>)}
        </select>
        <select style={{ ...S.input, fontSize:11, width:130 }} value={filterAssignee} onChange={e=>setFilterAssignee(e.target.value)}>
          <option value="">Alle Personen</option>
          {allAssignees.map(a=><option key={a} value={a}>{a}</option>)}
        </select>
        <select style={{ ...S.input, fontSize:11, width:90 }} value={filterTf} onChange={e=>setFilterTf(e.target.value)}>
          <option value="">Zeitraum</option>
          {TODO_TIMEFRAMES.map(p=><option key={p.key} value={p.key}>{p.label}</option>)}
        </select>
        <input type="date" style={{ ...S.input, fontSize:11, width:130 }}
          value={filterDate} onChange={e=>setFilterDate(e.target.value)} />
        {(filterDept||filterAssignee||filterTf||filterDate) && (
          <button style={{ ...S.btn("xs"), fontSize:11 }}
            onClick={()=>{setFilterDept("");setFilterAssignee("");setFilterTf("");setFilterDate("");}}>
            ✕ Zurücksetzen
          </button>
        )}
      </div>
      {filtered.length === 0 && (
        <div style={{ ...S.card, color:C.dim, textAlign:"center", padding:40 }}>
          {todos.length === 0 ? 'Keine Aufgaben. Klicke auf "+ Aufgabe" um zu beginnen.' : 'Keine Ergebnisse für diese Filter.'}
        </div>
      )}
      {open.map(t => <TodoItem key={t.id} t={t} upd={upd} rem={rem} crew={crew} />)}
      {done.length > 0 && (
        <div style={{ marginTop:16 }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8, cursor:"pointer" }}
            onClick={()=>setShowDone(v=>!v)}>
            <span style={{ fontSize:11, color:C.dim, fontWeight:600, letterSpacing:"0.08em" }}>
              ERLEDIGT ({done.length})
            </span>
            <span style={{ fontSize:11, color:C.dim }}>{showDone?"▾":"▸"}</span>
          </div>
          {showDone && done.map(t => <TodoItem key={t.id} t={t} upd={upd} rem={rem} crew={crew} />)}
        </div>
      )}
    </div>
  );
}


// ─── Fahrzeuge Tab ────────────────────────────────────────────────────────────
function FahrzeugeTab({ project, onChange }) {
  // Merge crew vehicles into fahrzeuge on mount (if not already there)
  const rawFahrzeuge = project.fahrzeuge || [];
  const crew = project.crew || [];

  // Sync: crew vehicles that have a crew-linked fahrzeug entry
  // When driver changes in Fahrzeuge, update crew.vehicle too
  const updF = newF => {
    // Also sync driver back to crew: if a crew member is driver, update their vehicle field
    let newCrew = [...crew];
    newF.forEach(f => {
      if (f.crewId) {
        newCrew = newCrew.map(p => p.id===f.crewId ? {...p, vehicle:f.name, driver:f.driver} : p);
      } else if (f.driver) {
        // Match by name
        newCrew = newCrew.map(p => p.name===f.driver ? {...p, vehicle:f.name} : p);
      }
    });
    onChange({ ...project, fahrzeuge: newF, crew: newCrew });
  };

  // Build unified fahrzeuge list: start with project.fahrzeuge,
  // then add crew vehicles not yet listed
  const crewVehicles = crew.filter(p => p.vehicle);
  const fahrzeuge = React.useMemo(() => {
    let list = [...rawFahrzeuge];
    crewVehicles.forEach(p => {
      const already = list.find(f => f.crewId===p.id || f.name===p.vehicle);
      if (!already) {
        list = [...list, { id:'crew_'+p.id, crewId:p.id, name:p.vehicle||"", type:"", plate:"", driver:p.name, seats:"", notes:"" }];
      }
    });
    return list;
  }, [rawFahrzeuge, crew]);

  const addF = () => updF([...fahrzeuge, {
    id: uid(), name: "", type: "", plate: "", driver: "", seats: "", notes: ""
  }]);
  const upd = (id, patch) => updF(fahrzeuge.map(f => f.id===id ? {...f,...patch} : f));
  const rem = id => { if(window.confirm("Fahrzeug löschen?")) updF(fahrzeuge.filter(f=>f.id!==id)); };

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>
        <h1 style={S.h1}>Fahrzeuge</h1>
        <button style={S.btn("primary")} onClick={addF}>+ Fahrzeug</button>
      </div>
      
      {fahrzeuge.length === 0 && (
        <div style={{ ...S.card, color:C.dim, textAlign:"center", padding:40 }}>
          Keine Fahrzeuge. Klicke auf "+ Fahrzeug" um Produktionsfahrzeuge hinzuzufügen.
        </div>
      )}
      {fahrzeuge.map(f => (
        <div key={f.id} style={{ ...S.card, marginBottom:10 }}>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <input style={{ ...S.input, flex:2, minWidth:140, fontWeight:600 }}
              value={f.name} placeholder="Fahrzeug-Bezeichnung (zB Kamera-Van)"
              onChange={e=>upd(f.id,{name:e.target.value})} />
            <input style={{ ...S.input, flex:1, minWidth:100 }}
              value={f.type} placeholder="Typ (zB Transporter)"
              onChange={e=>upd(f.id,{type:e.target.value})} />
            <input style={{ ...S.input, width:110 }}
              value={f.plate} placeholder="Kennzeichen"
              onChange={e=>upd(f.id,{plate:e.target.value})} />
            <input style={{ ...S.input, width:50 }}
              value={f.seats} placeholder="Sitze"
              onChange={e=>upd(f.id,{seats:e.target.value})} />
            <select style={{ ...S.input, width:150 }}
              value={f.driver} onChange={e=>upd(f.id,{driver:e.target.value})}>
              <option value="">— Fahrer/in —</option>
              {crew.filter(p=>p.name).sort((a,b)=>{
                const dA=(a.role||'').toLowerCase().includes('fahrer');
                const dB=(b.role||'').toLowerCase().includes('fahrer');
                return (dB?1:0)-(dA?1:0);
              }).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
            </select>
            <button style={S.btn("danger")} onClick={()=>rem(f.id)}>×</button>
          </div>
          <input style={{ ...S.input, width:"100%", marginTop:6, fontSize:11, color:"#888" }}
            value={f.notes} placeholder="Notizen..."
            onChange={e=>upd(f.id,{notes:e.target.value})} />
        </div>
      ))}
    </div>
  );
}

const LOC_STATUSES = [
  { key: "offen",      label: "Noch nicht gefunden", color: "#666" },
  { key: "kandidat",   label: "In der Auswahl",      color: "#a07020" },
  { key: "gefunden",   label: "Gefunden",             color: "#2060a0" },
  { key: "angefragt",  label: "Angefragt",            color: "#8040a0" },
  { key: "zugesagt",   label: "Zugesagt",             color: "#206040" },
];

// Build a display address from a location object (skips empty fields)
function locAddress(loc) {
  if (!loc) return "";
  // Support old format (loc.address) and new format (loc.street, loc.city etc)
  if (loc.street || loc.city) {
    return [loc.name, loc.street, loc.zip && loc.city ? loc.zip + " " + loc.city : (loc.zip||loc.city), loc.country, loc.extra1, loc.extra2]
      .filter(Boolean).join(", ");
  }
  return loc.address || loc.title || "";
}

// Build just the name/title part
function locTitle(loc) {
  if (!loc) return "";
  return loc.title || loc.name || "";  // loc.title = "Location-Name" field at top
}

function LocationsTab({ project, onChange }) {
  const locs = project.locations || [];
  const updLocs = newLocs => onChange({ ...project, locations: newLocs });
  const addLoc = () => updLocs([...locs, {

    sections: [{ id: uid(), title: "Ansicht", photos: [] }], notes: ""
  }]);
  const updLoc = (id, patch) => updLocs(locs.map(l => l.id===id ? {...l,...patch} : l));
  const remLoc = id => { if(window.confirm("Location wirklich löschen?")) updLocs(locs.filter(l => l.id!==id)); };

  const [open, setOpen] = React.useState({});
  const toggle = id => setOpen(o => ({...o, [id]: !o[id]}));
  const [lightbox, setLightbox] = React.useState(null); // {src, caption}
  const dragLocRef = React.useRef(null);
  const [dragOver, setDragOver] = React.useState(null);

  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:16 }}>

        <button style={S.btn("primary")} onClick={addLoc}>+ Location</button>

      {locs.length === 0 && (
        <div style={{ ...S.card, color: C.dim, textAlign:"center", padding:40 }}>

        </div>
      )}
      {locs.map(loc => {
        const st = LOC_STATUSES.find(s => s.key===loc.status) || LOC_STATUSES[0];
        const isOpen = open[loc.id];
        return (
          <div key={loc.id}
              draggable={false}
              onDragOver={e=>{e.preventDefault();setDragOver(loc.id);}}
              onDrop={e=>{e.preventDefault();if(dragLocRef.current&&dragLocRef.current!==loc.id){const from=locs.findIndex(l=>l.id===dragLocRef.current);const to=locs.findIndex(l=>l.id===loc.id);if(from>=0&&to>=0){const nl=[...locs];nl.splice(to,0,nl.splice(from,1)[0]);updLocs(nl);}};setDragOver(null);}}
              onDragEnd={()=>setDragOver(null)}
              style={{ ...S.card, marginBottom:12, opacity:dragOver===loc.id?0.6:1, outline:dragOver===loc.id?"2px solid "+C.accent:"none" }}>
            {/* Header */}
            <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
              <span draggable onDragStart={()=>{dragLocRef.current=loc.id;}} style={{ color:C.dim, cursor:"grab", padding:"0 4px", fontSize:14 }}>⠿</span>
              <button onClick={() => toggle(loc.id)}
                style={{ background:"none", border:"none", color:C.accent, fontSize:16, cursor:"pointer", padding:"0 4px" }}>
                {isOpen ? "▾" : "▸"}
              </button>
              <input style={{ ...S.input, flex:1, fontWeight:700, fontSize:15 }}

              {/* Status Badge */}
              <select
                value={loc.status}
                onChange={e => updLoc(loc.id, { status: e.target.value })}
                style={{ ...S.input, color: st.color, fontWeight:600, minWidth:160, border:"2px solid "+st.color }}>
                {LOC_STATUSES.map(s => <option key={s.key} value={s.key}>{s.label}</option>)}
              </select>
              <button style={S.btn("danger")} onClick={() => remLoc(loc.id)}>×</button>
            </div>
            {isOpen && (
              <div style={{ marginTop:12 }}>
                <div style={S.g2}>
                  <FG label="Name / Studio (optional)">
                    <input style={S.input} value={loc.name||""} placeholder="z.B. Studio Berlin, Fabrikhalle..."
                      onChange={e => updLoc(loc.id, { name: e.target.value })} />
                  </FG>
                  <FG label="Straße + Nr.">
                    <input style={S.input} value={loc.street||""} placeholder="Musterstraße 12"
                      onChange={e => updLoc(loc.id, { street: e.target.value })} />
                  </FG>
                  <div style={{ display:"grid", gridTemplateColumns:"100px 1fr", gap:8 }}>
                    <FG label="PLZ"><input style={S.input} value={loc.zip||""} placeholder="10115"
                      onChange={e => updLoc(loc.id, { zip: e.target.value })} /></FG>
                    <FG label="Ort"><input style={S.input} value={loc.city||""} placeholder="Berlin"
                      onChange={e => updLoc(loc.id, { city: e.target.value })} /></FG>
                  </div>
                  <FG label="Land (optional)">
                    <input style={S.input} value={loc.country||""} placeholder="Deutschland"
                      onChange={e => updLoc(loc.id, { country: e.target.value })} />
                  </FG>
                  <FG label="Adresszusatz 1 (optional)">
                    <input style={S.input} value={loc.extra1||""} placeholder="Hinterhof, 3. Etage..."
                      onChange={e => updLoc(loc.id, { extra1: e.target.value })} />
                  </FG>
                  <FG label="Adresszusatz 2 (optional)">
                    <input style={S.input} value={loc.extra2||""} placeholder="Klingel: Schmidt..."
                      onChange={e => updLoc(loc.id, { extra2: e.target.value })} />
                  </FG>
                  <FG label="Notizen">
                    <textarea style={{ ...S.input, minHeight:48, fontFamily:"inherit" }}
                      value={loc.notes||""} placeholder="Notizen..."
                      onChange={e => updLoc(loc.id, { notes: e.target.value })} />
                  </FG>
                </div>
                {/* Rückbezug: Szenen + Drehtage */}
                {(() => {
                  const locAddr = locAddress(loc);
                  const locName = locTitle(loc);
                  // Match scenes: by locationId, matching address, or matching motivname
                  const relScenes = project.scenes.filter(sc =>
                    sc.locationId === loc.id ||
                    (locAddr && sc.locationAddress === locAddr) ||
                    (loc.title && sc.locationTitle === loc.title)
                  );
                  const relSceneIds = new Set(relScenes.map(sc => sc.id));
                  // Find shooting days via Drehplan shot order
                  const relDays = project.shootDays.map((d, di) => {
                    const dayDiv = project.shots.find(s => s.type==='divider' && s.dividerType==='day' && s.shootDayId===d.id);
                    if (dayDiv) {
                      const divIdx = project.shots.indexOf(dayDiv);
                      const nextDivIdx = project.shots.findIndex((s,k) => k>divIdx && s.type==='divider' && s.dividerType==='day');
                      const slice = project.shots.slice(divIdx+1, nextDivIdx<0 ? undefined : nextDivIdx);
                      const hasScene = slice.some(s => s.type==='shot' && relSceneIds.has(s.scene));
                      if (hasScene || d.locationAddress===locAddr || d.locationId===loc.id) return {d, di};
                    } else if (d.locationAddress===locAddr || d.locationId===loc.id) {
                      return {d, di};
                    }
                    return null;
                  }).filter(Boolean);
                  if(relScenes.length===0&&relDays.length===0) return null;
                  return (
                    <div style={{ borderTop:"1px solid "+C.border, paddingTop:10, marginTop:4 }}>
                      {relScenes.length>0&&<div style={{ marginBottom:6 }}>
                        <div style={{ fontSize:11, color:C.dim, marginBottom:4, fontWeight:600 }}>SZENEN ({relScenes.length})</div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                          {relScenes.map(sc=><span key={sc.id} style={{ ...S.badge, background:"#1a2a3a", fontSize:10 }}>#{sc.number} {sc.title||sc.locationTitle||"?"}</span>)}
                        </div>
                      </div>}
                      {relDays.length>0&&<div>
                        <div style={{ fontSize:11, color:C.dim, marginBottom:4, fontWeight:600 }}>DREHTAGE</div>
                        <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                          {relDays.map(({d,di})=><span key={d.id} style={{ ...S.badge, background:"#1a3a2a", fontSize:10 }}>Tag {di+1}{d.date?" · "+d.date:""}</span>)}
                        </div>
                      </div>}
                    </div>
                  );
                })()}
                {/* Sections mit Foto-Upload */}
                {(loc.sections||[]).map((sec, si) => (
                  <div key={sec.id} style={{ marginTop:12, borderTop:"1px solid "+C.border, paddingTop:12 }}>
                    <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:8 }}>
                      <input style={{ ...S.input, flex:1, fontWeight:600 }}
                        value={sec.title} placeholder="Abschnitts-Name (zB Ansicht, Sonnenstand...)"
                        onChange={e => {
                          const newSec = (loc.sections||[]).map((s,i) => i===si ? {...s,title:e.target.value} : s);
                          updLoc(loc.id, { sections: newSec });
                        }} />
                      <button style={S.btn("danger")} onClick={() => {
                        const newSec = (loc.sections||[]).filter((_,i) => i!==si);
                        updLoc(loc.id, { sections: newSec });
                      }}>×</button>
                    </div>
                    {/* Fotos */}
                    <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                      {(sec.photos||[]).map((photo, pi) => (
                        <div key={pi} style={{ position:"relative" }}>
                          <img src={photo} alt="" onClick={() => setLightbox({src:photo, caption:sec.title})}
                            style={{ width:180, height:135, objectFit:"cover", borderRadius:4, border:"1px solid "+C.border, cursor:"pointer" }} />
                          <div style={{ position:"absolute", top:2, right:2, display:"flex", gap:2 }}>
                            <a href={photo} download={"foto-"+pi+".jpg"}

                            <button onClick={() => {
                              const newPhotos = (sec.photos||[]).filter((_,i)=>i!==pi);
                              const newSec = (loc.sections||[]).map((s,i)=>i===si?{...s,photos:newPhotos}:s);
                              updLoc(loc.id,{sections:newSec});
                            }} style={{ background:"rgba(0,0,0,0.7)",color:"#fff",border:"none",borderRadius:"50%",width:20,height:20,cursor:"pointer",fontSize:12,lineHeight:"20px",textAlign:"center" }}>×</button>
                          </div>
                        </div>
                      ))}
                      {/* Upload Button */}
                      <label style={{ width:180, height:135, border:"2px dashed "+C.border, borderRadius:4, display:"flex", alignItems:"center", justifyContent:"center", cursor:"pointer", color:C.dim, fontSize:11, flexDirection:"column", gap:4 }}>
                        <span style={{ fontSize:20 }}>+</span>
                        <span>Foto</span>
                        <input type="file" accept="image/*" multiple style={{ display:"none" }}
                          onChange={e => {
                            const files = Array.from(e.target.files||[]);
                            files.forEach(file => {
                              const r = new FileReader();
                              r.onload = ev => {
                                // Compress image
                                const img2 = new window.Image();
                                img2.onload = () => {
                                  const cv = document.createElement("canvas");
                                  const MAX = 600;
                                  const ratio = Math.min(MAX/img2.width,MAX/img2.height,1);
                                  cv.width=Math.round(img2.width*ratio); cv.height=Math.round(img2.height*ratio);
                                  const ctx2=cv.getContext("2d"); ctx2.fillStyle="#fff"; ctx2.fillRect(0,0,cv.width,cv.height);
                                  ctx2.drawImage(img2,0,0,cv.width,cv.height);
                                  const compressed = cv.toDataURL("image/jpeg",0.88);
                                  updLocs(project.locations.map(l => l.id===loc.id ? {
                                    ...l, sections: (l.sections||[]).map((s,i)=>i===si?{...s,photos:[...(s.photos||[]),compressed]}:s)
                                  } : l));
                                };
                                img2.src = ev.target.result;
                              };
                              r.readAsDataURL(file);
                            });
                            e.target.value="";
                          }} />
                      </label>
                    </div>
                  </div>
                ))}
                <button style={{ ...S.btn("secondary"), marginTop:10 }} onClick={() => {
                  const newSec = [...(loc.sections||[]), { id:uid(), title:"Neuer Abschnitt", photos:[] }];
                  updLoc(loc.id, { sections: newSec });
                }}>+ Abschnitt</button>
              </div>
            )}
          </div>
        );
      })}
      {lightbox && (

// ─── Sync cast days from scene→role assignments ───────────────────────────────
function computeCastDaysFromScenes(project) {
  const { scenes, shots, shootDays, cast } = project;
  
  // Build: sceneId → set of dayIndices
  const sceneDayMap = {};
  const groups = buildGroups(shots);
  groups.forEach((group, gi) => {
    const shootDay = shootDays.find(d => d.id === group.divider?.shootDayId);
    const dayIdx = shootDay ? shootDays.indexOf(shootDay) : gi;
    group.shots.forEach(s => {
      if (s.type === 'shot' && s.scene) {
        if (!sceneDayMap[s.scene]) sceneDayMap[s.scene] = new Set();
        sceneDayMap[s.scene].add(dayIdx);
      }
    });
  });

  // Build: role → set of dayIndices (from all scenes that use that role)
  const roleDayMap = {};
  scenes.forEach(sc => {
    const roles = sc.castRoles || [];
    const days = sceneDayMap[sc.id] || new Set();
    roles.forEach(role => {
      if (!roleDayMap[role]) roleDayMap[role] = new Set();
      days.forEach(d => roleDayMap[role].add(d));
    });
  });

  // Update cast: days purely from scene assignments (auto-computed)
  const newCast = cast.map(p => {
    const autoDays = [...(roleDayMap[p.role] || [])].sort((a,b)=>a-b);
    return { ...p, days: autoDays };
  });

  return { ...project, cast: newCast };
}


function RollenDropdown({ allRoles, selected, onChange }) {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    const handler = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', handler);
    return () => document.removeEventListener('mousedown', handler);
  }, []);
  const toggle = role => onChange(selected.includes(role) ? selected.filter(r=>r!==role) : [...selected, role]);
  const label = 'Rollen auswaehlen...';
  return (
    <div ref={ref} style={{ position:'relative' }}>
      <div style={{ fontSize:11, fontWeight:600, color:C.dim, marginBottom:4 }}>
        Rollen in dieser Szene:
      </div>
      <div onClick={() => setOpen(v=>!v)}
        style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'5px 10px', border:'1px solid '+C.border, borderRadius:6,
          cursor:'pointer', fontSize:11, color:selected.length?'#ccc':C.dim,
          background:C.card, userSelect:'none' }}>

          {label}
        </span>
        <span style={{ marginLeft:6, opacity:0.5, flexShrink:0 }}>{open?'▲':'▼'}</span>

        <div style={{ position:'absolute', zIndex:200, top:'100%', left:0, right:0,
          background:C.card, border:'1px solid '+C.border, borderRadius:6,
          boxShadow:'0 4px 16px rgba(0,0,0,0.4)', marginTop:2,

                {role}

          <div style={{ padding:'6px 12px', borderTop:'1px solid '+C.border, textAlign:'right' }}>
            <span onClick={() => setOpen(false)}
              style={{ fontSize:10, color:C.dim, cursor:'pointer', textDecoration:'underline' }}>

        </div>
      )}
    </div>
  );
}
