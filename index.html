      `}</style>

      <nav style={{ ...S.side, display: sidebarOpen ? "flex" : "none", flexDirection:"column",
        position: window.innerWidth < 700 ? "fixed" : "sticky", zIndex: 100,
        height: "100vh", top: 0 }} className="no-print">
        <div style={{ ...S.sLogo, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize: 15, fontFamily: "'Syne',sans-serif", fontWeight: 800, letterSpacing: "0.06em" }}>SETDECK</div>
            <div style={{ fontSize: 9, color: C.dim, marginTop: 2, letterSpacing: "0.14em" }}>PRODUKTIONSPLANER</div>
          </div>
          <button onClick={() => setSidebarOpen(false)}
            style={{ background:"transparent", border:"none", color:C.dim, cursor:"pointer",
              fontSize:16, padding:"2px 6px" }}>✕</button>
        </div>
        <div style={{ padding: "6px 0", flex: active ? 0 : 1 }}>
          <div style={S.sSec}>Navigation</div>
          <div style={S.sItem(tab === "dashboard" && !showArchiveSidebar)} onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(false); }}>
            <Icon name="home" size={13} /> Dashboard
          </div>
          <div style={S.sItem(tab === "profil")} onClick={() => { setTab("profil"); setActiveId(null); setShowArchiveSidebar(false); }}>
            <Icon name="settings" size={13} /> Profil
          </div>
          {projects.filter(p=>p.archived).length > 0 && (
            <div style={{ ...S.sItem(showArchiveSidebar), paddingLeft: 30 }}
              onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(true); }}>
              ▪ Archiv
            </div>
          )}
        </div>
        {active && (
          <div style={{ flex: 1, overflowY: "auto" }}>
            <div style={S.sSec}>Projekt</div>
            <div style={{ fontSize: 11, color: C.mid, padding: "3px 18px 10px", borderBottom: "1px solid " + C.border, wordBreak: "break-word" }}>{active.name}</div>
            {NAV.map(item => (
              <div key={item.key} style={S.sItem(tab === item.key)} onClick={() => setTab(item.key)}>
                <Icon name={item.icon} size={13} /> {item.label}
              </div>
            ))}
          </div>
        )}
        <div style={{ padding: "10px 18px", borderTop: "1px solid " + C.border, background: "#0e0e16", marginTop: "auto" }}>
          {isSignedIn && (
            <div style={{ marginBottom: 8 }}>
              <button style={{ ...S.btn("danger"), fontSize: 10, padding: "3px 8px", width: "100%" }}
                onClick={deleteAccount}>Konto löschen</button>
            </div>
          )}
          <div style={{ fontSize: 10, color: "#555", marginBottom: 4 }}>Setdeck v1.0</div>
          <div style={{ display: "flex", gap: 10 }}>
            <span style={{ fontSize: 10, color: "#6090c0", cursor: "pointer", textDecoration: "underline" }}
              onClick={() => setShowImpressum(true)}>Impressum</span>
            <span style={{ color: "#333" }}>·</span>
            <span style={{ fontSize: 10, color: "#6090c0", cursor: "pointer", textDecoration: "underline" }}
              onClick={() => setShowDatenschutz(true)}>Datenschutz</span>
          </div>
        </div>
      </nav>
      <main style={S.main}>
        <div style={S.top} className="no-print">
          <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 12 }}>
            {!sidebarOpen && (
              <button onClick={() => setSidebarOpen(true)}
                style={{ background:"transparent", border:"none", color:C.mid, cursor:"pointer",
                  fontSize:18, padding:"0 4px", lineHeight:1 }}>☰</button>
            )}
            {active ? (
              <><span style={{ cursor: "pointer" }} onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(false); }}>Dashboard</span>
                <span style={{ color: C.border }}>/</span>
                {active.archived && <span style={{ background:"#3a2a00", color:"#c08000", border:"1px solid #604000", borderRadius:3, padding:"1px 6px", fontSize:10 }}>ARCHIVIERT</span>}
                <span>{active.name}</span>
                <span style={{ color: C.border }}>/</span>
                <span style={{ color: C.accent }}>{NAV.find(n => n.key === tab)?.label || tab}</span></>
            ) : <span>{showArchiveSidebar ? "Archiv" : "Dashboard"}</span>}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginLeft:"auto" }}>
            <span style={{ fontSize:10, color: saveStatus==="gespeichert" ? "#446644" : saveStatus==="speichert..." ? C.dim : "#884444" }}>
              {saveStatus==="gespeichert" ? "Gespeichert" : saveStatus==="speichert..." ? "Speichert..." : saveStatus}
            </span>
            {FIREBASE_READY ? (isSignedIn ? (
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {currentUser && currentUser.photo && (
                  <img src={currentUser.photo} style={{ width:22, height:22, borderRadius:"50%", border:"1px solid #333" }} alt="" />
                )}
                <span style={{ fontSize:10, color: cloudStatus==="synced" ? "#446644" : cloudStatus==="syncing" ? C.dim : "#884444" }}>
                  {cloudStatus==="synced" ? "Cloud ✓" : cloudStatus==="syncing" ? "Sync..." : "Cloud-Fehler"}
                </span>
                <button style={{ ...S.btn("xs"), fontSize:10 }} onClick={loadFromCloud} title="Neu laden">↓</button>
                <button style={{ ...S.btn("xs"), fontSize:10, color:"#a86" }} onClick={signOut}>Abmelden</button>
              </div>
            ) : (
              <button style={{ ...S.btn(), fontSize:10, background:"#1a2a1a", color:"#6a9", border:"1px solid #2a4a2a" }}
                onClick={() => setShowConsent(true)}>
                ☁ Anmelden
              </button>
            )) : (
              <span style={{ fontSize:10, color:"#555" }} title="Firebase nicht konfiguriert - nur lokale Speicherung">Lokal</span>
            )}
          </div>
        </div>
        <div style={S.body}>

          {tab === "profil" && <Profile />}
          {tab === "dashboard" && <Dashboard projects={projects} onSelect={openProject} onNew={newProject} onDelete={delProject} onDemo={demoProject} onExport={exportProject} onImport={importProject} onArchive={archiveProject} showArchive={showArchiveSidebar} setShowArchive={setShowArchiveSidebar} isSignedIn={isSignedIn} onSignIn={() => setShowConsent(true)} firebaseReady={FIREBASE_READY} />}
          {tab === "overview"  && active && <Overview  project={active} />}
          {tab === "settings"  && active && <Settings  project={active} onChange={updSync} />}
          {tab === "shootdays" && active && <ShootDays project={active} onChange={upd} />}
          {tab === "castcrew"  && active && <CastCrew  project={active} onChange={upd} />}
          {tab === "catering"  && active && <Catering  project={active} onChange={upd} />}
          {tab === "equipment" && active && <Equipment project={active} onChange={upd} />}
          {tab === "scenes"    && active && <Scenes    project={active} onChange={upd} />}
          {tab === "shotlist"  && active && <Shotlist  project={active} onChange={upd} mode={shotlistMode} setMode={setShotlistMode} />}
          {tab === "drehplan"  && active && <Drehplan  project={active} />}
          {tab === "dispos"    && active && <Dispos    project={active} onChange={upd} />}
        </div>
      </main>
    </div>
  );
}


  </script>
</body>
</html>
