function Continuity({ project, onChange }) {
  const [dayIdx, setDayIdx] = React.useState(0);
  const [sceneFilter, setSceneFilter] = React.useState('');
  const shootDays = project.shootDays || [];

  const dayShots = React.useMemo(() => {
    const allShots = [...(project.shots||[])].sort((a,b)=>(a.shootOrder||0)-(b.shootOrder||0));
    const dayDividers = allShots.filter(s=>s.type==='divider'&&s.dividerType==='day');
    const thisDivider = dayDividers[dayIdx];
    const nextDivider = dayDividers[dayIdx+1];
    if (!thisDivider) return [];
    const startOrder = thisDivider.shootOrder||0;
    const endOrder = nextDivider?.shootOrder ?? Infinity;
    return allShots.filter(s=>
      s.type==='shot' &&
      (s.shootOrder||0)>startOrder &&
      (s.shootOrder||0)<endOrder
    );
  }, [project.shots, shootDays, dayIdx]);

  // Local reorder state — stored in project.shootDays[dayIdx].continuityOrder
  const day = shootDays[dayIdx];
  const savedOrder = day?.continuityOrder || null;

  // Build ordered list: use savedOrder if present, else dayShots order
  const [localOrder, setLocalOrder] = React.useState(null);

  const orderedShots = React.useMemo(() => {
    const extras = day?.continuityExtraShots || [];
    const allItems = [...dayShots, ...extras];
    const orderIds = savedOrder || dayShots.map(s=>s.id);
    const existing = new Set(orderIds);
    // Add new regular shots and extra shots not yet in order
    const newIds = allItems.filter(s=>!existing.has(s.id)).map(s=>s.id);
    const fullOrder = [...orderIds, ...newIds];
    return fullOrder.map(id=>allItems.find(s=>s.id===id)).filter(Boolean);
  }, [dayShots, savedOrder, day?.continuityExtraShots]);

  const drag = useDrag(orderedShots.map(s=>({id:s.id})), reordered => {
    const newOrder = reordered.map(r=>r.id);
    const days = [...shootDays];
    days[dayIdx] = {...days[dayIdx], continuityOrder: newOrder};
    // Keep extra shots in sync
    onChange({...project, shootDays:days});
  });

  const filteredShots = sceneFilter
    ? orderedShots.filter(s=>{
        const sc = project.scenes.find(sc=>sc.id===s.scene);
        return (sc?.number+'').includes(sceneFilter)||(sc?.title||'').toLowerCase().includes(sceneFilter.toLowerCase());
      })
    : orderedShots;

  // Extra shots stored ONLY in shootDays[dayIdx].continuityExtraShots
  // They do NOT appear in project.shots (= not in Shotlist or AD-Sheet)
  const getExtraShots = () => day?.continuityExtraShots || [];
  const saveExtraShots = (extras) => {
    const days = [...shootDays];
    days[dayIdx] = {...days[dayIdx], continuityExtraShots: extras};
    onChange({...project, shootDays: days});
  };

  const addExtraShot = () => {
    const newShot = {
      id: uid(), isExtraInContinuity: true,
      shotNum: 'X', shotLetter: '', sceneNum: '', description: 'Extra Shot',
      dayNight: 'TAG', shootTime: '', continuityNote: '', takes: [],
    };
    const extras = getExtraShots();
    const days = [...shootDays];
    const curOrder = days[dayIdx]?.continuityOrder || dayShots.map(s=>s.id);
    days[dayIdx] = {...days[dayIdx],
      continuityExtraShots: [...extras, newShot],
      continuityOrder: [...curOrder, newShot.id]};
    onChange({...project, shootDays: days});
  };

  const updExtraShot = (shotId, patch) => {
    saveExtraShots(getExtraShots().map(s=>s.id===shotId?{...s,...patch}:s));
  };

  const delExtraShot = (shotId) => {
    if (!window.confirm('Extra-Shot löschen?')) return;
    const days = [...shootDays];
    const extras = getExtraShots().filter(s=>s.id!==shotId);
    const curOrder = (days[dayIdx]?.continuityOrder||[]).filter(id=>id!==shotId);
    days[dayIdx] = {...days[dayIdx], continuityExtraShots: extras, continuityOrder: curOrder};
    onChange({...project, shootDays: days});
  };

  const totalTakes = filteredShots.reduce((a,s)=>a+(s.takes?.length||0),0);

  if (!shootDays.length) return <div style={{padding:32,color:'#888'}}>Bitte zuerst Drehtage anlegen.</div>;

  return (
    <div style={{background:'#f7f7f7',minHeight:'100vh'}}>
      <div style={{background:'#1a1a2e',color:'#fff',padding:'12px 20px',
        display:'flex',alignItems:'center',gap:12,flexWrap:'wrap'}}>
        <h1 style={{margin:0,fontSize:18,fontWeight:700,letterSpacing:1}}>Continuity Sheet</h1>
        <select value={dayIdx} onChange={e=>setDayIdx(Number(e.target.value))}
          style={{background:'#2a2a44',color:'#fff',border:'1px solid #444',
            borderRadius:4,padding:'4px 8px',fontSize:12}}>
          {shootDays.map((d,i)=>(
            <option key={d.id} value={i}>Tag {i+1}{d.date?' – '+fmtDate(d.date):''}</option>
          ))}
        </select>
        <input value={sceneFilter} onChange={e=>setSceneFilter(e.target.value)}
          placeholder="Szene filtern..."
          style={{background:'#2a2a44',color:'#fff',border:'1px solid #444',
            borderRadius:4,padding:'4px 8px',fontSize:12,width:130}}/>
        <button onClick={addExtraShot}
          style={{background:'#2a2a44',border:'1px solid #556',color:'#aaf',
            borderRadius:4,padding:'4px 10px',fontSize:11,cursor:'pointer'}}>
          + Extra Shot
        </button>
        <span style={{fontSize:10,color:'#888',marginLeft:'auto'}}>
          {filteredShots.length} Shots · {totalTakes} Takes
        </span>
      </div>

      <div style={{padding:'12px 16px'}}>
        {filteredShots.length===0&&(
          <div style={{padding:32,textAlign:'center',color:'#aaa'}}>Keine Shots für diesen Drehtag.</div>
        )}
        {filteredShots.map(shot=>(
          <div key={shot.id} style={{display:'flex',gap:6,alignItems:'flex-start',marginBottom:10}}>
            {/* Drag handle */}
            <div style={{paddingTop:10,flexShrink:0}}>
              <span {...drag.handle(shot.id)}
                style={{cursor:'grab',color:'#bbb',fontSize:16,
                  userSelect:'none',display:'block',padding:'4px 2px'}}>⠿</span>
            </div>
            <div {...drag.row(shot.id)}
              style={{flex:1,background:drag.over===shot.id?'#e8f0ff':'transparent',
                borderRadius:8,transition:'background 0.1s'}}>
              <ContinuityShotCard
                shot={shot}
                project={project}
                onChange={onChange}
                onUpdExtra={shot.isExtraInContinuity ? (patch=>updExtraShot(shot.id,patch)) : null}
                onDelExtra={shot.isExtraInContinuity ? (()=>delExtraShot(shot.id)) : null}
              />
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function NavGroups({ groups, hiddenTabs, tab, setTab }) {
  const [collapsed, setCollapsed] = React.useState({});
  const toggle = label => setCollapsed(prev => ({...prev, [label]: !prev[label]}));

  return (
    <>
      {groups.map(group => {
        const visItems = group.items.filter(item => !hiddenTabs.includes(item.key));
        if (!visItems.length) return null;
        const isCollapsed = group.label ? !!collapsed[group.label] : false;
        return (
          <div key={group.label||'top'}>
            {group.label && (
              <div onClick={() => toggle(group.label)}
                style={{ fontSize:9, fontWeight:700, letterSpacing:'0.1em',
                  color:C.dim, padding:'10px 18px 3px', textTransform:'uppercase',
                  opacity:0.7, cursor:'pointer', display:'flex',
                  justifyContent:'space-between', alignItems:'center',
                  userSelect:'none', WebkitUserSelect:'none' }}>
                <span>{group.label}</span>
                <span style={{ fontSize:10, marginRight:4, opacity:0.5 }}>
                  {isCollapsed ? '▸' : '▾'}
                </span>
              </div>
            )}
            {!isCollapsed && visItems.map(item => (
              <div key={item.key} style={S.sItem(tab === item.key)}
                onClick={() => setTab(item.key)}>
                <Icon name={item.icon} size={13} /> {item.label}
              </div>
            ))}
          </div>
        );
      })}
    </>
  );
}

    const t = setTimeout(() => {
      try {
        window.localStorage.setItem(STORAGE_KEY, JSON.stringify(projects));
        setSaveStatus("gespeichert");
        if (isSignedIn && typeof syncToCloud === "function") syncToCloud(projects);
      } catch(e) {
        setSaveStatus("fehler: " + (e.message || "Speicher voll?"));
      }
    }, 600); // debounce 600ms
    return () => clearTimeout(t);
  }, [projects]);

  const active = projects.find(p => p.id === activeId);
  const upd = useCallback(p => setProjects(prev => prev.map(x => x.id === p.id ? { ...p, lastEdited: Date.now() } : x)), []);
  const updSync = useCallback(p => {
    // Sync: respPersons → nur bestehende Crew-Namen aktualisieren, KEINE neuen erstellen
    // (verhindert Duplikate bei buchstabenweisem Tippen)
    const resp = p.settings.respPersons || [];
    let crew = [...p.crew];
    resp.forEach(rp => {
      if (!rp.label || !rp.value) return;
      const existing = crew.find(c2 => c2.role === rp.label);
      if (existing) {
        crew = crew.map(c2 => c2.role === rp.label ? { ...c2, name: rp.value } : c2);
      }
      // Kein automatisches Hinzufügen neuer Crew-Einträge
    });
    upd({ ...p, crew });
  }, [upd]);
  const openProject = id => { setActiveId(id); setTab("overview"); };
  const newProject = name => { const p = makeProject(name); setProjects(prev => [...prev, p]); setActiveId(p.id); setTab("settings"); };
  const delProject = id => { setProjects(prev => prev.filter(p => p.id !== id)); setActiveId(null); setTab("dashboard"); };
  const archiveProject = (id, archived) => { setProjects(prev => prev.map(p => p.id === id ? { ...p, archived } : p)); };
  const deleteAccount = async () => {
    if (!window.confirm("Konto und ALLE lokalen Daten löschen? Das kann nicht rückgängig gemacht werden!")) return;
    let deleted = false;
    try {
      if (isSignedIn && typeof useFirebaseSync !== "undefined") {
        // Try to delete Firebase account
        const fbAuth = window._fbAuth;
        if (fbAuth && fbAuth.currentUser) {
          await fbAuth.currentUser.delete();
          deleted = true;
        }
      }
    } catch(e) {
      console.error("Account delete error:", e);
    }
    // Always clear local data
    localStorage.clear();
    setProjects([]);
    setActiveId(null);
    setTab("dashboard");
    signOut();
    if (!deleted) {
      alert("Deine lokalen Daten wurden gelöscht.\n\nUm auch dein Cloud-Konto vollständig zu löschen, schreibe bitte an:\nhi.setdeck@gmail.com");
    }
  };
  const demoProject = () => {
    try {
      const p = makeDemoProject();
      setProjects(prev => {
        const updated = [...prev, p];
        return updated;
      });
      setActiveId(p.id);
      setTab("settings");
      setShotlistMode("shoot");
    } catch(e) {
      console.error("Demo project error:", e);
      alert("Demo-Fehler: " + e.message + "\n\n" + (e.stack || ''));
    }
  };

  // Export single project as JSON file
  const exportProject = (proj) => {
    const blob = new Blob([JSON.stringify(proj, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = (proj.name || "projekt").replace(/[^a-zA-Z0-9_-]/g, "_") + ".setdeck.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  // Import project from JSON file
  const importProject = () => {
    const input = document.createElement("input");
    input.type = "file";
    input.accept = ".json,.setdeck.json";
    input.onchange = e => {
      const file = e.target.files?.[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const proj = JSON.parse(ev.target.result);
          if (!proj.id || !proj.shots) throw new Error("Keine gültige Setdeck-Datei.");
          proj.id = uid(); // new id to avoid conflicts
          setProjects(prev => [...prev, proj]);
          setActiveId(proj.id);
          setTab("overview");
        } catch(err) {
          alert("Import fehlgeschlagen: " + err.message);
        }
      };
      reader.readAsText(file);
    };
    input.click();
  };

  return (
    <div style={S.app}>
      {showPatchnotes && <PatchnotesModal onClose={closePatchnotes} />}
      {showConsent && <ConsentScreen onAccept={handleConsentAccept} onShowDatenschutz={() => setShowDatenschutz(true)} onShowImpressum={() => setShowImpressum(true)} />}

      {/* Impressum Modal */}
      {showImpressum && (
        <div style={{ position:"fixed", inset:0, background:"#000b", display:"flex",
          alignItems:"center", justifyContent:"center", zIndex:10000, padding:24 }}
          onClick={e => { if(e.target === e.currentTarget) setShowImpressum(false); }}>
          <div style={{ background:"#14141c", border:"1px solid #252535", borderRadius:10,
            padding:"32px 36px", maxWidth:520, width:"100%", maxHeight:"85vh",
            overflowY:"auto", fontFamily:"'DM Mono','Courier New',monospace" }}>
            <div style={{ fontSize:16, fontWeight:700, color:"#e8a020", marginBottom:20 }}>Impressum</div>
            <div style={{ fontSize:12, color:"#aaa", lineHeight:1.9 }}>
              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.12em", textTransform:"uppercase"}}>
                Angaben gemäß § 5 TMG
              </strong><br/><br/>
              <strong style={{color:"#ddd"}}>Name:</strong> Elias Müller<br/>
              <strong style={{color:"#ddd"}}>Anschrift:</strong> Mittlere Kreuzgasse 2, 90403 Nürnberg<br/>
              <strong style={{color:"#ddd"}}>Telefon:</strong> +49 176 57772673<br/>
              <strong style={{color:"#ddd"}}>E-Mail:</strong>{" "}
              <a href="mailto:kontakt@eliasmuellerfilm.de"
                style={{color:"#6090c0"}}>kontakt@eliasmuellerfilm.de</a><br/><br/>
              <hr style={{border:"none", borderTop:"1px solid #252535", margin:"14px 0"}} />
              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                Haftung für Inhalte
              </strong><br/>
              Die Inhalte dieser App wurden mit größter Sorgfalt erstellt. Für die Richtigkeit,
              Vollständigkeit und Aktualität der Inhalte können wir jedoch keine Gewähr übernehmen.
              Als Diensteanbieter sind wir gemäß § 7 Abs. 1 TMG für eigene Inhalte nach den
              allgemeinen Gesetzen verantwortlich.<br/><br/>
              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                Urheberrecht
              </strong><br/>
              Die durch den Betreiber erstellten Inhalte unterliegen dem deutschen Urheberrecht.
              Die Vervielfältigung, Bearbeitung oder Verbreitung bedürfen der schriftlichen
              Zustimmung des Betreibers.<br/><br/>
              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                Streitbeilegung
              </strong><br/>
              Wir sind nicht bereit oder verpflichtet, an Streitbeilegungsverfahren vor einer
              Verbraucherschlichtungsstelle teilzunehmen.
            </div>
            <button onClick={() => setShowImpressum(false)}
              style={{ marginTop:20, background:"#1e1e2c", color:"#ddd",
                border:"1px solid #252535", borderRadius:5, padding:"9px 22px",
                cursor:"pointer", fontFamily:"inherit", fontSize:12 }}>
              Schließen
            </button>
          </div>
        </div>
      )}

      {/* Datenschutz Modal */}
      {showDatenschutz && (
        <div style={{ position:"fixed", inset:0, background:"#000b", display:"flex",
          alignItems:"center", justifyContent:"center", zIndex:10000, padding:24 }}
          onClick={e => { if(e.target === e.currentTarget) setShowDatenschutz(false); }}>
          <div style={{ background:"#14141c", border:"1px solid #252535", borderRadius:10,
            padding:"32px 36px", maxWidth:560, width:"100%", maxHeight:"87vh",
            overflowY:"auto", fontFamily:"'DM Mono','Courier New',monospace" }}>
            <div style={{ fontSize:16, fontWeight:700, color:"#e8a020", marginBottom:20 }}>
              Datenschutzerklärung
            </div>
            <div style={{ fontSize:12, color:"#aaa", lineHeight:1.9 }}>
              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                1. Verantwortlicher
              </strong><br/>
              Verantwortlich im Sinne der DSGVO (Art. 4 Nr. 7):<br/>
              <strong style={{color:"#ddd"}}>Elias Müller</strong><br/>
              Mittlere Kreuzgasse 2, 90403 Nürnberg<br/>
              E-Mail: kontakt@eliasmuellerfilm.de<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                2. Verarbeitete Daten
              </strong><br/>
              <strong style={{color:"#ddd"}}>Ohne Anmeldung:</strong> Projektdaten nur lokal auf deinem
              Gerät (localStorage). Keine Übertragung an Server.<br/><br/>
              <strong style={{color:"#ddd"}}>Mit Google-Anmeldung (optional):</strong><br/>
              · Google-Konto: Name, E-Mail, Profilbild<br/>
              · Projektdaten zur Synchronisation<br/>
              · Gespeichert bei: Google Firebase (Google LLC, USA)<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                3. Rechtsgrundlage
              </strong><br/>
              Einwilligung gem. Art. 6 Abs. 1 lit. a DSGVO — freiwillig, jederzeit widerrufbar.<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                4. Drittanbieter
              </strong><br/>
              <strong style={{color:"#ddd"}}>Google Firebase (Google LLC, USA)</strong> —
              als Auftragsverarbeiter gem. Art. 28 DSGVO:<br/>
              · Speicherung deiner Projektdaten und Account-Daten<br/>
              · Google ist zertifiziert nach EU-US Data Privacy Framework<br/>
              · Datenschutz Firebase:{" "}
              <a href="https://firebase.google.com/support/privacy" target="_blank"
                rel="noopener" style={{color:"#6090c0"}}>firebase.google.com/support/privacy</a><br/>
              · Google-Datenschutz:{" "}
              <a href="https://policies.google.com/privacy" target="_blank"
                rel="noopener" style={{color:"#6090c0"}}>policies.google.com/privacy</a><br/><br/>
              <strong style={{color:"#ddd"}}>Google Sign-In (Google LLC, USA)</strong> —
              zur Nutzerauthentifizierung. Google verarbeitet dabei Name,
              E-Mail und Profilbild deines Google-Kontos.<br/><br/>
              Kein Tracking. Keine Werbung. Keine weiteren Drittanbieter außer Google Firebase (siehe oben).<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                5. Deine Rechte (DSGVO Art. 15–21)
              </strong><br/>
              · Auskunft (Art. 15) · Berichtigung (Art. 16) · Löschung (Art. 17)<br/>
              · Widerruf der Einwilligung (Art. 7 Abs. 3)<br/>
              · Beschwerde bei einer Datenschutzbehörde (Art. 77)<br/><br/>
              <strong style={{color:"#ddd"}}>Zuständige Aufsichtsbehörde (Bayern):</strong><br/>
              Bayerisches Landesamt für Datenschutzaufsicht (BayLDA)<br/>
              Promenade 18, 91522 Ansbach<br/>
              <a href="https://www.lda.bayern.de" target="_blank" rel="noopener"
                style={{color:"#6090c0"}}>www.lda.bayern.de</a><br/><br/>
              Kontakt für Datenschutzanfragen: kontakt@eliasmuellerfilm.de<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                6. Cookies & Browser-Speicher
              </strong><br/>
              Keine Tracking-Cookies. localStorage nur für technisch notwendige
              Sitzungs- und Projektdaten — keine separate Einwilligung erforderlich.<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                7. Datensicherheit
              </strong><br/>
              Übertragung zu Firebase verschlüsselt (HTTPS/TLS).<br/><br/>

              <em style={{color:"#444", fontSize:11}}>Stand: {new Date().getFullYear()}</em>
            </div>
            <button onClick={() => setShowDatenschutz(false)}
              style={{ marginTop:20, background:"#1e1e2c", color:"#ddd",
                border:"1px solid #252535", borderRadius:5, padding:"9px 22px",
                cursor:"pointer", fontFamily:"inherit", fontSize:12 }}>
              Schließen
            </button>
          </div>
        </div>
      )}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;} input,select,textarea{font-family:inherit;}
        ::-webkit-scrollbar{width:5px;height:5px;} ::-webkit-scrollbar-track{background:#0c0c10;} ::-webkit-scrollbar-thumb{background:#252535;border-radius:3px;}
        button:hover{filter:brightness(1.18);}
        input:focus,select:focus,textarea:focus{border-color:#e8a020!important;outline:none;}
        @media print{.no-print{display:none!important;} .no-print-color{color:inherit!important;}}
      `}</style>

      <nav style={{ ...S.side, display: sidebarOpen ? "flex" : "none", flexDirection:"column",
        position: window.innerWidth < 700 ? "fixed" : "sticky", zIndex: 100,
        height: "100vh", top: 0 }} className="no-print">
        <div style={{ ...S.sLogo, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize: 15, fontFamily: "'Syne',sans-serif", fontWeight: 800, letterSpacing: "0.06em" }}>SETDECK</div>
            <div style={{ fontSize: 9, color: C.dim, marginTop: 2, letterSpacing: "0.14em" }}>PRODUKTIONSPLANER</div>
          </div>
          <button onClick={() => setSidebarOpen(false)}
            style={{ background:"transparent", border:"none", color:C.dim, cursor:"pointer",
              fontSize:16, padding:"2px 6px" }}>✕</button>
        </div>
        <div style={{ padding: "6px 0", flex: active ? 0 : 1 }}>
          <div style={S.sSec}>Navigation</div>
          <div style={S.sItem(tab === "dashboard" && !showArchiveSidebar)} onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(false); }}>
            <Icon name="home" size={13} /> Dashboard
          </div>
          <div style={S.sItem(tab === "profil")} onClick={() => { setTab("profil"); setActiveId(null); setShowArchiveSidebar(false); }}>
            <Icon name="settings" size={13} /> Profil
          </div>
          {projects.filter(p=>p.archived).length > 0 && (
            <div style={{ ...S.sItem(showArchiveSidebar), paddingLeft: 30 }}
              onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(true); }}>
              ▪ Archiv
            </div>
          )}
        </div>
        {active && (
          <div style={{ flex: 1, overflowY: "auto" }}>
            <div style={S.sSec}>Projekt</div>
            <div style={{ fontSize: 11, color: C.mid, padding: "3px 18px 10px", borderBottom: "1px solid " + C.border, wordBreak: "break-word" }}>{active.name}</div>
            <NavGroups
              groups={NAV_GROUPS}
              hiddenTabs={active?.settings?.hiddenTabs||[]}
              tab={tab}
              setTab={setTab}
            />
          </div>
        )}
        <div style={{ padding: "10px 18px", borderTop: "1px solid " + C.border, background: "#0e0e16", marginTop: "auto" }}>
          {isSignedIn && (
            <div style={{ marginBottom: 8 }}>
              <button style={{ ...S.btn("danger"), fontSize: 10, padding: "3px 8px", width: "100%" }}
                onClick={deleteAccount}>Konto löschen</button>
            </div>
          )}
          <div style={{ fontSize: 10, color: "#555", marginBottom: 4 }}>Setdeck v2.0.3</div>
          <div style={{ display: "flex", gap: 10 }}>
            <span style={{ fontSize: 10, color: "#6090c0", cursor: "pointer", textDecoration: "underline" }}
              onClick={() => setShowImpressum(true)}>Impressum</span>
            <span style={{ color: "#333" }}>·</span>
            <span style={{ fontSize: 10, color: "#6090c0", cursor: "pointer", textDecoration: "underline" }}
              onClick={() => setShowDatenschutz(true)}>Datenschutz</span>
          </div>
        </div>
      </nav>
      <main style={S.main}>
        <div style={S.top} className="no-print">
          <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 12 }}>
            {!sidebarOpen && (
              <button onClick={() => setSidebarOpen(true)}
                style={{ background:"transparent", border:"none", color:C.mid, cursor:"pointer",
                  fontSize:18, padding:"0 4px", lineHeight:1 }}>☰</button>
            )}
            {active ? (
              <><span style={{ cursor: "pointer" }} onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(false); }}>Dashboard</span>
                <span style={{ color: C.border }}>/</span>
                {active.archived && <span style={{ background:"#3a2a00", color:"#c08000", border:"1px solid #604000", borderRadius:3, padding:"1px 6px", fontSize:10 }}>ARCHIVIERT</span>}
                <span>{active.name}</span>
                <span style={{ color: C.border }}>/</span>
                <span style={{ color: C.accent }}>{NAV.find(n => n.key === tab)?.label || tab}</span></>
            ) : <span>{showArchiveSidebar ? "Archiv" : "Dashboard"}</span>}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginLeft:"auto" }}>
            <span style={{ fontSize:10, color: saveStatus==="gespeichert" ? "#446644" : saveStatus==="speichert..." ? C.dim : "#884444" }}>
              {saveStatus==="gespeichert" ? "Gespeichert" : saveStatus==="speichert..." ? "Speichert..." : saveStatus}
            </span>
            {FIREBASE_READY ? (isSignedIn ? (
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {currentUser && currentUser.photo && (
                  <img src={currentUser.photo} style={{ width:22, height:22, borderRadius:"50%", border:"1px solid #333" }} alt="" />
                )}
                <span style={{ fontSize:10, color: cloudStatus==="synced" ? "#446644" : cloudStatus==="syncing" ? C.dim : "#884444" }}>
                  {cloudStatus==="synced" ? "Cloud ✓" : cloudStatus==="syncing" ? "Sync..." : "Cloud-Fehler"}
                </span>
                <button style={{ ...S.btn("xs"), fontSize:10 }} onClick={loadFromCloud} title="Neu laden">↓</button>
                <button style={{ ...S.btn("xs"), fontSize:10, color:"#a86" }} onClick={signOut}>Abmelden</button>
              </div>
            ) : (
              <button style={{ ...S.btn(), fontSize:10, background:"#1a2a1a", color:"#6a9", border:"1px solid #2a4a2a" }}
                onClick={() => setShowConsent(true)}>
                ☁ Anmelden
              </button>
            )) : (
              <span style={{ fontSize:10, color:"#555" }} title="Firebase nicht konfiguriert - nur lokale Speicherung">Lokal</span>
            )}
          </div>
        </div>
        <div style={S.body}>

          {tab === "profil" && <Profile />}
          {tab === "dashboard" && <Dashboard projects={projects} onSelect={openProject} onNew={newProject} onDelete={delProject} onDemo={demoProject} onExport={exportProject} onImport={importProject} onArchive={archiveProject} showArchive={showArchiveSidebar} setShowArchive={setShowArchiveSidebar} isSignedIn={isSignedIn} onSignIn={() => setShowConsent(true)} firebaseReady={FIREBASE_READY} />}
          {tab === "overview"  && active && <Overview  project={active} />}
          {tab === "settings"  && active && <Settings  project={active} onChange={updSync} />}
          {tab === "shootdays" && active && <ShootDays project={active} onChange={upd} />}
          {tab === "castcrew"  && active && <CastCrew  project={active} onChange={upd} />}
          {tab === "casting"   && active && <CastingTab project={active} onChange={upd} />}
          {tab === "catering"  && active && <Catering  project={active} onChange={upd} />}
          {tab === "equipment" && active && <Equipment project={active} onChange={upd} />}
          {tab === "locations" && active && <LocationsTab project={active} onChange={upd} />}
          {tab === "todos"     && active && <TodoTab     project={active} onChange={upd} />}
          {tab === "fahrzeuge" && active && <FahrzeugeTab project={active} onChange={upd} />}
          {tab === "scenes"    && active && <Scenes    project={active} onChange={upd} />}
          {tab === "shotlist"  && active && <Shotlist  project={active} onChange={upd} mode={shotlistMode} setMode={setShotlistMode} />}
          {tab === "storyboard" && active && <StoryboardTab project={active} onChange={upd} />}
          {tab === "drehplan"  && active && <Drehplan  project={active} />}
          {tab === "dispos"    && active && <Dispos    project={active} onChange={upd} />}
          {tab === "adsheet"   && active && <ADSheet    project={active} onChange={upd} />}
          {tab === "continuity" && active && <Continuity project={active} onChange={upd} />}
        </div>
      </main>
    </div>
  );
}


  </script>
</body>
</html>
