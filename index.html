// ─── Shotlist ─────────────────────────────────────────────────────────────────
// ─── Shotlist PDF Export ──────────────────────────────────────────────────────
async function exportShotlistPdf(project, mode, visibleCols, timeMap, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const pS = pdfSafe;
    const now = new Date();
    const standStr = 'Stand: '+pad(now.getDate())+'.'+pad(now.getMonth()+1)+'.'+now.getFullYear()+' '+pad(now.getHours())+':'+pad(now.getMinutes());

    // A4 Querformat
    const W=297, H=210, ML=10, MR=10, MT=10, MB=8, CW=W-ML-MR;
    const pagesArr=[];
    let curPage={lines:[]};
    const addPage=()=>{pagesArr.push(curPage);curPage={lines:[]};};
    let y=MT;
    const getY=()=>y; const setY=v=>{y=v;}; const addY=d=>{y+=d;};
    const checkY=need=>{if(y+need>H-MB){addPage();y=MT+14;}};
    const txt=(s,x,yy,sz,bold,rgb,align)=>curPage.lines.push({type:'text',text:pS(s||''),x,y:yy,size:sz||8,bold:!!bold,rgb:rgb||[40,40,40],align:align||'left'});
    const rct=(x,yy,w,h2,rgb)=>curPage.lines.push({type:'rect',x,y:yy,w,h:h2,rgb:rgb||[240,240,240]});
    const ln=(x1,y1,x2,y2,lw,rgb)=>curPage.lines.push({type:'line',x1,y1,x2,y2,lineWidth:lw||0.3,rgb:rgb||[180,180,180]});

    const BLK=[0,0,0],WHT=[255,255,255],GRY=[130,130,130],LGY=[220,220,220];
    const DGY=[50,50,50],BG1=[248,248,248],HDR=[28,28,38],ACC=[200,140,30];
    const vc=visibleCols||{};
    const showCol=k=>vc[k]!==false;

    // Spalten (ohne 'scene' und 'shotNum' - werden durch klappe ersetzt)
    const allCols=[
      {key:'klappe',  label:'Klappe',   w:20, always:true},
      {key:'description',label:'Beschreibung',w:0}, // flex
      {key:'camera',  label:'Kamera',   w:25},
      {key:'lens',    label:'Objektiv', w:25},
      {key:'sonstiges',label:'Sonstiges',w:22},
      {key:'setup',   label:'Aufbau',   w:14},
      {key:'shoot',   label:'Dreh',     w:14},
      {key:'time',    label:'Zeitfenster',w:26},
      {key:'storyboard',label:'Storyboard',w:28},
      {key:'onLocation',label:'On Loc.',w:28},
      {key:'referenz', label:'Referenz', w:28},
      {key:'notes',   label:'Notizen',  w:28},
    ];
    const visCols=allCols.filter(col=>col.always||showCol(col.key));
    const fixedW=visCols.filter(col=>col.key!=='description').reduce((a,col)=>a+col.w,0);
    const descCol=visCols.find(col=>col.key==='description');
    if(descCol) descCol.w=Math.max(18,CW-fixedW);

    // Shots sortieren - WICHTIG: korrekte Reihenfolge
    const allShots=[...project.shots];
    let shots;
    if(mode==='script'){
      shots=allShots.filter(s=>s.type==='shot').sort((a,b)=>{
        const sa=project.scenes.find(sc=>sc.id===a.scene);
        const sb=project.scenes.find(sc=>sc.id===b.scene);
        const na=sa?(sa.number||0):999, nb=sb?(sb.number||0):999;
        if(na!==nb)return na-nb;
        return parseInt(a.shotNum||0)-parseInt(b.shotNum||0);
      });
    } else {
      // Drehreihenfolge: alle Shots UND Divider nach shootOrder sortieren
      shots=allShots.sort((a,b)=>(a.shootOrder??0)-(b.shootOrder??0));
    }

    // Hilfsfunktion: Text umbrechen
    const wrapTxt=(text,maxW,sz)=>{
      if(!text)return[''];
      // charW in mm: sz is in pt, 1pt ≈ 0.353mm, chars are ~0.5pt wide per pt size
      const charW=(sz||8)*0.353*0.55;
      const maxC=Math.max(1,Math.floor(maxW/charW));
      const words=text.split(' ');
      const lines=[];let line='';
      words.forEach(w=>{
        const candidate=(line?line+' ':'')+w;
        if(candidate.length<=maxC){line=candidate;}
        else{if(line)lines.push(line);line=w.slice(0,maxC);}
      });
      if(line)lines.push(line);
      return lines.length?lines:[''];
    };

    // Seiten-Header zeichnen
    const drawPageHdr=()=>{
      rct(ML,MT,CW,12,HDR);
      // Titel + Modus zentriert in der Mitte
      txt(pS(st.title||'')+' – '+(mode==='script'?'Spielreihenfolge':'Drehreihenfolge'),ML+CW/2,MT+7.5,10,true,WHT,'center');
      // Stand-Stamp rechts oben (klein)
      txt(standStr,W-MR-2,MT+4,6,false,[160,150,130],'right');
      if(st.logo&&st.logoHex){
        try{
          const slHex=JSON.parse(st.logoHex);
          const slH=8;
          const slW=Math.round(slH*(slHex.ratio||2));
          curPage.lines.push({type:'image',hexData:slHex.hexData,alphaData:slHex.alphaHex||null,pxW:slHex.pxW,pxH:slHex.pxH,
            x:ML+1,y:MT+1,w:slW,h:slH});
        }catch(e){txt(pS(st.company||''),ML+2,MT+9,7.5,true,WHT);}
      } else if(st.company){
        txt(pS(st.company),ML+2,MT+9,7.5,true,WHT);
      }
      y=MT+14;
    };
    drawPageHdr();

    // Spalten-Header
    const drawColHdr=()=>{
      rct(ML,y,CW,7,[40,40,55]);
      let hx=ML;
      visCols.forEach(col=>{
        txt(col.label,hx+1.5,y+5,6.5,true,[200,190,160]);
        hx+=col.w;
        if(hx<W-MR)ln(hx,y,hx,y+7,0.2,[80,80,100]);
      });
      addY(8);
    };
    drawColHdr();

    let lastScene=null;

    shots.forEach((s,si)=>{
      if(s.type==='divider'){
        checkY(8);
        const DS={
          day:     {bg:[20,28,48],  fc:[140,180,240],h:8},
          lunch:   {bg:[210,235,210],fc:[30,100,30],  h:6},
          break:   {bg:[240,230,210],fc:[100,70,20],  h:6},
          location:{bg:[230,215,235],fc:[80,40,100],  h:6},
          setup:   {bg:[215,220,240],fc:[40,55,110],  h:6},
          custom:  {bg:[225,225,225],fc:[60,60,60],   h:6},
        };
        const ds=DS[s.dividerType]||DS.custom;
        rct(ML,y,CW,ds.h,ds.bg);
        let divTxt='';
        if(s.dividerType==='day'){
          const di=project.shootDays.findIndex(d=>d.id===s.shootDayId);
          const d=project.shootDays[di];
          divTxt=(di>=0?di+1+'. DREHTAG':' DREHTAG')+(d?.date?' - '+d.date:'')+(s.callTime?' | Call: '+s.callTime:'');
          // Drehschluss berechnen fuer diesen Drehtag
          const dayShots=allShots.filter(sh=>sh.type==='shot'&&allShots.some((div,k)=>{
            if(div.type!=='divider'||div.dividerType!=='day'||div.shootDayId!==s.shootDayId)return false;
            const divIdx=allShots.indexOf(div);
            const nextDivIdx=allShots.findIndex((x,k2)=>k2>divIdx&&x.type==='divider'&&x.dividerType==='day');
            const shIdx=allShots.indexOf(sh);
            return shIdx>divIdx&&(nextDivIdx<0||shIdx<nextDivIdx);
          }));
          const dayMin=dayShots.reduce((a,sh)=>a+(sh.setupMin||0)+(sh.shootMin||0),0);
          const lunchMin2=allShots.filter(sh=>sh.type==='divider'&&sh.dividerType==='lunch').reduce((a,sh)=>a+(sh.durationMin||45),0);
          if(s.callTime&&dayMin>0){
            const [ch,cm]=s.callTime.split(':').map(Number);
            const endMin=(ch*60+(cm||0))+dayMin+lunchMin2;
            divTxt+=' | Drehschluss: '+pad(Math.floor(endMin/60)%24)+':'+pad(endMin%60);
          }
        } else {
          const typeNames={lunch:'MITTAGSPAUSE',break:'PAUSE',location:'MOTIVWECHSEL',setup:'UMBAU'};
          divTxt=(typeNames[s.dividerType]||s.dividerType.toUpperCase())+(s.label?' - '+s.label:'');
        }
        txt(pS(divTxt),ML+3,y+(ds.h*0.72),s.dividerType==='day'?8.5:7.5,true,ds.fc);
        if(s.dividerType!=='day'){
          const tm2=timeMap&&timeMap[s.id];
          const tmStr2 = tm2 ? tm2.start+'-'+tm2.end : (s.start||'');
          if(tmStr2) txt(pS(tmStr2),W-MR-2,y+(ds.h*0.72),7.5,true,ds.fc,'right');
        }
        addY(ds.h+1);
        return;
      }

      const sc=project.scenes.find(x=>x.id===s.scene);
      const klappeStr=sc?(sc.number+'.'+(s.shotNum||'?')):('?.'+(s.shotNum||'?'));

      // Szenen-Banner (nur Spielreihenfolge)
      if(mode==='script'&&sc&&sc.id!==lastScene){
        lastScene=sc.id;
        checkY(7);
        rct(ML,y,CW,6,[24,24,38]);
        txt(pS('#'+sc.number+' '+sc.title+' - '+(sc.interior||'')+'. '+(sc.locationTitle||'')),ML+3,y+4.2,8,true,[180,170,150]);
        addY(7);
      }

      // Zeilenhöhe aus Inhalt berechnen
      const descW=descCol?descCol.w-3:40;
      const descLines=wrapTxt(pS(s.description||''),descW,7.5);
      const notesLines=wrapTxt(pS(s.notes||''),24,7);
      const camLines=wrapTxt(pS(s.camera||''),22,7);
      const lensLines=wrapTxt(pS(s.lens||''),22,7);
      const sonstLines=wrapTxt(pS(s.sonstigesEquip||''),19,7);
      const maxLines=Math.max(descLines.length,notesLines.length,camLines.length,lensLines.length,sonstLines.length);
      const hasSB=(s.storyboard&&showCol('storyboard'))||(s.onLocation&&showCol('onLocation'))||(s.referenz&&showCol('referenz'));
      const sbH=hasSB?18:0;
      const rowH=Math.max(7,maxLines*3.8+3,sbH+2);

      checkY(rowH);
      rct(ML,y,CW,rowH,si%2===0?WHT:BG1);
      ln(ML,y+rowH,W-MR,y+rowH,0.2,LGY);

      let cx=ML;
      visCols.forEach(col=>{
        const cy=y+4;
        switch(col.key){
          case 'klappe': txt(klappeStr,cx+1.5,cy,8.5,true,BLK); break;
          case 'description':
            descLines.forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7.5,false,DGY));
            break;
          case 'camera': wrapTxt(pS(s.camera||''),col.w-3,7).forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,DGY)); break;
          case 'lens':   wrapTxt(pS(s.lens||''),col.w-3,7).forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,DGY)); break;
          case 'sonstiges': wrapTxt(pS(s.sonstigesEquip||''),col.w-3,7).forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,DGY)); break;
          case 'setup': txt((s.setupMin||0)+'m',cx+1.5,cy,7.5,false,DGY); break;
          case 'shoot': txt((s.shootMin||0)+'m',cx+1.5,cy,7.5,false,DGY); break;
          case 'time': {
            const tm=timeMap&&timeMap[s.id];
            if(tm)txt(tm.start+'-'+tm.end,cx+1.5,cy,7,false,DGY);
            break;
          }
          case 'storyboard':
            if(hasSB){
              curPage.lines.push({type:'image',data:s.storyboard,x:cx+1,y:y+1,w:col.w-2,h:rowH-2});
            }
            break;
          case 'onLocation':
            if(s.onLocation){ curPage.lines.push({type:'image',data:s.onLocation,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'referenz':
            if(s.referenz){ curPage.lines.push({type:'image',data:s.referenz,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'onLocation':
            if(s.onLocation){ curPage.lines.push({type:'image',data:s.onLocation,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'referenz':
            if(s.referenz){ curPage.lines.push({type:'image',data:s.referenz,x:cx+1,y:y+1,w:col.w-2,h:rowH-2}); }
            break;
          case 'notes': notesLines.forEach((l,li)=>txt(l,cx+1.5,cy+li*3.8,7,false,GRY)); break;
        }
        cx+=col.w;
        if(cx<W-MR)ln(cx,y,cx,y+rowH,0.2,LGY);
      });
      addY(rowH);
    });

    pagesArr.push(curPage);
    // Pre-process images: resize via canvas to get small JPEG data
    // This allows us to embed them in PDF
    // Convert storyboard images to PDF-embeddable format using canvas
    // Async image processing: load all storyboard images, convert to hex, then build PDF
    const processImagesAndBuild = async (buildFn) => {
      const imgLines = pagesArr.flatMap(p=>p.lines.filter(l=>l.type==='image'&&l.data));
      if (imgLines.length > 0) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        for (const l of imgLines) {
          try {
            // 150 DPI: 1mm = 5.91px (2.83pt * 150/72) — good balance of quality vs size
            const dpiScale = 5.91;
            const pw = Math.max(20, Math.round(l.w * dpiScale));
            const ph = Math.max(20, Math.round(l.h * dpiScale));
            canvas.width = pw; canvas.height = ph;
            ctx.clearRect(0,0,pw,ph); // preserve alpha for SMask
            const img = new window.Image();
            img.src = l.data;
            // Wait for image to fully load (crucial for data URLs)
            if (!img.complete) {
              await new Promise((res, rej) => { img.onload=res; img.onerror=res; setTimeout(res,2000); });
            }
            // Try createImageBitmap for better reliability, fallback to img
            let source = img;
            try {
              if (typeof createImageBitmap !== 'undefined' && img.naturalWidth > 0) {
                source = await createImageBitmap(img);
              }
            } catch(e) {}
            if (img.naturalWidth > 0) ctx.drawImage(source, 0, 0, pw, ph);
            const imgData = ctx.getImageData(0,0,pw,ph);
            let hexData = ''; let alphaData = '';
            for (let i=0; i<imgData.data.length; i+=4) {
              hexData += ('0'+imgData.data[i].toString(16)).slice(-2);
              hexData += ('0'+imgData.data[i+1].toString(16)).slice(-2);
              hexData += ('0'+imgData.data[i+2].toString(16)).slice(-2);
              alphaData += ('0'+imgData.data[i+3].toString(16)).slice(-2);
            }
            hexData += '>'; alphaData += '>';
            l.hexData = hexData; l.alphaData = alphaData; l.pxW = pw; l.pxH = ph;
          } catch(e) { console.warn('Image error:', e); }
        }
      }
      return buildFn();
    };
    const pdfStr = await processImagesAndBuild(() => buildPdf(pagesArr,{landscape:true}));
        const slModus2 = mode==='script'?'Spielreihenfolge':'Drehreihenfolge';
    const slNaming2 = st.exportNaming||{};
    const slPattern2 = slNaming2.shotlist || (slNaming2.shotlistParts||['{titel}','_','Shotlist','_','{modus}']).join('');
    const slName2 = resolveExportName(slPattern2, {titel:st.title||project.name||'Shotlist', modus:slModus2, dateFormat: (st.exportNaming||{}).dateFormat});
    openPdf(pdfStr, slName2+'.pdf');
  } catch(e){
    console.error('Shotlist PDF error:',e);
    alert('Shotlist-PDF Fehler:\n'+e.message+'\n'+(e.stack||''));
  } finally {
    if(setExporting)setExporting(false);
  }
}


// ─── Overview PDF Export ───────────────────────────────────────────────────────
function exportOverviewPdf(project, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const doc = makeDoc();
    const {W,ML,MR,CW} = doc;
    const pS = pdfSafe;
    const BLK=[0,0,0],WHT=[255,255,255],GRY=[130,130,130],LGY=[210,210,210];
    const DGY=[50,50,50],BG1=[248,248,248],HDR=[28,28,38],ACC=[200,140,30];
    const fmtD = d => { try { const dt=new Date(d+'T12:00'); const dn=['So','Mo','Di','Mi','Do','Fr','Sa']; return dn[dt.getDay()]+', '+pad(dt.getDate())+'.'+pad(dt.getMonth()+1)+'.'+dt.getFullYear(); } catch(e){return d||'';} };

    // ── HEADER ────────────────────────────────────────────────────
    const hT=doc.getY(), hH=28;
    doc.rect(ML, hT, CW, hH, HDR);
    doc.text(pS(st.company||''), ML+3, hT+9, 10, true, WHT);
    doc.text(pS(st.title||''), ML+CW/2, hT+15, 20, true, WHT, 'center');
    doc.text('PROJEKTUEBERSICHT', ML+CW/2, hT+23, 8, false, [170,160,140], 'center');
    const resp=(st.respPersons||[]).filter(p=>p.value).slice(0,3);
    resp.forEach((p,i) => {
      doc.text(pS(p.label)+': '+pS(p.value), W-MR-3, hT+5+i*5, 7.5, false, [200,195,175], 'right');
    });
    doc.setY(hT+hH+3);

    // ── KENNZAHLEN-ZEILE ──────────────────────────────────────────
    const shots = project.shots.filter(s=>s.type==='shot');
    const totalSetup = shots.reduce((a,s)=>a+(s.setupMin||0),0);
    const totalShoot = shots.reduce((a,s)=>a+(s.shootMin||0),0);
    const totalMin = totalSetup+totalShoot;
    const fmtMin = m => Math.floor(m/60)+'h '+pad(m%60)+'min';

    const stats = [
      {label:'Drehtage',   value:String(project.shootDays.length)},
      {label:'Szenen',     value:String(project.scenes.length)},
      {label:'Shots',      value:String(shots.length)},
      {label:'Aufbau ges.',value:fmtMin(totalSetup)},
      {label:'Dreh ges.',  value:fmtMin(totalShoot)},
      {label:'Gesamt',     value:fmtMin(totalMin)},
    ];
    const sw = CW/stats.length;
    const kY = doc.getY();
    stats.forEach((s,i) => {
      const x = ML+i*sw;
      doc.rect(x, kY, sw-0.5, 18, i%2===0?BG1:WHT);
      doc.line2(x, kY, x, kY+18, 0.3, LGY);
      // Großer Wert oben
      doc.text(pS(s.value), x+sw/2, kY+9, 11, true, HDR, 'center');
      // Kleines Label darunter
      doc.text(pS(s.label), x+sw/2, kY+15, 7, false, GRY, 'center');
    });
    doc.line2(ML, kY, W-MR, kY, 0.3, LGY);
    doc.line2(ML, kY+18, W-MR, kY+18, 0.5, BLK);
    doc.setY(kY+20);

    // ── DREHTAGE-TABELLE ──────────────────────────────────────────
    doc.checkY(14);
    doc.rect(ML, doc.getY(), CW, 8, HDR);
    doc.text('DREHTAGE', ML+3, doc.getY()+5.5, 8, true, WHT);
    doc.addY(9);

    const groups = buildGroups(project.shots);

    // Spalten-Header
    const DC = [{w:30,h:'Drehtag'},{w:40,h:'Datum'},{w:CW-30-40-35-35-30,h:'Drehort'},{w:35,h:'Call-Time'},{w:35,h:'Szenen'},{w:30,h:'Shots'}];
    doc.rect(ML, doc.getY(), CW, 7, [40,40,55]);
    let hx=ML;
    DC.forEach(col=>{doc.text(col.h,hx+2,doc.getY()+5,6.5,true,[200,190,160]);hx+=col.w;if(hx<W-MR)doc.line2(hx,doc.getY(),hx,doc.getY()+7,0.2,[80,80,100]);});
    doc.addY(8);

    project.shootDays.forEach((day,di) => {
      doc.checkY(9);
      const grp = groups.find(g=>{const lk=project.shootDays.find(d=>d.id===g.divider.shootDayId);return lk&&project.shootDays.indexOf(lk)===di;});
      const ct = grp?.divider?.callTime||day.callTime||'';
      const scIds = grp?grp.sceneIds:new Set();
      const daySc = project.scenes.filter(sc=>scIds.has(sc.id));
      const dayShots = project.shots.filter(s=>s.type==='shot'&&daySc.some(sc=>sc.id===s.scene));

      doc.rect(ML, doc.getY(), CW, 8, di%2===0?WHT:BG1);
      doc.line2(ML, doc.getY()+8, W-MR, doc.getY()+8, 0.2, LGY);
      const rY=doc.getY()+5.5;
      let rx=ML;

      const vals = [
        (di+1)+'. Drehtag',
        day.date?fmtD(day.date):'-',
        pS((day.locationTitle||'-')+(day.locationAddress?' ('+day.locationAddress.slice(0,25)+')':'')),
        ct||'-',
        daySc.map(sc=>'#'+sc.number).join(' '),
        String(dayShots.length),
      ];
      vals.forEach((v,vi)=>{
        doc.text(v, rx+2, rY, vi===0?8:7.5, vi===0, vi===0?BLK:DGY);
        rx+=DC[vi].w;
        if(rx<W-MR)doc.line2(rx,doc.getY(),rx,doc.getY()+8,0.2,LGY);
      });
      doc.addY(8);
    });
    doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK);
    doc.addY(5);

    // ── SZENENÜBERSICHT ───────────────────────────────────────────
    doc.checkY(16);
    doc.rect(ML, doc.getY(), CW, 8, HDR);
    doc.text('SZENENÜBERSICHT', ML+3, doc.getY()+5.5, 8, true, WHT);
    doc.addY(9);

    // Spalten
    const SC=[{w:12,h:'#'},{w:CW-12-26-20-20-20-18,h:'Titel'},{w:26,h:'Drehort'},{w:20,h:'V-Stopp'},{w:20,h:'Int/Ext'},{w:20,h:'Tag/N'},{w:18,h:'Shots'}];
    doc.rect(ML, doc.getY(), CW, 7, [40,40,55]);
    hx=ML;
    SC.forEach(col=>{doc.text(col.h,hx+2,doc.getY()+5,6.5,true,[200,190,160]);hx+=col.w;if(hx<W-MR)doc.line2(hx,doc.getY(),hx,doc.getY()+7,0.2,[80,80,100]);});
    doc.addY(8);

    project.scenes.forEach((sc,si) => {
      doc.checkY(8);
      const scShots=shots.filter(s=>s.scene===sc.id);
      const rH=8;
      doc.rect(ML,doc.getY(),CW,rH,si%2===0?WHT:BG1);
      doc.line2(ML,doc.getY()+rH,W-MR,doc.getY()+rH,0.2,LGY);
      const rY=doc.getY()+5.5;
      let rx=ML;
      const scVals=[
        String(sc.number),
        pS(sc.title||''),
        pS((sc.interior||'INT')+'. '+(sc.locationTitle||sc.location||'').slice(0,22)),
        sc.vorstopp||'--',
        sc.interior||'--',
        (sc.dayNight||'--').slice(0,4),
        String(scShots.length),
      ];
      scVals.forEach((v,vi)=>{
        doc.text(v,rx+2,rY,vi===0?9:7.5,vi<2,vi<2?BLK:DGY);
        rx+=SC[vi].w;
        if(rx<W-MR)doc.line2(rx,doc.getY(),rx,doc.getY()+rH,0.2,LGY);
      });
      doc.addY(rH);
    });
    doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,BLK);
    doc.addY(5);

    // ── BESETZUNG ─────────────────────────────────────────────────
    if (project.cast.length>0) {
      doc.checkY(14);
      doc.rect(ML,doc.getY(),CW,8,HDR);
      doc.text('BESETZUNG',ML+3,doc.getY()+5.5,8,true,WHT);
      doc.addY(9);
      const BC=[{w:24,h:'Rolle'},{w:40,h:'Name'},{w:CW-24-40-20,h:'Drehtage'}];
      doc.rect(ML,doc.getY(),CW,7,[40,40,55]);
      hx=ML;
      BC.forEach(col=>{doc.text(col.h,hx+2,doc.getY()+5,6.5,true,[200,190,160]);hx+=col.w;if(hx<W-MR)doc.line2(hx,doc.getY(),hx,doc.getY()+7,0.2,[80,80,100]);});
      doc.addY(8);
      project.cast.forEach((p,pi)=>{
        doc.checkY(7);
        doc.rect(ML,doc.getY(),CW,7,pi%2===0?WHT:BG1);
        doc.line2(ML,doc.getY()+7,W-MR,doc.getY()+7,0.2,LGY);
        const rY=doc.getY()+5;
        let rx=ML;
        [p.role||'',p.name||'','Tag '+p.days.map(d=>d+1).join(', ')].forEach((v,vi)=>{

          rx+=BC[vi].w;
          if(rx<W-MR)doc.line2(rx,doc.getY(),rx,doc.getY()+7,0.2,LGY);
        });
        doc.addY(7);
      });
    }

    const pdfStr=buildPdf(doc.pages());
    const ovNaming = st.exportNaming||{};
    const ovPattern = ovNaming.overview || (ovNaming.overviewParts||['{titel}','_','Uebersicht']).join('');
    const ovName = resolveExportName(ovPattern, {titel:st.title||project.name||'Projekt', dateFormat: (st.exportNaming||{}).dateFormat});
    openPdf(pdfStr, ovName+'.pdf');
  } catch(e) {
    console.error('Overview PDF error:',e);
    alert('Uebersicht-PDF Fehler:\n'+e.message+'\n'+(e.stack||''));
  } finally {
    if(setExporting)setExporting(false);
  }
}

function Shotlist({ project, onChange, mode, setMode }) {
  const [visibleCols, setVisibleCols] = useState({
    scene: true, shotNum: true, description: true, camera: true,
    lens: true, setup: true, shoot: true, notes: true, storyboard: true, onLocation: true, referenz: true, sonstiges: true
  });
  const toggleCol = k => setVisibleCols(prev => ({ ...prev, [k]: !prev[k] }));
  const [storyboardExpand, setStoryboardExpand] = useState(null);
  const shots = project.shots;
  const orderKey = mode === "script" ? "scriptOrder" : "shootOrder";
  const [selected, setSelected] = useState(new Set());
  const toggleSelect = id => setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const clearSelect = () => setSelected(new Set());

  const allSorted = [...shots].sort((a, b) => (a[orderKey] ?? 0) - (b[orderKey] ?? 0));
  const sorted = mode === "script"
    ? allSorted.filter(s => s.type !== "divider")
    : allSorted.filter(s => !(s.type === "shot" && s.hidden));

  // Which shots are inside any day-block
  const shotInDayBlock = new Set();
  let inDay2 = false;
  [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") { inDay2 = true; return; }
    if (s.type === "shot" && inDay2) shotInDayBlock.add(s.id);
  });
  const unassignedIds = new Set(shots.filter(s => s.type === "shot" && !s.hidden && !shotInDayBlock.has(s.id)).map(s => s.id));

  // Build scene segments for scene-info rows in shoot mode
  const { segMap } = buildSceneSegments(shots);

  // Drag
  const fromRef = useRef(null);
  const draggingDivType = useRef(null); // for divider toolbar drag
  const draggingNewShot = useRef(false); // for new-shot drag
  const blockDragIdRef = useRef(null);
  const [insertAt, setInsertAt] = useState(null);
  const [blockDrag, setBlockDrag] = useState(null);

  const getPos = e => { const r = e.currentTarget.getBoundingClientRect(); return (e.clientY - r.top) < r.height / 2 ? "before" : "after"; };

  const applyInsert = (fromIds, toId, pos, arr) => {
    const ids = Array.isArray(fromIds) ? fromIds : [fromIds];
    const r = [...arr];
    const items = ids.map(id => r.find(x => x.id === id)).filter(Boolean);
    ids.forEach(id => { const i = r.findIndex(x => x.id === id); if (i >= 0) r.splice(i, 1); });
    const ti = r.findIndex(x => x.id === toId);
    r.splice(pos === "before" ? ti : ti + 1, 0, ...items);
    return r;
  };

  const onRowDragOver = (e, id) => { e.preventDefault(); setInsertAt({ id, pos: getPos(e) }); };

  const onRowDrop = toId => {
    const fId = fromRef.current;
    const pos = insertAt?.pos || "after";

    // Drop a new divider from toolbar
    if (draggingDivType.current) {
      insertNewDivAt(draggingDivType.current, toId, pos);
      draggingDivType.current = null; setInsertAt(null); return;
    }
    // Drop a new shot from toolbar
    if (draggingNewShot.current) {
      insertNewShotAt(toId, pos);
      draggingNewShot.current = false; setInsertAt(null); return;
    }
    // Block drag
    if (blockDragIdRef.current) {
      doBlockDrop(blockDragIdRef.current, toId);
      blockDragIdRef.current = null; setBlockDrag(null); setInsertAt(null); return;
    }
    if (!fId || fId === toId) { setInsertAt(null); return; }
    const moveIds = selected.size > 1 && selected.has(fId) ? [...selected] : [fId];  // includes dividers if selected
    const arr = [...sorted];
    const reordered = applyInsert(moveIds, toId, pos, arr);
    const updated = shots.map(s => { const idx = reordered.findIndex(a => a.id === s.id); return idx >= 0 ? { ...s, [orderKey]: idx } : s; });
    onChange({ ...project, shots: updated });
    fromRef.current = null; setInsertAt(null);
    if (selected.size > 1) clearSelect();
  };

  const onDragEnd = () => {
    fromRef.current = null; draggingDivType.current = null; draggingNewShot.current = false;
    blockDragIdRef.current = null; setInsertAt(null); setBlockDrag(null);
  };

  const insertNewShotAt = (nearId, pos) => {
    const maxS = shots.filter(s => s.type === "shot").reduce((m, s) => Math.max(m, s.scriptOrder ?? 0), -1);
    const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
    const newShot = { id: uid(), type: "shot", scene: "", shotNum: "", description: "", camera: "", lens: "", setupMin: 0, shootMin: 0, notes: "", hidden: false, scriptOrder: maxS + 1, shootOrder: maxD + 1 };
    const arr = [...sorted, newShot];
    const reordered = applyInsert(newShot.id, nearId, pos, arr);
    const newShots = [...shots, newShot];
    const updated = newShots.map(s => { const idx = reordered.findIndex(a => a.id === s.id); return idx >= 0 ? { ...s, [orderKey]: idx } : s; });
    onChange({ ...project, shots: updated });
  };

  const insertNewDivAt = (dtype, nearId, pos) => {
    const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
    const usedIds = shots.filter(s => s.type === "divider" && s.dividerType === "day" && s.shootDayId).map(s => s.shootDayId);
    const freeDay = project.shootDays.find(d => !usedIds.includes(d.id));
    const newDiv = { id: uid(), type: "divider", dividerType: dtype, label: DIVIDERS[dtype].label, durationMin: dtype === "lunch" ? 45 : dtype === "break" ? 15 : 30, shootDayId: dtype === "day" ? (freeDay?.id || "") : "", callTime: dtype === "day" ? (freeDay?.callTime || "07:00") : "07:00", scriptOrder: shots.length, shootOrder: maxD + 1 };
    const arr = [...sorted, newDiv];
    const reordered = applyInsert(newDiv.id, nearId, pos, arr);
    const newShots = [...shots, newDiv];
    const updated = newShots.map(s => { const idx = reordered.findIndex(a => a.id === s.id); return idx >= 0 ? { ...s, [orderKey]: idx } : s; });
    onChange({ ...project, shots: updated });
  };

  const doBlockDrop = (fromDayId, toDayId) => {
    if (fromDayId === toDayId) return;
    const ss = [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0));
    const blocks = []; let cur = null;
    ss.forEach(s => {
      if (s.type === "divider" && s.dividerType === "day") { cur = { id: s.id, items: [s] }; blocks.push(cur); }
      else if (cur) cur.items.push(s);
      else { if (!blocks.length || blocks[0].id !== "__pre__") blocks.unshift({ id: "__pre__", items: [] }); blocks[0].items.push(s); }
    });
    const fi = blocks.findIndex(b => b.id === fromDayId);
    const ti = blocks.findIndex(b => b.id === toDayId);
    if (fi < 0 || ti < 0) return;
    const [block] = blocks.splice(fi, 1);
    const newTi = blocks.findIndex(b => b.id === toDayId);
    blocks.splice(newTi + 1, 0, block);
    const flat = blocks.flatMap(b => b.items);
    onChange({ ...project, shots: shots.map(s => ({ ...s, shootOrder: flat.findIndex(x => x.id === s.id) })) });
  };

  const CRUD = {
    add: () => {
      const maxS = shots.filter(s => s.type === "shot").reduce((m, s) => Math.max(m, s.scriptOrder ?? 0), -1);
      const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
      // New shots always get maxD+1 (end of list = unassigned)
      onChange({ ...project, shots: [...shots, { id: uid(), type: "shot", scene: "", shotNum: "", description: "", camera: "", lens: "", setupMin: 0, shootMin: 0, notes: "", hidden: false, scriptOrder: maxS + 1, shootOrder: maxD + 1 }] });
    },
    addDivClick: dtype => {
      const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
      const usedIds = shots.filter(s => s.type === "divider" && s.dividerType === "day" && s.shootDayId).map(s => s.shootDayId);
      const freeDay = project.shootDays.find(d => !usedIds.includes(d.id));
      onChange({ ...project, shots: [...shots, { id: uid(), type: "divider", dividerType: dtype, label: DIVIDERS[dtype].label, durationMin: dtype === "lunch" ? 45 : dtype === "break" ? 15 : 30, shootDayId: dtype === "day" ? (freeDay?.id || "") : "", callTime: dtype === "day" ? (freeDay?.callTime || "07:00") : "07:00", scriptOrder: shots.length, shootOrder: maxD + 1 }] });
    },
    upd: (id, patch) => onChange({ ...project, shots: shots.map(s => s.id === id ? { ...s, ...patch } : s) }),
    rem: id => onChange({ ...project, shots: shots.filter(s => s.id !== id) }),
  };

  const addNewShootDay = divId => {
    const newDay = { id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" };
    onChange({ ...project, shootDays: [...project.shootDays, newDay], shots: shots.map(s => s.id === divId ? { ...s, shootDayId: newDay.id, callTime: newDay.callTime } : s) });
  };
  const onDaySelect = (divId, val) => {
    if (val === "__new__") { addNewShootDay(divId); return; }
    const day = project.shootDays.find(d => d.id === val);
    CRUD.upd(divId, { shootDayId: val, callTime: day?.callTime || "07:00" });
  };
  const onDivCallTimeChange = (divId, newTime) => {
    const div = shots.find(s => s.id === divId); if (!div) return;
    onChange({ ...project, shots: shots.map(s => s.id === divId ? { ...s, callTime: newTime } : s), shootDays: project.shootDays.map(d => d.id === div.shootDayId ? { ...d, callTime: newTime } : d) });
  };

  const klappe = s => { const sc = project.scenes.find(x => x.id === s.scene); return sc ? (sc.number + "." + (s.shotNum||"?")) : ("?." + (s.shotNum||"?")); };

  // Time calc
  const timeMap = {}; const dayEndMap = {};
  let runMin = 480; let lastDayId = null;
  [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
    if (s.type === "divider") {
      if (s.dividerType === "day") { runMin = timeToMin(s.callTime || "07:00"); lastDayId = s.id; timeMap[s.id] = { start: minToTime(runMin), end: minToTime(runMin) }; }
      else { timeMap[s.id] = { start: minToTime(runMin), end: minToTime(runMin + (s.durationMin || 0)) }; runMin += s.durationMin || 0; }
    } else if (!s.hidden) {
      const dur = (s.setupMin || 0) + (s.shootMin || 0);
      timeMap[s.id] = { start: minToTime(runMin), end: minToTime(runMin + dur) };
      runMin += dur;
    }
    if (lastDayId) dayEndMap[lastDayId] = timeMap[s.id]?.end || dayEndMap[lastDayId];
  });

  // Per lunch divider: compute time since last day-divider calltime
  // lunchWarnMap[lunchId] = "red" | "orange" | null
  const lunchWarnMap = (() => {
    const map = {};
    let curDayCallMin = 480;
    [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
      if (s.type === "divider" && s.dividerType === "day") {
        curDayCallMin = timeToMin(s.callTime || "07:00");
      }
      if (s.type === "divider" && s.dividerType === "lunch") {
        const lunchStartMin = timeToMin(timeMap[s.id]?.start || "13:00");
        const diff = (lunchStartMin - curDayCallMin) / 60;
        map[s.id] = diff > 6 ? "red" : diff > 5.5 ? "orange" : null;
      }
    });
    return map;
  })();

  const cameras = (project.equipment?.cameras || []).map(c => c.name).filter(Boolean);
  const lenses = (project.equipment?.lenses || []).map(l => l.name).filter(Boolean);

  const IL = () => <tr style={{ height: 2 }}><td colSpan={20} style={{ padding: 0, height: 2, background: C.accent, boxShadow: "0 0 8px " + C.accent }} /></tr>;

  const colCount = mode === "shoot" ? 13 : 12;
  const extraCols = (visibleCols.storyboard !== false ? 1 : 0) + (visibleCols.onLocation !== false ? 1 : 0) + (visibleCols.referenz !== false ? 1 : 0) + (visibleCols.sonstiges !== false ? 1 : 0);

  // Track current day for scene-info
  let renderDayId = null;
  const renderedSegments = new Set(); // key: dayId-sceneId-segIndex

  // Per-day segment index tracker for render
  const renderSegIdx = {}; // dayId -> { sceneId -> nextSegIdx }

  return (
    <div>
      <div style={{ marginBottom: 16 }}>
        <div style={{ ...S.row, flexWrap: "wrap", gap: 8, marginBottom: 8 }}>
          <h1 style={{ ...S.h1, marginBottom: 0 }}>Shotlist</h1>
          <div style={S.row}>
            {[["script", "Spielreihenfolge"], ["shoot", "Drehreihenfolge"]].map(([m, l]) => (
              <button key={m} style={{ ...S.btn(), background: mode === m ? C.accent : "#1e1e2c", color: mode === m ? "#0c0c10" : C.text }} onClick={() => { setMode(m); clearSelect(); }}>{l}</button>
            ))}
          </div>
          <button style={S.btn("primary")} draggable onDragStart={e => { draggingNewShot.current = true; e.dataTransfer.effectAllowed = "copy"; }} onDragEnd={onDragEnd} onClick={CRUD.add} title="Klick = ans Ende, Ziehen = an Position">
            <Icon name="plus" size={13} /> Shot
          </button>
          {selected.size > 0 && (
            <div style={{ ...S.row, gap: 6 }}>
              <span style={{ fontSize: 11, color: C.accent }}>{selected.size} ausgewaehlt</span>
              <button style={S.btn("xs")} onClick={clearSelect}>Aufheben</button>
            </div>
          )}
          <div style={{ marginLeft: "auto" }}>
            <ShotlistPdfButton project={project} mode={mode} visibleCols={visibleCols} timeMap={timeMap} />
          </div>
        </div>
        <div style={{ display: mode === "script" ? "none" : "flex", flexWrap: "wrap", gap: 6, alignItems: "center", paddingTop: 6, borderTop: "1px solid " + C.border }}>
          <span style={{ fontSize: 10, color: C.dim }}>Trenner:</span>
          {Object.entries(DIVIDERS).map(([key, d]) => (
            <button key={key} draggable onDragStart={e => { draggingDivType.current = key; e.dataTransfer.effectAllowed = "copy"; }} onDragEnd={onDragEnd}
              style={{ ...S.btn("xs"), background: d.bg, border: "1px solid " + d.border, color: d.color, cursor: "grab" }}
              onClick={() => CRUD.addDivClick(key)} title="Klick = ans Ende, Ziehen = Position">
              + {d.label}
            </button>
          ))}
        </div>

      {mode === "script" && (
        <div style={{ ...S.card, background: "#161620", border: "1px solid #252535", padding: "10px 16px", marginBottom: 14 }}>
          <span style={{ fontSize: 11, color: C.mid }}>
            <span style={{ color: "#555", textDecoration: "line-through", marginRight: 4 }}>Shot</span>In Drehreihenfolge ausgeblendet  |  Auge = ein-/ausblenden  |  Kaestchen = Auswahl  |  Shot-Button ziehen = an Position einfuegen
          </span>
        </div>
      )}
      {mode === "shoot" && (
        <div style={{ ...S.card, background: "#161620", border: "1px solid #252535", padding: "10px 16px", marginBottom: 14 }}>
          <span style={{ fontSize: 11, color: C.mid }}>
            <span style={{ background: "#1a1400", border: "1px solid #2a2000", padding: "1px 5px", borderRadius: 2, marginRight: 6, fontSize: 10 }}>Shot</span>Kein Drehtag zugewiesen  |  Szenen-Zeile ziehen = Segment verschieben  |  Kaestchen = Auswahl  |  Shot-Button ziehen = einfuegen
          </span>
        </div>
      )}

      {/* Spalten ein-/ausblenden */}
      <div style={{ display:"flex", gap:5, flexWrap:"wrap", marginBottom:8, alignItems:"center" }}>
        <span style={{ fontSize:10, color:C.dim, marginRight:2 }}>Spalten:</span>
        {[["description","Beschreibung"],["camera","Kamera"],["lens","Objektiv"],
          ["sonstiges","Sonstiges"],["setup","Aufbau"],["shoot","Dreh"],
          ["storyboard","Storyboard"],["onLocation","On Location"],["referenz","Referenz"],["notes","Notizen"]
        ].map(([k,l]) => (
          <button key={k} onClick={() => toggleCol(k)}
            style={{ ...S.btn("xs"), fontSize:10, padding:"2px 7px",
              background: visibleCols[k]!==false ? "#1e2a1e" : "transparent",
              color: visibleCols[k]!==false ? "#6a9" : C.dim,
              border:"1px solid "+(visibleCols[k]!==false ? "#2a4a2a" : C.border) }}>
            {l}
          </button>
        ))}
      </div>

      <div style={{ overflowX: "auto" }}>
        <table style={{ ...S.tbl, tableLayout: "fixed" }}>
          <colgroup>
            <col style={{ width: 44 }} /><col style={{ width: 26 }} /><col style={{ width: 64 }} /><col style={{ width: 90 }} />
            <col style={{ width: 50 }} /><col style={{ width: 150 }} /><col style={{ width: 90 }} /><col style={{ width: 90 }} />
            {visibleCols.sonstiges !== false && <col style={{ width: 90 }} />}
            <col style={{ width: 58 }} /><col style={{ width: 52 }} />
            {mode === "shoot" && <col style={{ width: 90 }} />}
            {visibleCols.storyboard !== false && <col style={{ width: 64 }} />}
            {visibleCols.onLocation !== false && <col style={{ width: 64 }} />}
            {visibleCols.referenz !== false && <col style={{ width: 64 }} />}
            {visibleCols.notes !== false && <col style={{ width: 90 }} />}
            <col style={{ width: 36 }} />
          </colgroup>
          <thead>
            <tr>
              <th style={S.th} /><th style={S.th}>#</th><th style={S.th}>Klappe</th><th style={S.th}>Szene</th>
              <th style={S.th}>Shot-Nr.</th><th style={S.th}>Beschreibung</th><th style={S.th}>Kamera</th><th style={S.th}>Objektiv</th>
              <th style={S.th}>Aufbau</th><th style={S.th}>Dreh</th>
              {mode === "shoot" && <th style={S.th}>Zeitfenster</th>}
              {visibleCols.storyboard !== false && <th style={S.th}>Storyboard</th>}
              {visibleCols.onLocation !== false && <th style={S.th}>On Location</th>}
              {visibleCols.referenz !== false && <th style={S.th}>Referenz</th>}
              <th style={S.th}>Notizen</th><th style={S.th} />
            </tr>
          </thead>
          <tbody>
            {sorted.map((s, i) => {
              const isDiv = s.type === "divider";
              const dt = isDiv ? DIVIDERS[s.dividerType] : null;
              const isDay = isDiv && s.dividerType === "day";
              const showBefore = insertAt?.id === s.id && insertAt?.pos === "before";
              const showAfter = insertAt?.id === s.id && insertAt?.pos === "after";

              if (isDay) { renderDayId = s.id; renderSegIdx[s.id] = {}; }

              if (isDiv) {
                const linkedDay = project.shootDays.find(d => d.id === s.shootDayId);
                const displayCT = s.callTime || linkedDay?.callTime || "07:00";
                return (
                  <>
                    {showBefore && <IL key={"ilb" + s.id} />}
                    {(() => {
                      const isLunchWarn = s.dividerType === "lunch" && lunchWarnMap[s.id];
                      const lunchBg = isLunchWarn === "red" ? "#2a0a0a" : isLunchWarn === "orange" ? "#2a1a00" : null;
                      return (
                        <tr key={s.id} onDragOver={e => onRowDragOver(e, s.id)} onDrop={() => onRowDrop(s.id)} onDragEnd={onDragEnd}
                          style={{ background: blockDrag === s.id ? C.hover : (lunchBg || dt.bg), opacity: blockDrag === s.id ? 0.5 : 1 }}>
                      <td style={{ ...S.td, color: dt.color, whiteSpace: "nowrap" }}>
                        <span style={{ display: "flex", gap: 4, alignItems: "center" }}>
                          {mode === "shoot" && <Checkbox checked={selected.has(s.id)} onChange={() => toggleSelect(s.id)} title="Auswahl" />}
                          {isDay && (
                            <span draggable onDragStart={() => { blockDragIdRef.current = s.id; setBlockDrag(s.id); fromRef.current = null; draggingDivType.current = null; }} onDragEnd={onDragEnd}
                              style={{ cursor: "grab", fontSize: 15, lineHeight: 1, userSelect: "none" }} title="Block verschieben">&#9618;</span>
                          )}
                          <span draggable onDragStart={() => { fromRef.current = s.id; blockDragIdRef.current = null; draggingDivType.current = null; }} onDragEnd={onDragEnd}
                            style={{ cursor: "grab" }} title="Nur Trenner"><Icon name="drag" size={13} /></span>
                        </span>
                      </td>
                      <td style={{ ...S.td, color: dt.color, fontWeight: 700, fontSize: 9, letterSpacing: "0.12em" }} colSpan={2}>
                        {dt.label}
                        {isLunchWarn && (
                          <span className="no-print-color" style={{ marginLeft: 6, fontWeight: 700, color: isLunchWarn === "red" ? "#c03030" : "#c07000" }}>
                            {isLunchWarn === "red" ? "! >6h" : "! >5.5h"}
                          </span>
                        )}
                      </td>
                      <td style={S.td} colSpan={isDay ? 5 : 7}>
                        {isDay ? (
                          <div style={S.row}>
                            <select style={{ ...S.input, width: 240, padding: "3px 8px", fontSize: 11 }} value={s.shootDayId || ""} onChange={e => onDaySelect(s.id, e.target.value)}>
                              <option value="">- Drehtag waehlen -</option>
                              {project.shootDays.map((d, di) => (<option key={d.id} value={d.id}>Tag {di + 1}{d.date ? " - " + fmtDate(d.date) : ""}{d.locationTitle ? " - " + d.locationTitle : ""}</option>))}
                              <option value="__new__">+ Neuen Drehtag erstellen...</option>
                            </select>
                            <input style={{ ...S.input, width: 106, padding: "3px 8px", fontSize: 11 }} type="time" value={displayCT} onChange={e => onDivCallTimeChange(s.id, e.target.value)} title="Call Time" />
                          </div>
                        ) : (
                          <div style={S.row}>
                            <input style={{ ...S.input, width: 155, padding: "3px 8px", fontSize: 11 }} value={s.label} placeholder={dt.label} onChange={e => CRUD.upd(s.id, { label: e.target.value })} />
                            <input style={{ ...S.input, width: 52, padding: "3px 8px", fontSize: 11 }} type="number" value={s.durationMin} onChange={e => CRUD.upd(s.id, { durationMin: Number(e.target.value) })} title="Dauer (min)" />
                            <span style={{ fontSize: 10, color: C.dim }}>min</span>
                          </div>
                        )}
                      </td>
                      {mode === "shoot" && (
                        <td style={{ ...S.td, color: dt.color, fontSize: 10, whiteSpace: "nowrap" }} colSpan={isDay ? 2 : 1}>
                          {isDay ? <>Start: {timeMap[s.id]?.start} Ende: <strong>{dayEndMap[s.id] || "?"}</strong></> : <>{timeMap[s.id]?.start} - {timeMap[s.id]?.end}</>}
                        </td>
                      )}
                      <td style={S.td} />
                      <td style={S.td}><button style={S.btn("danger")} onClick={() => CRUD.rem(s.id)}><Icon name="trash" size={13} /></button></td>
                        </tr>
                      );
                    })()}
                    {showAfter && <IL key={"ila" + s.id} />}
                  </>
                );
              }

              // Shot row
              const isUnassigned = unassignedIds.has(s.id);
              const isHidden = s.hidden;
              const isSelected = selected.has(s.id);

              // Scene-info row: shoot mode (segment) OR script mode (scene change)
              let sceneInfoRow = null;
              // Script mode: show scene divider when scene changes
              if (mode === "script" && s.type === "shot" && s.scene) {
                const sc = project.scenes.find(x => x.id === s.scene);
                const prevShot = i > 0 ? sorted.slice(0, i).reverse().find(x => x.type === "shot") : null;
                if (sc && (!prevShot || prevShot.scene !== s.scene)) {
                  sceneInfoRow = (
                    <tr key={"sc-div-" + s.scene + "-" + i}>
                      <td colSpan={99} style={{ padding: "4px 10px", background: "#0f0f1a",
                        borderTop: "1px solid #1e1e30", borderBottom: "1px solid #1e1e30" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 12, fontSize: 10 }}>
                          <span style={{ color: C.accent, fontWeight: 700, letterSpacing: "0.1em" }}>
                            #{sc.number}
                          </span>
                          <span style={{ color: C.mid }}>{sc.title || "Unbenannte Szene"}</span>
                          {sc.interior && <span style={{ color: C.dim }}>— {sc.interior}. {sc.locationTitle || ""}</span>}
                        </div>
                      </td>
                    </tr>
                  );
                }
              }
              if (mode === "shoot" && s.scene && renderDayId) {
                const daySegs = segMap[renderDayId] || [];
                const segIdx = renderSegIdx[renderDayId] || {};
                // Find which segment this shot belongs to
                const segForThisShot = daySegs.find(seg => seg.sceneId === s.scene && seg.shotIds.includes(s.id));
                if (segForThisShot) {
                  const segKey = renderDayId + "-" + s.scene + "-" + segForThisShot.part ?? 0;
                  if (!renderedSegments.has(segKey)) {
                    renderedSegments.add(segKey);
                    const sc = project.scenes.find(x => x.id === s.scene);
                    const total = segForThisShot.setup + segForThisShot.shoot;
                    const isSplit = segForThisShot.part !== null;
                    const label = isSplit ? "Szene #" + sc?.number + "." + segForThisShot.part + " " + sc?.title || "".trim() : "Szene #" + sc?.number + " " + sc?.title || "".trim();
                    // Scene-info row is draggable to move this segment
                    sceneInfoRow = (
                      <tr key={"si-" + segKey} style={{ background: "#0f0f14", cursor: "grab" }}
                        draggable
                        onDragStart={() => {
                          const segShotIds = segForThisShot.shotIds;
                          setSelected(new Set(segShotIds));
                          fromRef.current = segShotIds[0] || null;
                          blockDragIdRef.current = null; draggingDivType.current = null; draggingNewShot.current = false;
                        }}
                        onDragOver={e => onRowDragOver(e, s.id)}
                        onDrop={() => onRowDrop(s.id)}
                        onDragEnd={onDragEnd}
                        title={"Szenen-Segment verschieben (" + segForThisShot.shotIds.length + " Shots)"}>
                        <td colSpan={colCount + 1} style={{ padding: "3px 10px", borderBottom: "1px solid #18181e" }}>
                          <div style={{ display: "flex", gap: 18, alignItems: "center", fontSize: 10, color: "#404050" }}>
                            <span style={{ color: "#555", marginRight: 2 }}><Icon name="drag" size={11} /></span>
                            <span style={{ color: "#484860", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>{label}</span>
                            {isSplit && <span style={{ color: "#3a3a50", fontSize: 9, border: "1px solid #3a3a50", padding: "0 4px", borderRadius: 2 }}>GETEILT</span>}
                            <span>Aufbau: <span style={{ color: "#484858" }}>{segForThisShot.setup}min</span></span>
                            <span>Dreh: <span style={{ color: "#484858" }}>{segForThisShot.shoot}min</span></span>
                            <span style={{ color: "#303040" }}>|</span>
                            <span>Gesamt: <span style={{ color: "#606075", fontWeight: 700 }}>{total}min</span></span>
                            <span style={{ color: "#383848" }}>{segForThisShot.count || segForThisShot.shotIds.length} Shots</span>
                          </div>
                        </td>
                      </tr>
                    );
                  }
                }
              }

              // Unassigned separator
              let unassignedSep = null;
              if (mode === "shoot" && isUnassigned) {
                const prev = i > 0 ? sorted[i - 1] : null;
                const prevIsUnassigned = prev && prev.type === "shot" && unassignedIds.has(prev.id);
                if (!prevIsUnassigned) {
                  unassignedSep = (
                    <tr key="unassigned-sep" style={{ background: "#1a1400" }}>
                      <td colSpan={colCount + 1} style={{ padding: "4px 10px", borderBottom: "1px solid #2a2000", borderTop: "1px solid #2a2000" }}>
                        <div style={{ fontSize: 9, color: "#7a5500", letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 700 }}>
                          Nicht zugeordnet - diese Shots sind keinem Drehtag zugewiesen
                        </div>
                      </td>
                    </tr>
                  );
                }
              }

              const rowBg = mode === "script" && isHidden ? "#111118" : mode === "shoot" && isUnassigned ? "#1a1400" : "transparent";

              return (
                <>
                  {sceneInfoRow}
                  {unassignedSep}
                  {showBefore && <IL key={"ilb" + s.id} />}
                  <tr key={s.id}
                    onDragOver={e => onRowDragOver(e, s.id)} onDrop={() => onRowDrop(s.id)} onDragEnd={onDragEnd}
                    style={{ background: isSelected ? "#1a1a2c" : rowBg, cursor: "grab", outline: isSelected ? "1px solid " + C.accent : "none" }}>
                    <td style={{ ...S.td, color: C.dim }}>
                      <span style={{ display: "flex", gap: 3, alignItems: "center" }}>
                        <Checkbox checked={isSelected} onChange={() => toggleSelect(s.id)} title="Mehrfachauswahl" />
                        <span draggable style={{ cursor:"grab" }} onDragStart={() => { fromRef.current = s.id; blockDragIdRef.current = null; draggingDivType.current = null; draggingNewShot.current = false; }}><Icon name="drag" /></span>
                        <span onClick={() => CRUD.upd(s.id, { hidden: !s.hidden })} title={s.hidden ? "Einblenden" : "Ausblenden"} style={{ cursor: "pointer", color: s.hidden ? "#666" : "#444" }}>
                          <Icon name={s.hidden ? "eyeoff" : "eye"} size={12} />
                        </span>
                      </span>
                    </td>

// ─── Build groups (for Drehplan + Dispo) ─────────────────────────────────────
function buildGroups(shots) {
  const sorted = [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0));
  const groups = []; let cur = null;
  sorted.forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") { cur = { divider: s, shots: [], sceneIds: new Set() }; groups.push(cur); }
    else if (cur) { if (s.type === "shot" && !s.hidden && s.scene) cur.sceneIds.add(s.scene); cur.shots.push(s); }
  });
  return groups;
}


// ─── Storyboard PDF Export ────────────────────────────────────────────────────
async function exportStoryboardPdf(project, mode, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const shots = project.shots || [];
    const scenes = project.scenes || [];
    const shootDays = project.shootDays || [];
    const pS = pdfSafe;
    const NL = "\n";

    // A4 Hochformat: 210 × 297mm — 2 Shots pro Zeile
    const W=210, H=297, ML=10, MR=10, MT=14, MB=10, CW=W-ML-MR;
    // Layout constants
    const frameGap = 3;
    const halfW = (CW - frameGap) / 2;
    const halfH = halfW * 9/16;
    const headerH = 7;
    const noteH = 7;

    const pagesArr = [];
    let curPage = {lines:[]};
    const addPage = () => { pagesArr.push(curPage); curPage = {lines:[]}; };
    let y = MT;
    const checkY = need => { if (y + need > H - MB) { addPage(); y = MT; drawHeader(); } };

    const txt = (s,x,yy,sz,bold,rgb,align) =>
      curPage.lines.push({type:'text',text:pS(s||''),x,y:yy,size:sz||8,bold:!!bold,rgb:rgb||[40,40,40],align:align||'left'});
    const rct = (x,yy,w,h2,rgb) =>
      curPage.lines.push({type:'rect',x,y:yy,w,h:h2,rgb:rgb||[240,240,240]});
    const ln = (x1,y1,x2,y2,lw,rgb) =>
      curPage.lines.push({type:'line',x:x1,y:y1,x2,y2,lineWidth:lw||0.3,rgb:rgb||[200,200,200]});

    const HDR=[28,28,38], WHT=[255,255,255], GRY=[160,160,160], DGY=[60,60,60];
    const ACC=[200,140,30];

    // Get sorted shots
    const orderKey = mode==='script'?'scriptOrder':'shootOrder';
    const groups = buildGroups(shots);
    const sortedShots = [...shots]
      .filter(s=>s.type==='shot')
      .sort((a,b)=>(a[orderKey]??0)-(b[orderKey]??0));

    const getScene = id => scenes.find(sc=>sc.id===id);
    const getKlappe = s => {
      const sc = getScene(s.scene);
      const num = sc?.number ? sc.number+'.'+(s.shotNum||'1') : (s.shotNum||'');
      return num + (s.shotLetter||'');
    };

    const now = new Date();
    const standStr = now.toLocaleDateString('de-DE')+' '+now.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});

    const drawHeader = () => {
      rct(ML, MT-12, CW, 10, HDR);
      txt(pS(st.title||'')+' - Storyboard ('+(mode==='script'?'Spielreihenfolge':'Drehreihenfolge')+')',
        ML+CW/2, MT-6, 9, true, WHT, 'center');
      txt(standStr, W-MR-2, MT-6, 6, false, GRY, 'right');
      if (st.logo && st.logoHex) {
        try {
          const lhD = JSON.parse(st.logoHex);
          const logoH = 8;
          curPage.lines.push({type:'image',hexData:lhD.hexData,pxW:lhD.pxW,pxH:lhD.pxH,
            x:ML,y:MT-12,w:Math.round(logoH*(lhD.ratio||3)),h:logoH});
        } catch(e) { txt(pS(st.company||''), ML+2, MT-6, 7, true, WHT); }
      } else if (st.company) {
        txt(pS(st.company||''), ML+2, MT-6, 7, true, WHT);
      }
    };

    drawHeader();

    // Layout shots in 2-column grid
    let col = 0;
    let rowY = y;

    // Returns the total height used by this shot card
    // Draw one shot card. startX/startY in mm, cardWidth in mm. Returns height used.
    const drawShotCard = (s, startX, startY, cardWidth) => {
      const kl = getKlappe(s);
      const sc = getScene(s.scene);
      const frames = s.storyboardFrames || (s.storyboard ? [{id:'f0',img:s.storyboard,note:''}] : [{id:'f0',img:null,note:''}]);
      const allFrames = frames.length > 0 ? frames : [{id:'f0',img:null,note:''}];
      const nFrames = allFrames.length;
      let totalH = 0;

      // Header bar
      rct(startX, startY, cardWidth, headerH, HDR);
      txt(kl||'?', startX+2, startY+5, 7, true, ACC);
      if (sc) txt(pS((sc.locationTitle||sc.title||'').slice(0,24)), startX+18, startY+5, 6.5, false, [180,170,150]);
      totalH += headerH;

      // Frame layout:
      // 1 frame  → full card width (no stretching)
      // 2 frames → two side-by-side, each half card
      // 3+ frames → fixed 1/3-width grid, rows of 3, LEFT-ALIGNED (last row not stretched)
      let fw, fh, cols;
      if (nFrames === 1)      { fw = cardWidth;              fh = fw*9/16; cols = 1; }
      else if (nFrames === 2) { fw = (cardWidth-frameGap)/2; fh = fw*9/16; cols = 2; }
      else                    { fw = (cardWidth-frameGap*2)/3; fh = fw*9/16; cols = 3; }

      for (let i = 0; i < allFrames.length; i += cols) {
        const row = allFrames.slice(i, i + cols);
        let fx = startX;
        let hasNote = false;
        row.forEach((frame, fi) => {
          if (fi > 0) txt('→', fx - frameGap/2, startY + totalH + fh/2 + 2, 8, false, ACC, 'center');
          if (frame.img) {
            curPage.lines.push({type:'image', data:frame.img,
              x:fx+0.5, y:startY+totalH+0.5, w:fw-1, h:fh-1});
          } else {
            rct(fx+0.5, startY+totalH+0.5, fw-1, fh-1, [228,228,228]);
            txt('[ kein Bild ]', fx+fw/2, startY+totalH+fh/2, 6.5, false, [180,180,180], 'center');
          }
          if (frame.note) {
            hasNote = true;
            txt(pS(frame.note.slice(0,45)), fx+1, startY+totalH+fh+2, 6, false, DGY);
          }
          fx += fw + frameGap;
        });
        totalH += fh + (hasNote ? noteH : 2);
      }

      if (s.description) { txt(pS(s.description.slice(0,80)), startX+1, startY+totalH+3, 6.5, false, [120,120,120]); totalH += 6; }
      if (s.sbNote)       { txt(pS(s.sbNote.slice(0,80)),       startX+1, startY+totalH+2, 6,   false, GRY);           totalH += 6; }

      ln(startX, startY+totalH+2, startX+cardWidth, startY+totalH+2, 0.2, [190,190,190]);
      return totalH + 4;
    };

    // Build display plan:
    // - single-frame shots → paired side by side (half width each)
    // - multi-frame shots  → full page width
    const buildDisplayPlan = (shotList) => {
      const plan = [];
      let i = 0;
      while (i < shotList.length) {
        const s = shotList[i];
        const nf = (s.storyboardFrames && s.storyboardFrames.length > 0)
          ? s.storyboardFrames.length
          : (s.storyboard ? 1 : 0);
        if (nf <= 1 && i+1 < shotList.length) {
          const s2 = shotList[i+1];
          const nf2 = (s2.storyboardFrames && s2.storyboardFrames.length > 0)
            ? s2.storyboardFrames.length
            : (s2.storyboard ? 1 : 0);
          if (nf2 <= 1) { plan.push({type:'pair', shots:[s,s2]}); i+=2; continue; }
        }
        plan.push({type:'full', shots:[s]});
        i++;
      }
      return plan;
    };

    // Draw one plan row, return height used
    const drawPlanRow = (row, startY) => {
      if (row.type === 'full') {
        return drawShotCard(row.shots[0], ML, startY, CW);
      } else {
        const hw = (CW - frameGap) / 2;
        const h1 = drawShotCard(row.shots[0], ML, startY, hw);
        const h2 = drawShotCard(row.shots[1], ML+hw+frameGap, startY, hw);
        return Math.max(h1, h2);
      }
    };

        if (mode === 'shoot') {
      for (const group of groups) {
        const groupShots = group.shots.filter(s=>s.type==='shot');
        if (!groupShots.length) continue;
        // Day header
        checkY(8);
        const div = group.divider;
        const dayIdx = div?.shootDayId ? shootDays.findIndex(d=>d.id===div.shootDayId) : -1;
        const day = dayIdx>=0 ? shootDays[dayIdx] : null;
        const dayLabel = dayIdx>=0 ? `${dayIdx+1}. Drehtag${day?.date?' – '+day.date:''}` : 'Drehtag';
        rct(ML, y, CW, 6, [40,40,60]);
        txt(dayLabel.toUpperCase(), ML+2, y+4.5, 7, true, [180,170,100]);
        y += 8; col = 0; rowY = y;

        const shootPlan = buildDisplayPlan(groupShots);
        for (const row of shootPlan) {
          const estH = headerH + halfH + noteH + 20;
          checkY(estH);
          const usedH = drawPlanRow(row, y);
          y += usedH;
        }
        y += 4;
      }
    } else {
      // Script mode: all shots sorted
      const scriptPlan = buildDisplayPlan(sortedShots);
      for (const row of scriptPlan) {
        const estH2 = headerH + halfH + noteH + 20;
        checkY(estH2);
        const usedH2 = drawPlanRow(row, y);
        y += usedH2;
      }
    }

    pagesArr.push(curPage);

    // Process images async then build PDF
    // Inline image processing (same as processImagesAndBuild)
    const imgLines2 = pagesArr.flatMap(p=>p.lines.filter(l=>l.type==='image'&&l.data));
    if (imgLines2.length > 0) {
      const canvas2 = document.createElement('canvas');
      const ctx2g = canvas2.getContext('2d');
      for (const l of imgLines2) {
        try {
          const dpiScale = 5.91;
          const pw = Math.max(20, Math.round(l.w * dpiScale));
          const ph = Math.max(20, Math.round(l.h * dpiScale));
          canvas2.width = pw; canvas2.height = ph;
          ctx2g.fillStyle = '#ffffff'; ctx2g.fillRect(0,0,pw,ph);
          const img3 = new window.Image();
          img3.src = l.data;
          if (!img3.complete) {
            await new Promise(res => { img3.onload=res; img3.onerror=res; setTimeout(res,3000); });
          }
          let src3 = img3;
          try { if(img3.naturalWidth>0) src3 = await createImageBitmap(img3); } catch(e){}
          if (img3.naturalWidth > 0) ctx2g.drawImage(src3, 0, 0, pw, ph);
          const imgData2 = ctx2g.getImageData(0,0,pw,ph);
          let hexData2='', alphaData2=''; let hasAlpha2=false;
          for(let i=0;i<imgData2.data.length;i+=4){
            hexData2+=('0'+imgData2.data[i].toString(16)).slice(-2);
            hexData2+=('0'+imgData2.data[i+1].toString(16)).slice(-2);
            hexData2+=('0'+imgData2.data[i+2].toString(16)).slice(-2);
          }
          hexData2+='>'; l.hexData=hexData2; l.pxW=pw; l.pxH=ph;
        } catch(e) { console.warn('SB img err:',e); }
      }
    }
    const pdfStr = buildPdf(pagesArr, {landscape:false});
    const modus = mode==='script'?'Spielreihenfolge':'Drehreihenfolge';
    const naming = st.exportNaming||{};
    const pattern = naming.storyboard || (pS(st.title||'Projekt')+'_Storyboard_'+modus);
    openPdf(pdfStr, pattern+'.pdf');
  } catch(e) {
    alert('Storyboard-PDF Fehler: '+e.message);
    console.error(e);
  } finally {
    if (setExporting) setExporting(false);
  }
}

// ─── Storyboard Tab ───────────────────────────────────────────────────────────
function StoryboardTab({ project, onChange }) {
  const shots = project.shots || [];
  const scenes = project.scenes || [];
  const shootDays = project.shootDays || [];

  const [mode, setMode] = React.useState('shoot');
  const [exportingPdf, setExportingPdf] = React.useState(false);
  const [selectedDay, setSelectedDay] = React.useState(null);
  const [lightbox, setLightbox] = React.useState(null);
  const [expandedPhotos, setExpandedPhotos] = React.useState({}); // shotId → bool

  const orderKey = mode === 'script' ? 'scriptOrder' : 'shootOrder';

  // Update shot
  const updShot = (id, patch) => onChange({
    ...project, shots: shots.map(s => s.id === id ? {...s,...patch} : s)
  });

  // Get groups (day-based) for shoot order
  const groups = buildGroups(shots);

  // Get scene info
  const getScene = id => scenes.find(sc => sc.id === id);

  // For script order: sort all shots by scriptOrder, group by scene
  const shotsByScript = [...shots]
    .filter(s => s.type === 'shot')
    .sort((a,b) => (a.scriptOrder??0) - (b.scriptOrder??0));

  // For shoot order: use groups
  const allShotsSorted = [...shots]
    .filter(s => s.type === 'shot')
    .sort((a,b) => (a[orderKey]??0) - (b[orderKey]??0));

  // Klappe string
  const klappe = s => {
    const sc = getScene(s.scene);
    const num = sc?.number ? sc.number+'.'+(s.shotNum||'1') : (s.shotNum||'');
    return num + (s.shotLetter||'');
  };

  // Photo upload
  const uploadPhoto = (shotId, field, frameIdx, file) => {
    const r = new FileReader();
    r.onload = ev => {
      const img2 = new window.Image();
      img2.onload = () => {
        const cv = document.createElement('canvas');
        const MAX = 800;
        const ratio = Math.min(MAX/img2.width, MAX/img2.height, 1);
        cv.width = Math.round(img2.width*ratio); cv.height = Math.round(img2.height*ratio);
        const ctx2 = cv.getContext('2d');
        ctx2.fillStyle='#fff'; ctx2.fillRect(0,0,cv.width,cv.height);
        ctx2.drawImage(img2,0,0,cv.width,cv.height);
        const dataUrl = cv.toDataURL('image/jpeg', 0.88);
        if (frameIdx !== undefined) {
          // Update storyboardFrames
          const s = shots.find(s => s.id === shotId);
          const frames = [...(s?.storyboardFrames || (s?.storyboard ? [{id:uid(),img:s.storyboard,note:''}] : [{id:uid(),img:null,note:''}]))];
          frames[frameIdx] = {...frames[frameIdx], img: dataUrl};
          // Also update legacy storyboard field with first frame
          updShot(shotId, {storyboardFrames: frames, storyboard: frames[0]?.img || null});
        } else {
          updShot(shotId, {[field]: dataUrl});
        }
      };
      img2.src = ev.target.result;
    };
    r.readAsDataURL(file);
  };

  // Add frame to shot
  const addFrame = shotId => {
    const s = shots.find(s => s.id === shotId);
    const existing = s?.storyboardFrames || (s?.storyboard ? [{id:uid(),img:s.storyboard,note:''}] : []);
    const frames = [...existing, {id:uid(), img:null, note:''}];
    updShot(shotId, {storyboardFrames: frames, storyboard: frames[0]?.img || null});
  };

  // Remove frame
  const removeFrame = (shotId, frameIdx) => {
    const s = shots.find(s => s.id === shotId);
    const frames = (s?.storyboardFrames || []).filter((_,i) => i !== frameIdx);
    updShot(shotId, {storyboardFrames: frames.length ? frames : null, storyboard: frames[0]?.img || null});
  };

  // Single shot card with multi-frame storyboard
  const ShotCard = ({ s }) => {
    const sc = getScene(s.scene);
    const kl = klappe(s);
    const frames = s.storyboardFrames || (s.storyboard ? [{id:s.id+'_f0', img:s.storyboard, note:''}] : [{id:s.id+'_f0', img:null, note:''}]);
    const showPhotos = expandedPhotos[s.id];

    return (
      <div style={{ background:C.card, border:'1px solid '+C.border, borderRadius:8, overflow:'hidden' }}>
        {/* Header */}
        <div style={{ background:'#1a1a2e', padding:'5px 10px', display:'flex', gap:8, alignItems:'center' }}>
          <span style={{ fontWeight:700, color:C.accent, fontSize:13, flexShrink:0 }}>{kl||'?'}</span>
          {sc && <span style={{ fontSize:11, color:'#aaa', flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{sc.locationTitle||sc.title||''}</span>}
          <div style={{ display:'flex', gap:4, flexShrink:0 }}>
            {['camera','lens','setup'].map(f => s[f] ?
              <span key={f} style={{ fontSize:10, color:'#666' }}>{s[f]}</span> : null)}
          </div>
        </div>

        {/* Multi-frame storyboard row */}
        <div style={{ display:'flex', alignItems:'stretch', overflowX:'auto', gap:0 }}>
          {frames.map((frame, fi) => (
            <React.Fragment key={frame.id||fi}>
              {/* Arrow between frames */}
              {fi > 0 && (
                <div style={{ display:'flex', alignItems:'center', padding:'0 4px',
                  color:C.accent, fontSize:20, flexShrink:0 }}>→</div>
              )}
              {/* Frame */}
              <div style={{ minWidth:180, flex:'0 0 180px', display:'flex', flexDirection:'column' }}>
                {/* Image */}
                <div style={{ position:'relative', aspectRatio:'16/9', background:'#111',
                  display:'flex', alignItems:'center', justifyContent:'center' }}>
                  {frame.img ? (
                    <>
                      <img src={frame.img} alt=""
                        onClick={() => setLightbox({src:frame.img, caption:kl+' — Frame '+(fi+1)})}
                        style={{ width:'100%', height:'100%', objectFit:'cover', cursor:'pointer' }} />
                      <div style={{ position:'absolute', top:2, right:2, display:'flex', gap:2 }}>
                        <label style={{ background:'rgba(0,0,0,0.6)', padding:'2px 5px', borderRadius:3,
                          cursor:'pointer', fontSize:10, color:'#ccc' }}>
                          ✎
                          <input type="file" accept="image/*" style={{ display:'none' }}
                            onChange={e=>{const f=e.target.files?.[0];if(f)uploadPhoto(s.id,null,fi,f);e.target.value='';}} />
                        </label>
                        <span onClick={()=>removeFrame(s.id,fi)}
                          style={{ background:'rgba(180,40,40,0.8)', padding:'2px 5px', borderRadius:3,
                            cursor:'pointer', fontSize:10, color:'#fff' }}>×</span>
                      </div>
                    </>
                  ) : (
                    <label style={{ display:'flex', flexDirection:'column', alignItems:'center',
                      gap:4, cursor:'pointer', color:C.dim, width:'100%', height:'100%',
                      justifyContent:'center', minHeight:100 }}>
                      <span style={{ fontSize:24, opacity:0.3 }}>+</span>
                      <span style={{ fontSize:10 }}>Storyboard</span>
                      <input type="file" accept="image/*" style={{ display:'none' }}
                        onChange={e=>{const f=e.target.files?.[0];if(f)uploadPhoto(s.id,null,fi,f);e.target.value='';}} />
                    </label>
                  )}
                </div>
                {/* Frame note */}
                <textarea
                  key={frame.id||fi}
                  style={{ background:'#111', color:'#aaa', fontSize:10, fontFamily:'inherit',
                    border:'none', borderTop:'1px solid #222', padding:'4px 6px', resize:'none',
                    minHeight:32, outline:'none', width:'100%' }}
                  defaultValue={frame.note||''} placeholder={'Frame '+(fi+1)+' Notiz...'}
                  onBlur={e => {
                    const newFrames = frames.map((fr,i) => i===fi ? {...fr,note:e.target.value} : fr);
                    updShot(s.id, {storyboardFrames: newFrames});
                  }} />
              </div>
            </React.Fragment>
          ))}
          {/* Add frame button */}
          <div style={{ display:'flex', alignItems:'center', padding:'0 8px', flexShrink:0 }}>
            <button onClick={()=>addFrame(s.id)}
              style={{ ...S.btn('xs'), fontSize:16, padding:'4px 8px', opacity:0.6 }}
              title="Frame hinzufügen">+</button>
          </div>
        </div>

        {/* On Location + Referenz (collapsed by default) */}
        <div style={{ borderTop:'1px solid #222' }}>
          <button onClick={()=>setExpandedPhotos(p=>({...p,[s.id]:!p[s.id]}))}
            style={{ background:'none', border:'none', color:C.dim, fontSize:10,
              padding:'4px 10px', cursor:'pointer', width:'100%', textAlign:'left' }}>
            {showPhotos ? '▾' : '▸'} On Location / Referenz
          </button>
          {showPhotos && (
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:1, background:C.border }}>
              {[['onLocation','On Location'],['referenz','Referenz']].map(([field,label]) => (
                <div key={field} style={{ background:C.bg, position:'relative',
                  aspectRatio:'16/9', display:'flex', alignItems:'center', justifyContent:'center',
                  minHeight:80 }}>
                  {s[field] ? (
                    <>
                      <img src={s[field]} alt={label}
                        onClick={()=>setLightbox({src:s[field],caption:label+' — '+kl})}
                        style={{ width:'100%', height:'100%', objectFit:'cover', cursor:'pointer' }} />
                      <div style={{ position:'absolute', bottom:0, left:0, right:0,
                        background:'rgba(0,0,0,0.5)', padding:'2px 6px',
                        display:'flex', justifyContent:'space-between' }}>
                        <span style={{ fontSize:9, color:'#ccc' }}>{label}</span>
                        <span onClick={()=>updShot(s.id,{[field]:null})}
                          style={{ fontSize:10, color:'#f66', cursor:'pointer' }}>×</span>
                      </div>
                    </>
                  ) : (
                    <label style={{ display:'flex', flexDirection:'column', alignItems:'center',
                      gap:3, cursor:'pointer', color:C.dim, width:'100%', height:'100%',
                      justifyContent:'center' }}>
                      <span style={{ fontSize:16, opacity:0.3 }}>+</span>
                      <span style={{ fontSize:9 }}>{label}</span>
                      <input type="file" accept="image/*" style={{ display:'none' }}
                        onChange={e=>{const f=e.target.files?.[0];if(f)uploadPhoto(s.id,field,undefined,f);e.target.value='';}} />
                    </label>
                  )}
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Shot description (editable, syncs with Shotlist) */}
        <div style={{ padding:'6px 10px', borderTop:'1px solid #1a1a1a' }}>
          <textarea key={'desc-'+s.id} style={{ width:'100%', background:'transparent', color:'#ccc',
            fontSize:11, fontFamily:'inherit', border:'none', resize:'none', outline:'none',
            minHeight:28 }}
            defaultValue={s.description||''} placeholder='Beschreibung (Shotlist-sync)...'
            onBlur={e=>updShot(s.id,{description:e.target.value})} />
        </div>

        {/* Storyboard-only note */}
        <div style={{ padding:'4px 10px 8px', borderTop:'1px solid #111' }}>
          <textarea key={'sbnote-'+s.id} style={{ width:'100%', background:'transparent', color:'#888',
            fontSize:10, fontFamily:'inherit', border:'none', resize:'none', outline:'none',
            minHeight:24 }}
            defaultValue={s.sbNote||''} placeholder='Storyboard-Notiz (nur hier sichtbar)...'
            onBlur={e=>updShot(s.id,{sbNote:e.target.value})} />
        </div>


      </div>
    );
  };

  // Determine display groups based on mode
  const dayGroups = mode === 'shoot' ? groups : null;

  return (
    <div>
      {/* Header */}
      <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:16, flexWrap:'wrap' }}>
        <h1 style={S.h1}>Storyboard</h1>
        <div style={{ display:'flex', gap:4, marginLeft:'auto', flexWrap:'wrap' }}>
          <button style={S.btn(mode==='shoot'?'primary':'xs')} onClick={()=>setMode('shoot')}>
            Drehreihenfolge
          </button>
          <button style={S.btn(mode==='script'?'primary':'xs')} onClick={()=>setMode('script')}>
            Spielreihenfolge
          </button>
          <button style={S.btn('secondary')} onClick={()=>exportStoryboardPdf(project, mode, setExportingPdf)}>
            PDF
          </button>
        </div>
      </div>

      {/* Day filter (shoot mode only) */}
      {mode === 'shoot' && groups.length > 0 && (
        <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginBottom:14 }}>
          <button style={{ ...S.btn(selectedDay===null?'primary':'xs'), fontSize:11 }}
            onClick={()=>setSelectedDay(null)}>Alle Tage</button>
          {groups.map((g, i) => {
            const div = g.divider;
            const dayIdx = div?.shootDayId ? shootDays.findIndex(d=>d.id===div.shootDayId) : i;
            const day = dayIdx >= 0 ? shootDays[dayIdx] : null;
            const label = `Tag ${dayIdx>=0?dayIdx+1:i+1}${day?.date?' · '+day.date:''}`;
            return (
              <button key={i} style={{ ...S.btn(selectedDay===i?'primary':'xs'), fontSize:11 }}
                onClick={()=>setSelectedDay(i)}>{label}</button>
            );
          })}
        </div>
      )}

      {/* Empty state */}
      {allShotsSorted.length === 0 && (
        <div style={{ ...S.card, color:C.dim, textAlign:'center', padding:40 }}>
          Noch keine Shots. Füge Shots in der Shotlist hinzu.
        </div>
      )}

      {/* SHOOT MODE: grouped by day */}
      {mode === 'shoot' && (selectedDay !== null ? [groups[selectedDay]] : groups).filter(Boolean).map((g, gi) => {
        const shotCards = g.shots.filter(s=>s.type==='shot');
        if (!shotCards.length) return null;
        const div = g.divider;
        const dayIdx = div?.shootDayId ? shootDays.findIndex(d=>d.id===div.shootDayId) : gi;
        const day = dayIdx >= 0 ? shootDays[dayIdx] : null;
        const label = `${dayIdx>=0?dayIdx+1:gi+1}. Drehtag${day?.date?' – '+day.date:''}`;
        return (
          <div key={gi} style={{ marginBottom:28 }}>
            <div style={{ fontSize:11, fontWeight:700, color:C.accent, letterSpacing:'0.1em',
              marginBottom:10, paddingBottom:6, borderBottom:'2px solid '+C.accent }}>
              {label.toUpperCase()} — {shotCards.length} Shot{shotCards.length!==1?'s':''}
            </div>
            <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))', gap:14 }}>
              {shotCards.map(s => <ShotCard key={s.id} s={s} />)}
              {/* Add new shot button */}
              <div onClick={() => {
                const maxOrder = Math.max(0, ...shots.map(s=>s.shootOrder||0));
                const maxScript = Math.max(0, ...shots.map(s=>s.scriptOrder||0));
                const newShot = {id:uid(), type:'shot', scene:null, shotNum:'1', shotLetter:'',
                  description:'', camera:'', lens:'', setup:'', shootMin:0, notes:'',
                  hidden:false, shootOrder:maxOrder+1, scriptOrder:maxScript+1,
                  storyboard:null, storyboardFrames:null, onLocation:null, referenz:null};
                onChange({...project, shots:[...shots, newShot]});
              }} style={{ background:'transparent', border:'2px dashed '+C.border, borderRadius:8,
                display:'flex', alignItems:'center', justifyContent:'center', minHeight:120,
                cursor:'pointer', color:C.dim, fontSize:13, gap:6 }}>
                + Shot hinzufügen
              </div>
            </div>
          </div>
        );
      })}

      {/* SCRIPT MODE: all shots by script order */}
      {mode === 'script' && (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))', gap:14 }}>
          {shotsByScript.map(s => <ShotCard key={s.id} s={s} />)}
        </div>
      )}

      {/* Lightbox */}
      {lightbox && (
        <div onClick={()=>setLightbox(null)}
          style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.92)', zIndex:9999,
            display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column', gap:12 }}>
          <img src={lightbox.src} alt=""
            style={{ maxWidth:'93vw', maxHeight:'88vh', objectFit:'contain', borderRadius:8 }} />
          {lightbox.caption && <div style={{ color:'#ddd', fontSize:13 }}>{lightbox.caption}</div>}
          <div style={{ color:'#888', fontSize:11 }}>Klicken zum Schließen</div>
        </div>
      )}
    </div>
  );
}

  const cast = (() => {

      ? project.cast.filter(p => rolesForDay.has(p.role))
      : project.cast.filter(p => p.days.includes(dayIdx));
  })();
                const totalMin = group.shots.filter(s => s.type === "shot" && !s.hidden)

                    </td>
                  </tr>
                );
                if (scenes.length === 0) {
                  rows.push(<tr key={"ns-" + gi}><td colSpan={5} style={{ ...tS, color: "#aaa", fontStyle: "italic" }}>Keine Szenen zugewiesen.</td></tr>);
                } else {
                  scenes.forEach((sc, si) => {
                    rows.push(
                      <tr key={sc.id} style={{ background: si % 2 === 0 ? "#fff" : "#f8f8f8", borderBottom: "1px solid #ddd" }}>

                          <div style={{ fontWeight: 700 }}>{sc.number}</div>
