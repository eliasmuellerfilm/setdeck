  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#0c0c10;color:#ddd8d0;}
    #root{min-height:100vh;}
    #loading{position:fixed;inset:0;background:#0c0c10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:monospace;color:#e8a020;z-index:9999;}
    #loading-bar{width:200px;height:2px;background:#252535;border-radius:1px;overflow:hidden;}
    #loading-fill{height:100%;background:#e8a020;width:0%;transition:width 0.3s;}
    #error-box{display:none;position:fixed;inset:0;background:#0c0c10;color:#c04040;font-family:monospace;padding:40px;white-space:pre-wrap;overflow:auto;z-index:9999;}

<body>
  <div id="loading">
    <div style="font-size:22px;font-weight:700;letter-spacing:0.1em;">FILM DISPO</div>
    <div id="loading-bar"><div id="loading-fill"></div></div>
    <div id="loading-text" style="font-size:11px;color:#666;">Lade...</div>
  </div>
  <div id="error-box"></div>
  <div id="root"></div>

  <script>
    // Progress indicator
    const fill = document.getElementById('loading-fill');
    const loadText = document.getElementById('loading-text');
    let progress = 0;
    const tick = setInterval(() => {
      progress = Math.min(progress + Math.random() * 8, 85);
      fill.style.width = progress + '%';
    }, 200);

    function showError(msg) {
      clearInterval(tick);
      document.getElementById('loading').style.display = 'none';
      const eb = document.getElementById('error-box');
      eb.style.display = 'block';
      eb.textContent = 'Ladefehler:\n\n' + msg + '\n\nBitte Seite neu laden oder Browser-Console pruefen.';
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Konnte nicht laden: ' + src));
        document.head.appendChild(s);
      });
    }

    async function bootstrap() {
      try {
        loadText.textContent = 'Lade React...';
        await loadScript('https://unpkg.com/react@18.3.1/umd/react.production.min.js');
        fill.style.width = '30%';
        
        await loadScript('https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js');
        fill.style.width = '50%';
        loadText.textContent = 'Lade Compiler...';

        await loadScript('https://unpkg.com/@babel/standalone@7.23.10/babel.min.js');
        fill.style.width = '80%';
        loadText.textContent = 'Starte App...';

        // Register presets
        Babel.registerPreset('custom', {
          presets: [
            [Babel.availablePresets['react']],
            [Babel.availablePresets['env'], { targets: { browsers: ['last 2 versions'] }, modules: false }]
          ]
        });

        // Transform the app code
        const appCode = document.getElementById('app-source').textContent;
        let transformed;
        try {
          transformed = Babel.transform(appCode, {
            presets: ['custom'],
            filename: 'App.jsx'
          }).code;
        } catch(e) {
          throw new Error('JSX Kompilierungsfehler: ' + e.message);
        }

        // Execute
        const fn = new Function('React', 'ReactDOM', transformed + '\nreturn App;');
        const App = fn(React, ReactDOM);
        
        fill.style.width = '100%';
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
          ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(App)
          );
        }, 200);

      } catch(e) {
        showError(e.message + (e.stack ? '\n' + e.stack : ''));
      }
    }

    bootstrap();
  </script>

// ─── PDF Export ──────────────────────────────────────────────────────────────
// Self-contained PDF builder - no external libraries, works in sandboxed iframes.
// Generates a real binary PDF and opens it in a new tab via a data: URI.

function buildPdf(pages) {
  // pages: array of {lines:[{type,x,y,w,h,text,size,bold,italic,rgb,align,x2,y2,lineWidth}]}
  // All coordinates in mm, converted to PDF points (1mm = 2.8346pt)
  // PDF y=0 is at BOTTOM of page; we convert from top-down mm coords.
  const P = 2.8346; // mm to pt
  const PW = 595.28; const PH = 841.89; // A4 in pt
  const mm2pt = v => v * P;
  const y2pt = ymm => PH - ymm * P; // top-down mm -> bottom-up pt

  const escPdf = s => {
    let r = "";
    for (let i = 0; i < s.length; i++) {
      const b = s.charCodeAt(i);
      if (b === 40) r += "\\(";
      else if (b === 41) r += "\\)";
      else if (b === 92) r += "\\\\";
      else if (b < 32 || b > 126) r += "?";
      else r += s[i];
    }
    return r;
  };

  const NL = "\n";
  const faces = ["Helvetica","Helvetica-Bold","Helvetica-Oblique","Helvetica-BoldOblique"];

  // Build one content stream per page using absolute Tm positioning
  const streams = pages.map(pg => {
    const ops = [];
    ops.push("BT");
    let curFont = ""; let curRgb = ""; let curSRgb = "";

    pg.lines.forEach(l => {
      if (l.type === "rect") {
        ops.push("ET");
        const rgb = l.rgb || [240,240,240];
        const rc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3);
        ops.push(rc+" rg");
        // rect: x y w h re f  (y is bottom-left corner in PDF)
        const px = mm2pt(l.x).toFixed(2);
        const py = (y2pt(l.y) - mm2pt(l.h)).toFixed(2); // top-left to bottom-left
        const pw2 = mm2pt(l.w).toFixed(2);
        const ph = mm2pt(l.h).toFixed(2);
        ops.push(px+" "+py+" "+pw2+" "+ph+" re f");
        ops.push("BT");
        return;
      }
      if (l.type === "line") {
        ops.push("ET");
        const rgb = l.rgb || [180,180,180];
        const sc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3);
        if (sc !== curSRgb) { ops.push(sc+" RG"); curSRgb = sc; }
        ops.push((l.lineWidth||0.3).toFixed(2)+" w");
        ops.push(mm2pt(l.x1).toFixed(2)+" "+y2pt(l.y1).toFixed(2)+" m "+mm2pt(l.x2).toFixed(2)+" "+y2pt(l.y2).toFixed(2)+" l S");
        ops.push("BT");
        return;
      }
      // Text: use Tm for absolute positioning
      const sz = l.size || 9;
      const bold = !!l.bold; const italic = !!l.italic;
      const fn = bold&&italic?"Helvetica-BoldOblique":bold?"Helvetica-Bold":italic?"Helvetica-Oblique":"Helvetica";
      const fk = fn+"|"+sz;
      if (fk !== curFont) { ops.push("/"+fn+" "+sz.toFixed(2)+" Tf"); curFont = fk; }
      const rgb = l.rgb || [0,0,0];
      const fc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3)+" rg";
      if (fc !== curRgb) { ops.push(fc); curRgb = fc; }

      const text = escPdf(String(l.text||""));
      // Approximate char width for Helvetica: ~0.5 * fontSize in pt
      const approxCharW = mm2pt(sz) * 0.5;
      const textW = approxCharW * String(l.text||"").length;
      let px = mm2pt(l.x);
      if (l.align === "right") px = mm2pt(l.x) - textW;
      else if (l.align === "center") px = mm2pt(l.x) - textW/2;

      const py = y2pt(l.y); // baseline
      // Tm: 1 0 0 1 tx ty Tm  (identity matrix + translation = absolute position)
      ops.push("1 0 0 1 "+px.toFixed(2)+" "+py.toFixed(2)+" Tm");
      ops.push("("+text+") Tj");
    });
    ops.push("ET");
    return ops.join(NL)+NL;
  });

  // Assemble PDF binary
  let out = "%PDF-1.4"+NL;
  const refs = []; // byte offsets
  let off = out.length;
  let nObj = 0;

  const addObj = content => {
    nObj++;
    refs.push(off);
    const s = nObj+" 0 obj"+NL+content+NL+"endobj"+NL;
    out += s; off += s.length;
    return nObj;
  };

  // Font objects
  const fontIds = {};
  faces.forEach(f => {
    fontIds[f] = addObj("<</Type /Font /Subtype /Type1 /BaseFont /"+f+" /Encoding /WinAnsiEncoding>>");
  });

  const fontRes = "/Font <<"+faces.map(f=>"/"+f+" "+fontIds[f]+" 0 R").join(" ")+" >>";

  // Content stream + page objects
  const pageIds = streams.map(stream => {
    const len = stream.length;
    const sid = addObj("<</Length "+len+">>\nstream\n"+stream+"endstream");
    const pid = addObj("<</Type /Page /MediaBox [0 0 "+PW.toFixed(2)+" "+PH.toFixed(2)+"] /Contents "+sid+" 0 R /Resources <<"+fontRes+">> /Parent 0 0 R>>");
    return pid;
  });

  const pagesId = addObj("<</Type /Pages /Kids ["+pageIds.map(n=>n+" 0 R").join(" ")+"] /Count "+pageIds.length+">>");
  // Fix parent refs
  pageIds.forEach(pid => {
    out = out.replace(pid+" 0 obj\n<</Type /Page", pid+" 0 obj\n<</Type /Page");
    // Replace the placeholder parent ref
  });
  // Patch /Parent 0 0 R -> /Parent pagesId 0 R
  out = out.split("/Parent 0 0 R").join("/Parent "+pagesId+" 0 R");

  const catId = addObj("<</Type /Catalog /Pages "+pagesId+" 0 R>>");

  // Cross-reference table
  const xrefOff = off;
  let xref = "xref"+NL+"0 "+(nObj+1)+NL;
  xref += "0000000000 65535 f "+NL;
  refs.forEach(r => { xref += r.toString().padStart(10,"0")+" 00000 n "+NL; });
  out += xref;
  out += "trailer"+NL+"<</Size "+(nObj+1)+" /Root "+catId+" 0 R>>"+NL;
  out += "startxref"+NL+xrefOff+NL+"%%EOF";
  return out;
}

function pdfSafe(s) {
  return String(s||"")
    .replace(/\u00e4/g,"ae").replace(/\u00f6/g,"oe").replace(/\u00fc/g,"ue")
    .replace(/\u00c4/g,"Ae").replace(/\u00d6/g,"Oe").replace(/\u00dc/g,"Ue")
    .replace(/\u00df/g,"ss").replace(/[^\x20-\x7E]/g,"?");
}

function openPdf(pdfStr, filename) {
  const len = pdfStr.length;
  const buf = new Uint8Array(len);
  for (let i = 0; i < len; i++) buf[i] = pdfStr.charCodeAt(i) & 0xff;
  const blob = new Blob([buf], {type:"application/pdf"});
  const url = URL.createObjectURL(blob);
  // Open in new tab - works in sandboxed iframes
  const win = window.open(url, "_blank");
  if (!win) {
    // Fallback: force download via link
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.target = "_blank";
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
  } else {
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }
}

// ─── Document layout engine ───────────────────────────────────────────────────
// All measurements in mm, Y increases downward from top of page

function makeDoc() {
  const W = 210; const H = 297;
  const ML = 12; const MR = 12; const MT = 14; const MB = 14;
  const CW = W - ML - MR;
  let pages = [{ lines: [] }];
  let y = MT;

  const cur = () => pages[pages.length - 1];
  const checkY = need => {
    if (y + need > H - MB) { pages.push({ lines: [] }); y = MT; }
  };
  const addY = d => { y += d; };
  const setY = v => { y = v; };
  const getY = () => y;

  // Primitives
  const rect = (x, yy, w, h, rgb) => cur().lines.push({ type:"rect", x, y:yy, w, h, rgb:rgb||[240,240,240] });
  const line2 = (x1, y1, x2, y2, lw, rgb) => cur().lines.push({ type:"line", x1, y1, x2, y2, lineWidth:lw||0.3, rgb:rgb||[180,180,180] });
  const text = (s, x, yy, sz, bold, rgb, align) => cur().lines.push({ type:"text", text:pdfSafe(s), x, y:yy, size:sz||9, bold:!!bold, rgb:rgb||[40,40,40], align:align||"left" });

  // Word-wrap text into multiple lines (returns array of strings)
  const wrapText = (s, maxMm, sz) => {
    const safe = pdfSafe(s);
    const charWmm = sz * 0.55 * 0.3528; // pt->mm: sz*0.55pt per char * 0.3528mm/pt
    const maxChars = Math.max(1, Math.floor(maxMm / charWmm));
    const words = safe.split(" ");
    const lines = []; let cur2 = "";
    words.forEach(w => {
      const test = cur2 ? cur2+" "+w : w;
      if (test.length > maxChars && cur2) { lines.push(cur2); cur2 = w; }
      else cur2 = test;
    });
    if (cur2) lines.push(cur2);
    return lines.length ? lines : ["-"];
  };

  // Draw a section header bar
  const sectionHeader = (label, h) => {
    h = h || 6;
    checkY(h + 2);
    rect(ML, y, CW, h, [30,30,42]);
    text(label, ML+2, y + h*0.68, 7.5, true, [200,180,140]);
    addY(h + 1);
  };

  // Draw a table header row
  const tableHeader = (cols, h) => {
    h = h || 6;
    checkY(h + 2);
    rect(ML, y, CW, h, [40,40,55]);
    let cx = ML;
    cols.forEach(col => {
      text(col.label||"", cx+1, y + h*0.7, 7, true, [200,180,140]);
      cx += col.w;
    });
    addY(h + 0.5);
  };

  // Draw a data row with word-wrap per cell; returns row height used
  const tableRow = (cols, vals, si, rowMinH) => {
    const SZ = 8; // font size in POINTS
    const LH = 3.8; // line height mm
    // Calculate lines per cell
    const cellLines = vals.map((v, i) => wrapText(String(v||""), (cols[i]&&cols[i].w||20)-2, SZ));
    const nLines = Math.max(...cellLines.map(l=>l.length), 1);
    const rowH = Math.max(nLines * LH + 2.5, rowMinH||6);
    checkY(rowH);
    if (si % 2 === 0) rect(ML, y, CW, rowH, [252,252,252]);
    line2(ML, y+rowH, W-MR, y+rowH, 0.15, [210,210,210]);
    let cx = ML;
    vals.forEach((v, i) => {
      const col = cols[i] || { w: 20 };
      const bold = col.bold || false;
      const rgb = col.rgb || [40,40,40];
      const lines3 = cellLines[i];
      lines3.forEach((l, li) => {
        text(l, cx+1, y + 3.5 + li*LH, SZ, bold && li===0, rgb);
      });
      cx += col.w;
    });
    addY(rowH);
    return rowH;
  };

  return { pages:()=>pages, checkY, addY, setY, getY, rect, line2, text, wrapText, sectionHeader, tableHeader, tableRow, W, H, ML, MR, MT, MB, CW };
}


// ─── Export Dispo as PDF ──────────────────────────────────────────────────────
function exportDispoPdf(project, dayIdx, setExporting) {
  setExporting(true);
  try {
    const st = project.settings;
    const day = project.shootDays[dayIdx];
    const doc = makeDoc();
    const { W, ML, MR, CW } = doc;

    // Compute groups
    const groups = buildGroups(project.shots);
    const group = groups.find(g => {
      const lk = project.shootDays.find(d2 => d2.id === g.divider.shootDayId);
      return lk && project.shootDays.indexOf(lk) === dayIdx;
    }) || groups[dayIdx];
    const sceneIds = group ? [...group.sceneIds] : [];
    const scenes = project.scenes.filter(sc => sceneIds.includes(sc.id));
    const castForDay = project.cast.filter(ca => ca.days.includes(dayIdx));
    const dispoData = (day && day.dispoData) || {};
    const arbRows = dispoData.arbRows || [];
    const DEF_G = ["Regie","Kamera","Licht","Ton","Requisite","Kostuem","Maske","Catering","Set-AL"];
    const respPersons = st.respPersons || [];

    const pad2 = n => String(n).padStart(2, "0");
    const fmtD = ds => {
      if (!ds) return "";
      const dt = new Date(ds + "T12:00:00");
      const wd = ["So","Mo","Di","Mi","Do","Fr","Sa"][dt.getDay()];
      return wd + ", " + pad2(dt.getDate()) + "." + pad2(dt.getMonth()+1) + "." + dt.getFullYear();
    };

    // Schedule for timings
    let runMin = 480;
    const sched = (group && group.shots ? group.shots : [])
      .filter(sh => !sh.hidden || sh.type === "divider")
      .map(sh => {
        if (sh.type === "divider") {
          const dur = sh.durationMin || 0;
          const e = Object.assign({}, sh, { isDivider: true, startMin: runMin });
          runMin += dur; return e;
        }
        const dur = (sh.setupMin || 0) + (sh.shootMin || 0);
        const e = Object.assign({}, sh, { isDivider: false, startMin: runMin });
        runMin += dur; return e;
      });
    const m2t = m => { const t = Math.max(0, m); return pad2(Math.floor(t/60)%24) + ":" + pad2(t%60); };
    const fShot = sched.find(s => !s.isDivider);
    const lItem = sched[sched.length - 1];
    const probeT = fShot ? m2t(fShot.startMin) : "--:--";
    const endT = lItem ? m2t(lItem.startMin + (lItem.isDivider ? lItem.durationMin||0 : (lItem.setupMin||0)+(lItem.shootMin||0))) : "--:--";
    const lunchItems = sched.filter(s => s.isDivider && s.dividerType === "lunch");

    // Drehort addresses
    const drehortsMap = new Map();
    scenes.forEach(sc => {
      const addr = sc.locationAddress || sc.locationTitle || sc.location || "";
      if (addr && !drehortsMap.has(addr)) drehortsMap.set(addr, addr);
    });
    const drehorts = [...drehortsMap.values()];

    // ── LOGO / TITEL / VERANTWORTLICHE ──────────────────────────────────────
    const respFilled = respPersons.filter(p => p.value);
    const hdrH = Math.max(18, respFilled.length * 3.8 + 8);
    // Hintergrund
    doc.rect(ML, 8, CW, hdrH, [255,255,255]);
    doc.line2(ML, 8 + hdrH, W-MR, 8 + hdrH, 1.5, [20,20,20]);
    // Links: Firma (ca. 28% Breite)
    const compW = CW * 0.28;
    const compLns = doc.wrapText(pdfSafe(st.company || ""), compW - 4, 10);
    const compCenterY = 8 + hdrH / 2;
    const compStartY = compCenterY - (compLns.length * 4.5) / 2 + 3.5;
    compLns.forEach((l, i) => doc.text(l, ML+3, compStartY + i*5, 10, true, [20,20,20]));
    // Rechts: Verantwortliche (ca. 30% Breite, rechtsbündig)
    const respW = CW * 0.30;
    const respStartY = 8 + (hdrH - respFilled.length * 3.8) / 2 + 3.5;
    respFilled.forEach((p, i) => {
      doc.text(pdfSafe(p.label) + ": " + pdfSafe(p.value), W-MR-3, respStartY + i*3.8, 7.5, false, [50,50,50], "right");
    });
    // Mitte: Titel exakt zentriert auf W/2
    const titleCenterY = 8 + hdrH / 2 + 3;
    doc.text(pdfSafe(st.title || ""), W/2, titleCenterY, 14, true, [20,20,20], "center");
    doc.setY(8 + hdrH + 1);

    // ── DISPOSITION BAR (schwarzer Balken) ────────────────────────────────────
    doc.rect(ML, doc.getY(), CW, 9, [20,20,20]);
    const dBarY = doc.getY() + 6.2;
    doc.text("DISPOSITION", ML+4, dBarY, 10, true, [255,255,255]);
    if (day && day.date) doc.text(fmtD(day.date), ML + CW/2, dBarY, 9, true, [255,255,255], "center");
    doc.text((dayIdx+1) + ". Drehtag", W-MR-4, dBarY, 9, true, [255,255,255], "right");
    doc.addY(10);

    // ── DREHORT | MOTIV | ARBEITSBEGINN ──────────────────────────────────────
    const cW1 = CW * 0.28;
    const cW2 = CW * 0.30;
    const cW3 = CW - cW1 - cW2;
    const arbToShow = arbRows.length > 0 ? arbRows : DEF_G.map(l => ({ label: l, time: "" }));
    let arbLineH = 4.0;

    // Inhalte vorberechnen
    const drehortStr = pdfSafe((drehorts.length > 0 ? drehorts[0] : (day && (day.locationAddress||day.locationTitle||day.location))) || "-");
    const drehortLn = doc.wrapText(drehortStr, cW1 - 4, 8.5);
    const extraDrehortLn = drehorts.slice(1).map(loc => doc.wrapText(pdfSafe(loc), cW1-4, 7.5));
    const drehortTotalLines = drehortLn.length + extraDrehortLn.reduce((s,l)=>s+l.length, 0);
    const basisLines = dispoData.basis ? doc.wrapText(dispoData.basis, cW1+cW2-4, 8) : [];

    // Hoehen berechnen
    const row1H = Math.max(drehortTotalLines * 4.5 + 6, scenes.length * 5 + 6, 24);
    const row2H = Math.max(basisLines.length * 4.5 + 10, 18);
    const arbNeeded = arbToShow.length * arbLineH + lunchItems.length * arbLineH + 14;

    const blockTopY = doc.getY();

    // ─ Abschnitts-Label Zeile 1 (Drehort | Motiv | Arbeitsbeginn)
    doc.rect(ML, blockTopY, cW1, 5, [230,230,240]);
    doc.rect(ML+cW1, blockTopY, cW2, 5, [230,230,240]);
    doc.rect(ML+cW1+cW2, blockTopY, cW3, 5, [230,230,240]);
    doc.line2(ML, blockTopY, W-MR, blockTopY, 0.5, [80,80,80]);
    doc.text("DREHORTINFOS", ML+2, blockTopY+3.5, 6.5, true, [80,80,120]);
    doc.text("MOTIVINFOS", ML+cW1+2, blockTopY+3.5, 6.5, true, [80,80,120]);
    doc.text("ARBEITSBEGINN", ML+cW1+cW2+2, blockTopY+3.5, 6.5, true, [80,80,120]);

    // ─ Zeile 1: Drehort + Motiv Inhalt
    const r1ContentY = blockTopY + 6;
    const r1EndY = blockTopY + 5 + row1H;
    drehortLn.forEach((l, i) => doc.text(l, ML+2, r1ContentY+4+i*4.5, 8.5, i===0, [20,20,20]));
    let drehortOffY = r1ContentY + 4 + drehortLn.length * 4.5;
    extraDrehortLn.forEach(lines => {
      lines.forEach((l, li) => { doc.text(l, ML+2, drehortOffY+li*4, 7.5, false, [80,80,80]); });
      drehortOffY += lines.length * 4;
    });
    scenes.forEach((sc, i) => {

      doc.rect(ML, doc.getY(), CW, 7, [20,20,20]);
      const nPad2 = n => String(n).padStart(2,"0");
      const nFmtD = ds => {
        if (!ds) return "";
        const dt = new Date(ds + "T12:00:00");
        const wd = ["So","Mo","Di","Mi","Do","Fr","Sa"][dt.getDay()];
        return wd + ", " + nPad2(dt.getDate()) + "." + nPad2(dt.getMonth()+1) + "." + dt.getFullYear();
      };
      doc.text("Vordispo: " + (dayIdx+2) + ". Drehtag" + (nextDay2.date ? " - " + nFmtD(nextDay2.date) : ""), ML+3, doc.getY()+5, 9, true, [255,255,255]);
      doc.addY(8);

      const vColW = CW * 0.28;
      const vRows = [
        ["Drehort:", pdfSafe(nextDay2.locationAddress || nextDay2.locationTitle || nextDay2.location || "-")],
        nextScenes2.length > 0 ? ["Szenen:", nextScenes2.map(sc => "#" + sc.number + " " + pdfSafe(sc.title||"") + " (" + sc.interior + "/" + (sc.dayNight?sc.dayNight[0]:"T") + ")").join("  |  ")] : null,
        nextCast2.length > 0 ? ["Darsteller:", nextCast2.map(ca => pdfSafe(ca.name) + " (" + pdfSafe(ca.role) + ")").join(", ")] : null,
        nextGroup2 && nextGroup2.divider.callTime ? ["Call Time:", nextGroup2.divider.callTime] : null,
      ].filter(Boolean);

      vRows.forEach((row, ri) => {
        const valLines = doc.wrapText(row[1]||"", CW-vColW-3, 8);
        const rowH = Math.max(valLines.length * 4 + 2, 7);
        doc.checkY(rowH + 1);
        if (ri % 2 === 0) doc.rect(ML, doc.getY(), CW, rowH, [248,248,248]);
        doc.line2(ML, doc.getY(), ML, doc.getY()+rowH, 0.3, [150,150,150]);
        doc.line2(W-MR, doc.getY(), W-MR, doc.getY()+rowH, 0.3, [150,150,150]);
        doc.line2(ML, doc.getY()+rowH, W-MR, doc.getY()+rowH, 0.2, [200,200,200]);
        doc.text(row[0], ML+2, doc.getY()+4.5, 8, true, [60,60,60]);
        valLines.forEach((l, li) => doc.text(l, ML+vColW+2, doc.getY()+4.5+li*4, 8, false, [20,20,20]));
        doc.addY(rowH);
      });
      doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.4, [120,120,120]);
    }

    const pdfStr = buildPdf(doc.pages());
    const tSafe = pdfSafe(st.title||"Dispo").replace(/[^a-zA-Z0-9_-]/g,"_");
    openPdf(pdfStr, tSafe+"_Dispo_"+((day&&day.date)||("Tag"+(dayIdx+1)))+".pdf");
  } catch(e) {
    alert("PDF-Export fehlgeschlagen:\n"+e.message+"\n"+(e.stack||""));
  } finally { setExporting(false); }
}

// ─── Export Drehplan as PDF ───────────────────────────────────────────────────
function exportDrehplanPdf(project, setExporting) {
  setExporting(true);
  try {
    const st = project.settings;
    const doc = makeDoc();
    const { W, ML, MR, CW } = doc;
    const groups = buildGroups(project.shots);

    const pad2 = n => String(n).padStart(2, "0");
    const fmtD = ds => {
      if (!ds) return "";
      const dt = new Date(ds + "T12:00:00");
      const wd = ["So","Mo","Di","Mi","Do","Fr","Sa"][dt.getDay()];
      return wd + ", " + pad2(dt.getDate()) + "." + pad2(dt.getMonth()+1) + "." + dt.getFullYear();
    };

    // ── HEADER ────────────────────────────────────────────────────────────────
    const dpRespFilled = (st.respPersons||[]).filter(p=>p.value);
    const dpHdrH = Math.max(18, dpRespFilled.length * 3.8 + 8);
    doc.rect(ML, 8, CW, dpHdrH, [255,255,255]);
    doc.line2(ML, 8+dpHdrH, W-MR, 8+dpHdrH, 1.5, [20,20,20]);
    // Links: Firma
    const dpCompLns = doc.wrapText(pdfSafe(st.company || ""), CW*0.28-4, 10);
    const dpCompY0 = 8 + dpHdrH/2 - dpCompLns.length*2.5 + 3;
    dpCompLns.forEach((l,i) => doc.text(l, ML+3, dpCompY0+i*5, 10, true, [20,20,20]));
    // Mitte: Titel + "DREHPLAN" exakt auf W/2
    const dpTitleY = 8 + dpHdrH/2 + 1;
    doc.text(pdfSafe(st.title || "Projekttitel"), W/2, dpTitleY, 14, true, [20,20,20], "center");
    doc.text("DREHPLAN", W/2, dpTitleY+5.5, 8, false, [100,100,100], "center");
    // Rechts: Verantwortliche
    const dpRespY0 = 8 + (dpHdrH - dpRespFilled.length*3.8)/2 + 3.5;
    dpRespFilled.forEach((p,i) => {
      doc.text(pdfSafe(p.label+": "+p.value), W-MR-3, dpRespY0+i*3.8, 7.5, false, [50,50,50], "right");
    });
    doc.setY(8 + dpHdrH + 1);

    // ── CAST-LEGENDE ──────────────────────────────────────────────────────────
    if (project.cast.length > 0) {
      const cTxt = "Besetzung:   " + project.cast.map((ca,i) => (i+1)+" = "+pdfSafe(ca.name)+" ("+pdfSafe(ca.role)+")").join("   ");
      const cLines = doc.wrapText(cTxt, CW-4, 8);
      doc.rect(ML, doc.getY(), CW, cLines.length*4+4, [240,240,240]);
      doc.line2(ML, doc.getY()+cLines.length*4+4, W-MR, doc.getY()+cLines.length*4+4, 0.3, [160,160,160]);
      cLines.forEach((l,i) => doc.text(l, ML+2, doc.getY()+3.5+i*4, 8, false, [60,60,60]));
      doc.addY(cLines.length*4+5);
    }

    // ── TABELLE ───────────────────────────────────────────────────────────────
    const tCols = [
      { w: 15, label: "Bild\nLicht" },
      { w: 17, label: "V-Stopp\nSeiten" },
      { w: CW-15-17-40-28, label: "Motiv / Inhalt" },
      { w: 40, label: "Darsteller" },
      { w: 28, label: "Notizen" }
    ];

    const drawTblHdr = () => {
      const tHdrH = 12;
      doc.rect(ML, doc.getY(), CW, tHdrH, [220,220,220]);
      doc.line2(ML, doc.getY(), ML, doc.getY()+tHdrH, 0.4, [100,100,100]);
      doc.line2(W-MR, doc.getY(), W-MR, doc.getY()+tHdrH, 0.4, [100,100,100]);
      let hx2 = ML;
      tCols.forEach(col => {
        const parts = col.label.split("\n");
        doc.text(parts[0], hx2+1.5, doc.getY()+5, 7.5, true, [20,20,20]);
        if (parts[1]) doc.text(parts[1], hx2+1.5, doc.getY()+9.5, 6.5, false, [80,80,80]);
        hx2 += col.w;
      });
      doc.addY(tHdrH + 0.5);
    };
    drawTblHdr();

    groups.forEach((group, gi) => {
      const scenes = project.scenes.filter(sc => group.sceneIds.has(sc.id));
      const shootDay = project.shootDays.find(d2 => d2.id === group.divider.shootDayId) || project.shootDays[gi];
      const dayIdx2 = shootDay ? project.shootDays.indexOf(shootDay) : gi;
      const castForDay = project.cast.filter(ca => ca.days.includes(dayIdx2));

      // ─ Drehtag-Kopf (schwarzer Balken, 2 Zeilen wie im Web) ─────────────
      // Berechne Gesamtzeit
      const totalMinDay = group.shots.filter(s=>s.type==="shot"&&!s.hidden).reduce((sum,s)=>sum+(s.setupMin||0)+(s.shootMin||0),0);
      const totalH = Math.floor(totalMinDay/60); const totalM = totalMinDay%60;
      const totalStr = totalMinDay>0 ? "ca. " + totalH + "h " + (totalM>0?totalM+"min":"") : "";
      const locTitle = shootDay && (shootDay.locationTitle || shootDay.location || "");
      const locAddr = shootDay && shootDay.locationAddress ? " (" + pdfSafe(shootDay.locationAddress) + ")" : "";
      const locStr = locTitle ? pdfSafe(locTitle) + locAddr : "";
      // Zeile 1: Nummer + Datum
      const dTxt = (gi+1) + ". DREHTAG" + (shootDay&&shootDay.date ? " - " + fmtD(shootDay.date) : "");
      // Zeile 2: Drehort + Call + Zeit (sofern passt)
      const line2Str = locStr + (group.divider.callTime ? "   Call: " + group.divider.callTime : "") + (totalStr ? "   " + totalStr : "");
      // Mehrzeilig wenn Drehort vorhanden
      const hdrH = locStr ? 14 : 9;
      doc.checkY(hdrH + 4);
      doc.rect(ML, doc.getY(), CW, hdrH, [30,30,40]);
      doc.text(dTxt, ML+3, doc.getY()+5.5, 9, true, [255,255,255]);
      if (group.divider.callTime) doc.text("Call: "+group.divider.callTime, W-MR-3, doc.getY()+5.5, 9, true, [232,160,32], "right");
      if (locStr || totalStr) {
        const line2Lines = doc.wrapText(line2Str, CW-6, 8);
        line2Lines.slice(0,2).forEach((l,li) => {
          doc.text(l, ML+3, doc.getY()+10+li*3.8, 8, false, [160,160,180]);
        });
      }
      doc.addY(hdrH+1);

      if (!scenes.length) {
        doc.checkY(7);
        doc.text("Keine Szenen zugewiesen.", ML+3, doc.getY()+4.5, 8, false, [150,150,150]);
        doc.addY(7);
      } else {
        scenes.forEach((sc, si) => {
          const motStr = pdfSafe((sc.title||"-") + " " + sc.interior + ". " + (sc.locationTitle||sc.location||"-") + (sc.synopsis ? " - " + sc.synopsis : ""));
          const LH = 4.2; // line height mm
          // Motiv: Titel + Location + Synopsis (3 separate Teile)
          const titleLns = doc.wrapText(pdfSafe(sc.title||"-"), tCols[2].w-3, 8);
          const locLn = pdfSafe(sc.interior+". "+(sc.locationTitle||sc.location||"-"));
          const synLns = sc.synopsis ? doc.wrapText(pdfSafe(sc.synopsis), tCols[2].w-3, 7) : [];
          const motTotalLines = titleLns.length + 1 + synLns.length;
          // Rollen: jede Rolle in eigener Zeile
          const roleLines = castForDay.map(ca => pdfSafe(ca.role));
          // Notizen
          const noteLines = doc.wrapText(sc.notes||"", tCols[4].w-3, 7.5);
          const rowH = Math.max(motTotalLines, roleLines.length, noteLines.length, 3) * LH + 4;
          doc.checkY(rowH+1);
          const dpRSY = doc.getY();
          if (si % 2 === 0) doc.rect(ML, dpRSY, CW, rowH, [252,252,252]);
          doc.line2(ML, dpRSY, ML, dpRSY+rowH, 0.4, [120,120,120]);
          doc.line2(W-MR, dpRSY, W-MR, dpRSY+rowH, 0.4, [120,120,120]);
          doc.line2(ML, dpRSY+rowH, W-MR, dpRSY+rowH, 0.25, [180,180,180]);
          let vx2 = ML;
          tCols.forEach(col => { vx2 += col.w; doc.line2(vx2, dpRSY, vx2, dpRSY+rowH, 0.2, [200,200,200]); });
          let cx2 = ML;
          doc.text(String(sc.number), cx2+1.5, dpRSY+4.5, 9, true, [20,20,20]);
          doc.text(sc.interior+"/"+(sc.dayNight?sc.dayNight[0]:"T"), cx2+1.5, dpRSY+9, 7, false, [80,80,80]);
          cx2 += tCols[0].w;
          doc.text(sc.vorstopp||"-", cx2+1.5, dpRSY+4.5, 8, false, [20,20,20]);
          doc.text(sc.pages||"-", cx2+1.5, dpRSY+9, 7, false, [80,80,80]);
          cx2 += tCols[1].w;
          const titleLines = doc.wrapText(pdfSafe(sc.title||"-"), tCols[2].w-3, 8);
          const locLine = pdfSafe(sc.interior + ". " + (sc.locationTitle||sc.location||"-"));
          const synLines = sc.synopsis ? doc.wrapText(pdfSafe(sc.synopsis), tCols[2].w-3, 7.5) : [];
          let my = dpRSY + 4.5;
          titleLines.forEach(l => { doc.text(l, cx2+1.5, my, 8, true, [20,20,20]); my += LH; });
          doc.text(locLine, cx2+1.5, my, 7.5, false, [60,60,60]); my += LH;
          synLines.forEach(l => { doc.text(l, cx2+1.5, my, 7, false, [100,100,100]); my += 3.5; });
          cx2 += tCols[2].w;
          roleLines.forEach((l,i) => doc.text(l, cx2+1.5, dpRSY+4.5+i*LH, 8, false, [20,20,20]));
          cx2 += tCols[3].w;
          noteLines.forEach((l,i) => doc.text(l, cx2+1.5, dpRSY+4.5+i*LH, 7.5, false, [80,80,80]));
          doc.addY(rowH);
        });
      }
    });

    const pdfStr = buildPdf(doc.pages());
    const tSafe = pdfSafe(st.title||"Drehplan").replace(/[^a-zA-Z0-9_-]/g,"_");
    openPdf(pdfStr, tSafe+"_Drehplan.pdf");
  } catch(e) {
    alert("Drehplan-PDF fehlgeschlagen:\n"+e.message+"\n"+(e.stack||""));
  } finally { setExporting(false); }
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
// Build ordered list of "scene segments" per day.
// A segment = consecutive run of shots from same scene within a day-block.
// Returns: Map<dayDividerId, [{sceneId, segmentIndex, shotIds, setup, shoot}]>
// Also returns sceneSegmentLabel(dayId, sceneId, segmentIndex) -> "Szene #N" or "Szene #N.K"
function buildSceneSegments(shots) {
  const sorted = [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0));
  // dayBlocks: [{dayId, items}]
  const dayBlocks = [];
  let cur = null;
  sorted.forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") {
      cur = { dayId: s.id, items: [] };
      dayBlocks.push(cur);
    } else if (cur) {
      cur.items.push(s);
    }
  });

  // Per day, find segments (consecutive runs of same scene)
  // segMap: dayId -> [{sceneId, shotIds, setup, shoot}]
  const segMap = {};
  // Also track how many segments exist per scene across all days (for split label)
  const sceneSegCount = {}; // sceneId -> total segment count across all days

  dayBlocks.forEach(({ dayId, items }) => {
    const segs = [];
    let lastSceneId = null;
    items.forEach(s => {
      if (s.type !== "shot" || s.hidden || !s.scene) return;
      if (s.scene !== lastSceneId) {
        segs.push({ sceneId: s.scene, shotIds: [], setup: 0, shoot: 0 });
        lastSceneId = s.scene;
      }
      const seg = segs[segs.length - 1];
      seg.shotIds.push(s.id);
      seg.setup += s.setupMin || 0;
      seg.shoot += s.shootMin || 0;
    });
    segMap[dayId] = segs;
    segs.forEach(seg => {
      sceneSegCount[seg.sceneId] = (sceneSegCount[seg.sceneId] || 0) + 1;
    });
  });

  // Assign segment index per scene (global, in order of appearance)
  const sceneSegIdx = {}; // sceneId -> next index
  dayBlocks.forEach(({ dayId }) => {
    (segMap[dayId] || []).forEach(seg => {
      if (sceneSegCount[seg.sceneId] > 1) {
        if (sceneSegIdx[seg.sceneId] === undefined) sceneSegIdx[seg.sceneId] = 1;
        seg.part = sceneSegIdx[seg.sceneId]++;
      } else {
        seg.part = null;
      }
    });
  });

  return { segMap, sceneSegCount };
}

function useDrag(items, setItems) {
  const from = useRef(null);
  const [over, setOver] = useState(null);
  const onStart = id => { from.current = id; };
  const onOver = (e, id) => { e.preventDefault(); setOver(id); };
  const onDrop = toId => {
    if (!from.current || from.current === toId) { setOver(null); return; }
    const arr = [...items];
    const fi = arr.findIndex(x => x.id === from.current);
    const ti = arr.findIndex(x => x.id === toId);
    const [item] = arr.splice(fi, 1);
    arr.splice(ti, 0, item);
    setItems(arr);
    from.current = null; setOver(null);
  };
  const onEnd = () => { from.current = null; setOver(null); };
  return { onStart, onOver, onDrop, onEnd, over };
}

// ─── Dashboard ────────────────────────────────────────────────────────────────
function Dashboard({ projects, onSelect, onNew, onDelete, onDemo, onExport, onImport, onArchive, showArchive, setShowArchive }) {
  const [name, setName] = useState("");
  const [menuOpen, setMenuOpen] = useState(null);
  const active = projects.filter(p => !p.archived);
  const archived = projects.filter(p => p.archived);
  const shown = showArchive ? archived : active;
  const fmtRelTime = ts => {
    if (!ts) return "";
    const diff = Date.now() - ts;
    const min = Math.floor(diff/60000);
    if (min < 2) return "gerade eben";
    if (min < 60) return "vor " + min + " Min.";
    const h = Math.floor(min/60);
    if (h < 24) return "vor " + h + " Std.";
    const d = Math.floor(h/24);
    if (d < 7) return "vor " + d + " Tag" + (d>1?"en":"");
    return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"2-digit"});
  };
  return (
    <div onClick={() => setMenuOpen(null)}>
      <div style={{ ...S.row, marginBottom: 22, flexWrap: "wrap", gap: 10 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>{showArchive ? "Archiv" : "Meine Projekte"}</h1>

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(240px,1fr))", gap: 14 }}>
        {shown.map(p => (
          <div key={p.id} style={{ ...S.card, marginBottom: 0, cursor: "pointer", position: "relative", paddingBottom: 14 }}
            onClick={() => onSelect(p.id)}>
            <div style={{ fontSize: 9, color: C.accent, textTransform: "uppercase", letterSpacing: "0.16em", marginBottom: 6 }}>
              {showArchive ? <span style={{ color: "#806000" }}>Archiviert</span> : "Projekt"}
            </div>
            <div style={{ fontSize: 17, marginBottom: 6 }}>{p.name}</div>
            <div style={{ fontSize: 11, color: C.dim }}>{p.shootDays.length} Drehtage  {p.shots.filter(s => s.type !== "divider").length} Shots  {p.scenes.length} Szenen</div>
            {p.lastEdited && <div style={{ fontSize: 10, color: "#444", marginTop: 5 }}>Zuletzt: {fmtRelTime(p.lastEdited)}</div>}
            <div style={{ position: "absolute", top: 10, right: 10 }} onClick={e => e.stopPropagation()}>

                  {[
                    { label: "Exportieren", fn: () => { onExport(p); setMenuOpen(null); } },
                    { label: p.archived ? "Wiederherstellen" : "Archivieren", fn: () => { onArchive(p.id, !p.archived); setMenuOpen(null); } },
                    { label: "Loeschen", fn: () => { onDelete(p.id); setMenuOpen(null); }, danger: true },

// ─── Overview ─────────────────────────────────────────────────────────────────
function Overview({ project }) {
  const shots = project.shots.filter(s => s.type === "shot");
  const dividers = project.shots.filter(s => s.type === "divider");
  const dayDivs = dividers.filter(s => s.dividerType === "day");
  const totalSetup = shots.reduce((s, x) => s + (x.setupMin || 0), 0);
  const totalShoot = shots.reduce((s, x) => s + (x.shootMin || 0), 0);
  const totalMin = totalSetup + totalShoot;
  // Pages (parse "2 3/8" format)
  const parsePage = p => {
    if (!p) return 0;
    const parts = p.trim().split(" ");
    let v = 0;
    parts.forEach(pt => {
      if (pt.includes("/")) { const [a, b] = pt.split("/").map(Number); v += a / b; }
      else { v += parseFloat(pt) || 0; }
    });
    return v;
  };
  const totalPages = project.scenes.reduce((s, sc) => s + parsePage(sc.pages), 0);
  const pagesStr = totalPages > 0 ? Math.floor(totalPages) + " " + Math.round((totalPages % 1) * 8) + "/8" : "0";
  // Vorstopp
  const latestVorstopp = project.scenes.filter(sc => sc.vorstopp).sort((a, b) => b.vorstopp.localeCompare(a.vorstopp))[0]?.vorstopp || "-";
  // Unassigned
  const shotInDay = new Set();
  let inD = false;
  [...project.shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") { inD = true; return; }
    if (s.type === "shot" && inD) shotInDay.add(s.id);
  });
  const unassigned = shots.filter(s => !shotInDay.has(s.id)).length;

  const Stat = ({ label, value, sub, accent }) => (
    <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 6, padding: "18px 20px" }}>
      <div style={{ fontSize: 10, color: C.dim, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 26, fontWeight: 400, color: accent ? C.accent : C.text }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.mid, marginTop: 4 }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <h1 style={S.h1}>Projektubersicht</h1>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: 12, marginBottom: 20 }}>
        <Stat label="Drehtage" value={project.shootDays.length} sub={dayDivs.length > 0 ? dayDivs.length + " in Shotlist eingetragen" : "noch keine in Shotlist"} />
        <Stat label="Szenen" value={project.scenes.length} />
        <Stat label="Shots gesamt" value={shots.length} sub={unassigned > 0 ? unassigned + " nicht zugeordnet" : "alle zugeordnet"} accent={unassigned > 0} />
        <Stat label="Seiten gesamt" value={pagesStr} />
        <Stat label="Geplante Drehzeit" value={Math.floor(totalMin / 60) + "h " + (totalMin % 60) + "m"} sub={"Aufbau: " + totalSetup + "m  Dreh: " + totalShoot + "m"} />
        <Stat label="Crew" value={project.crew.length} />
        <Stat label="Cast" value={project.cast.length} />
        <Stat label="Letzter Vorstopp" value={latestVorstopp} />
      </div>

      {/* Drehtage summary */}
      {project.shootDays.length > 0 && (
        <div style={S.card}>
          <div style={S.ct}>Drehtage im Ueberblick</div>
          <table style={S.tbl}>
            <thead><tr>{["Tag", "Datum", "Location", "Call", "Anmerkungen"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {project.shootDays.map((d, i) => (
                <tr key={d.id}>
                  <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>{i + 1}</td>
                  <td style={S.td}>{d.date ? fmtDate(d.date) : "-"}</td>
                  <td style={S.td}>{d.locationTitle || d.location || "-"}{d.locationAddress ? " (" + d.locationAddress + ")" : ""}</td>
                  <td style={S.td}>{d.callTime || "-"}</td>
                  <td style={{ ...S.td, color: C.mid, fontSize: 11 }}>{d.notes || "-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Scenes summary */}
      {project.scenes.length > 0 && (
        <div style={S.card}>
          <div style={S.ct}>Szenen im Ueberblick</div>
          <table style={S.tbl}>
            <thead><tr>{["#", "Titel", "INT/EXT", "Location", "Tageszeit", "Seiten", "Vorstopp", "Synopsis"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {project.scenes.map(sc => (
                <tr key={sc.id}>
                  <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>#{sc.number}</td>
                  <td style={S.td}>{sc.title || "-"}</td>
                  <td style={S.td}>{sc.interior}</td>
                  <td style={S.td}>{sc.locationTitle || sc.location || "-"}</td>
                  <td style={S.td}>{sc.dayNight}</td>
                  <td style={S.td}>{sc.pages || "-"}</td>
                  <td style={{ ...S.td, color: sc.vorstopp ? C.accent : C.dim }}>{sc.vorstopp || "-"}</td>
                  <td style={{ ...S.td, color: C.mid, fontSize: 11 }}>{sc.synopsis || "-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function Settings({ project, onChange }) {
  const s = project.settings;
  const set = (k, v) => onChange({ ...project, settings: { ...s, [k]: v } });
  const updateCount = n => {
    const count = Math.max(1, Math.min(60, Number(n)));
    let days = [...project.shootDays];
    while (days.length < count) days.push({ id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" });
    onChange({ ...project, shootDays: days.slice(0, count) });
  };

  // Responsible persons for Dispo header (configurable list)
  const respPersons = s.respPersons || [
    { id: "rp1", label: "Produzent/in",       value: "" },
    { id: "rp2", label: "Produktionsleitung", value: "" },
    { id: "rp3", label: "Regie",              value: "" },
    { id: "rp4", label: "Kamera",             value: "" },
    { id: "rp5", label: "Szenenbild",         value: "" },
    { id: "rp6", label: "Kostümbild",        value: "" },
  ];
  const setResp = (id, patch) => set("respPersons", respPersons.map(p => p.id === id ? { ...p, ...patch } : p));
  const addResp = () => set("respPersons", [...respPersons, { id: uid(), label: "", value: "" }]);
  const remResp = id => set("respPersons", respPersons.filter(p => p.id !== id));

  return (
    <div>
      <h1 style={S.h1}>Projekteinstellungen</h1>
      <div style={S.card}>
        <div style={S.ct}>Allgemein</div>
        <div style={S.g2}>
          <Inp label="Projekttitel"     value={s.title}   onChange={v => set("title", v)} />
          <Inp label="Produktionsfirma" value={s.company} onChange={v => set("company", v)} />
        </div>
        <div style={S.g2}>
          <Inp label="Logo URL (optional)" value={s.logo} onChange={v => set("logo", v)} placeholder="https://..." />
          <FG label="Logo hochladen (alternativ)" tip="Bild direkt hochladen - ersetzt die URL">
            <input type="file" accept="image/*" style={{ ...S.input, cursor: "pointer" }}
              onChange={e => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => set("logo", ev.target.result);
                reader.readAsDataURL(file);
              }} />
          </FG>
        </div>
      </div>
      <div style={S.card}>
        <div style={S.ct}>Drehtage</div>
        <div style={S.row}>
          <label style={{ ...S.lbl, marginBottom: 0, width: 160 }}>Anzahl Drehtage</label>
          <input style={{ ...S.input, width: 80 }} type="number" min={1} max={60} value={project.shootDays.length} onChange={e => updateCount(e.target.value)} />
          <span style={{ fontSize: 11, color: C.dim }}>Details im Tab "Drehtage"</span>
        </div>
      </div>
      <div style={S.card}>
        <div style={{ ...S.row, marginBottom: 14 }}>
          <span style={{ ...S.ct, marginBottom: 0 }}>Verantwortliche</span>
          <button style={S.btn("xs")} onClick={addResp}>+ Hinzufuegen</button>
        </div>

        {respPersons.map((p, i) => (
          <div key={p.id} style={{ ...S.row, marginBottom: 8 }}>
            <input style={{ ...S.input, width: 140, flex: "none" }} value={p.label} placeholder="Bezeichnung" onChange={e => setResp(p.id, { label: e.target.value })} />
            <input style={{ ...S.input, flex: 1 }} value={p.value} placeholder="Name / Wert" onChange={e => setResp(p.id, { value: e.target.value })} />
            <button style={S.btn("danger")} onClick={() => remResp(p.id)}><Icon name="trash" size={13} /></button>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── Drehtage ─────────────────────────────────────────────────────────────────
function ShootDays({ project, onChange }) {
  const drag = useDrag(project.shootDays, days => onChange({ ...project, shootDays: days }));
  const upd = (i, patch) => {
    const days = [...project.shootDays];
    days[i] = { ...days[i], ...patch };
    const updatedShots = project.shots.map(s =>
      s.type === "divider" && s.dividerType === "day" && s.shootDayId === days[i].id && patch.callTime
        ? { ...s, callTime: patch.callTime } : s
    );
    onChange({ ...project, shootDays: days, shots: updatedShots });
  };
  const add = () => onChange({ ...project, shootDays: [...project.shootDays, { id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" }] });
  const remove = i => onChange({ ...project, shootDays: project.shootDays.filter((_, j) => j !== i) });
  return (
    <div>
      <div style={{ ...S.row, marginBottom: 20 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Drehtage</h1>
        <button style={S.btn("primary")} onClick={add}><Icon name="plus" size={13} /> Drehtag</button>
      </div>
      {project.shootDays.map((day, i) => (
        <div key={day.id} draggable onDragStart={() => drag.onStart(day.id)} onDragOver={e => drag.onOver(e, day.id)} onDrop={() => drag.onDrop(day.id)} onDragEnd={drag.onEnd}

function CastCrew({ project, onChange }) {
  // Wenn Crew-Liste sich ändert: Namen zurück in settings.respPersons schreiben
  const onCrewChange = (newCrewList) => {
    const resp = project.settings.respPersons;
    if (!resp) { onChange({ ...project, crew: newCrewList }); return; }
    // Baue Map: Rolle -> Name aus neuer Crew-Liste
    const crewMap = {};
    newCrewList.forEach(c => { if (c.role) crewMap[c.role] = c.name || ""; });
    // Update respPersons: wenn Label in Crew vorkommt, Name übernehmen
    const newResp = resp.map(p => {
      if (p.label && crewMap[p.label] !== undefined) return { ...p, value: crewMap[p.label] };
      return p;
    });
    onChange({ ...project, crew: newCrewList, settings: { ...project.settings, respPersons: newResp } });
  };
  return (<div><h1 style={S.h1}>Cast & Crew</h1>
    <PersonTable type="crew" list={project.crew} shootDays={project.shootDays} onChange={onCrewChange} />
    <PersonTable type="cast" list={project.cast} shootDays={project.shootDays} onChange={list => onChange({ ...project, cast: list })} />
  </div>);
}

  const allPersons = [...project.crew, ...project.cast];

    { value: "",             label: "-",            color: C.dim },
  ];

  // Summary per day
  const daySummary = project.shootDays.map((d, di) => {

        return [(

// ─── Shotlist ─────────────────────────────────────────────────────────────────
function Shotlist({ project, onChange, mode, setMode }) {
  const shots = project.shots;
  const orderKey = mode === "script" ? "scriptOrder" : "shootOrder";
  const [selected, setSelected] = useState(new Set());
  const toggleSelect = id => setSelected(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });
  const clearSelect = () => setSelected(new Set());

  const allSorted = [...shots].sort((a, b) => (a[orderKey] ?? 0) - (b[orderKey] ?? 0));
  const sorted = mode === "script"
    ? allSorted.filter(s => s.type !== "divider")
    : allSorted.filter(s => !(s.type === "shot" && s.hidden));

  // Which shots are inside any day-block
  const shotInDayBlock = new Set();
  let inDay2 = false;
  [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") { inDay2 = true; return; }
    if (s.type === "shot" && inDay2) shotInDayBlock.add(s.id);
  });
  const unassignedIds = new Set(shots.filter(s => s.type === "shot" && !s.hidden && !shotInDayBlock.has(s.id)).map(s => s.id));

  // Build scene segments for scene-info rows in shoot mode
  const { segMap } = buildSceneSegments(shots);

  // Drag
  const fromRef = useRef(null);
  const draggingDivType = useRef(null); // for divider toolbar drag
  const draggingNewShot = useRef(false); // for new-shot drag
  const blockDragIdRef = useRef(null);
  const [insertAt, setInsertAt] = useState(null);
  const [blockDrag, setBlockDrag] = useState(null);

  const getPos = e => { const r = e.currentTarget.getBoundingClientRect(); return (e.clientY - r.top) < r.height / 2 ? "before" : "after"; };

  const applyInsert = (fromIds, toId, pos, arr) => {
    const ids = Array.isArray(fromIds) ? fromIds : [fromIds];
    const r = [...arr];
    const items = ids.map(id => r.find(x => x.id === id)).filter(Boolean);
    ids.forEach(id => { const i = r.findIndex(x => x.id === id); if (i >= 0) r.splice(i, 1); });
    const ti = r.findIndex(x => x.id === toId);
    r.splice(pos === "before" ? ti : ti + 1, 0, ...items);
    return r;
  };

  const onRowDragOver = (e, id) => { e.preventDefault(); setInsertAt({ id, pos: getPos(e) }); };

  const onRowDrop = toId => {
    const fId = fromRef.current;
    const pos = insertAt?.pos || "after";

    // Drop a new divider from toolbar
    if (draggingDivType.current) {
      insertNewDivAt(draggingDivType.current, toId, pos);
      draggingDivType.current = null; setInsertAt(null); return;
    }
    // Drop a new shot from toolbar
    if (draggingNewShot.current) {
      insertNewShotAt(toId, pos);
      draggingNewShot.current = false; setInsertAt(null); return;
    }
    // Block drag
    if (blockDragIdRef.current) {
      doBlockDrop(blockDragIdRef.current, toId);
      blockDragIdRef.current = null; setBlockDrag(null); setInsertAt(null); return;
    }
    if (!fId || fId === toId) { setInsertAt(null); return; }
    const moveIds = selected.size > 1 && selected.has(fId) ? [...selected] : [fId];  // includes dividers if selected
    const arr = [...sorted];
    const reordered = applyInsert(moveIds, toId, pos, arr);
    const updated = shots.map(s => { const idx = reordered.findIndex(a => a.id === s.id); return idx >= 0 ? { ...s, [orderKey]: idx } : s; });
    onChange({ ...project, shots: updated });
    fromRef.current = null; setInsertAt(null);
    if (selected.size > 1) clearSelect();
  };

  const onDragEnd = () => {
    fromRef.current = null; draggingDivType.current = null; draggingNewShot.current = false;
    blockDragIdRef.current = null; setInsertAt(null); setBlockDrag(null);
  };

  const insertNewShotAt = (nearId, pos) => {
    const maxS = shots.filter(s => s.type === "shot").reduce((m, s) => Math.max(m, s.scriptOrder ?? 0), -1);
    const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
    const newShot = { id: uid(), type: "shot", scene: "", shotNum: "", description: "", camera: "", lens: "", setupMin: 0, shootMin: 0, notes: "", hidden: false, scriptOrder: maxS + 1, shootOrder: maxD + 1 };
    const arr = [...sorted, newShot];
    const reordered = applyInsert(newShot.id, nearId, pos, arr);
    const newShots = [...shots, newShot];
    const updated = newShots.map(s => { const idx = reordered.findIndex(a => a.id === s.id); return idx >= 0 ? { ...s, [orderKey]: idx } : s; });
    onChange({ ...project, shots: updated });
  };

  const insertNewDivAt = (dtype, nearId, pos) => {
    const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
    const usedIds = shots.filter(s => s.type === "divider" && s.dividerType === "day" && s.shootDayId).map(s => s.shootDayId);
    const freeDay = project.shootDays.find(d => !usedIds.includes(d.id));
    const newDiv = { id: uid(), type: "divider", dividerType: dtype, label: DIVIDERS[dtype].label, durationMin: dtype === "lunch" ? 45 : dtype === "break" ? 15 : 30, shootDayId: dtype === "day" ? (freeDay?.id || "") : "", callTime: dtype === "day" ? (freeDay?.callTime || "07:00") : "07:00", scriptOrder: shots.length, shootOrder: maxD + 1 };
    const arr = [...sorted, newDiv];
    const reordered = applyInsert(newDiv.id, nearId, pos, arr);
    const newShots = [...shots, newDiv];
    const updated = newShots.map(s => { const idx = reordered.findIndex(a => a.id === s.id); return idx >= 0 ? { ...s, [orderKey]: idx } : s; });
    onChange({ ...project, shots: updated });
  };

  const doBlockDrop = (fromDayId, toDayId) => {
    if (fromDayId === toDayId) return;
    const ss = [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0));
    const blocks = []; let cur = null;
    ss.forEach(s => {
      if (s.type === "divider" && s.dividerType === "day") { cur = { id: s.id, items: [s] }; blocks.push(cur); }
      else if (cur) cur.items.push(s);
      else { if (!blocks.length || blocks[0].id !== "__pre__") blocks.unshift({ id: "__pre__", items: [] }); blocks[0].items.push(s); }
    });
    const fi = blocks.findIndex(b => b.id === fromDayId);
    const ti = blocks.findIndex(b => b.id === toDayId);
    if (fi < 0 || ti < 0) return;
    const [block] = blocks.splice(fi, 1);
    const newTi = blocks.findIndex(b => b.id === toDayId);
    blocks.splice(newTi + 1, 0, block);
    const flat = blocks.flatMap(b => b.items);
    onChange({ ...project, shots: shots.map(s => ({ ...s, shootOrder: flat.findIndex(x => x.id === s.id) })) });
  };

  const CRUD = {
    add: () => {
      const maxS = shots.filter(s => s.type === "shot").reduce((m, s) => Math.max(m, s.scriptOrder ?? 0), -1);
      const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
      // New shots always get maxD+1 (end of list = unassigned)
      onChange({ ...project, shots: [...shots, { id: uid(), type: "shot", scene: "", shotNum: "", description: "", camera: "", lens: "", setupMin: 0, shootMin: 0, notes: "", hidden: false, scriptOrder: maxS + 1, shootOrder: maxD + 1 }] });
    },
    addDivClick: dtype => {
      const maxD = shots.reduce((m, s) => Math.max(m, s.shootOrder ?? 0), -1);
      const usedIds = shots.filter(s => s.type === "divider" && s.dividerType === "day" && s.shootDayId).map(s => s.shootDayId);
      const freeDay = project.shootDays.find(d => !usedIds.includes(d.id));
      onChange({ ...project, shots: [...shots, { id: uid(), type: "divider", dividerType: dtype, label: DIVIDERS[dtype].label, durationMin: dtype === "lunch" ? 45 : dtype === "break" ? 15 : 30, shootDayId: dtype === "day" ? (freeDay?.id || "") : "", callTime: dtype === "day" ? (freeDay?.callTime || "07:00") : "07:00", scriptOrder: shots.length, shootOrder: maxD + 1 }] });
    },
    upd: (id, patch) => onChange({ ...project, shots: shots.map(s => s.id === id ? { ...s, ...patch } : s) }),
    rem: id => onChange({ ...project, shots: shots.filter(s => s.id !== id) }),
  };

  const addNewShootDay = divId => {
    const newDay = { id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" };
    onChange({ ...project, shootDays: [...project.shootDays, newDay], shots: shots.map(s => s.id === divId ? { ...s, shootDayId: newDay.id, callTime: newDay.callTime } : s) });
  };
  const onDaySelect = (divId, val) => {
    if (val === "__new__") { addNewShootDay(divId); return; }
    const day = project.shootDays.find(d => d.id === val);
    CRUD.upd(divId, { shootDayId: val, callTime: day?.callTime || "07:00" });
  };
  const onDivCallTimeChange = (divId, newTime) => {
    const div = shots.find(s => s.id === divId); if (!div) return;
    onChange({ ...project, shots: shots.map(s => s.id === divId ? { ...s, callTime: newTime } : s), shootDays: project.shootDays.map(d => d.id === div.shootDayId ? { ...d, callTime: newTime } : d) });
  };

  const klappe = s => { const sc = project.scenes.find(x => x.id === s.scene); return sc ? sc.number : "?" + "." + s.shotNum || "?"; };

  // Time calc
  const timeMap = {}; const dayEndMap = {};
  let runMin = 480; let lastDayId = null;
  [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
    if (s.type === "divider") {
      if (s.dividerType === "day") { runMin = timeToMin(s.callTime || "07:00"); lastDayId = s.id; timeMap[s.id] = { start: minToTime(runMin), end: minToTime(runMin) }; }
      else { timeMap[s.id] = { start: minToTime(runMin), end: minToTime(runMin + (s.durationMin || 0)) }; runMin += s.durationMin || 0; }
    } else if (!s.hidden) {
      const dur = (s.setupMin || 0) + (s.shootMin || 0);
      timeMap[s.id] = { start: minToTime(runMin), end: minToTime(runMin + dur) };
      runMin += dur;
    }
    if (lastDayId) dayEndMap[lastDayId] = timeMap[s.id]?.end || dayEndMap[lastDayId];
  });

  // Per lunch divider: compute time since last day-divider calltime
  // lunchWarnMap[lunchId] = "red" | "orange" | null
  const lunchWarnMap = (() => {
    const map = {};
    let curDayCallMin = 480;
    [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
      if (s.type === "divider" && s.dividerType === "day") {
        curDayCallMin = timeToMin(s.callTime || "07:00");
      }
      if (s.type === "divider" && s.dividerType === "lunch") {
        const lunchStartMin = timeToMin(timeMap[s.id]?.start || "13:00");
        const diff = (lunchStartMin - curDayCallMin) / 60;
        map[s.id] = diff > 6 ? "red" : diff > 5.5 ? "orange" : null;
      }
    });
    return map;
  })();

  const cameras = (project.equipment?.cameras || []).map(c => c.name).filter(Boolean);
  const lenses = (project.equipment?.lenses || []).map(l => l.name).filter(Boolean);

  const IL = () => <tr style={{ height: 2 }}><td colSpan={20} style={{ padding: 0, height: 2, background: C.accent, boxShadow: "0 0 8px " + C.accent }} /></tr>;

  const colCount = mode === "shoot" ? 13 : 12;

  // Track current day for scene-info
  let renderDayId = null;
  const renderedSegments = new Set(); // key: dayId-sceneId-segIndex

  // Per-day segment index tracker for render
  const renderSegIdx = {}; // dayId -> { sceneId -> nextSegIdx }

  return (
    <div>
      <div style={{ ...S.row, marginBottom: 16, flexWrap: "wrap", gap: 8 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Shotlist</h1>
        <div style={S.row}>
          {[["script", "Spielreihenfolge"], ["shoot", "Drehreihenfolge"]].map(([m, l]) => (
            <button key={m} style={{ ...S.btn(), background: mode === m ? C.accent : "#1e1e2c", color: mode === m ? "#0c0c10" : C.text }} onClick={() => { setMode(m); clearSelect(); }}>{l}</button>
          ))}
        </div>
        {/* New shot button - also draggable */}
        <button style={S.btn("primary")} draggable onDragStart={e => { draggingNewShot.current = true; e.dataTransfer.effectAllowed = "copy"; }} onDragEnd={onDragEnd} onClick={CRUD.add} title="Klick = ans Ende, Ziehen = an Position">
          <Icon name="plus" size={13} /> Shot
        </button>
        {selected.size > 0 && (
          <div style={{ ...S.row, gap: 6 }}>
            <span style={{ fontSize: 11, color: C.accent }}>{selected.size} ausgewaehlt</span>
            <button style={S.btn("xs")} onClick={clearSelect}>Aufheben</button>
          </div>
        )}
        {mode === "shoot" && (
          <div style={{ ...S.row, flexWrap: "wrap", gap: 6, alignItems: "center" }}>
            {Object.entries(DIVIDERS).map(([key, d]) => (
              <button key={key} draggable onDragStart={e => { draggingDivType.current = key; e.dataTransfer.effectAllowed = "copy"; }} onDragEnd={onDragEnd}
                style={{ ...S.btn("xs"), background: d.bg, border: "1px solid " + d.border, color: d.color, cursor: "grab" }}
                onClick={() => CRUD.addDivClick(key)} title="Klick = ans Ende, Ziehen = Position">
                + {d.label}
              </button>
            ))}
          </div>
        )}
      </div>

      {mode === "script" && (
        <div style={{ ...S.card, background: "#161620", border: "1px solid #252535", padding: "10px 16px", marginBottom: 14 }}>
          <span style={{ fontSize: 11, color: C.mid }}>
            <span style={{ color: "#555", textDecoration: "line-through", marginRight: 4 }}>Shot</span>In Drehreihenfolge ausgeblendet  |  Auge = ein-/ausblenden  |  Kaestchen = Auswahl  |  Shot-Button ziehen = an Position einfuegen
          </span>
        </div>
      )}
      {mode === "shoot" && (
        <div style={{ ...S.card, background: "#161620", border: "1px solid #252535", padding: "10px 16px", marginBottom: 14 }}>
          <span style={{ fontSize: 11, color: C.mid }}>
            <span style={{ background: "#1a1400", border: "1px solid #2a2000", padding: "1px 5px", borderRadius: 2, marginRight: 6, fontSize: 10 }}>Shot</span>Kein Drehtag zugewiesen  |  Szenen-Zeile ziehen = Segment verschieben  |  Kaestchen = Auswahl  |  Shot-Button ziehen = einfuegen
          </span>
        </div>
      )}

      <div style={{ overflowX: "auto" }}>
        <table style={{ ...S.tbl, tableLayout: "fixed" }}>
          <colgroup>
            <col style={{ width: 58 }} /><col style={{ width: 30 }} /><col style={{ width: 72 }} /><col style={{ width: 110 }} />
            <col style={{ width: 60 }} /><col style={{ width: 170 }} /><col style={{ width: 108 }} /><col style={{ width: 108 }} />
            <col style={{ width: 68 }} /><col style={{ width: 60 }} />
            {mode === "shoot" && <col style={{ width: 108 }} />}
            <col style={{ width: 108 }} /><col style={{ width: 36 }} />
          </colgroup>
          <thead>
            <tr>
              <th style={S.th} /><th style={S.th}>#</th><th style={S.th}>Klappe</th><th style={S.th}>Szene</th>
              <th style={S.th}>Shot-Nr.</th><th style={S.th}>Beschreibung</th><th style={S.th}>Kamera</th><th style={S.th}>Objektiv</th>
              <th style={S.th}>Aufbau</th><th style={S.th}>Dreh</th>
              {mode === "shoot" && <th style={S.th}>Zeitfenster</th>}
              <th style={S.th}>Notizen</th><th style={S.th} />
            </tr>
          </thead>
          <tbody>
            {sorted.map((s, i) => {
              const isDiv = s.type === "divider";
              const dt = isDiv ? DIVIDERS[s.dividerType] : null;
              const isDay = isDiv && s.dividerType === "day";
              const showBefore = insertAt?.id === s.id && insertAt?.pos === "before";
              const showAfter = insertAt?.id === s.id && insertAt?.pos === "after";

              if (isDay) { renderDayId = s.id; renderSegIdx[s.id] = {}; }

              if (isDiv) {
                const linkedDay = project.shootDays.find(d => d.id === s.shootDayId);
                const displayCT = s.callTime || linkedDay?.callTime || "07:00";
                return (
                  <>
                    {showBefore && <IL key={"ilb" + s.id} />}
                    {(() => {
                      const isLunchWarn = s.dividerType === "lunch" && lunchWarnMap[s.id];
                      const lunchBg = isLunchWarn === "red" ? "#2a0a0a" : isLunchWarn === "orange" ? "#2a1a00" : null;
                      return (
                        <tr key={s.id} onDragOver={e => onRowDragOver(e, s.id)} onDrop={() => onRowDrop(s.id)} onDragEnd={onDragEnd}
                          style={{ background: blockDrag === s.id ? C.hover : (lunchBg || dt.bg), opacity: blockDrag === s.id ? 0.5 : 1 }}>
                      <td style={{ ...S.td, color: dt.color, whiteSpace: "nowrap" }}>
                        <span style={{ display: "flex", gap: 4, alignItems: "center" }}>
                          {mode === "shoot" && <Checkbox checked={selected.has(s.id)} onChange={() => toggleSelect(s.id)} title="Auswahl" />}
                          {isDay && (
                            <span draggable onDragStart={() => { blockDragIdRef.current = s.id; setBlockDrag(s.id); fromRef.current = null; draggingDivType.current = null; }} onDragEnd={onDragEnd}
                              style={{ cursor: "grab", fontSize: 15, lineHeight: 1, userSelect: "none" }} title="Block verschieben">&#9618;</span>
                          )}
                          <span draggable onDragStart={() => { fromRef.current = s.id; blockDragIdRef.current = null; draggingDivType.current = null; }} onDragEnd={onDragEnd}
                            style={{ cursor: "grab" }} title="Nur Trenner"><Icon name="drag" size={13} /></span>
                        </span>
                      </td>
                      <td style={{ ...S.td, color: dt.color, fontWeight: 700, fontSize: 9, letterSpacing: "0.12em" }} colSpan={2}>
                        {dt.label}
                        {isLunchWarn && (
                          <span className="no-print-color" style={{ marginLeft: 6, fontWeight: 700, color: isLunchWarn === "red" ? "#c03030" : "#c07000" }}>
                            {isLunchWarn === "red" ? "! >6h" : "! >5.5h"}
                          </span>
                        )}
                      </td>
                      <td style={S.td} colSpan={isDay ? 5 : 7}>
                        {isDay ? (
                          <div style={S.row}>
                            <select style={{ ...S.input, width: 240, padding: "3px 8px", fontSize: 11 }} value={s.shootDayId || ""} onChange={e => onDaySelect(s.id, e.target.value)}>
                              <option value="">- Drehtag waehlen -</option>
                              {project.shootDays.map((d, di) => (<option key={d.id} value={d.id}>Tag {di + 1}{d.date ? " - " + fmtDate(d.date) : ""}{d.locationTitle ? " - " + d.locationTitle : ""}</option>))}
                              <option value="__new__">+ Neuen Drehtag erstellen...</option>
                            </select>
                            <input style={{ ...S.input, width: 106, padding: "3px 8px", fontSize: 11 }} type="time" value={displayCT} onChange={e => onDivCallTimeChange(s.id, e.target.value)} title="Call Time" />
                          </div>
                        ) : (
                          <div style={S.row}>
                            <input style={{ ...S.input, width: 155, padding: "3px 8px", fontSize: 11 }} value={s.label} placeholder={dt.label} onChange={e => CRUD.upd(s.id, { label: e.target.value })} />
                            <input style={{ ...S.input, width: 52, padding: "3px 8px", fontSize: 11 }} type="number" value={s.durationMin} onChange={e => CRUD.upd(s.id, { durationMin: Number(e.target.value) })} title="Dauer (min)" />
                            <span style={{ fontSize: 10, color: C.dim }}>min</span>
                          </div>
                        )}
                      </td>
                      {mode === "shoot" && (
                        <td style={{ ...S.td, color: dt.color, fontSize: 10, whiteSpace: "nowrap" }} colSpan={isDay ? 2 : 1}>
                          {isDay ? <>Start: {timeMap[s.id]?.start} Ende: <strong>{dayEndMap[s.id] || "?"}</strong></> : <>{timeMap[s.id]?.start} - {timeMap[s.id]?.end}</>}
                        </td>
                      )}
                      <td style={S.td} />
                      <td style={S.td}><button style={S.btn("danger")} onClick={() => CRUD.rem(s.id)}><Icon name="trash" size={13} /></button></td>
                        </tr>
                      );
                    })()}
                    {showAfter && <IL key={"ila" + s.id} />}
                  </>
                );
              }

              // Shot row
              const isUnassigned = unassignedIds.has(s.id);
              const isHidden = s.hidden;
              const isSelected = selected.has(s.id);

              // Scene-info row in shoot mode: per segment (consecutive shots of same scene)
              let sceneInfoRow = null;
              if (mode === "shoot" && s.scene && renderDayId) {
                const daySegs = segMap[renderDayId] || [];
                const segIdx = renderSegIdx[renderDayId] || {};
                // Find which segment this shot belongs to
                const segForThisShot = daySegs.find(seg => seg.sceneId === s.scene && seg.shotIds.includes(s.id));
                if (segForThisShot) {
                  const segKey = renderDayId + "-" + s.scene + "-" + segForThisShot.part ?? 0;
                  if (!renderedSegments.has(segKey)) {
                    renderedSegments.add(segKey);
                    const sc = project.scenes.find(x => x.id === s.scene);
                    const total = segForThisShot.setup + segForThisShot.shoot;
                    const isSplit = segForThisShot.part !== null;
                    const label = isSplit ? "Szene #" + sc?.number + "." + segForThisShot.part + " " + sc?.title || "".trim() : "Szene #" + sc?.number + " " + sc?.title || "".trim();
                    // Scene-info row is draggable to move this segment
                    sceneInfoRow = (
                      <tr key={"si-" + segKey} style={{ background: "#0f0f14", cursor: "grab" }}
                        draggable
                        onDragStart={() => {
                          const segShotIds = segForThisShot.shotIds;
                          setSelected(new Set(segShotIds));
                          fromRef.current = segShotIds[0] || null;
                          blockDragIdRef.current = null; draggingDivType.current = null; draggingNewShot.current = false;
                        }}
                        onDragOver={e => onRowDragOver(e, s.id)}
                        onDrop={() => onRowDrop(s.id)}
                        onDragEnd={onDragEnd}
                        title={"Szenen-Segment verschieben (" + segForThisShot.shotIds.length + " Shots)"}>
                        <td colSpan={colCount + 1} style={{ padding: "3px 10px", borderBottom: "1px solid #18181e" }}>
                          <div style={{ display: "flex", gap: 18, alignItems: "center", fontSize: 10, color: "#404050" }}>
                            <span style={{ color: "#555", marginRight: 2 }}><Icon name="drag" size={11} /></span>
                            <span style={{ color: "#484860", fontWeight: 700, letterSpacing: "0.1em", textTransform: "uppercase" }}>{label}</span>
                            {isSplit && <span style={{ color: "#3a3a50", fontSize: 9, border: "1px solid #3a3a50", padding: "0 4px", borderRadius: 2 }}>GETEILT</span>}
                            <span>Aufbau: <span style={{ color: "#484858" }}>{segForThisShot.setup}min</span></span>
                            <span>Dreh: <span style={{ color: "#484858" }}>{segForThisShot.shoot}min</span></span>
                            <span style={{ color: "#303040" }}>|</span>
                            <span>Gesamt: <span style={{ color: "#606075", fontWeight: 700 }}>{total}min</span></span>
                            <span style={{ color: "#383848" }}>{segForThisShot.count || segForThisShot.shotIds.length} Shots</span>
                          </div>
                        </td>
                      </tr>
                    );
                  }
                }
              }

              // Unassigned separator
              let unassignedSep = null;
              if (mode === "shoot" && isUnassigned) {
                const prev = i > 0 ? sorted[i - 1] : null;
                const prevIsUnassigned = prev && prev.type === "shot" && unassignedIds.has(prev.id);
                if (!prevIsUnassigned) {
                  unassignedSep = (
                    <tr key="unassigned-sep" style={{ background: "#1a1400" }}>
                      <td colSpan={colCount + 1} style={{ padding: "4px 10px", borderBottom: "1px solid #2a2000", borderTop: "1px solid #2a2000" }}>
                        <div style={{ fontSize: 9, color: "#7a5500", letterSpacing: "0.14em", textTransform: "uppercase", fontWeight: 700 }}>
                          Nicht zugeordnet - diese Shots sind keinem Drehtag zugewiesen
                        </div>
                      </td>
                    </tr>
                  );
                }
              }

              const rowBg = mode === "script" && isHidden ? "#111118" : mode === "shoot" && isUnassigned ? "#1a1400" : "transparent";

              return (
                <>
                  {sceneInfoRow}
                  {unassignedSep}
                  {showBefore && <IL key={"ilb" + s.id} />}
                  <tr key={s.id} draggable
                    onDragStart={() => { fromRef.current = s.id; blockDragIdRef.current = null; draggingDivType.current = null; draggingNewShot.current = false; }}
                    onDragOver={e => onRowDragOver(e, s.id)} onDrop={() => onRowDrop(s.id)} onDragEnd={onDragEnd}
                    style={{ background: isSelected ? "#1a1a2c" : rowBg, cursor: "grab", outline: isSelected ? "1px solid " + C.accent : "none" }}>
                    <td style={{ ...S.td, color: C.dim }}>
                      <span style={{ display: "flex", gap: 3, alignItems: "center" }}>
                        <Checkbox checked={isSelected} onChange={() => toggleSelect(s.id)} title="Mehrfachauswahl" />
                        <Icon name="drag" />
                        <span onClick={() => CRUD.upd(s.id, { hidden: !s.hidden })} title={s.hidden ? "Einblenden" : "Ausblenden"} style={{ cursor: "pointer", color: s.hidden ? "#666" : "#444" }}>
                          <Icon name={s.hidden ? "eyeoff" : "eye"} size={12} />
                        </span>
                      </span>
                    </td>
                    <td style={{ ...S.td, color: isUnassigned && mode === "shoot" ? "#c07800" : isHidden && mode === "script" ? "#555" : C.dim, fontSize: 10 }}>{i + 1}</td>
                    <td style={{ ...S.td, color: isHidden && mode === "script" ? "#555" : isUnassigned && mode === "shoot" ? "#c07800" : C.accent, fontWeight: 700, whiteSpace: "nowrap", textDecoration: isHidden && mode === "script" ? "line-through" : "none" }}>{klappe(s)}</td>
                    <td style={S.td}>
                      <select style={{ ...S.input, padding: "3px 6px", width: "100%", fontSize: 11 }} value={s.scene} onChange={e => CRUD.upd(s.id, { scene: e.target.value })}>
                        <option value="">-</option>
                        {project.scenes.map(sc => <option key={sc.id} value={sc.id}>#{sc.number} {sc.title}</option>)}
                      </select>
                    </td>
                    <td style={S.td}><input style={{ ...S.input, padding: "3px 6px", width: "100%" }} value={s.shotNum} placeholder="1" onChange={e => CRUD.upd(s.id, { shotNum: e.target.value })} /></td>
                    <td style={S.td}><input style={{ ...S.input, padding: "3px 6px", width: "100%", color: isHidden && mode === "script" ? "#555" : C.text }} value={s.description} placeholder="Beschreibung..." onChange={e => CRUD.upd(s.id, { description: e.target.value })} /></td>
                    <td style={S.td}>
                      {cameras.length > 0
                        ? <select style={{ ...S.input, padding: "3px 6px", width: "100%", fontSize: 11 }} value={s.camera} onChange={e => CRUD.upd(s.id, { camera: e.target.value })}><option value="">-</option>{cameras.map(c => <option key={c}>{c}</option>)}</select>
                        : <input style={{ ...S.input, padding: "3px 6px", width: "100%" }} value={s.camera} placeholder="Kamera" onChange={e => CRUD.upd(s.id, { camera: e.target.value })} />}
                    </td>
                    <td style={S.td}>
                      {lenses.length > 0
                        ? <select style={{ ...S.input, padding: "3px 6px", width: "100%", fontSize: 11 }} value={s.lens} onChange={e => CRUD.upd(s.id, { lens: e.target.value })}><option value="">-</option>{lenses.map(l => <option key={l}>{l}</option>)}</select>
                        : <input style={{ ...S.input, padding: "3px 6px", width: "100%" }} value={s.lens} placeholder="35mm" onChange={e => CRUD.upd(s.id, { lens: e.target.value })} />}
                    </td>
                    <td style={S.td}>
                      <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                        <input style={{ ...S.input, padding: "3px 5px", width: 42 }} type="number" value={s.setupMin} onChange={e => CRUD.upd(s.id, { setupMin: Number(e.target.value) })} />
                        <span style={{ fontSize: 10, color: C.dim }}>m</span>
                      </div>
                    </td>
                    <td style={S.td}>
                      <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                        <input style={{ ...S.input, padding: "3px 5px", width: 42 }} type="number" value={s.shootMin} onChange={e => CRUD.upd(s.id, { shootMin: Number(e.target.value) })} />
                        <span style={{ fontSize: 10, color: C.dim }}>m</span>
                      </div>
                    </td>
                    {mode === "shoot" && (
                      <td style={{ ...S.td, color: isUnassigned ? "#a07010" : C.accent, whiteSpace: "nowrap", fontSize: 11 }}>
                        {timeMap[s.id] ? timeMap[s.id].start + " - " + timeMap[s.id].end : "--:-- - --:--"}
                      </td>
                    )}
                    <td style={S.td}><input style={{ ...S.input, padding: "3px 6px", width: "100%" }} value={s.notes} placeholder="Notizen" onChange={e => CRUD.upd(s.id, { notes: e.target.value })} /></td>
                    <td style={S.td}><button style={S.btn("danger")} onClick={() => CRUD.rem(s.id)}><Icon name="trash" size={13} /></button></td>
                  </tr>
                  {showAfter && <IL key={"ila" + s.id} />}

              );
            })}
          </tbody>
        </table>
      </div>
      {!shots.length && <div style={{ color: C.dim, textAlign: "center", padding: 40 }}>Noch keine Shots.</div>}
    </div>
  );
}

// ─── Build groups (for Drehplan + Dispo) ─────────────────────────────────────
function buildGroups(shots) {
  const sorted = [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0));
  const groups = []; let cur = null;
  sorted.forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") { cur = { divider: s, shots: [], sceneIds: new Set() }; groups.push(cur); }
    else if (cur) { if (s.type === "shot" && !s.hidden && s.scene) cur.sceneIds.add(s.scene); cur.shots.push(s); }
  });
  return groups;
}
