          <span style={{ color: "#bbb", marginRight: 8 }}>{title} (leer - nicht gedruckt)</span>
          <span style={{ cursor: "pointer", color: "#aaa", textDecoration: "underline" }} onClick={add}>+ Zeile</span>
        </div>
      )}
    </div>
  );
}

// ─── DispoDay ─────────────────────────────────────────────────────────────────
function DispoDay({ project, dayIdx, onChange }) {
  const st = project.settings;
  const day = project.shootDays[dayIdx];
  const groups = buildGroups(project.shots);
  const group = groups.find(g => {
    const linked = project.shootDays.find(d => d.id === g.divider.shootDayId);
    return linked && project.shootDays.indexOf(linked) === dayIdx;
  }) || groups[dayIdx];

  const sceneIds = group ? [...group.sceneIds] : [];
  const scenes = project.scenes.filter(sc => sceneIds.includes(sc.id));
  const crew = project.crew.filter(c => c.days.includes(dayIdx));
  const cast = project.cast.filter(c => c.days.includes(dayIdx));

  let runMin = timeToMin(group?.divider?.callTime || day?.callTime || "07:00");
  const schedule = (group?.shots || []).filter(sh => !sh.hidden || sh.type === "divider").map(sh => {
    if (sh.type === "divider") {
      const dur = sh.durationMin || 0;
      const e = { isDivider: true, ...sh, start: minToTime(runMin), end: minToTime(runMin + dur) };
      runMin += dur; return e;
    }
    const dur = (sh.setupMin || 0) + (sh.shootMin || 0);
    const sc = project.scenes.find(x => x.id === sh.scene);
    const k = sc ? sc.number : "?" + "." + sh.shotNum || "?";
    const e = { isDivider: false, ...sh, sc, klappe: k, start: minToTime(runMin), end: minToTime(runMin + dur) };
    runMin += dur; return e;
  });
  const probeStart = schedule.find(s => !s.isDivider)?.start || "-";
  const drehEnd = schedule.length > 0 ? schedule[schedule.length - 1]?.end || "-" : "-";

  const dispoData = day?.dispoData || {};
  const updDispoData = patch => {
    const days = [...project.shootDays];
    days[dayIdx] = { ...days[dayIdx], dispoData: { ...dispoData, ...patch } };
    onChange({ ...project, shootDays: days });
  };

  const DEFAULT_GEWERKE = [
    { label: "Regie" }, { label: "Kamera" }, { label: "Licht" },
    { label: "Ton" }, { label: "Requisite" }, { label: "Kostüm" },
    { label: "Maske" }, { label: "Catering" }, { label: "Set-AL" },
  ];
  // Inherit arbRows from day 0 if not set for this day
  const day0DispoData = project.shootDays[0]?.dispoData || {};
  const inheritedArbRows = dayIdx === 0
    ? DEFAULT_GEWERKE.map((g, i) => ({ id: "arb_" + i, label: g.label, time: "" }))
    : (day0DispoData.arbRows || DEFAULT_GEWERKE.map((g, i) => ({ id: "arb_" + i, label: g.label, time: "" })));
  // probeStart als Zeitvorschlag (aus Shotlist)
  const probeStartSuggestion = schedule.find(s => !s.isDivider)?.start || "";
  const arbRows = dispoData.arbRows || inheritedArbRows.map(r => ({ ...r, time: "", info: "" }));
  const updArbRow = (id, patch) => updDispoData({ arbRows: arbRows.map(r => r.id === id ? { ...r, ...patch } : r) });
  const addArbRow = () => updDispoData({ arbRows: [...arbRows, { id: uid(), label: "", time: "", info: "" }] });
  const remArbRow = id => updDispoData({ arbRows: arbRows.filter(r => r.id !== id) });

  const castTimes = dispoData.castTimes || {};
  const updCastTime = (castId, field, val) => {
    const updated = { ...castTimes, [castId]: { ...(castTimes[castId] || {}), [field]: val } };
    const ct = updated[castId];
    let fahrdispo = dispoData.fahrdispo || [];
    // Auto-add fahrdispo entry when both Abholung and Ankunft are set for a cast member
    if (ct.abholung && ct.ankunft) {
      const castMember = cast.find(p => p.id === castId);
      // Check if entry already auto-created for this cast member
      const autoId = "auto_" + castId;
      const exists = fahrdispo.find(f => f.id === autoId);
      if (!exists && castMember) {
        fahrdispo = [...fahrdispo, {
          id: autoId, fahrer: "", abholungVon: castMember.name || castMember.role,
          abfahrt: ct.abholung, von: "", ankunft: ct.ankunft, an: ""
        }];
      } else if (exists) {
        // Update times if already exists
        fahrdispo = fahrdispo.map(f => f.id === autoId
          ? { ...f, abholungVon: castMember?.name || castMember?.role || f.abholungVon, abfahrt: ct.abholung, ankunft: ct.ankunft }
          : f
        );
      }
    }
    updDispoData({ castTimes: updated, fahrdispo });
  };

  const [weather, setWeather] = useState(null);
  const [sunrise, setSunrise] = useState("-");
  const [sunset, setSunset] = useState("-");

  const [weatherLoading, setWeatherLoading] = useState(false);

  // Extract a searchable city/place from an address string
  const extractCity = addr => {
    if (!addr) return "";
    // Try to find a PLZ+Stadt pattern like "10117 Berlin" or "90403 Nurnberg"
    const plzMatch = addr.match(/\d{4,5}\s+([A-Za-z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\s-]+)/);
    if (plzMatch) return plzMatch[1].trim().split(" ")[0];
    // Try last capitalized word(s) as city
    const words = addr.trim().split(/[,\s]+/).filter(w => w.length > 2);
    return words[words.length - 1] || addr;
  };

  const fetchWeather = async () => {
    const addr = day?.locationAddress || day?.locationTitle || day?.location;
    if (!day?.date) { alert("Bitte Datum im Drehtage-Tab eintragen."); return; }
    if (!addr) { alert("Bitte Drehort-Adresse im Drehtage-Tab eintragen."); return; }
    setWeatherLoading(true);
    try {
      // Strategy: Open-Meteo geocoding only accepts city names, not full addresses.
      // Extract city name first, then geocode.
      const city = extractCity(addr);

      const geoUrl = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=de&format=json";
      const geoRes = await fetch(geoUrl);
      if (!geoRes.ok) throw new Error("Geocoding nicht erreichbar");
      const geoData = await geoRes.json();
      if (!geoData?.results?.[0]) {
        throw new Error("Ort nicht gefunden fuer: '" + city + "'\nTipp: Trage im Drehtage-Tab die Adresse mit Stadtname ein, z.B. 'Berlin' oder '10117 Berlin'.");
      }
      const loc = geoData.results[0];
      const { latitude, longitude, timezone, name } = loc;

      // Fetch forecast + sunrise/sunset from Open-Meteo
      // Use archive API for past dates, forecast for future dates
      const shootDate = new Date(day.date + "T12:00");
      const today2 = new Date();
      today2.setHours(0,0,0,0);
      const isPast = shootDate < today2;
      const wBase = isPast
        ? "https://archive-api.open-meteo.com/v1/archive"
        : "https://api.open-meteo.com/v1/forecast";
      const dailyParams = isPast
        ? "temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset"
        : "temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset";
      const wUrl = wBase +
        "?latitude=" + latitude + "&longitude=" + longitude +
        "&daily=" + dailyParams +
        "&timezone=" + encodeURIComponent(timezone || "Europe/Berlin") +
        "&start_date=" + day.date + "&end_date=" + day.date;
      const wRes = await fetch(wUrl);
      if (!wRes.ok) throw new Error("Wetter-API Fehler: " + wRes.status + " (Datum: " + day.date + ")");
      const wData = await wRes.json();
      if (!wData?.daily) throw new Error("Keine Wetterdaten fuer dieses Datum.");
      const d = wData.daily;
      setWeather({
        tMax: d.temperature_2m_max?.[0] != null ? Math.round(d.temperature_2m_max[0]) : null,
        tMin: d.temperature_2m_min?.[0] != null ? Math.round(d.temperature_2m_min[0]) : null,
        rain: (d.precipitation_probability_max?.[0] ?? d.precipitation_sum?.[0]) != null ? Math.round(d.precipitation_probability_max?.[0] ?? d.precipitation_sum?.[0] ?? 0) : null,
        city: name || city
      });
      const parseSunTime = raw => raw && raw.includes("T") ? raw.split("T")[1].slice(0,5) : (raw ? raw.slice(-5) : "-");
      setSunrise(parseSunTime(d.sunrise?.[0]));
      setSunset(parseSunTime(d.sunset?.[0]));
    } catch(e) {
      alert("Wetterdaten konnten nicht geladen werden:\n" + e.message);
    } finally {
      setWeatherLoading(false);
    }
  };

  // Deduplicate drehorte by ADDRESS only (not by name - different Motive can share an address)
  const drehortsMap = new Map();
  scenes.forEach(sc => {
    const addr = sc.locationAddress || sc.locationTitle || sc.location || "";
    if (addr && !drehortsMap.has(addr)) drehortsMap.set(addr, addr);
  });
  const drehorts = [...drehortsMap.values()];

  const respPersons = st.respPersons || [
    { id: "rp1", label: "Produzent/in",       value: st.producer || "" },
    { id: "rp2", label: "Produktionsleitung", value: "" },
    { id: "rp3", label: "Regie",              value: st.director || "" },
    { id: "rp4", label: "Kamera",             value: st.dop || "" },
    { id: "rp5", label: "Szenenbild",         value: "" },
    { id: "rp6", label: "Kostümbild",        value: "" },
  ];

  const nextDay = project.shootDays[dayIdx + 1];
  const nextGroup = groups.find(g => {
    const linked = project.shootDays.find(d => d.id === g.divider.shootDayId);
    return linked && project.shootDays.indexOf(linked) === dayIdx + 1;
  }) || groups[dayIdx + 1];
  const nextScenes = project.scenes.filter(sc => nextGroup?.sceneIds?.has(sc.id));
  const nextCast = project.cast.filter(c => c.days.includes(dayIdx + 1));

  const tdS = { border: "1px solid #bbb", padding: "8px 12px", verticalAlign: "top", fontSize: 11 };
  const sectionStyle = { width: "100%", borderCollapse: "collapse", borderBottom: "1px solid #ccc", marginTop: 0 };
  const thS = { ...tdS, background: "#ddd", fontWeight: 700, fontSize: 10 };
  const editInp = { border: "none", borderBottom: "1px solid #ccc", background: "transparent", fontSize: 10, fontFamily: "inherit", padding: "1px 2px", width: "100%", outline: "none", color: "#111" };

  // Set-Liste: alle Crew die an diesem Tag dabei sind
  const crewAtDay = project.crew.filter(c => c.days.includes(dayIdx));
  const castAtDay = project.cast.filter(c => c.days.includes(dayIdx));

  return (
    <div style={{ background: "#fff", color: "#111", borderRadius: 8, border: "2px solid #aaa", margin: "0 0 32px 0", fontFamily: "'DM Mono','Courier New',monospace", fontSize: 11, overflow: "hidden" }}>
      {/* Set- und Cast-Liste ganz oben, wie in professioneller Vorlage */}
      {(crewAtDay.length > 0 || castAtDay.length > 0) && (
        <div style={{ padding: "6px 14px", borderBottom: "1px solid #ddd", fontSize: 10 }}>
          {crewAtDay.length > 0 && (
            <div style={{ marginBottom: castAtDay.length > 0 ? 3 : 0 }}>
              <strong>Set:</strong> {crewAtDay.map(p => p.name || p.role).filter(Boolean).join(", ")}
            </div>
          )}
          {castAtDay.length > 0 && (
            <div>
              <strong>Darsteller:</strong> {castAtDay.map(p => (p.name || p.role)).filter(Boolean).join(", ")}
            </div>
          )}
        </div>
      )}
      <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "2px solid #111" }}>
        <tbody><tr>
          <td style={{ padding: "8px 14px", width: "30%", verticalAlign: "middle" }}>
            {st.logo ? <img src={st.logo} alt="Logo" style={{ height: 40, objectFit: "contain" }} />
              : <div style={{ fontWeight: 700, fontSize: 13 }}>{st.company || "Produktionsfirma"}</div>}
          </td>
          <td style={{ padding: "8px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 16, fontWeight: 700 }}>{st.title || "Projekttitel"}</div>
          </td>
          <td style={{ padding: "8px 14px", width: "35%", textAlign: "right", fontSize: 10 }}>
            {respPersons.map(p => p.value ? (
              <div key={p.id} style={{ display: "flex", justifyContent: "flex-end", gap: 4, marginBottom: 1, whiteSpace: "nowrap" }}>
                <span style={{ color: "#666" }}>{p.label}:</span>
                <span style={{ fontWeight: 600 }}>{p.value}</span>
              </div>
            ) : null)}
          </td>
        </tr></tbody>
      </table>

      <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "1px solid #999" }}>
        <tbody><tr style={{ background: "#222", color: "#fff" }}>
          <td style={{ padding: "5px 14px", fontWeight: 700, fontSize: 12 }}>DISPOSITION</td>
          <td style={{ padding: "5px 14px", textAlign: "center", fontWeight: 700, fontSize: 12 }}>{day?.date ? fmtDate(day.date) : "Datum TBD"}</td>
          <td style={{ padding: "5px 14px", textAlign: "right", fontWeight: 700, fontSize: 12 }}>{dayIdx + 1}. Drehtag</td>
        </tr></tbody>
      </table>

      {(() => {
        const lunchItems = schedule.filter(s => s.isDivider && s.dividerType === "lunch");
        const lunchStartMin = lunchItems.length > 0 ? timeToMin(lunchItems[0].start) : null;
        const arbTimes = arbRows.map(r => r.time).filter(Boolean).map(timeToMin);
        const earliestArbMin = arbTimes.length > 0 ? Math.min(...arbTimes) : null;
        let lunchWarning = null;
        if (lunchStartMin !== null && earliestArbMin !== null) {
          const diffH = (lunchStartMin - earliestArbMin) / 60;
          if (diffH > 6) lunchWarning = "red";
          else if (diffH > 5.5) lunchWarning = "orange";
        }
        const lunchColor = lunchWarning === "red" ? "#c03030" : lunchWarning === "orange" ? "#c07000" : "#444";
        const bS = { border: "1px solid #bbb", padding: "6px 10px", verticalAlign: "top", fontSize: 11 };
        return (
          <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "1px solid #999" }}>
            <tbody>
              {/* Row 1: DREHORTINFOS | MOTIVINFOS | ARBEITSBEGINN (rowspan 2) */}
              <tr>
                <td style={{ ...bS, width: "28%" }}>
                  <div style={{ fontSize: 9, color: "#666", fontWeight: 700, marginBottom: 3, letterSpacing: "0.1em" }}>DREHORTINFOS</div>
                  {drehorts.length > 0
                    ? drehorts.map((loc, i) => (
                      <div key={i} style={{ marginBottom: 1 }}>
                        {i > 0 && <span style={{ fontSize: 9, color: "#888" }}>Drehort {i + 1}: </span>}
                        <span style={{ fontWeight: i === 0 ? 700 : 400 }}>{loc}</span>
                      </div>
                    ))
                    : <div style={{ fontWeight: 700 }}>{day?.locationAddress || day?.locationTitle || day?.location || "-"}</div>}
                </td>
                <td style={{ ...bS, width: "30%" }}>
                  <div style={{ fontSize: 9, color: "#666", fontWeight: 700, marginBottom: 3, letterSpacing: "0.1em" }}>MOTIVINFOS</div>
                  {scenes.length > 0
                    ? scenes.map(sc => (
                      <div key={sc.id} style={{ marginBottom: 2 }}>
                        <span style={{ fontWeight: 700 }}>#{sc.number}</span>{" "}
                        {sc.interior}. {sc.locationTitle || sc.title || "-"}
                      </div>
                    ))
                    : <div style={{ color: "#aaa" }}>Keine Szenen zugewiesen</div>}
                </td>
                <td style={{ ...bS, width: "42%" }} rowSpan={2}>
                  <div style={{ fontSize: 9, color: "#666", fontWeight: 700, marginBottom: 3, letterSpacing: "0.1em" }}>ARBEITSBEGINN</div>
                  <table style={{ width: "100%", borderCollapse: "collapse" }}>
                    <tbody>
                      {arbRows.map(r => {
                        const displayTime = r.time || probeStartSuggestion;
                        const isSuggested = !r.time && !!probeStartSuggestion;
                        return (
                        <tr key={r.id}>
                          <td style={{ padding: "1px 0", width: "30%" }}>
                            <input style={editInp} value={r.label} placeholder="Gewerk" onChange={e => updArbRow(r.id, { label: e.target.value })} />
                          </td>
                          <td style={{ padding: "1px 0", width: "30%" }}>
                            <input style={{ ...editInp, fontSize: 9, color: "#777" }} value={r.info||""} placeholder="Zusatz-Info..." onChange={e => updArbRow(r.id, { info: e.target.value })} />
                          </td>
                          <td style={{ padding: "1px 0", width: "32%" }}>
                            <input style={{ ...editInp, textAlign: "right", color: isSuggested ? "#888" : "#111", fontStyle: isSuggested ? "italic" : "normal" }}
                              value={displayTime}
                              placeholder="--:--"
                              title={isSuggested ? "Vorschlag aus Shotlist – klicken zum Anpassen" : ""}
                              onChange={e => updArbRow(r.id, { time: e.target.value })} />
                          </td>
                          <td style={{ width: 14, cursor: "pointer", color: "#ccc", textAlign: "center", fontSize: 10 }} onClick={() => remArbRow(r.id)}>x</td>
                        </tr>
                        );
                      })}
                      <tr>
                        <td colSpan={3} style={{ paddingTop: 2 }}>
                          <span style={{ fontSize: 9, color: "#aaa", cursor: "pointer", textDecoration: "underline" }} onClick={addArbRow}>+ Gewerk</span>
                        </td>
                      </tr>
                      <tr style={{ borderTop: "1px solid #ddd" }}>
                        <td style={{ padding: "3px 0", fontSize: 10, color: "#444" }}>Probe / Dreh:</td>
                        <td style={{ padding: "3px 0", fontWeight: 700, textAlign: "right" }}>{probeStart}</td>
                        <td />
                      </tr>
                      {lunchItems.map((s, i) => (
                        <tr key={i}>
                          <td style={{ padding: "1px 0", fontSize: 10 }}>
                            <span className="no-print-color" style={{ color: lunchColor, fontWeight: lunchWarning ? 700 : 400 }}>
                              Mittagspause{lunchWarning ? " (!)" : ""}:
                            </span>
                          </td>
                          <td style={{ padding: "1px 0", fontWeight: 500, textAlign: "right" }}>{s.start} ({s.durationMin || 45} min)</td>
                          <td />
                        </tr>
                      ))}
                      <tr>
                        <td style={{ padding: "1px 0", fontSize: 10, color: "#444" }}>Drehschluss (ca.):</td>
                        <td style={{ padding: "1px 0", fontWeight: 700, textAlign: "right" }}>{drehEnd}</td>
                        <td />
                      </tr>
                    </tbody>
                  </table>
                </td>
              </tr>
              {/* Row 2: BASIS (spans Drehort+Motiv cols) | (Arbeitsbeginn continued via rowspan) */}
              <tr>
                <td colSpan={2} style={{ ...bS }}>
                  <div style={{ fontSize: 9, color: "#666", fontWeight: 700, marginBottom: 3, letterSpacing: "0.1em" }}>BASIS / ALLGEMEINE INFOS</div>
                  <textarea
                    rows={3}
                    style={{ border: "none", background: "transparent", fontSize: 10, fontFamily: "inherit", padding: "1px 2px", width: "100%", outline: "none", color: "#111", resize: "vertical", minHeight: 48 }}
                    value={dispoData.basis || ""}
                    placeholder="Catering, Sanitaer..."
                    onChange={e => updDispoData({ basis: e.target.value })}
                  />
                  <div style={{ marginTop: 5, borderTop: "1px solid #eee", paddingTop: 4 }}>
                    {(dispoData.parkplaetze || []).map((pk, pi) => (
                      <div key={pk.id} style={{ display: "flex", alignItems: "center", gap: 4, marginBottom: 3 }}>
                        <span title="Parkplatz" style={{
                          display: "inline-block", flexShrink: 0, width: 20, height: 14,
                          background: "#111", borderRadius: "3px 3px 2px 2px",
                          position: "relative", marginRight: 2, verticalAlign: "middle"
                        }}>
                          <span style={{
                            position: "absolute", bottom: -3, left: 1,
                            width: 6, height: 6, background: "#555",
                            borderRadius: "50%", border: "1.5px solid #888"
                          }} />
                          <span style={{
                            position: "absolute", bottom: -3, right: 1,
                            width: 6, height: 6, background: "#555",
                            borderRadius: "50%", border: "1.5px solid #888"
                          }} />
                          <span style={{
                            position: "absolute", top: 1, left: 3, right: 3,
                            height: 5, background: "#888", borderRadius: 1
                          }} />
                        </span>
                        {pk.url
                          ? <a href={pk.url} target="_blank" rel="noopener noreferrer"
                              style={{ fontSize: 10, color: "#1a6fc4", textDecoration: "underline", whiteSpace: "nowrap", flexShrink: 0 }}>
                              Maps-Link
                            </a>
                          : null}
                        <input style={{ ...editInp, width: pk.url ? 60 : 130, fontSize: 9, color: "#555" }}
                          value={pk.url||""} placeholder={pk.url ? "URL" : "Google-Maps-Link..."}
                          onChange={e => updDispoData({ parkplaetze: (dispoData.parkplaetze||[]).map((x,i)=>i===pi?{...x,url:e.target.value}:x) })} />
                        <input style={{ ...editInp, flex: 1, fontSize: 9 }}
                          value={pk.info||""} placeholder="z.B. Crew-Parken, Technik..."
                          onChange={e => updDispoData({ parkplaetze: (dispoData.parkplaetze||[]).map((x,i)=>i===pi?{...x,info:e.target.value}:x) })} />
                        <span style={{ cursor: "pointer", color: "#bbb", fontSize: 11, flexShrink: 0 }}
                          onClick={() => updDispoData({ parkplaetze: (dispoData.parkplaetze||[]).filter((_,i)=>i!==pi) })}>×</span>
                      </div>
                    ))}
                    <span style={{ fontSize: 9, color: "#aaa", cursor: "pointer", textDecoration: "underline" }}
                      onClick={() => updDispoData({ parkplaetze: [...(dispoData.parkplaetze||[]), { id: uid(), url: "", info: "" }] })}>
                      + Parkplatz
                    </span>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        );
      })()}

      <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0", borderBottom: "1px solid #999" }}>
        <tbody><tr>
          <td style={{ ...tdS, fontSize: 10, borderColor: "#999", width: "38%" }}>
            <strong>Wetter:</strong>{" "}
            {weather
              ? <span>{weather.tMin != null ? weather.tMin : "?"}-{weather.tMax != null ? weather.tMax : "?"}{"\u00b0C"}{weather.rain != null ? ", " + weather.rain + "% Regen" : ""}</span>
              : <span style={{ color: "#aaa" }}>-</span>}
            {" "}
            <span
              onClick={fetchWeather}
              style={{ color: weatherLoading ? "#aaa" : "#4080c0", fontSize: 9, cursor: "pointer", textDecoration: "underline" }}>
              {weatherLoading ? "Lade..." : weather ? "Aktualisieren" : "Wetter laden"}
            </span>
          </td>
          <td style={{ ...tdS, fontSize: 10, borderColor: "#999" }}>
            Sonnenaufgang: <strong>{sunrise}</strong>
          </td>
          <td style={{ ...tdS, fontSize: 10, borderColor: "#999" }}>
            Sonnenuntergang: <strong>{sunset}</strong>
          </td>
        </tr></tbody>
      </table>

      <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0", borderBottom: "1px solid #999" }}>
        <thead><tr>
          <th style={{ ...thS, width: 56, textAlign: "center" }}>
            <div>Bild</div><div style={{ fontWeight: 400, color: "#555" }}>Licht</div>
          </th>
          <th style={{ ...thS, width: 56, textAlign: "center" }}>
            <div>V-Stopp</div><div style={{ fontWeight: 400, color: "#555" }}>Seiten</div>
          </th>
          <th style={thS}>Motiv / Synopsis</th>
          <th style={{ ...thS, width: 130 }}>Rollen</th>
          <th style={{ ...thS, width: 90 }}>Sonstiges</th>
        </tr></thead>
        <tbody>
          {(() => {
            if (scenes.length === 0) return <tr><td colSpan={5} style={{ ...tdS, color: "#aaa", fontStyle: "italic" }}>Keine Szenen zugewiesen.</td></tr>;
            // Build interleaved list: scenes + Motivwechsel dividers from schedule
            const locationDividers = schedule.filter(s => s.isDivider && s.dividerType === "location");
            const rows = [];
            let si = 0;
            // Map scene IDs to their order in schedule
            const sceneOrderInSchedule = [];
            schedule.forEach(s => {
              if (!s.isDivider && s.scene && !sceneOrderInSchedule.includes(s.scene))
                sceneOrderInSchedule.push(s.scene);
            });
            const orderedScenes = sceneOrderInSchedule.map(id => scenes.find(sc => sc.id === id)).filter(Boolean);
            const extraScenes = scenes.filter(sc => !sceneOrderInSchedule.includes(sc.id));
            const allScenes = [...orderedScenes, ...extraScenes];
            allScenes.forEach((sc, idx) => {
              // Check if there's a Motivwechsel divider before this scene in schedule
              if (idx > 0 && locationDividers.length > 0) {
                const prevSceneId = allScenes[idx - 1]?.id;
                const prevIdx = schedule.findIndex(s => !s.isDivider && s.scene === prevSceneId);
                const curIdx = schedule.findIndex(s => !s.isDivider && s.scene === sc.id);
                const hasLocDiv = schedule.slice(prevIdx, curIdx).some(s => s.isDivider && s.dividerType === "location");
                if (hasLocDiv) {
                  rows.push(
                    <tr key={"loc-" + idx} style={{ background: "#1a1a2a" }}>
                      <td colSpan={7} style={{ padding: "3px 8px", fontSize: 9, fontWeight: 700, letterSpacing: "0.12em", color: "#6060c0", borderBottom: "1px solid #303060" }}>
                        MOTIVWECHSEL
                      </td>
                    </tr>
                  );
                }
              }
              rows.push(
                <tr key={sc.id} style={{ background: idx % 2 === 0 ? "#fff" : "#f9f9f9", borderBottom: "1px solid #ddd" }}>
                  <td style={{ ...tdS, textAlign: "center" }}>
                    <div style={{ fontWeight: 700 }}>{sc.number}</div>
                    <div style={{ fontSize: 10, color: "#555" }}>{sc.interior}/{sc.dayNight ? sc.dayNight.charAt(0) : "T"}</div>
                  </td>
                  <td style={{ ...tdS, textAlign: "center" }}>
                    <div>{sc.vorstopp || "-"}</div>
                    <div style={{ fontSize: 10, color: "#555" }}>{sc.pages || "-"}</div>
                  </td>
                  <td style={tdS}>
                    <div style={{ fontWeight: 700 }}>{sc.title || "-"}</div>
                    <div style={{ fontSize: 10, color: "#555" }}>{sc.interior}. {sc.locationTitle || sc.location || "-"}</div>
                    {sc.synopsis && <div style={{ fontSize: 10, color: "#777", marginTop: 1 }}>{sc.synopsis}</div>}
                  </td>
                  <td style={{ ...tdS, fontSize: 10 }}>
                    {project.cast.map((ca, ci) => (
                      <div key={ca.id} style={{ color: ca.days.includes(dayIdx) ? "#222" : "#ccc" }}>{ca.role}</div>
                    ))}
                  </td>
                  <td style={{ ...tdS, fontSize: 10, color: "#666" }}>{sc.notes || ""}</td>
                </tr>
              );
            });
            return rows;
          })()}
        </tbody>
      </table>

      <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0", borderBottom: "1px solid #999" }}>
        <thead><tr>
          {["Rolle", "Besetzung", "Abholung", "Ankunft", "Kostüm", "Maske", "Set/DF"].map(h => <th key={h} style={thS}>{h}</th>)}
        </tr></thead>
        <tbody>
          {cast.map(c => {
            const ct = castTimes[c.id] || {};
            return (
              <tr key={c.id} style={{ borderBottom: "1px solid #eee" }}>
                <td style={tdS}>{c.role}</td>
                <td style={tdS}>{c.name}</td>
                {["abholung", "ankunft", "kostüm", "maske", "set"].map(f => (
                  <td key={f} style={tdS}><input style={editInp} value={ct[f] || ""} placeholder="--:--" onChange={e => updCastTime(c.id, f, e.target.value)} /></td>
                ))}
              </tr>
            );
          })}
        </tbody>
      </table>

      <FahrdispoTable
        data={dispoData.fahrdispo || []}
        onChange={rows => updDispoData({ fahrdispo: rows })}
      />

      <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0", borderBottom: "1px solid #999" }}>
        <tbody>
          <tr><td colSpan={2} style={{ ...tdS, background: "#eee", fontWeight: 700 }}>Produktionsnotizen:</td></tr>
          {day?.notes && <tr><td style={{ ...tdS, width: "30%", color: "#555" }}>Anmerkungen:</td><td style={tdS}>{day.notes}</td></tr>}
          {drehorts.length > 1 && <tr><td style={{ ...tdS, color: "#555" }}>Mehrere Drehorte:</td><td style={tdS}>{drehorts.map((l, i) => "Drehort " + (i + 1) + ": " + l).join(" / ")}</td></tr>}
          <tr><td style={{ ...tdS, color: "#555" }}>Notruf:</td><td style={{ ...tdS, fontSize: 10 }}>Polizei: 110 | Feuerwehr / RTW: 112</td></tr>
          <tr><td style={{ ...tdS, color: "#555" }}>Naechster Drehort:</td>
            <td style={{ ...tdS, fontSize: 10 }}>
              {nextDay ? (nextDay.locationTitle || nextDay.location || "-") + (nextDay.locationAddress ? " (" + nextDay.locationAddress + ")" : "") : "Kein weiterer Drehtag"}
            </td>
          </tr>
        </tbody>
      </table>

      {/* Besonderes table */}
      <div style={{ borderTop: "8px solid #f0f0f0" }}><BesonderesTable data={dispoData.besonderes || []} onChange={rows => updDispoData({ besonderes: rows })} title="Besonderes" />

</div>
      {/* Hinweise Motiv und Basis table */}
      <div style={{ borderTop: "8px solid #f0f0f0" }}><BesonderesTable data={dispoData.hinweise || []} onChange={rows => updDispoData({ hinweise: rows })} title="Hinweise Motiv und Basis" />

      </div>
      {nextDay && st.showVordispo !== false && (
        <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0" }}>
          <tbody>
            <tr style={{ background: "#444", color: "#fff" }}>
              <td colSpan={4} style={{ padding: "5px 10px", fontWeight: 700 }}>
                VORDISPO - {dayIdx + 2}. Drehtag{nextDay?.date ? " - " + fmtDate(nextDay.date) : ""}
                {nextGroup?.divider?.callTime && <span style={{ fontWeight: 400, marginLeft: 16, color: "#ccc" }}>Call: {nextGroup.divider.callTime}</span>}
              </td>
            </tr>
            <tr>
              <td style={{ ...tdS, width: "25%", background: "#f5f5f5", fontWeight: 700, fontSize: 10 }}>Drehort:</td>
              <td style={{ ...tdS, fontSize: 10 }} colSpan={3}>
                {nextDay.locationTitle || nextDay.location || "-"}{nextDay.locationAddress ? " - " + nextDay.locationAddress : ""}
              </td>
            </tr>
            {nextScenes.length > 0 && (
              <tr>
                <td style={{ ...tdS, background: "#f5f5f5", fontWeight: 700, fontSize: 10 }}>Szenen:</td>
                <td style={{ ...tdS, fontSize: 10 }} colSpan={3}>
                  {nextScenes.map(sc => "#" + sc.number + " " + (sc.title || "") + " (" + sc.interior + "/" + (sc.dayNight ? sc.dayNight.charAt(0) : "T") + (sc.vorstopp ? " V-Stopp: " + sc.vorstopp : "") + ")").join(" | ")}
                </td>
              </tr>
            )}
            {nextCast.length > 0 && (
              <tr>
                <td style={{ ...tdS, background: "#f5f5f5", fontWeight: 700, fontSize: 10 }}>Darsteller:</td>
                <td style={{ ...tdS, fontSize: 10 }} colSpan={3}>
                  {nextCast.map((c, i) => i + 1 + " " + c.name + " (" + c.role + ")").join(", ")}
                </td>
              </tr>
            )}
          </tbody>
        </table>
      )}
    </div>
  );
}

function Dispos({ project, onChange }) {
  const [activeDay, setActiveDay] = useState(0);
  const [dispoExporting, setDispoExporting] = useState(false);
  const [allExporting, setAllExporting] = useState(false);
  const handleExportDispo = () => exportDispoPdf(project, activeDay, setDispoExporting);
  const handleExportAll = async () => {
    setAllExporting(true);
    try {
      for (let i = 0; i < project.shootDays.length; i++) {
        await new Promise(resolve => setTimeout(resolve, i * 800));
        exportDispoPdf(project, i, () => {});
      }
      // Wait for last download to start
      await new Promise(resolve => setTimeout(resolve, 1000));
    } finally {
      setAllExporting(false);
    }
  };
  return (
    <div>
      <div className="dispo-top-bar no-print" style={{ ...S.row, marginBottom: 20, flexWrap: "wrap", gap: 8 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Tagesdispos</h1>
        <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:12, color:C.mid }}>
          <input type="checkbox"
            checked={project.settings.showVordispo !== false}
            onChange={e => onChange({ ...project, settings: { ...project.settings, showVordispo: e.target.checked } })}
            style={{ accentColor: C.accent, width:14, height:14 }} />
          Vordispo anzeigen
        </label>
        <select
          value={activeDay}
          onChange={e => setActiveDay(Number(e.target.value))}
          style={{ ...S.input, width: "auto", minWidth: 220, padding: "7px 12px", fontSize: 13, cursor: "pointer" }}>
          {project.shootDays.map((d, i) => (
            <option key={i} value={i}>
              Tag {i + 1}{d.date ? " - " + fmtDate(d.date) : ""}{d.locationTitle ? " - " + d.locationTitle : ""}
            </option>
          ))}
        </select>
        <button style={{ ...S.btn(), opacity: dispoExporting ? 0.6 : 1 }} onClick={handleExportDispo} disabled={dispoExporting}>{dispoExporting ? "Exportiere..." : "Als PDF speichern"}</button>
        <button style={{ ...S.btn(), opacity: allExporting ? 0.6 : 1, border: "1px solid #2a4060", color: "#6090c0" }} onClick={handleExportAll} disabled={allExporting}>{allExporting ? "Exportiere alle..." : "Alle Dispos exportieren"}</button>
      </div>
      {project.shootDays.length === 0
        ? <div style={{ color: C.dim }}>Bitte zuerst Drehtage anlegen.</div>
        : <div id="dispo-print-area" style={{ maxWidth: 1000, margin: "0 auto" }}>
            <DispoDay project={project} dayIdx={activeDay} onChange={onChange} />
          </div>}
    </div>
  );
}

const STORAGE_KEY = "filmdispo_projects_v1";

function loadProjects() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    }
  } catch(e) {}
  return [];
}

      } catch(e) {

    const resp = p.settings.respPersons || [];
    let crew = [...p.crew];
    resp.forEach(rp => {
      if (!rp.label) return; // Leere Labels überspringen
      const existing = crew.find(c2 => c2.role === rp.label);
      if (existing) {
        // Nur updaten wenn Value sich geändert hat
        crew = crew.map(c2 => c2.role === rp.label ? { ...c2, name: rp.value || "" } : c2);
      } else if (rp.value) {
        // Neuen Crew-Eintrag nur wenn auch ein Name vorhanden ist
        crew = [...crew, { id: uid(), role: rp.label, name: rp.value, days: [], diet: "meat", notes: "" }];
      }
      // Wenn kein Value: keinen leeren Eintrag erstellen
    });
    upd({ ...p, crew });

    if (!window.confirm("Konto und ALLE lokalen Daten löschen? Das kann nicht rückgängig gemacht werden!")) return;

        // Try to delete Firebase account

        if (fbAuth && fbAuth.currentUser) {
          await fbAuth.currentUser.delete();
          deleted = true;
        }
      }
    } catch(e) {
      console.error("Account delete error:", e);

    // Always clear local data
    localStorage.clear();
    setProjects([]);
    setActiveId(null);

              <strong style={{color:"#ddd"}}>Elias Müller</strong><br/>
              Mittlere Kreuzgasse 2, 90403 Nürnberg<br/>
              E-Mail: kontakt@eliasmuellerfilm.de<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>

              </strong><br/>
              <strong style={{color:"#ddd"}}>Ohne Anmeldung:</strong> Projektdaten nur lokal auf deinem
              Gerät (localStorage). Keine Übertragung an Server.<br/><br/>

              </strong><br/>
              · Auskunft (Art. 15) · Berichtigung (Art. 16) · Löschung (Art. 17)<br/>

                style={{color:"#6090c0"}}>www.lda.bayern.de</a><br/><br/>
              Kontakt für Datenschutzanfragen: kontakt@eliasmuellerfilm.de<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                6. Cookies & Browser-Speicher
              </strong><br/>
              Keine Tracking-Cookies. localStorage nur für technisch notwendige
              Sitzungs- und Projektdaten — keine separate Einwilligung erforderlich.<br/><br/>

              <strong style={{color:"#e8a020", fontSize:10, letterSpacing:"0.1em", textTransform:"uppercase"}}>
                7. Datensicherheit
              </strong><br/>
              Übertragung zu Firebase verschlüsselt (HTTPS/TLS).<br/><br/>

            </div>
            <button onClick={() => setShowDatenschutz(false)}
              style={{ marginTop:20, background:"#1e1e2c", color:"#ddd",
                border:"1px solid #252535", borderRadius:5, padding:"9px 22px",
                cursor:"pointer", fontFamily:"inherit", fontSize:12 }}>
              Schließen
            </button>
          </div>
        </div>
      )}
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');
        *{box-sizing:border-box;} input,select,textarea{font-family:inherit;}
        ::-webkit-scrollbar{width:5px;height:5px;} ::-webkit-scrollbar-track{background:#0c0c10;} ::-webkit-scrollbar-thumb{background:#252535;border-radius:3px;}
        button:hover{filter:brightness(1.18);}
        input:focus,select:focus,textarea:focus{border-color:#e8a020!important;outline:none;}
        @media print{.no-print{display:none!important;} .no-print-color{color:inherit!important;}}
      `}</style>

      <nav style={{ ...S.side, display: sidebarOpen ? "flex" : "none", flexDirection:"column",
        position: window.innerWidth < 700 ? "fixed" : "sticky", zIndex: 100,
        height: "100vh", top: 0 }} className="no-print">
        <div style={{ ...S.sLogo, display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div>
            <div style={{ fontSize: 15, fontFamily: "'Syne',sans-serif", fontWeight: 800, letterSpacing: "0.06em" }}>SETDECK</div>
            <div style={{ fontSize: 9, color: C.dim, marginTop: 2, letterSpacing: "0.14em" }}>PRODUKTIONSPLANER</div>
          </div>
          <button onClick={() => setSidebarOpen(false)}
            style={{ background:"transparent", border:"none", color:C.dim, cursor:"pointer",
              fontSize:16, padding:"2px 6px" }}>✕</button>
        </div>
        <div style={{ padding: "6px 0", flex: active ? 0 : 1 }}>
          <div style={S.sSec}>Navigation</div>
          <div style={S.sItem(tab === "dashboard" && !showArchiveSidebar)} onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(false); }}>
            <Icon name="home" size={13} /> Dashboard
          </div>
          <div style={S.sItem(tab === "profil")} onClick={() => { setTab("profil"); setActiveId(null); setShowArchiveSidebar(false); }}>
            <Icon name="settings" size={13} /> Profil
          </div>
          {projects.filter(p=>p.archived).length > 0 && (
            <div style={{ ...S.sItem(showArchiveSidebar), paddingLeft: 30 }}
              onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(true); }}>
              ▪ Archiv
            </div>
          )}
        </div>
        {active && (
          <div style={{ flex: 1, overflowY: "auto" }}>
            <div style={S.sSec}>Projekt</div>
            <div style={{ fontSize: 11, color: C.mid, padding: "3px 18px 10px", borderBottom: "1px solid " + C.border, wordBreak: "break-word" }}>{active.name}</div>
            {NAV.map(item => (
              <div key={item.key} style={S.sItem(tab === item.key)} onClick={() => setTab(item.key)}>
                <Icon name={item.icon} size={13} /> {item.label}
              </div>
            ))}
          </div>
        )}
        <div style={{ padding: "10px 18px", borderTop: "1px solid " + C.border, background: "#0e0e16", marginTop: "auto" }}>
          {isSignedIn && (
            <div style={{ marginBottom: 8 }}>
              <button style={{ ...S.btn("danger"), fontSize: 10, padding: "3px 8px", width: "100%" }}
                onClick={deleteAccount}>Konto löschen</button>
            </div>
          )}
          <div style={{ fontSize: 10, color: "#555", marginBottom: 4 }}>Setdeck v1.2</div>
          <div style={{ display: "flex", gap: 10 }}>
            <span style={{ fontSize: 10, color: "#6090c0", cursor: "pointer", textDecoration: "underline" }}
              onClick={() => setShowImpressum(true)}>Impressum</span>
            <span style={{ color: "#333" }}>·</span>
            <span style={{ fontSize: 10, color: "#6090c0", cursor: "pointer", textDecoration: "underline" }}
              onClick={() => setShowDatenschutz(true)}>Datenschutz</span>
          </div>
        </div>
      </nav>
      <main style={S.main}>
        <div style={S.top} className="no-print">
          <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 12 }}>
            {!sidebarOpen && (
              <button onClick={() => setSidebarOpen(true)}
                style={{ background:"transparent", border:"none", color:C.mid, cursor:"pointer",
                  fontSize:18, padding:"0 4px", lineHeight:1 }}>☰</button>
            )}
            {active ? (
              <><span style={{ cursor: "pointer" }} onClick={() => { setTab("dashboard"); setActiveId(null); setShowArchiveSidebar(false); }}>Dashboard</span>
                <span style={{ color: C.border }}>/</span>
                {active.archived && <span style={{ background:"#3a2a00", color:"#c08000", border:"1px solid #604000", borderRadius:3, padding:"1px 6px", fontSize:10 }}>ARCHIVIERT</span>}
                <span>{active.name}</span>
                <span style={{ color: C.border }}>/</span>
                <span style={{ color: C.accent }}>{NAV.find(n => n.key === tab)?.label || tab}</span></>
            ) : <span>{showArchiveSidebar ? "Archiv" : "Dashboard"}</span>}
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginLeft:"auto" }}>
            <span style={{ fontSize:10, color: saveStatus==="gespeichert" ? "#446644" : saveStatus==="speichert..." ? C.dim : "#884444" }}>
              {saveStatus==="gespeichert" ? "Gespeichert" : saveStatus==="speichert..." ? "Speichert..." : saveStatus}
            </span>
            {FIREBASE_READY ? (isSignedIn ? (
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                {currentUser && currentUser.photo && (
                  <img src={currentUser.photo} style={{ width:22, height:22, borderRadius:"50%", border:"1px solid #333" }} alt="" />
                )}
                <span style={{ fontSize:10, color: cloudStatus==="synced" ? "#446644" : cloudStatus==="syncing" ? C.dim : "#884444" }}>
                  {cloudStatus==="synced" ? "Cloud ✓" : cloudStatus==="syncing" ? "Sync..." : "Cloud-Fehler"}
                </span>
                <button style={{ ...S.btn("xs"), fontSize:10 }} onClick={loadFromCloud} title="Neu laden">↓</button>
                <button style={{ ...S.btn("xs"), fontSize:10, color:"#a86" }} onClick={signOut}>Abmelden</button>
              </div>
            ) : (
              <button style={{ ...S.btn(), fontSize:10, background:"#1a2a1a", color:"#6a9", border:"1px solid #2a4a2a" }}
                onClick={() => setShowConsent(true)}>
                ☁ Anmelden
              </button>
            )) : (
              <span style={{ fontSize:10, color:"#555" }} title="Firebase nicht konfiguriert - nur lokale Speicherung">Lokal</span>
            )}
          </div>
        </div>
        <div style={S.body}>

          {tab === "profil" && <Profile />}
          {tab === "dashboard" && <Dashboard projects={projects} onSelect={openProject} onNew={newProject} onDelete={delProject} onDemo={demoProject} onExport={exportProject} onImport={importProject} onArchive={archiveProject} showArchive={showArchiveSidebar} setShowArchive={setShowArchiveSidebar} isSignedIn={isSignedIn} onSignIn={() => setShowConsent(true)} firebaseReady={FIREBASE_READY} />}
          {tab === "overview"  && active && <Overview  project={active} />}
          {tab === "settings"  && active && <Settings  project={active} onChange={updSync} />}
          {tab === "shootdays" && active && <ShootDays project={active} onChange={upd} />}
          {tab === "castcrew"  && active && <CastCrew  project={active} onChange={upd} />}
          {tab === "catering"  && active && <Catering  project={active} onChange={upd} />}
          {tab === "equipment" && active && <Equipment project={active} onChange={upd} />}
          {tab === "scenes"    && active && <Scenes    project={active} onChange={upd} />}
          {tab === "shotlist"  && active && <Shotlist  project={active} onChange={upd} mode={shotlistMode} setMode={setShotlistMode} />}
          {tab === "drehplan"  && active && <Drehplan  project={active} />}
          {tab === "dispos"    && active && <Dispos    project={active} onChange={upd} />}
        </div>
      </main>
    </div>
  );
}


  </script>
</body>
</html>
