    const tick = setInterval(() => {
      progress = Math.min(progress + Math.random() * 8, 85);

    }, 200);

    function showError(msg) {
      clearInterval(tick);
      document.getElementById('loading').style.display = 'none';
      const eb = document.getElementById('error-box');
      eb.style.display = 'block';
      eb.textContent = 'Ladefehler:\n\n' + msg + '\n\nBitte Seite neu laden oder Browser-Console pruefen.';
    }

    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.crossOrigin = 'anonymous';
        s.onload = resolve;
        s.onerror = () => reject(new Error('Konnte nicht laden: ' + src));
        document.head.appendChild(s);
      });
    }

    async function bootstrap() {
      try {
        loadText.textContent = 'Lade React...';
        await loadScript('https://unpkg.com/react@18.3.1/umd/react.production.min.js');
        fill.style.width = '30%';
        
        await loadScript('https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js');

        await loadScript('https://unpkg.com/@babel/standalone@7.23.10/babel.min.js');
        fill.style.width = '80%';
        loadText.textContent = 'Starte App...';

        // Register presets
        Babel.registerPreset('custom', {
          presets: [
            [Babel.availablePresets['react']],
            [Babel.availablePresets['env'], { targets: { browsers: ['last 2 versions'] }, modules: false }]
          ]
        });

        // Transform the app code
        const appCode = document.getElementById('app-source').textContent;
        let transformed;
        try {
          transformed = Babel.transform(appCode, {
            presets: ['custom'],
            filename: 'App.jsx'
          }).code;
        } catch(e) {
          throw new Error('JSX Kompilierungsfehler: ' + e.message);
        }

        // Execute
        const fn = new Function('React', 'ReactDOM', transformed + '\nreturn App;');
        const App = fn(React, ReactDOM);
        
        fill.style.width = '100%';
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
          ReactDOM.createRoot(document.getElementById('root')).render(
            React.createElement(App)
          );
        }, 200);

      } catch(e) {
        showError(e.message + (e.stack ? '\n' + e.stack : ''));
      }
    }

    bootstrap();

    // ─── Firebase Sync Hook ───────────────────────────────────────────────────
    function useFirebaseSync(projects, setProjects) {
      const [isSignedIn, setIsSignedIn] = React.useState(false);
      const [currentUser, setCurrentUser] = React.useState(null);
      const [cloudStatus, setCloudStatus] = React.useState("idle");
      const [lastCloudSync, setLastCloudSync] = React.useState(null);
      const [fbReady, setFbReady] = React.useState(false);
      const syncTimer = React.useRef(null);
      const db = React.useRef(null);
      const auth = React.useRef(null);

      React.useEffect(() => {
        if (!FIREBASE_READY) return;
        // Load Firebase SDKs dynamically
        const loadFB = async () => {
          try {
            const { initializeApp, getApps } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js");
            const { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut: fbSignOut }
              = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js");
            const { getFirestore, doc, setDoc, getDoc, collection }
              = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");

            const app = getApps().length ? getApps()[0] : initializeApp(FIREBASE_CONFIG);
            auth.current = { instance: getAuth(app), GoogleAuthProvider, signInWithPopup, signOut: fbSignOut };
            db.current = { instance: getFirestore(app), doc, setDoc, getDoc, collection };
            setFbReady(true);
            window._fbAuth = auth.current.instance; // expose for account deletion

            onAuthStateChanged(auth.current.instance, async user => {
              if (user) {
                setIsSignedIn(true);
                setCurrentUser({ name: user.displayName, email: user.email, photo: user.photoURL });
                // Load projects from Firestore
                await loadUserProjects(user.uid, db.current);
              } else {
                setIsSignedIn(false);
                setCurrentUser(null);
              }
            });
          } catch(e) {
            console.error("Firebase init error:", e);
          }
        };
        loadFB();
      }, []);

      const loadUserProjects = async (uid, dbRef) => {
        try {
          setCloudStatus("syncing");
          const snap = await dbRef.getDoc(dbRef.doc(dbRef.instance, "users", uid));
          if (snap.exists() && snap.data().projects) {
            const cloudProjs = snap.data().projects;
            setProjects(cloudProjs);
            localStorage.setItem("filmdispo_projects_v1", JSON.stringify(cloudProjs));
          }
          setCloudStatus("synced");
          setLastCloudSync(Date.now());
        } catch(e) {
          console.error("Load error:", e);
          setCloudStatus("error");
        }
      };

      const syncToCloud = React.useCallback((currentProjects) => {
        if (!isSignedIn || !fbReady || !auth.current || !db.current) return;
        clearTimeout(syncTimer.current);
        syncTimer.current = setTimeout(async () => {
          try {
            setCloudStatus("syncing");
            const uid = auth.current.instance.currentUser?.uid;
            if (!uid) return;
            await db.current.setDoc(
              db.current.doc(db.current.instance, "users", uid),
              { projects: currentProjects, updatedAt: Date.now() },
              { merge: true }
            );
            setCloudStatus("synced");
            setLastCloudSync(Date.now());
          } catch(e) {
            console.error("Sync error:", e);
            setCloudStatus("error");
          }
        }, 3000);
      }, [isSignedIn, fbReady]);

      const signIn = React.useCallback(async () => {
        if (!fbReady || !auth.current) return;
        try {
          const provider = new auth.current.GoogleAuthProvider();
          await auth.current.signInWithPopup(auth.current.instance, provider);
        } catch(e) {
          console.error("SignIn error:", e);
        }
      }, [fbReady]);

      const signOut = React.useCallback(async () => {
        if (!auth.current) return;
        await auth.current.signOut(auth.current.instance);
        setIsSignedIn(false);
        setCurrentUser(null);
        setCloudStatus("idle");
      }, []);

      const loadFromCloud = React.useCallback(async () => {
        if (!isSignedIn || !auth.current || !db.current) return;
        const uid = auth.current.instance.currentUser?.uid;
        if (uid) await loadUserProjects(uid, db.current);
      }, [isSignedIn, fbReady]);

      return { isSignedIn, currentUser, cloudStatus, lastCloudSync, syncToCloud, loadFromCloud, signIn, signOut, fbReady };
    }



// ─── PDF Export ──────────────────────────────────────────────────────────────
// Self-contained PDF builder - no external libraries, works in sandboxed iframes.
// Generates a real binary PDF and opens it in a new tab via a data: URI.

function buildPdf(pages) {
  // pages: array of {lines:[{type,x,y,w,h,text,size,bold,italic,rgb,align,x2,y2,lineWidth}]}
  // All coordinates in mm, converted to PDF points (1mm = 2.8346pt)
  // PDF y=0 is at BOTTOM of page; we convert from top-down mm coords.
  const P = 2.8346; // mm to pt
  const PW = 595.28; const PH = 841.89; // A4 in pt
  const mm2pt = v => v * P;
  const y2pt = ymm => PH - ymm * P; // top-down mm -> bottom-up pt

  const escPdf = s => {
    let r = "";
    for (let i = 0; i < s.length; i++) {
      const b = s.charCodeAt(i);
      if (b === 40) r += "\\(";
      else if (b === 41) r += "\\)";
      else if (b === 92) r += "\\\\";
      else if (b < 32 || b > 126) r += "?";
      else r += s[i];
    }
    return r;
  };

  const NL = "\n";
  const faces = ["Helvetica","Helvetica-Bold","Helvetica-Oblique","Helvetica-BoldOblique"];

  // Build one content stream per page using absolute Tm positioning
  const streams = pages.map(pg => {
    const ops = [];
    ops.push("BT");
    let curFont = ""; let curRgb = ""; let curSRgb = "";

    pg.lines.forEach(l => {
      if (l.type === "rect") {
        ops.push("ET");
        const rgb = l.rgb || [240,240,240];
        const rc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3);
        ops.push(rc+" rg");
        // rect: x y w h re f  (y is bottom-left corner in PDF)
        const px = mm2pt(l.x).toFixed(2);
        const py = (y2pt(l.y) - mm2pt(l.h)).toFixed(2); // top-left to bottom-left
        const pw2 = mm2pt(l.w).toFixed(2);
        const ph = mm2pt(l.h).toFixed(2);
        ops.push(px+" "+py+" "+pw2+" "+ph+" re f");
        ops.push("BT");
        return;
      }
      if (l.type === "line") {
        ops.push("ET");
        const rgb = l.rgb || [180,180,180];
        const sc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3);
        if (sc !== curSRgb) { ops.push(sc+" RG"); curSRgb = sc; }
        ops.push((l.lineWidth||0.3).toFixed(2)+" w");
        ops.push(mm2pt(l.x1).toFixed(2)+" "+y2pt(l.y1).toFixed(2)+" m "+mm2pt(l.x2).toFixed(2)+" "+y2pt(l.y2).toFixed(2)+" l S");
        ops.push("BT");
        return;
      }
      // Text: use Tm for absolute positioning
      const sz = l.size || 9;
      const bold = !!l.bold; const italic = !!l.italic;
      const fn = bold&&italic?"Helvetica-BoldOblique":bold?"Helvetica-Bold":italic?"Helvetica-Oblique":"Helvetica";
      const fk = fn+"|"+sz;
      if (fk !== curFont) { ops.push("/"+fn+" "+sz.toFixed(2)+" Tf"); curFont = fk; }
      const rgb = l.rgb || [0,0,0];
      const fc = (rgb[0]/255).toFixed(3)+" "+(rgb[1]/255).toFixed(3)+" "+(rgb[2]/255).toFixed(3)+" rg";
      if (fc !== curRgb) { ops.push(fc); curRgb = fc; }

      const text = escPdf(String(l.text||""));
      // Approximate char width for Helvetica: ~0.5 * fontSize in pt
      const approxCharW = mm2pt(sz) * 0.5;
      const textW = approxCharW * String(l.text||"").length;
      let px = mm2pt(l.x);
      if (l.align === "right") px = mm2pt(l.x) - textW;
      else if (l.align === "center") px = mm2pt(l.x) - textW/2;

      const py = y2pt(l.y); // baseline
      // Tm: 1 0 0 1 tx ty Tm  (identity matrix + translation = absolute position)
      ops.push("1 0 0 1 "+px.toFixed(2)+" "+py.toFixed(2)+" Tm");
      ops.push("("+text+") Tj");
    });
    ops.push("ET");
    return ops.join(NL)+NL;
  });

  // Assemble PDF binary
  let out = "%PDF-1.4"+NL;
  const refs = []; // byte offsets
  let off = out.length;
  let nObj = 0;

  const addObj = content => {
    nObj++;
    refs.push(off);
    const s = nObj+" 0 obj"+NL+content+NL+"endobj"+NL;
    out += s; off += s.length;
    return nObj;
  };

  // Font objects
  const fontIds = {};
  faces.forEach(f => {
    fontIds[f] = addObj("<</Type /Font /Subtype /Type1 /BaseFont /"+f+" /Encoding /WinAnsiEncoding>>");
  });

  const fontRes = "/Font <<"+faces.map(f=>"/"+f+" "+fontIds[f]+" 0 R").join(" ")+" >>";

  // Content stream + page objects
  const pageIds = streams.map(stream => {
    const len = stream.length;
    const sid = addObj("<</Length "+len+">>\nstream\n"+stream+"endstream");
    const pid = addObj("<</Type /Page /MediaBox [0 0 "+PW.toFixed(2)+" "+PH.toFixed(2)+"] /Contents "+sid+" 0 R /Resources <<"+fontRes+">> /Parent 0 0 R>>");
    return pid;
  });

  const pagesId = addObj("<</Type /Pages /Kids ["+pageIds.map(n=>n+" 0 R").join(" ")+"] /Count "+pageIds.length+">>");
  // Fix parent refs
  pageIds.forEach(pid => {
    out = out.replace(pid+" 0 obj\n<</Type /Page", pid+" 0 obj\n<</Type /Page");
    // Replace the placeholder parent ref
  });
  // Patch /Parent 0 0 R -> /Parent pagesId 0 R
  out = out.split("/Parent 0 0 R").join("/Parent "+pagesId+" 0 R");

  const catId = addObj("<</Type /Catalog /Pages "+pagesId+" 0 R>>");

  // Cross-reference table
  const xrefOff = off;
  let xref = "xref"+NL+"0 "+(nObj+1)+NL;
  xref += "0000000000 65535 f "+NL;
  refs.forEach(r => { xref += r.toString().padStart(10,"0")+" 00000 n "+NL; });
  out += xref;
  out += "trailer"+NL+"<</Size "+(nObj+1)+" /Root "+catId+" 0 R>>"+NL;
  out += "startxref"+NL+xrefOff+NL+"%%EOF";
  return out;
}

const pad = n => String(Math.floor(n)).padStart(2,"0");

function pdfSafe(s) {
  return String(s||"")
    .replace(/\u00e4/g,"ae").replace(/\u00f6/g,"oe").replace(/\u00fc/g,"ue")
    .replace(/\u00c4/g,"Ae").replace(/\u00d6/g,"Oe").replace(/\u00dc/g,"Ue")
    .replace(/\u00df/g,"ss").replace(/[^\x20-\x7E]/g,"?");
}

function openPdf(pdfStr, filename) {
  const len = pdfStr.length;
  const buf = new Uint8Array(len);
  for (let i = 0; i < len; i++) buf[i] = pdfStr.charCodeAt(i) & 0xff;
  const blob = new Blob([buf], {type:"application/pdf"});
  const url = URL.createObjectURL(blob);
  // Open in new tab - works in sandboxed iframes
  const win = window.open(url, "_blank");
  if (!win) {
    // Fallback: force download via link
    const a = document.createElement("a");
    a.href = url; a.download = filename; a.target = "_blank";
    document.body.appendChild(a); a.click();
    setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
  } else {
    setTimeout(() => URL.revokeObjectURL(url), 10000);
  }
}

// ─── Document layout engine ───────────────────────────────────────────────────
// All measurements in mm, Y increases downward from top of page

function makeDoc() {
  const W = 210; const H = 297;
  const ML = 12; const MR = 12; const MT = 14; const MB = 14;
  const CW = W - ML - MR;
  let pages = [{ lines: [] }];
  let y = MT;

  const cur = () => pages[pages.length - 1];
  const checkY = need => {
    if (y + need > H - MB) { pages.push({ lines: [] }); y = MT; }
  };
  const addY = d => { y += d; };
  const setY = v => { y = v; };
  const getY = () => y;

  // Primitives
  const rect = (x, yy, w, h, rgb) => cur().lines.push({ type:"rect", x, y:yy, w, h, rgb:rgb||[240,240,240] });
  const line2 = (x1, y1, x2, y2, lw, rgb) => cur().lines.push({ type:"line", x1, y1, x2, y2, lineWidth:lw||0.3, rgb:rgb||[180,180,180] });
  const text = (s, x, yy, sz, bold, rgb, align) => cur().lines.push({ type:"text", text:pdfSafe(s), x, y:yy, size:sz||9, bold:!!bold, rgb:rgb||[40,40,40], align:align||"left" });

  // Word-wrap text into multiple lines (returns array of strings)
  const wrapText = (s, maxMm, sz) => {
    const safe = pdfSafe(s);
    const charWmm = sz * 0.55 * 0.3528; // pt->mm: sz*0.55pt per char * 0.3528mm/pt
    const maxChars = Math.max(1, Math.floor(maxMm / charWmm));
    const words = safe.split(" ");
    const lines = []; let cur2 = "";
    words.forEach(w => {
      const test = cur2 ? cur2+" "+w : w;
      if (test.length > maxChars && cur2) { lines.push(cur2); cur2 = w; }
      else cur2 = test;
    });
    if (cur2) lines.push(cur2);
    return lines.length ? lines : ["-"];
  };

  // Draw a section header bar
  const sectionHeader = (label, h) => {
    h = h || 6;
    checkY(h + 2);
    rect(ML, y, CW, h, [30,30,42]);
    text(label, ML+2, y + h*0.68, 7.5, true, [200,180,140]);
    addY(h + 1);
  };

  // Draw a table header row
  const tableHeader = (cols, h) => {
    h = h || 6;
    checkY(h + 2);
    rect(ML, y, CW, h, [40,40,55]);
    let cx = ML;
    cols.forEach(col => {
      text(col.label||"", cx+1, y + h*0.7, 7, true, [200,180,140]);
      cx += col.w;
    });
    addY(h + 0.5);
  };

  // Draw a data row with word-wrap per cell; returns row height used
  const tableRow = (cols, vals, si, rowMinH) => {
    const SZ = 8; // font size in POINTS
    const LH = 3.8; // line height mm
    // Calculate lines per cell
    const cellLines = vals.map((v, i) => wrapText(String(v||""), (cols[i]&&cols[i].w||20)-2, SZ));
    const nLines = Math.max(...cellLines.map(l=>l.length), 1);
    const rowH = Math.max(nLines * LH + 2.5, rowMinH||6);
    checkY(rowH);
    if (si % 2 === 0) rect(ML, y, CW, rowH, [252,252,252]);
    line2(ML, y+rowH, W-MR, y+rowH, 0.15, [210,210,210]);
    let cx = ML;
    vals.forEach((v, i) => {
      const col = cols[i] || { w: 20 };
      const bold = col.bold || false;
      const rgb = col.rgb || [40,40,40];
      const lines3 = cellLines[i];
      lines3.forEach((l, li) => {
        text(l, cx+1, y + 3.5 + li*LH, SZ, bold && li===0, rgb);
      });
      cx += col.w;
    });
    addY(rowH);
    return rowH;
  };

  return { pages:()=>pages, checkY, addY, setY, getY, rect, line2, text, wrapText, sectionHeader, tableHeader, tableRow, W, H, ML, MR, MT, MB, CW };
}


// ─── Export Dispo as PDF ──────────────────────────────────────────────────────
function exportDispoPdf(project, dayIdx, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const day = project.shootDays[dayIdx] || {};
    const groups = buildGroups(project.shots);
    const group = groups.find(g => {
      const lk = project.shootDays.find(d => d.id === g.divider.shootDayId);
      return lk && project.shootDays.indexOf(lk) === dayIdx;
    }) || groups[dayIdx];
    const sceneIds = group ? group.sceneIds : new Set();
    const scenes = project.scenes.filter(sc => sceneIds.has(sc.id));
    const schedule = group ? group.items : [];
    const dispoData = (day.dispoData) || {};
    const arbRows = dispoData.arbRows || [];

    // Helpers
    const W = 210, ML = 10, MR = 10, CW = W - ML - MR;
    const TM = 10; // top margin
    let y = TM;
    const lines = [];
    const push = (obj) => lines.push({ y, ...obj });

    const fS = (sz) => sz; // font size in pt
    const BLACK = [0,0,0], WHITE = [255,255,255], GRAY = [100,100,100];
    const LGRAY = [220,220,220], DGRAY = [50,50,50], ACCENT = [232,160,32];
    const BG1 = [245,245,245];

    const doc = makeDoc();
    const timeToMin = t => { if (!t) return 0; const [h,m] = t.split(':').map(Number); return h*60+(m||0); };
    const fmtD = d => { if (!d) return ''; try { const dt = new Date(d+'T12:00'); return pad(dt.getDate())+'.'+pad(dt.getMonth()+1)+'.'+dt.getFullYear(); } catch(e) { return d; } };

    const respPersons = st.respPersons || [];

    // ── SET + DARSTELLER LISTE OBEN ─────────────────────────────
    const crewAtDay = project.crew.filter(p => p.days.includes(dayIdx));
    const castAtDay = project.cast.filter(p => p.days.includes(dayIdx));
    if (crewAtDay.length > 0 || castAtDay.length > 0) {
      if (crewAtDay.length > 0) {
        doc.text('Set: ' + pdfSafe(crewAtDay.map(p => p.name||p.role).join(', ')),
          ML, doc.getY()+4, 8, false, DGRAY);
        doc.addY(5);
      }
      if (castAtDay.length > 0) {
        doc.text('Darsteller: ' + pdfSafe(castAtDay.map(p => p.name||p.role).join(', ')),
          ML, doc.getY()+4, 8, false, DGRAY);
        doc.addY(5);
      }
      doc.addY(2);
    }

    // ── HEADER: Logo + Titel + Verantwortliche ──────────────────
    const hdrTop = doc.getY();
    const hdrH = 22;
    doc.rect(ML, hdrTop, CW, hdrH, [255,255,255]);
    doc.line2(ML, hdrTop, W-MR, hdrTop, 0.5, GRAY);
    doc.line2(ML, hdrTop+hdrH, W-MR, hdrTop+hdrH, 1.5, BLACK);

    // Logo oder Firmenname (links)
    if (st.logo && st.logo.startsWith('data:image')) {
      // Logo als Base64 in PDF einbetten — vereinfacht: Firmenname fallback
      doc.text(pdfSafe(st.company||''), ML+2, hdrTop+8, 11, true, BLACK);
    } else {
      doc.text(pdfSafe(st.company||''), ML+2, hdrTop+8, 11, true, BLACK);
    }

    // Titel (Mitte)
    doc.text(pdfSafe(st.title||'Projekt'), W/2, hdrTop+9, 16, true, BLACK, 'center');
    doc.text(pdfSafe(st.projektArt||''), W/2, hdrTop+17, 8, false, GRAY, 'center');

    // Verantwortliche (rechts)
    let ry = hdrTop + 4;
    respPersons.filter(p => p.value).slice(0,5).forEach(p => {
      doc.text(pdfSafe(p.label)+': ', W-MR-50, ry, 7.5, false, GRAY, 'left');
      doc.text(pdfSafe(p.value), W-MR-50+25, ry, 7.5, true, BLACK, 'left');
      ry += 4;
    });
    doc.setY(hdrTop + hdrH + 1);

    // ── DISPOSITION-BALKEN ───────────────────────────────────────
    const dispH = 9;
    doc.rect(ML, doc.getY(), CW, dispH, DGRAY);
    doc.text('DISPOSITION', ML+3, doc.getY()+6.5, 9, true, WHITE);
    doc.text(day.date ? fmtD(day.date) : 'Datum TBD', W/2, doc.getY()+6.5, 9, true, WHITE, 'center');
    doc.text((dayIdx+1)+'. Drehtag', W-MR-2, doc.getY()+6.5, 9, true, WHITE, 'right');
    doc.addY(dispH + 1);

    // ── 3-SPALTEN-BLOCK: Drehortinfos | Motivinfos | Arbeitsbeginn ──
    const blkTop = doc.getY();
    const c1W = 55, c2W = 65, c3W = CW - c1W - c2W;
    const c1X = ML, c2X = ML+c1W, c3X = ML+c1W+c2W;

    // Spalten-Header
    ['DREHORTINFOS','MOTIVINFOS','ARBEITSBEGINN'].forEach((lbl,i) => {
      const x = [c1X,c2X,c3X][i];
      doc.rect(x, blkTop, [c1W,c2W,c3W][i], 5, BG1);
      doc.text(lbl, x+2, blkTop+3.8, 6.5, true, GRAY);
    });
    doc.addY(6);

    // Drehort
    const addrLines = [day.locationTitle||'', day.locationAddress||''].filter(Boolean);
    addrLines.forEach(l => { doc.text(pdfSafe(l), c1X+2, doc.getY()+4, 8, true, BLACK); doc.addY(4.5); });

    // Motiv: Szenen an diesem Tag
    const mY0 = blkTop+6;
    let mY = mY0;
    scenes.slice(0,8).forEach(sc => {
      const lbl = pdfSafe('#'+sc.number+' '+(sc.interior||'')+'.'+(sc.locationTitle||sc.title||''));
      doc.text(lbl, c2X+2, mY+4, 7.5, true, BLACK);
      mY += 4.5;
    });

    // Basis
    const basisLines = (dispoData.basis||'').split('\n').filter(Boolean).slice(0,3);
    if (basisLines.length > 0) {
      mY += 2;
      doc.text('BASIS:', c2X+2, mY+4, 7, true, GRAY);
      mY += 4.5;
      basisLines.forEach(l => { doc.text(pdfSafe(l), c2X+2, mY+4, 7, false, DGRAY); mY += 4; });
    }

    // Arbeitsbeginn
    const a3Y0 = blkTop+6;
    let a3Y = a3Y0;
    arbRows.forEach(r => {
      if (!r.label) return;
      doc.text(pdfSafe(r.label+':.'), c3X+2, a3Y+4, 7.5, false, DGRAY);
      if (r.time) doc.text(r.time, c3X+c3W-4, a3Y+4, 7.5, true, BLACK, 'right');
      a3Y += 4.5;
    });

    // Probe/Dreh
    const shotItems = schedule.filter(s => s.type==='shot'||(!s.isDivider));
    const firstShot = shotItems[0];
    const probeStart = firstShot ? (firstShot.start||'') : '';
    if (probeStart) {
      a3Y += 1;
      doc.line2(c3X, a3Y, c3X+c3W, a3Y, 0.3, LGRAY); a3Y += 1;
      doc.text('Probe/Dreh:', c3X+2, a3Y+4, 7.5, false, DGRAY);
      doc.text(probeStart, c3X+c3W-4, a3Y+4, 8, true, BLACK, 'right'); a3Y += 5;
    }

    // Mittagspause
    const lunch = schedule.filter(s => s.isDivider && s.dividerType==='lunch')[0];
    if (lunch) {
      doc.text('Mittagspause:', c3X+2, a3Y+4, 7, false, DGRAY);
      doc.text(lunch.start+' ('+( lunch.durationMin||45)+'min)', c3X+c3W-4, a3Y+4, 7, false, GRAY, 'right'); a3Y += 4.5;
    }

    // Block-Höhe bestimmen und Rahmen zeichnen
    const blkEndY = Math.max(doc.getY()+2, mY+4, a3Y+4);
    doc.line2(ML, blkTop, ML, blkEndY, 0.4, LGRAY);
    doc.line2(c2X, blkTop, c2X, blkEndY, 0.4, LGRAY);
    doc.line2(c3X, blkTop, c3X, blkEndY, 0.4, LGRAY);
    doc.line2(W-MR, blkTop, W-MR, blkEndY, 0.4, LGRAY);
    doc.line2(ML, blkEndY, W-MR, blkEndY, 0.8, BLACK);
    doc.setY(blkEndY+1);

    // Parkplätze
    const parkplaetze = dispoData.parkplaetze || [];
    if (parkplaetze.length > 0) {
      parkplaetze.forEach(pk => {
        if (!pk.info && !pk.url) return;
        doc.text('[P] '+(pk.info ? pdfSafe(pk.info) : '')+(pk.url ? '  '+pdfSafe(pk.url).slice(0,40) : ''),
          ML+2, doc.getY()+4, 7.5, false, DGRAY);
        doc.addY(4.5);
      });
    }

    // ── WETTER-ZEILE ─────────────────────────────────────────────
    doc.rect(ML, doc.getY(), CW, 7, BG1);
    doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.5, LGRAY);
    doc.text('Wetter: -', ML+2, doc.getY()+5, 7.5, false, DGRAY);
    doc.text('Sonnenaufgang: -', ML+CW*0.35, doc.getY()+5, 7.5, false, DGRAY);
    doc.text('Sonnenuntergang: -', ML+CW*0.68, doc.getY()+5, 7.5, false, DGRAY);
    doc.line2(ML+CW*0.35, doc.getY(), ML+CW*0.35, doc.getY()+7, 0.3, LGRAY);
    doc.line2(ML+CW*0.68, doc.getY(), ML+CW*0.68, doc.getY()+7, 0.3, LGRAY);
    doc.addY(8);

    // ── SZENEN-TABELLE ───────────────────────────────────────────
    const scCols = [
      {w:18,lbl:'Bild\nLicht'},{w:16,lbl:'V-Stopp\nSeiten'},{w:60,lbl:'Motiv / Synopsis'},
      {w:42,lbl:'Rollen'},{w:CW-18-16-60-42,lbl:'Sonstiges'}
    ];
    // Header
    doc.rect(ML, doc.getY(), CW, 9, BG1);
    doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.5, LGRAY);
    let hx = ML;
    scCols.forEach(col => {
      col.lbl.split('\n').forEach((l,li) => doc.text(l, hx+2, doc.getY()+4+li*3.5, 7, true, DGRAY));
      hx += col.w;
      if (hx < W-MR) doc.line2(hx, doc.getY(), hx, doc.getY()+9, 0.3, LGRAY);
    });
    doc.addY(10);

    // Szenen-Zeilen
    scenes.forEach((sc, si) => {
      doc.checkY(14);
      const rowH = Math.max(14, 4 + Math.ceil((sc.synopsis||'').length/35)*3.5);
      if (si%2===0) doc.rect(ML, doc.getY(), CW, rowH, [250,250,252]);
      doc.line2(ML, doc.getY()+rowH, W-MR, doc.getY()+rowH, 0.2, LGRAY);
      const rowY = doc.getY() + 4;
      let rx = ML;
      // Bild/Licht
      doc.text(String(sc.number), rx+2, rowY, 9, true, BLACK);
      doc.text((sc.interior||'')+'/'+(sc.dayNight||''), rx+2, rowY+4, 6.5, false, GRAY);
      rx += scCols[0].w;
      doc.line2(rx, doc.getY(), rx, doc.getY()+rowH, 0.2, LGRAY);
      // V-Stopp/Seiten
      doc.text(sc.vorstopp||'-', rx+2, rowY, 8, true, DGRAY);
      doc.text(sc.pages||'-', rx+2, rowY+4, 7, false, GRAY);
      rx += scCols[1].w;
      doc.line2(rx, doc.getY(), rx, doc.getY()+rowH, 0.2, LGRAY);
      // Motiv/Synopsis
      doc.text(pdfSafe(sc.title||''), rx+2, rowY, 8, true, BLACK);
      doc.text(pdfSafe((sc.interior||'')+(sc.locationTitle?' '+sc.locationTitle:'')), rx+2, rowY+4, 7, false, GRAY);
      if (sc.synopsis) doc.text(pdfSafe(sc.synopsis.slice(0,80)), rx+2, rowY+8, 7, false, DGRAY);
      rx += scCols[2].w;
      doc.line2(rx, doc.getY(), rx, doc.getY()+rowH, 0.2, LGRAY);
      // Rollen
      const scCast = project.cast.filter(p => (p.sceneIds||[]).includes(sc.id)||scenes.some(s=>s.id===sc.id));
      const castNames = project.cast.filter(p => p.days.includes(dayIdx)).slice(0,4);
      castNames.forEach((p,pi) => {
        doc.text(pdfSafe((pi+1)+' - '+(p.role||p.name||'')), rx+2, rowY+pi*3.8, 7, false, DGRAY);
      });
      rx += scCols[3].w;
      doc.line2(rx, doc.getY(), rx, doc.getY()+rowH, 0.2, LGRAY);
      doc.addY(rowH);
    });
    doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.5, BLACK);
    doc.addY(1);
    doc.text('Gesamt: '+scenes.length+' Szenen', ML+2, doc.getY()+4, 7, false, GRAY);
    doc.addY(6);

    // ── DARSTELLER-TABELLE ───────────────────────────────────────
    const dCols = [
      {w:22,lbl:'Rolle'},{w:38,lbl:'Besetzung'},{w:20,lbl:'Abholung'},
      {w:20,lbl:'Ankunft'},{w:22,lbl:'Kostüm'},{w:22,lbl:'Maske'},{w:CW-22-38-20-20-22-22,lbl:'DF/Set'}
    ];
    doc.checkY(30);
    doc.rect(ML, doc.getY(), CW, 7, BG1);
    doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.5, LGRAY);
    let dx = ML;
    dCols.forEach(col => {
      doc.text(pdfSafe(col.lbl), dx+1, doc.getY()+5, 7, true, DGRAY);
      dx += col.w;
      if (dx < W-MR) doc.line2(dx, doc.getY(), dx, doc.getY()+7, 0.3, LGRAY);
    });
    doc.addY(8);
    castAtDay.forEach((p,pi) => {
      doc.checkY(8);
      if (pi%2===1) doc.rect(ML, doc.getY(), CW, 7, BG1);
      doc.line2(ML, doc.getY()+7, W-MR, doc.getY()+7, 0.2, LGRAY);
      let dxr = ML;
      const dvals = [p.role||'', p.name||'', '', '', '', '', ''];
      dvals.forEach((v,vi) => {
        doc.text(pdfSafe(v), dxr+1, doc.getY()+5, 7.5, vi<2, vi<2?BLACK:DGRAY);
        dxr += dCols[vi].w;
        if (dxr < W-MR) doc.line2(dxr, doc.getY(), dxr, doc.getY()+7, 0.2, LGRAY);
      });
      doc.addY(7);
    });
    doc.line2(ML, doc.getY(), W-MR, doc.getY(), 0.5, BLACK);
    doc.addY(4);

    // ── VORDISPO ─────────────────────────────────────────────────
    if (st.showVordispo !== false) {
      const nextDay2 = project.shootDays[dayIdx+1];
      if (nextDay2) {
        doc.checkY(20);
        doc.rect(ML, doc.getY(), CW, 7, DGRAY);
        const ct = (buildGroups(project.shots).find(g => {
          const lk = project.shootDays.find(d=>d.id===g.divider.shootDayId);
          return lk && project.shootDays.indexOf(lk)===dayIdx+1;
        })||{}).divider?.callTime;
        doc.text('VORDISPO - '+(dayIdx+2)+'. Drehtag'+(nextDay2.date?' - '+fmtD(nextDay2.date):'')+(ct?' Call: '+ct:''),
          ML+3, doc.getY()+5.5, 8, true, WHITE);
        doc.addY(8);
        const nextSc = project.scenes.slice(0,3);
        nextSc.forEach(sc => {
          doc.text(pdfSafe('#'+sc.number+' '+sc.title+' ('+sc.interior+')'), ML+3, doc.getY()+4, 7.5, false, DGRAY);
          doc.addY(4.5);
        });
      }
    }

    const pdfStr = buildPdf(doc.pages());
    const tSafe = pdfSafe((st.title||'Dispo')+'-Tag'+(dayIdx+1)).replace(/[^a-zA-Z0-9_-]/g,'_');
    openPdf(pdfStr, tSafe+'.pdf');
  } catch(e) {
    console.error('Dispo PDF error:', e);
    alert('Dispo-PDF fehlgeschlagen:\n'+e.message+'\n'+e.stack);
  } finally {
    if (setExporting) setExporting(false);
  }
}

function exportShotlistPdf(project, mode, setExporting) {
  setExporting(true);
  try {
    const st = project.settings;
    const doc = makeDoc();
    const { W, ML, MR, CW } = doc;

    // Header
    doc.rect(ML, 8, CW, 16, [17,17,28]);
    doc.text(pdfSafe(st.title||"Projekt"), W/2, 16, 14, true, [221,216,208], "center");
    doc.text(pdfSafe(mode==="script" ? "Shotlist Spielreihenfolge" : "Shotlist Drehreihenfolge"),
      W/2, 21.5, 8, false, [140,130,110], "center");
    doc.setY(26);

    // Get shots in correct order
    let shots;
    if (mode === "script") {
      shots = [...project.shots].filter(s => s.type === "shot")
        .sort((a,b) => {
          const sa = project.scenes.find(sc => sc.id === a.scene);
          const sb = project.scenes.find(sc => sc.id === b.scene);
          const na = sa ? (sa.number||0) : 999;
          const nb = sb ? (sb.number||0) : 999;
          if (na !== nb) return na - nb;
          return parseInt(a.shotNum||0) - parseInt(b.shotNum||0);
        });
    } else {
      shots = [...project.shots].filter(s => s.type !== "divider" || s.dividerType === "day")
        .sort((a,b) => (a.shootOrder||0) - (b.shootOrder||0));
    }

    const tCols = [
      {w:12, label:"Shot"}, {w:14, label:"Szene"}, {w:CW-12-14-18-18-30-25, label:"Beschreibung"},
      {w:18, label:"Kamera"}, {w:18, label:"Optik"}, {w:30, label:"Setup/Dreh"}, {w:25, label:"Notizen"}
    ];

    // Table header
    doc.rect(ML, doc.getY(), CW, 7, [30,30,42]);
    let hx = ML;
    tCols.forEach(col => {
      doc.text(col.label, hx+1.5, doc.getY()+5, 7.5, true, [200,180,140]);
      hx += col.w;
    });
    doc.addY(8);

    let lastScene = null;
    shots.forEach((s, si) => {
      if (s.type === "divider") {
        // Day divider
        doc.checkY(10);
        doc.rect(ML, doc.getY(), CW, 7, [20,20,30]);
        const dayNum = project.shootDays.findIndex(d => d.id === s.shootDayId);
        doc.text("DREHTAG " + (dayNum+1) + (s.callTime ? " — Call: " + s.callTime : ""),
          ML+3, doc.getY()+5, 8.5, true, [232,160,32]);
        doc.addY(8);
        return;
      }
      const sc = project.scenes.find(x => x.id === s.scene);
      // Scene divider in script mode
      if (mode === "script" && sc && sc.id !== lastScene) {
        lastScene = sc.id;
        doc.checkY(8);
        doc.rect(ML, doc.getY(), CW, 6, [24,24,36]);
        doc.text(pdfSafe("#" + sc.number + " " + (sc.title||"") + " — " + sc.interior + ". " + (sc.locationTitle||"")),
          ML+3, doc.getY()+4.2, 8, true, [180,170,150]);
        doc.addY(7);
      }
      const rowH = 7;
      doc.checkY(rowH);
      if (si%2===0) doc.rect(ML, doc.getY(), CW, rowH, [252,252,252]);
      doc.line2(ML, doc.getY()+rowH, W-MR, doc.getY()+rowH, 0.2, [200,200,200]);
      let cx = ML;
      doc.text(pdfSafe(s.shotNum||"-"), cx+1.5, doc.getY()+4.8, 8, true, [20,20,20]);
      cx += tCols[0].w;
      doc.text(sc ? String(sc.number) : "-", cx+1.5, doc.getY()+4.8, 8, false, [80,80,80]);
      cx += tCols[1].w;
      const descLines = doc.wrapText(pdfSafe(s.description||""), tCols[2].w-3, 7.5);
      descLines.slice(0,1).forEach((l,i) => doc.text(l, cx+1.5, doc.getY()+4.8+i*3.5, 7.5, false, [20,20,20]));
      cx += tCols[2].w;
      doc.text(pdfSafe(s.camera||"-"), cx+1.5, doc.getY()+4.8, 7, false, [60,60,60]);
      cx += tCols[3].w;
      doc.text(pdfSafe(s.lens||"-"), cx+1.5, doc.getY()+4.8, 7, false, [60,60,60]);
      cx += tCols[4].w;
      doc.text((s.setupMin||0)+"m / "+(s.shootMin||0)+"m", cx+1.5, doc.getY()+4.8, 7, false, [80,80,80]);
      cx += tCols[5].w;
      doc.text(pdfSafe(s.notes||""), cx+1.5, doc.getY()+4.8, 7, false, [100,100,100]);
      doc.addY(rowH);
    });

    const pdfStr = buildPdf(doc.pages());
    const tSafe = pdfSafe(st.title||"Projekt").replace(/[^a-zA-Z0-9_-]/g,"_");
    openPdf(pdfStr, tSafe+"_Shotlist_"+(mode==="script"?"Spielreihenfolge":"Drehreihenfolge")+".pdf");
  } catch(e) {
    alert("Shotlist-PDF fehlgeschlagen:\n"+e.message);
  } finally { setExporting(false); }
}

// ─── Export Drehplan as PDF ───────────────────────────────────────────────────
function exportDrehplanPdf(project, setExporting) {
  if (setExporting) setExporting(true);
  try {
    const st = project.settings;
    const doc = makeDoc();
    const W=210,ML=10,MR=10,CW=W-ML-MR;
    const DGRAY=[50,50,50],GRAY=[120,120,120],BLACK=[0,0,0],WHITE=[255,255,255];
    const BG1=[245,245,245],LGRAY=[200,200,200],ACCENT=[232,160,32];
    const fmtD=d=>{if(!d)return'';try{const dt=new Date(d+'T12:00');const dn=['So','Mo','Di','Mi','Do','Fr','Sa'];return dn[dt.getDay()]+', '+pad(dt.getDate())+'.'+pad(dt.getMonth()+1)+'.'+dt.getFullYear();}catch(e){return d;}};
    const pS=pdfSafe;

    // Besetzungslegende
    const castLegend=project.cast.map((p,i)=>(i+1)+' = '+(p.name||p.role)+(p.role&&p.name?' ('+p.role+')':'')).join('   ');
    if(castLegend){
      doc.text('Besetzung:  '+pS(castLegend),ML,doc.getY()+4,7.5,false,DGRAY);
      doc.addY(6);
    }

    // Header
    const hT=doc.getY();
    doc.rect(ML,hT,CW,22,[255,255,255]);
    doc.line2(ML,hT,W-MR,hT,0.5,GRAY);
    doc.line2(ML,hT+22,W-MR,hT+22,1.5,BLACK);
    doc.text(pS(st.company||''),ML+2,hT+8,11,true,BLACK);
    doc.text(pS(st.title||'Projekt'),W/2,hT+10,16,true,BLACK,'center');
    doc.text('DREHPLAN',W/2,hT+17,8,false,GRAY,'center');
    (st.respPersons||[]).filter(p=>p.value).slice(0,4).forEach((p,i)=>{
      doc.text(pS(p.label)+': '+pS(p.value),W-MR-2,hT+4+i*4.5,7.5,false,DGRAY,'right');
    });
    doc.setY(hT+23);

    // Spalten
    const cols=[{w:16,lbl:'Bild\nLicht'},{w:18,lbl:'V-Stopp\nSeiten'},{w:CW-16-18-48-26,lbl:'Motiv / Inhalt'},{w:48,lbl:'Darsteller'},{w:26,lbl:'Notizen'}];
    doc.rect(ML,doc.getY(),CW,9,BG1);
    doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,LGRAY);
    let hx=ML;
    cols.forEach(col=>{
      col.lbl.split('\n').forEach((l,li)=>doc.text(l,hx+2,doc.getY()+3.5+li*3.5,7,true,DGRAY));
      hx+=col.w;
      if(hx<W-MR)doc.line2(hx,doc.getY(),hx,doc.getY()+9,0.3,LGRAY);
    });
    doc.addY(10);

    // Drehtage
    const groups=buildGroups(project.shots);
    project.shootDays.forEach((day,di)=>{
      doc.checkY(18);
      const grp=groups.find(g=>{const lk=project.shootDays.find(d=>d.id===g.divider.shootDayId);return lk&&project.shootDays.indexOf(lk)===di;});
      const ct=grp?.divider?.callTime;
      const scIds=grp?grp.sceneIds:new Set();
      const daySc=project.scenes.filter(sc=>scIds.has(sc.id));

      // Drehtag-Balken
      doc.rect(ML,doc.getY(),CW,9,DGRAY);
      let dtTxt=(di+1)+'. DREHTAG';
      if(day.date)dtTxt+=' - '+fmtD(day.date);
      if(day.locationTitle)dtTxt+='   Drehort: '+pS(day.locationTitle+(day.locationAddress?' ('+day.locationAddress+')':''));
      doc.text(pS(dtTxt),ML+3,doc.getY()+6.5,8.5,true,WHITE);
      if(ct){
        doc.text('Call: '+ct,W-MR-3,doc.getY()+6.5,8.5,true,ACCENT,'right');
      }

      // Gesamtzeit
      let totMin=0;
      daySc.forEach(sc=>{
        const scMin=project.shots.filter(s=>s.type==='shot'&&s.scene===sc.id).reduce((a,s)=>a+(s.setupMin||0)+(s.shootMin||0),0)||30;
        totMin+=scMin;
      });
      const totH=Math.floor(totMin/60),totM=totMin%60;
      if(totMin>0)doc.text('ca. '+totH+'h '+totM+'min',W-MR-2,doc.getY()+2,7,false,GRAY,'right');
      doc.addY(10);

      // Szenen
      daySc.forEach((sc,si)=>{
        doc.checkY(16);
        const synL=Math.ceil((sc.synopsis||'').length/32);
        const scH=Math.max(16,4+synL*3.5+4);
        if(si%2===1)doc.rect(ML,doc.getY(),CW,scH,BG1);
        doc.line2(ML,doc.getY()+scH,W-MR,doc.getY()+scH,0.2,LGRAY);
        const rY=doc.getY()+4;
        let rx=ML;
        // Bild/Licht
        doc.text(String(sc.number),rx+2,rY,10,true,BLACK);
        doc.text((sc.interior||'INT')+'/'+(sc.dayNight||'T').slice(0,1),rx+2,rY+5,6.5,false,GRAY);
        rx+=cols[0].w;doc.line2(rx,doc.getY(),rx,doc.getY()+scH,0.2,LGRAY);
        // V-Stopp/Seiten
        doc.text(sc.vorstopp||'-',rx+2,rY,8,true,DGRAY);
        doc.text(sc.pages||'-',rx+2,rY+5,7,false,GRAY);
        rx+=cols[1].w;doc.line2(rx,doc.getY(),rx,doc.getY()+scH,0.2,LGRAY);
        // Motiv
        doc.text(pS(sc.title||''),rx+2,rY,8.5,true,BLACK);
        doc.text(pS((sc.interior||'INT')+'. '+(sc.locationTitle||'').slice(0,40)),rx+2,rY+4.5,7,false,GRAY);
        if(sc.synopsis)doc.text(pS(sc.synopsis.slice(0,80)),rx+2,rY+8.5,7,false,DGRAY);
        rx+=cols[2].w;doc.line2(rx,doc.getY(),rx,doc.getY()+scH,0.2,LGRAY);
        // Darsteller
        project.cast.filter(p=>p.days.includes(di)).slice(0,5).forEach((p,pi)=>{
          doc.text(pS((p.name||p.role||'')),rx+2,rY+pi*4,7.5,false,DGRAY);
        });
        rx+=cols[3].w;doc.line2(rx,doc.getY(),rx,doc.getY()+scH,0.2,LGRAY);
        // Notizen
        if(sc.notes)doc.text(pS(sc.notes.slice(0,30)),rx+2,rY,7,false,GRAY);
        doc.addY(scH);
      });

      if(daySc.length===0){doc.text('Keine Szenen',ML+3,doc.getY()+5,8,false,GRAY);doc.addY(8);}
      doc.addY(3);
    });

    // Fußzeile
    doc.checkY(10);
    doc.line2(ML,doc.getY(),W-MR,doc.getY(),0.5,LGRAY);
    doc.addY(2);
    const summary=project.shootDays.map((d,i)=>(i+1)+'. DT: '+(d.date?fmtD(d.date):'TBD')).join('   ');
    doc.text(pS(summary),ML+2,doc.getY()+4,7,false,GRAY);

    const pdfStr=buildPdf(doc.pages());
    openPdf(pdfStr,pS(st.title||'Drehplan').replace(/[^a-zA-Z0-9_-]/g,'_')+'_Drehplan.pdf');
  }catch(e){
    console.error('Drehplan PDF error:',e);
    alert('Drehplan-PDF fehlgeschlagen:\n'+e.message);
  }finally{
    if(setExporting)setExporting(false);
  }
}

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T12:00:00");
  return WEEKDAYS[dt.getDay()] + ", " + pad(dt.getDate()) + "." + pad(dt.getMonth() + 1) + "." + dt.getFullYear();
}
function fmtDateShort(d) {
  if (!d) return "";
  const dt = new Date(d + "T12:00:00");
  return pad(dt.getDate()) + "." + pad(dt.getMonth() + 1) + "." + dt.getFullYear();
}
function minToTime(m) { const t = Math.max(0, m); return pad(Math.floor(t / 60) % 24) + ":" + pad(t % 60); }
function timeToMin(t) { if (!t) return 480; const [h, m] = t.split(":").map(Number); return h * 60 + m; }

// ─── Helpers ──────────────────────────────────────────────────────────────────
// Build ordered list of "scene segments" per day.
// A segment = consecutive run of shots from same scene within a day-block.
// Returns: Map<dayDividerId, [{sceneId, segmentIndex, shotIds, setup, shoot}]>
// Also returns sceneSegmentLabel(dayId, sceneId, segmentIndex) -> "Szene #N" or "Szene #N.K"
function buildSceneSegments(shots) {
  const sorted = [...shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0));
  // dayBlocks: [{dayId, items}]
  const dayBlocks = [];
  let cur = null;
  sorted.forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") {
      cur = { dayId: s.id, items: [] };
      dayBlocks.push(cur);
    } else if (cur) {
      cur.items.push(s);
    }
  });

  // Per day, find segments (consecutive runs of same scene)
  // segMap: dayId -> [{sceneId, shotIds, setup, shoot}]
  const segMap = {};
  // Also track how many segments exist per scene across all days (for split label)
  const sceneSegCount = {}; // sceneId -> total segment count across all days

  dayBlocks.forEach(({ dayId, items }) => {
    const segs = [];
    let lastSceneId = null;
    items.forEach(s => {
      if (s.type !== "shot" || s.hidden || !s.scene) return;
      if (s.scene !== lastSceneId) {
        segs.push({ sceneId: s.scene, shotIds: [], setup: 0, shoot: 0 });
        lastSceneId = s.scene;
      }
      const seg = segs[segs.length - 1];
      seg.shotIds.push(s.id);
      seg.setup += s.setupMin || 0;
      seg.shoot += s.shootMin || 0;
    });
    segMap[dayId] = segs;
    segs.forEach(seg => {
      sceneSegCount[seg.sceneId] = (sceneSegCount[seg.sceneId] || 0) + 1;
    });
  });

  // Assign segment index per scene (global, in order of appearance)
  const sceneSegIdx = {}; // sceneId -> next index
  dayBlocks.forEach(({ dayId }) => {
    (segMap[dayId] || []).forEach(seg => {
      if (sceneSegCount[seg.sceneId] > 1) {
        if (sceneSegIdx[seg.sceneId] === undefined) sceneSegIdx[seg.sceneId] = 1;
        seg.part = sceneSegIdx[seg.sceneId]++;
      } else {
        seg.part = null;
      }
    });
  });

  return { segMap, sceneSegCount };
}

  const [over, setOver] = useState(null);
  const onStart = id => { from.current = id; };
  const onOver = (e, id) => { e.preventDefault(); setOver(id); };
  const onDrop = toId => {
    if (!from.current || from.current === toId) { setOver(null); return; }
    const arr = [...items];
    const fi = arr.findIndex(x => x.id === from.current);
    const ti = arr.findIndex(x => x.id === toId);
    const [item] = arr.splice(fi, 1);
    arr.splice(ti, 0, item);
    setItems(arr);
    from.current = null; setOver(null);
  };
  const onEnd = () => { from.current = null; setOver(null); };
  return { onStart, onOver, onDrop, onEnd, over };
}

function Dashboard({ projects, onSelect, onNew, onDelete, onDemo, onExport, onImport, onArchive, showArchive, setShowArchive, isSignedIn, onSignIn, firebaseReady }) {

  const [name, setName] = useState("");
  const [menuOpen, setMenuOpen] = useState(null);
  const active = projects.filter(p => !p.archived);
  const archived = projects.filter(p => p.archived);
  const shown = showArchive ? archived : active;
  const fmtRelTime = ts => {
    if (!ts) return "";
    const diff = Date.now() - ts;
    const min = Math.floor(diff/60000);
    if (min < 2) return "gerade eben";
    if (min < 60) return "vor " + min + " Min.";
    const h = Math.floor(min/60);
    if (h < 24) return "vor " + h + " Std.";
    const d = Math.floor(h/24);
    if (d < 7) return "vor " + d + " Tag" + (d>1?"en":"");
    return new Date(ts).toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"2-digit"});
  };
  return (
    <div onClick={() => setMenuOpen(null)}>
      <div style={{ ...S.row, marginBottom: 22, flexWrap: "wrap", gap: 10 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>{showArchive ? "Archiv" : "Meine Projekte"}</h1>

          <div key={p.id} style={{ ...S.card, marginBottom: 0, cursor: "pointer", position: "relative", paddingBottom: 14 }}

            <div style={{ fontSize: 9, color: C.accent, textTransform: "uppercase", letterSpacing: "0.16em", marginBottom: 6 }}>
              {showArchive ? <span style={{ color: "#806000" }}>Archiviert</span> : (p.settings?.projektArt || "Projekt")}
            </div>
            <div style={{ fontSize: 17, marginBottom: 6 }}>{p.name}</div>
            <div style={{ fontSize: 11, color: C.dim }}>{p.shootDays.length} Drehtage  {p.shots.filter(s => s.type !== "divider").length} Shots  {p.scenes.length} Szenen</div>
            {p.lastEdited && <div style={{ fontSize: 10, color: "#444", marginTop: 5 }}>Zuletzt: {fmtRelTime(p.lastEdited)}</div>}

              <button style={{ ...S.btn(), padding: "1px 8px", fontSize: 16, lineHeight: 1 }}

                <div style={{ position: "absolute", right: 0, top: 28, background: C.card, border: "1px solid "+C.border, borderRadius: 6, zIndex: 100, minWidth: 150, boxShadow: "0 4px 20px #0009" }}>
                  {[
                    { label: "Exportieren", fn: () => { onExport(p); setMenuOpen(null); } },
                    { label: p.archived ? "Wiederherstellen" : "Archivieren", fn: () => { onArchive(p.id, !p.archived); setMenuOpen(null); } },
                    { label: "Loeschen", fn: () => { onDelete(p.id); setMenuOpen(null); }, danger: true },

// ─── Overview ─────────────────────────────────────────────────────────────────
function Overview({ project }) {
  const shots = project.shots.filter(s => s.type === "shot");
  const dividers = project.shots.filter(s => s.type === "divider");
  const dayDivs = dividers.filter(s => s.dividerType === "day");
  const totalSetup = shots.reduce((s, x) => s + (x.setupMin || 0), 0);
  const totalShoot = shots.reduce((s, x) => s + (x.shootMin || 0), 0);
  const totalMin = totalSetup + totalShoot;
  // Pages (parse "2 3/8" format)
  const parsePage = p => {
    if (!p) return 0;
    const parts = p.trim().split(" ");
    let v = 0;
    parts.forEach(pt => {
      if (pt.includes("/")) { const [a, b] = pt.split("/").map(Number); v += a / b; }
      else { v += parseFloat(pt) || 0; }
    });
    return v;
  };
  const totalPages = project.scenes.reduce((s, sc) => s + parsePage(sc.pages), 0);
  const pagesStr = totalPages > 0 ? Math.floor(totalPages) + " " + Math.round((totalPages % 1) * 8) + "/8" : "0";
  // Vorstopp
  const latestVorstopp = project.scenes.filter(sc => sc.vorstopp).sort((a, b) => b.vorstopp.localeCompare(a.vorstopp))[0]?.vorstopp || "-";
  // Unassigned
  const shotInDay = new Set();
  let inD = false;
  [...project.shots].sort((a, b) => (a.shootOrder ?? 0) - (b.shootOrder ?? 0)).forEach(s => {
    if (s.type === "divider" && s.dividerType === "day") { inD = true; return; }
    if (s.type === "shot" && inD) shotInDay.add(s.id);
  });
  const unassigned = shots.filter(s => !shotInDay.has(s.id)).length;

  const Stat = ({ label, value, sub, accent }) => (
    <div style={{ background: C.card, border: "1px solid " + C.border, borderRadius: 6, padding: "18px 20px" }}>
      <div style={{ fontSize: 10, color: C.dim, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 6 }}>{label}</div>
      <div style={{ fontSize: 26, fontWeight: 400, color: accent ? C.accent : C.text }}>{value}</div>
      {sub && <div style={{ fontSize: 11, color: C.mid, marginTop: 4 }}>{sub}</div>}
    </div>
  );

  return (
    <div>
      <h1 style={S.h1}>Projektubersicht</h1>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(180px,1fr))", gap: 12, marginBottom: 20 }}>
        <Stat label="Drehtage" value={project.shootDays.length} sub={dayDivs.length > 0 ? dayDivs.length + " in Shotlist eingetragen" : "noch keine in Shotlist"} />
        <Stat label="Szenen" value={project.scenes.length} />
        <Stat label="Shots gesamt" value={shots.length} sub={unassigned > 0 ? unassigned + " nicht zugeordnet" : "alle zugeordnet"} accent={unassigned > 0} />
        <Stat label="Seiten gesamt" value={pagesStr} />
        <Stat label="Geplante Drehzeit" value={Math.floor(totalMin / 60) + "h " + (totalMin % 60) + "m"} sub={"Aufbau: " + totalSetup + "m  Dreh: " + totalShoot + "m"} />
        <Stat label="Crew" value={project.crew.length} />
        <Stat label="Cast" value={project.cast.length} />
        <Stat label="Letzter Vorstopp" value={latestVorstopp} />
      </div>

      {/* Drehtage summary */}
      {project.shootDays.length > 0 && (
        <div style={S.card}>
          <div style={S.ct}>Drehtage im Ueberblick</div>
          <table style={S.tbl}>
            <thead><tr>{["Tag", "Datum", "Location", "Call", "Anmerkungen"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {project.shootDays.map((d, i) => (
                <tr key={d.id}>
                  <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>{i + 1}</td>
                  <td style={S.td}>{d.date ? fmtDate(d.date) : "-"}</td>
                  <td style={S.td}>{d.locationTitle || d.location || "-"}{d.locationAddress ? " (" + d.locationAddress + ")" : ""}</td>
                  <td style={S.td}>{d.callTime || "-"}</td>
                  <td style={{ ...S.td, color: C.mid, fontSize: 11 }}>{d.notes || "-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {/* Scenes summary */}
      {project.scenes.length > 0 && (
        <div style={S.card}>
          <div style={S.ct}>Szenen im Ueberblick</div>
          <table style={S.tbl}>
            <thead><tr>{["#", "Titel", "INT/EXT", "Location", "Tageszeit", "Seiten", "Vorstopp", "Synopsis"].map(h => <th key={h} style={S.th}>{h}</th>)}</tr></thead>
            <tbody>
              {project.scenes.map(sc => (
                <tr key={sc.id}>
                  <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>#{sc.number}</td>
                  <td style={S.td}>{sc.title || "-"}</td>
                  <td style={S.td}>{sc.interior}</td>
                  <td style={S.td}>{sc.locationTitle || sc.location || "-"}</td>
                  <td style={S.td}>{sc.dayNight}</td>
                  <td style={S.td}>{sc.pages || "-"}</td>
                  <td style={{ ...S.td, color: sc.vorstopp ? C.accent : C.dim }}>{sc.vorstopp || "-"}</td>
                  <td style={{ ...S.td, color: C.mid, fontSize: 11 }}>{sc.synopsis || "-"}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ─── Settings ─────────────────────────────────────────────────────────────────
function Settings({ project, onChange }) {
  const s = project.settings;
  const set = (k, v) => onChange({ ...project, settings: { ...s, [k]: v } });
  const updateCount = n => {
    const count = Math.max(1, Math.min(60, Number(n)));
    let days = [...project.shootDays];
    while (days.length < count) days.push({ id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" });
    onChange({ ...project, shootDays: days.slice(0, count) });
  };

  // Responsible persons for Dispo header (configurable list)
  const respPersons = s.respPersons || [
    { id: "rp1", label: "Produzent/in",       value: "" },
    { id: "rp2", label: "Produktionsleitung", value: "" },
    { id: "rp3", label: "Regie",              value: "" },
    { id: "rp4", label: "Kamera",             value: "" },
    { id: "rp5", label: "Szenenbild",         value: "" },
    { id: "rp6", label: "Kostümbild",        value: "" },
  ];
  const setResp = (id, patch) => set("respPersons", respPersons.map(p => p.id === id ? { ...p, ...patch } : p));
  const addResp = () => set("respPersons", [...respPersons, { id: uid(), label: "", value: "" }]);
  const remResp = id => set("respPersons", respPersons.filter(p => p.id !== id));

  return (
    <div>
      <h1 style={S.h1}>Projekteinstellungen</h1>
      <div style={S.card}>
        <div style={S.ct}>Allgemein</div>
        <div style={S.g2}>
          <Inp label="Projekttitel"     value={s.title}   onChange={v => set("title", v)} />
          <Inp label="Produktionsfirma" value={s.company} onChange={v => set("company", v)} />
        </div>
        <div style={S.g3}>
          <FG label="Projekt-Art">
            {(() => {
              const ARTEN = ["Spielfilm","Kurzfilm","Dokumentarfilm","Musikvideo","Werbung","Corporate Video","Imagefilm","Webserie"];
              const isCustom = s.projektArt && !ARTEN.includes(s.projektArt);
              return (
                <>
                  <select style={{ ...S.input, marginBottom: isCustom ? 6 : 0 }}
                    value={isCustom ? "__custom__" : (s.projektArt || "Spielfilm")}
                    onChange={e => {
                      if (e.target.value === "__custom__") set("projektArt", "");
                      else set("projektArt", e.target.value);
                    }}>
                    {ARTEN.map(v => <option key={v} value={v}>{v}</option>)}
                    <option value="__custom__">Sonstiges / Eigene...</option>
                  </select>
                  {isCustom && (
                    <input style={S.input} placeholder="Eigene Bezeichnung eingeben..." value={s.projektArt || ""}
                      onChange={e => set("projektArt", e.target.value)} autoFocus />
                  )}
                </>
              );
            })()}
          </FG>
          <FG label="Logo hochladen" tip="Wird in der Dispo statt dem Firmennamen angezeigt">
            <input type="file" accept="image/*" style={{ ...S.input, cursor: "pointer" }}
              onChange={e => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => set("logo", ev.target.result);
                reader.readAsDataURL(file);
              }} />
          </FG>
          <FG label="Logo entfernen">
            {s.logo ? (
              <div>
                <img src={s.logo} style={{ height: 36, objectFit: "contain", marginBottom: 6, display: "block" }} alt="Logo" />
                <button style={S.btn("danger")} onClick={() => set("logo", "")}>Logo entfernen</button>
              </div>
            ) : <span style={{ fontSize: 11, color: C.dim }}>Kein Logo hochgeladen</span>}
          </FG>
        </div>

      </div>
      <div style={S.card}>
        <div style={S.ct}>Drehtage</div>
        <div style={S.row}>
          <label style={{ ...S.lbl, marginBottom: 0, width: 160 }}>Anzahl Drehtage</label>
          <input style={{ ...S.input, width: 80 }} type="number" min={1} max={60} value={project.shootDays.length} onChange={e => updateCount(e.target.value)} />
          <span style={{ fontSize: 11, color: C.dim }}>Details im Tab "Drehtage"</span>
        </div>
      </div>
      <div style={S.card}>
        <div style={{ ...S.row, marginBottom: 14 }}>
          <span style={{ ...S.ct, marginBottom: 0 }}>Verantwortliche</span>
          <button style={S.btn("xs")} onClick={addResp}>+ Hinzufuegen</button>
        </div>

        {respPersons.map((p, i) => (
          <div key={p.id} style={{ ...S.row, marginBottom: 8 }}>
            <input style={{ ...S.input, width: 140, flex: "none" }} value={p.label} placeholder="Bezeichnung" onChange={e => setResp(p.id, { label: e.target.value })} />

// ─── Drehtage ─────────────────────────────────────────────────────────────────
function ShootDays({ project, onChange }) {
  const drag = useDrag(project.shootDays, days => onChange({ ...project, shootDays: days }));
  const upd = (i, patch) => {
    const days = [...project.shootDays];
    days[i] = { ...days[i], ...patch };
    const updatedShots = project.shots.map(s =>
      s.type === "divider" && s.dividerType === "day" && s.shootDayId === days[i].id && patch.callTime
        ? { ...s, callTime: patch.callTime } : s
    );
    onChange({ ...project, shootDays: days, shots: updatedShots });
  };
  const add = () => onChange({ ...project, shootDays: [...project.shootDays, { id: uid(), date: "", locationTitle: "", locationAddress: "", callTime: "07:00", notes: "" }] });
  const remove = i => onChange({ ...project, shootDays: project.shootDays.filter((_, j) => j !== i) });
  return (
    <div>
      <div style={{ ...S.row, marginBottom: 20 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Drehtage</h1>
        <button style={S.btn("primary")} onClick={add}><Icon name="plus" size={13} /> Drehtag</button>
      </div>
      {project.shootDays.map((day, i) => (
        <div key={day.id} draggable onDragStart={() => drag.onStart(day.id)} onDragOver={e => drag.onOver(e, day.id)} onDrop={() => drag.onDrop(day.id)} onDragEnd={drag.onEnd}
          style={{ ...S.card, marginBottom: 10, cursor: "grab", opacity: drag.over === day.id ? 0.5 : 1 }}>
          <div style={S.row}>
            <span style={{ color: C.dim }}><Icon name="drag" /></span>
            <span style={{ ...S.badge, flexShrink: 0 }}>Tag {i + 1}</span>
            <div style={{ flex: 1 }}>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14 }}>
                <FG label="Datum"><input style={S.input} type="date" value={day.date} onChange={e => upd(i, { date: e.target.value })} /></FG>
                <Inp label="Location (Titel)" value={day.locationTitle || ""} onChange={v => upd(i, { locationTitle: v })} placeholder="z.B. Studio Berlin" />
                <Inp label="Location (Adresse)" value={day.locationAddress || ""} onChange={v => upd(i, { locationAddress: v })} placeholder="Musterstr. 12, Berlin" />
                <FG label="Call Time" tip="Wird mit Shotlist synchronisiert">
                  <input style={S.input} type="time" value={day.callTime} onChange={e => upd(i, { callTime: e.target.value })} />
                </FG>
              </div>
              <FG label="Anmerkungen"><textarea style={S.ta} rows={2} value={day.notes} placeholder="Interne Notizen..." onChange={e => upd(i, { notes: e.target.value })} /></FG>
            </div>
            {project.crew.filter(p=>p.days.includes(i)).length + project.cast.filter(p=>p.days.includes(i)).length > 0 && (
              <div style={{ fontSize: 10, color: C.dim, marginTop: 4, display: "flex", gap: 14 }}>
                <span>Crew: <strong style={{ color: C.mid }}>{project.crew.filter(p=>p.days.includes(i)).length}</strong></span>
                <span>Cast: <strong style={{ color: C.mid }}>{project.cast.filter(p=>p.days.includes(i)).length}</strong></span>
                <span>Gesamt: <strong style={{ color: C.accent }}>{project.crew.filter(p=>p.days.includes(i)).length + project.cast.filter(p=>p.days.includes(i)).length}</strong> Personen</span>
              </div>
            )}
            <button style={S.btn("danger")} onClick={() => remove(i)}><Icon name="trash" size={13} /></button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── PersonTable ──────────────────────────────────────────────────────────────
function PersonTable({ type, list, shootDays, onChange }) {
  const drag = useDrag(list, onChange);
  const add = () => onChange([...list, { id: uid(), name: "", role: type === "crew" ? "Position" : "Figur", days: [] }]);
  const upd = (id, patch) => onChange(list.map(p => p.id === id ? { ...p, ...patch } : p));
  const rem = id => onChange(list.filter(p => p.id !== id));
  const toggleDay = (person, di) => { const days = person.days.includes(di) ? person.days.filter(d => d !== di) : [...person.days, di]; upd(person.id, { days }); };
  const allDays = person => { const all = shootDays.map((_, i) => i); upd(person.id, { days: all.every(i => person.days.includes(i)) ? [] : all }); };
  return (
    <div style={S.card}>
      <div style={{ ...S.row, marginBottom: 14 }}>
        <span style={{ ...S.ct, marginBottom: 0 }}>{type === "crew" ? "Crew" : "Cast"}</span>
        <button style={S.btn()} onClick={add}><Icon name="plus" size={13} /> Hinzufuegen</button>
      </div>
      <div style={{ overflowX: "auto" }}>
        <table style={S.tbl}>
          <thead><tr>
            <th style={S.th} /><th style={S.th}>#</th><th style={S.th}>Name</th>
            <th style={S.th}>{type === "crew" ? "Position" : "Rolle / Figur"}</th>
            {shootDays.map((d, i) => (<th key={i} style={{ ...S.th, textAlign: "center" }}>{d.date ? pad(new Date(d.date + "T12:00").getDate()) + "." + pad(new Date(d.date + "T12:00").getMonth() + 1) : "T" + i + 1}</th>))}
            <th style={S.th}>Alle</th><th style={S.th} />
          </tr></thead>
          <tbody>
            {list.map((p, idx) => (
              <tr key={p.id} draggable onDragStart={() => drag.onStart(p.id)} onDragOver={e => drag.onOver(e, p.id)} onDrop={() => drag.onDrop(p.id)} onDragEnd={drag.onEnd}
                style={{ background: drag.over === p.id ? C.hover : "transparent", cursor: "grab" }}>
                <td style={{ ...S.td, color: C.dim }}><Icon name="drag" /></td>
                <td style={{ ...S.td, color: C.accent, fontWeight: 700 }}>{idx + 1}</td>
                <td style={S.td}><input style={{ ...S.input, padding: "4px 8px", minWidth: 120 }} value={p.name} placeholder="Name" onChange={e => upd(p.id, { name: e.target.value })} /></td>
                <td style={S.td}><input style={{ ...S.input, padding: "4px 8px", minWidth: 120 }} value={p.role} placeholder="Position" onChange={e => upd(p.id, { role: e.target.value })} /></td>
                {shootDays.map((_, i) => (<td key={i} style={{ ...S.td, textAlign: "center" }}><input type="checkbox" checked={p.days.includes(i)} onChange={() => toggleDay(p, i)} style={{ accentColor: C.accent, width: 14, height: 14 }} /></td>))}
                <td style={{ ...S.td, textAlign: "center" }}><button style={S.btn("xs")} onClick={() => allDays(p)}>{shootDays.every((_, i) => p.days.includes(i)) ? "- Alle" : "+ Alle"}</button></td>

function CastCrew({ project, onChange }) {
  // Wenn Crew-Liste sich ändert: Namen zurück in settings.respPersons schreiben
  const onCrewChange = (newCrewList) => {
    const resp = project.settings.respPersons;
    if (!resp) { onChange({ ...project, crew: newCrewList }); return; }
    // Baue Map: Rolle -> Name aus neuer Crew-Liste
    const crewMap = {};
    newCrewList.forEach(c => { if (c.role) crewMap[c.role] = c.name || ""; });
    // Update respPersons: wenn Label in Crew vorkommt, Name übernehmen
    const newResp = resp.map(p => {
      if (p.label && crewMap[p.label] !== undefined) return { ...p, value: crewMap[p.label] };
      return p;
    });
    onChange({ ...project, crew: newCrewList, settings: { ...project.settings, respPersons: newResp } });
  };
  return (<div><h1 style={S.h1}>Cast & Crew</h1>
    <PersonTable type="crew" list={project.crew} shootDays={project.shootDays} onChange={onCrewChange} />
    <PersonTable type="cast" list={project.cast} shootDays={project.shootDays} onChange={list => onChange({ ...project, cast: list })} />

}

  const daySummary = project.shootDays.map((d, di) => {

          <tbody>

              <tr key={s.dayIdx}>

                <td style={{ ...S.td, fontWeight: 700 }}>{s.total}</td>
                <td style={{ ...S.td, color: "#c05030" }}>{s.fleisch || "-"}</td>

      {["Crew", "Cast"].flatMap(group => {

        return [(
