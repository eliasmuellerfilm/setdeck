                          <div>{sc.vorstopp || "-"}</div>
                          <div style={{ fontSize: 10, color: "#555" }}>{sc.pages || "-"}</div>
                        </td>
                        <td style={tS}>
                          <div style={{ fontWeight: 700 }}>{sc.title || "-"}</div>
                          <div style={{ color: "#555", fontSize: 10 }}>{sc.interior}. {sc.locationTitle || sc.location || "-"}</div>
                          {sc.synopsis && <div style={{ color: "#777", fontSize: 10, marginTop: 1 }}>{sc.synopsis}</div>}
                        
                        </td>
                        <td style={{ ...tS, fontSize: 10 }}>
                          {(() => {
                            // Unique roles for this scene, sorted by Cast&Crew order
                            const allRoles = [...new Set((project.cast||[]).map(p=>p.role).filter(Boolean))];
                            const sceneRoles = sc.castRoles && sc.castRoles.length > 0
                              ? sc.castRoles
                              : [...new Set(project.cast.filter(ca=>ca.days.includes(dayIdx)).map(ca=>ca.role))];
                            const sorted = allRoles.filter(r => sceneRoles.includes(r));
                            return sorted.map(role => {
                              const num = allRoles.indexOf(role) + 1;
                              return (
                                <div key={role} style={{ whiteSpace:'nowrap' }}>
                                  <span style={{ color:"#aaa", marginRight:3 }}>{num} -</span>
                                  <span style={{ fontWeight:600 }}>{role}</span>
                                </div>
                              );
                            });
                          })()}
                        </td>
                        <td style={{ ...tS, fontSize: 10, color: "#666" }}>{sc.notes || ""}</td>
                      </tr>
                    );
                  });
                }
                return rows;
              })}
            </tbody>
          </table>
          <div style={{ padding: "5px 14px", borderTop: "2px solid #ccc", display: "flex", gap: 20, flexWrap: "wrap", fontSize: 10, color: "#555" }}>
            {groups.map((g, gi) => {
              const sd = project.shootDays.find(d => d.id === g.divider.shootDayId) || project.shootDays[gi];
              return <span key={gi}><strong>{gi + 1}. DT:</strong> {sd?.date ? fmtDate(sd.date) : "TBD"}</span>;
            })}
          </div>
        </div>
      )}
    </div>
  );
}

    rows: table.rows.map((row,r) => r===ri ? row.map((cell,c2) => c2===ci ? val : cell) : row) });
  const updHeader = (ci, val) => onChange({ ...table,
    headers: table.headers.map((h,i) => i===ci ? val : h) });

                <input style={{ border:"none", background:"transparent", fontSize:10,

                  onChange={e => updHeader(ci+1, e.target.value)} />

function FahrdispoTable({ data, onChange, crew = [] }) {
  const addRow = (preset) => onChange([...data, { id: uid(), fahrer: "", abholungVon: "", abfahrt: "", von: "", ankunft: "", an: "", ...(preset || {}) }]);
  const upd = (id, patch) => onChange(data.map(r => r.id === id ? { ...r, ...patch } : r));
  const rem = id => onChange(data.filter(r => r.id !== id));
  const hasData = data.length > 0;

  // Helper: parse "HH:MM" to minutes
  const toMin = t => { if (!t) return null; const p = t.split(":"); return parseInt(p[0])*60 + parseInt(p[1]||0); };

  // Sort rows: first group by fahrer (stable), within fahrer by Abfahrt
  // We keep original fahrer order (first appearance), within each fahrer sort by time
  const fahrerOrder = [];
  data.forEach(r => { if (!fahrerOrder.includes(r.fahrer || "_")) fahrerOrder.push(r.fahrer || "_"); });
  const sorted = [...data].sort((a, b) => {
    const ka = a.fahrer || "_"; const kb = b.fahrer || "_";
    const oa = fahrerOrder.indexOf(ka); const ob = fahrerOrder.indexOf(kb);
    if (oa !== ob) return oa - ob;
    const ta = toMin(a.abfahrt) ?? 9999; const tb = toMin(b.abfahrt) ?? 9999;
    return ta - tb;
  });

  // Build rowspan map per fahrer KEY (not per fahrer name, to handle duplicates)
  // A "fahrer group" = consecutive block of same fahrer in sorted order
  // We need to assign group IDs so that re-sorted rows stay stable
  const groups = [];
  sorted.forEach(r => {
    const key = r.fahrer ? r.fahrer : ("__solo__"+r.id); // empty fahrer = own group
    if (!groups.length || groups[groups.length-1].key !== key) {
      groups.push({ key, ids: [r.id] });
    } else {
      groups[groups.length-1].ids.push(r.id);
    }
  });
  // Map row id -> { showCell, span }
  const cellMap = {};
  groups.forEach(g => {
    g.ids.forEach((id, i) => { cellMap[id] = { showCell: i === 0, span: g.ids.length, key: g.key }; });
  });

  // Overlap detection: for each fahrer group, check if any two trips overlap
  // Trip overlaps if abfahrtA < ankunftB AND abfahrtB < ankunftA
  const overlapIds = new Set();
  groups.forEach(g => {
    const trips = g.ids.map(id => sorted.find(r => r.id === id)).filter(Boolean);
    for (let i = 0; i < trips.length; i++) {
      for (let j = i+1; j < trips.length; j++) {
        const a = trips[i]; const b = trips[j];
        const abfA = toMin(a.abfahrt); const ankA = toMin(a.ankunft);
        const abfB = toMin(b.abfahrt); const ankB = toMin(b.ankunft);
        if (abfA !== null && ankA !== null && abfB !== null && ankB !== null) {
          if (abfA < ankB && abfB < ankA) {
            overlapIds.add(a.id); overlapIds.add(b.id);
          }
        }
      }
    }
  });

  const colS = { border: "1px solid #bbb", padding: "5px 8px", verticalAlign: "middle", fontSize: 10 };
  const thC = { ...colS, background: "#ddd", fontWeight: 700, fontSize: 10 };
  const eI = { border: "none", background: "transparent", fontSize: 10, fontFamily: "inherit", padding: "1px 2px", width: "100%", outline: "none", color: "#111" };

  return (
    <div style={{ borderTop: "8px solid #f0f0f0" }}>
      {/* Title */}
      <div style={{ background: "#eee", padding: "5px 12px", fontWeight: 700, fontSize: 11, borderBottom: "1px solid #bbb", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>Fahrdispo</span>
        <span className="no-print" style={{ fontSize: 9, fontWeight: 400, color: "#888", cursor: "pointer", textDecoration: "underline" }} onClick={() => addRow()}>+ Fahrt hinzufuegen</span>
      </div>
      {hasData ? (
        <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "1px solid #999" }}>
          <thead>
            <tr style={{ background: "#ddd" }}>
              <th style={{ ...thC, width: "12%" }}>Fahrer</th>
              <th style={{ ...thC, width: "16%" }}>Abholung von</th>
              <th style={{ ...thC, width: "9%", textAlign: "center" }}>Abfahrt</th>
              <th style={{ ...thC, width: "20%" }}>von</th>
              <th style={{ ...thC, width: "9%", textAlign: "center" }}>Ankunft</th>
              <th style={{ ...thC }}>an</th>
              <th style={{ ...thC, width: 28 }} className="no-print"></th>
            </tr>
          </thead>
          <tbody>
            {sorted.map(r => {
              const cell = cellMap[r.id];
              const isOverlap = overlapIds.has(r.id);
              const rowBg = isOverlap ? "#fff5f5" : "transparent";
              return (
                <tr key={r.id} style={{ borderBottom: "1px solid #eee", background: rowBg }}>
                  {cell.showCell && (
                    <td style={{ ...colS, fontWeight: 600, verticalAlign: "middle" }} rowSpan={cell.span}>
                      {(() => {
                        // Sort crew: isDriver+vehicle first, then isDriver, then vehicle, then rest
                        const sortedCrew = [...crew].sort((a, b) => {
                          const isDriverA = (a.role||'').toLowerCase().includes('fahrer');
                          const isDriverB = (b.role||'').toLowerCase().includes('fahrer');
                          const scoreA = (isDriverA && a.vehicle ? 3 : isDriverA ? 2 : a.vehicle ? 1 : 0);
                          const scoreB = (isDriverB && b.vehicle ? 3 : isDriverB ? 2 : b.vehicle ? 1 : 0);
                          return scoreB - scoreA;
                        });
                        const driverId = "fahrer-list-"+r.id;
                        return (
                          <>
                            <input style={eI} value={r.fahrer} placeholder="Name (Freitext oder auswählen)"
                              list={driverId}
                              onChange={e => {
                                const newFahrer = e.target.value;
                                onChange(data.map(row => {
                                  if (cell.key.startsWith('__solo__')) {
                                    return row.id === r.id ? { ...row, fahrer: newFahrer } : row;
                                  }
                                  const rkey = row.fahrer || '';
                                  return rkey === cell.key ? { ...row, fahrer: newFahrer } : row;
                                }));
                              }} />
                            <datalist id={driverId}>
                              {sortedCrew.filter(p => p.name).map(p => (
                                <option key={p.id} value={p.name}>
                                  {p.vehicle ? p.name+" ("+p.vehicle+")" : p.name}
                                </option>
                              ))}
                            </datalist>
                          </>
                        );
                      })()}
                    </td>
                  )}
                  <td style={colS}><input style={eI} value={r.abholungVon} placeholder="Wen abholen?" onChange={e => upd(r.id, { abholungVon: e.target.value })} /></td>
                  <td style={{ ...colS, textAlign: "center" }}>
                    <input style={{ ...eI, textAlign: "center", color: isOverlap ? "#c03030" : "#111" }} value={r.abfahrt} placeholder="--:--" onChange={e => upd(r.id, { abfahrt: e.target.value })} />
                  </td>
                  <td style={colS}><textarea style={{...eI, resize:"vertical", minHeight:32, fontFamily:"inherit", lineHeight:1.4}} value={r.von} placeholder="Adresse" onChange={e => upd(r.id, { von: e.target.value })} /></td>
                  <td style={{ ...colS, textAlign: "center" }}>
                    <input style={{ ...eI, textAlign: "center", color: isOverlap ? "#c03030" : "#111" }} value={r.ankunft} placeholder="--:--" onChange={e => upd(r.id, { ankunft: e.target.value })} />
                  </td>
                  <td style={colS}><textarea style={{...eI, resize:"vertical", minHeight:32, fontFamily:"inherit", lineHeight:1.4}} value={r.an} placeholder="Adresse" onChange={e => upd(r.id, { an: e.target.value })} /></td>
                  <td style={{ ...colS, textAlign: "center", cursor: "pointer", color: "#ccc", padding: "2px" }} className="no-print" onClick={() => rem(r.id)}>x</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      ) : (
        <div className="no-print" style={{ padding: "5px 12px", fontSize: 9, color: "#bbb", borderBottom: "1px solid #eee" }}>
          Keine Fahrten eingetragen (wird nicht gedruckt)
        </div>
      )}
    </div>
  );
}

// ─── DispoDay ─────────────────────────────────────────────────────────────────
const DISPO_SECTIONS = [
  { key: 'fahrdispo',         label: 'Fahrdispo' },
  { key: 'customTables',      label: 'Benutzerdefinierte Tabellen' },
  { key: 'besonderes',        label: 'Besonderes' },
  { key: 'hinweise',          label: 'Hinweise Motiv und Basis' },
  { key: 'produktionsnotizen',label: 'Produktionsnotizen' },
];
const DEFAULT_SECTION_ORDER = DISPO_SECTIONS.map(s=>s.key);


// ─── DispoSections (sortierbare Dispo-Sektionen) ─────────────────────────────
function DispoSections({ dispoData, updDispoData, project, onChange, dayIdx, day }) {
  const [reorderMode, setReorderMode] = React.useState(false);
  // Merge template tables from project settings into this day's customTables
  const templateTables = project.settings?.dispoTemplateTables || [];
  const rawTables = dispoData.customTables || [];
  // Add template tables that aren't already in this day's customTables
  const tables = React.useMemo(() => {
    let merged = [...rawTables];
    templateTables.forEach(tt => {
      if (!merged.find(t=>t.id===tt.id)) {
        // Add with empty rows
        merged.push({ ...tt, rows: [Array(tt.cols||2).fill('')] });
      }
    });
    return merged;
  }, [rawTables, templateTables]);

  // Build flat item list: fixed sections + one item per custom table
  // Keys: 'fahrdispo', 'besonderes', 'hinweise', 'produktionsnotizen', 'ct:<id>'
  const buildFlatItems = (order, tbls) => {
    // Expand 'customTables' legacy key into individual ct: items
    const expanded = [];
    order.forEach(key => {
      if (key === 'customTables') {
        tbls.forEach(t => expanded.push('ct:'+t.id));
      } else {
        expanded.push(key);
      }
    });
    // Add any new custom tables not yet in order
    tbls.forEach(t => {
      if (!expanded.includes('ct:'+t.id)) expanded.push('ct:'+t.id);
    });
    // Remove ct: items for deleted tables
    return expanded.filter(k => !k.startsWith('ct:') || tbls.some(t=>'ct:'+t.id===k));
  };

  const defaultOrder = ['fahrdispo','besonderes','hinweise','produktionsnotizen'];
  const rawOrder = dispoData.sectionOrder
    || project.settings?.dispoSectionOrder
    || defaultOrder;
  const order = buildFlatItems(rawOrder, tables);

  const getLabelForKey = key => {
    if (key.startsWith('ct:')) {
      const id = key.slice(3);
      const t = tables.find(t=>t.id===id);
      return t?.title || 'Benutzerdefinierte Tabelle';
    }
    const sec = DISPO_SECTIONS.find(s=>s.key===key);
    return sec?.label || key;
  };

  const drag = useDrag(
    order.map(k=>({id:k})),
    reordered => {
      const newOrder = reordered.map(r=>r.id);
      // Single combined onChange to avoid stale data overwrite
      const days = [...project.shootDays];
      days[dayIdx] = { ...days[dayIdx],
        dispoData: { ...dispoData, sectionOrder: newOrder } };
      const newSettings = dayIdx === 0
        ? { ...project.settings, dispoSectionOrder: newOrder }
        : project.settings;
      onChange({ ...project, shootDays: days, settings: newSettings });
    }
  );

  // When a custom table is added: append its ct: key to order
  const handleTablesChange = newTables => {
    let newOrder = [...order];
    const oldIds = new Set(tables.map(t=>t.id));
    newTables.forEach(t => {
      if (!oldIds.has(t.id)) newOrder.push('ct:'+t.id);
    });
    newOrder = newOrder.filter(k => !k.startsWith('ct:') || newTables.some(t=>'ct:'+t.id===k));
    // Single combined onChange to avoid stale data overwrite
    const days = [...project.shootDays];
    days[dayIdx] = { ...days[dayIdx],
      dispoData: { ...dispoData, customTables: newTables, sectionOrder: newOrder } };
    const newSettings = dayIdx === 0
      ? { ...project.settings, dispoSectionOrder: newOrder }
      : project.settings;
    onChange({ ...project, shootDays: days, settings: newSettings });
  };;

  const renderKey = key => {
    if (key.startsWith('ct:')) {
      const id = key.slice(3);
      const t = tables.find(t=>t.id===id);
      if (!t) return null;
      const templateTables = project.settings?.dispoTemplateTables || [];
      const isTemplate = templateTables.some(tt=>tt.id===id);
      const toggleTemplate = () => {
        const newTT = isTemplate
          ? templateTables.filter(tt=>tt.id!==id)
          : [...templateTables, {id:t.id, title:t.title, cols:t.cols, headers:t.headers}];
        const days = [...project.shootDays];
        days[dayIdx] = {...days[dayIdx], dispoData:{...dispoData}};
        onChange({...project, shootDays:days,
          settings:{...project.settings, dispoTemplateTables:newTT}});
      };
      return (
        <div key={key} style={{ borderTop:"8px solid #f0f0f0" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"flex-end",
            padding:"2px 8px", background:"#f9f9f9", borderBottom:"1px solid #eee" }}>
            <label style={{ display:"flex", alignItems:"center", gap:4,
              fontSize:9, color:isTemplate?"#555":"#bbb", cursor:"pointer" }}>
              <input type="checkbox" checked={isTemplate} onChange={toggleTemplate}
                style={{ cursor:"pointer" }} />
              Für alle Drehtage übernehmen
            </label>
          </div>
          <CustomTableEditor table={t}
            onChange={patch => {
              const newTables = tables.map(tb => tb.id===id ? {...tb,...patch} : tb);
              const newTT = isTemplate
                ? templateTables.map(tt => tt.id===id ? {...tt,...patch} : tt)
                : templateTables;
              const days = [...project.shootDays];
              days[dayIdx] = {...days[dayIdx], dispoData:{...dispoData, customTables:newTables}};
              onChange({...project, shootDays:days,
                settings:{...project.settings, dispoTemplateTables:newTT}});
            }}
            onDelete={() => {
              if(!window.confirm('Tabelle löschen?')) return;
              const newTables = tables.filter(tb=>tb.id!==id);
              const newOrder = order.filter(k=>k!=='ct:'+id);
              const newTT = templateTables.filter(tt=>tt.id!==id);
              const days = [...project.shootDays];
              days[dayIdx] = {...days[dayIdx],
                dispoData:{...dispoData, customTables:newTables, sectionOrder:newOrder}};
              onChange({...project, shootDays:days,
                settings:{...project.settings, dispoTemplateTables:newTT}});
            }} />
        </div>
      );
    }
    switch(key) {
      case 'fahrdispo': return (
        <div key="fahrdispo">
          <FahrdispoTable
            data={dispoData.fahrdispo || []}
            onChange={rows => updDispoData({ fahrdispo: rows })}
            crew={project.crew || []}
          />
        </div>
      );
      case 'besonderes': return (
        <div key="besonderes" style={{ borderTop:"8px solid #f0f0f0" }}>
          <BesonderesTable data={dispoData.besonderes || []}
            onChange={rows => updDispoData({ besonderes: rows })}
            title="Besonderes" />
        </div>
      );
      case 'hinweise': return (
        <div key="hinweise" style={{ borderTop:"8px solid #f0f0f0" }}>
          <BesonderesTable data={dispoData.hinweise || []}
            onChange={rows => updDispoData({ hinweise: rows })}
            title="Hinweise Motiv und Basis" />
        </div>
      );
      case 'produktionsnotizen': return (
        <div key="produktionsnotizen" style={{ borderTop:"8px solid #f0f0f0" }}>
          <table style={{ width:"100%", borderCollapse:"collapse" }}>
            <thead><tr style={{ background:"#eee" }}>
              <th style={{ padding:"4px 8px", textAlign:"left", fontSize:10,
                fontWeight:700, border:"1px solid #bbb" }}>Produktionsnotizen</th>
              <th style={{ border:"1px solid #bbb" }}/>
            </tr></thead>
            {day?.notes && <tbody><tr>
              <td colSpan={2} style={{ padding:"6px 8px", fontSize:10,
                border:"1px solid #bbb", color:"#111" }}>
                {day?.notes}
              </td>
            </tr></tbody>}
          </table>
        </div>
      );
      default: return null;
    }
  };

  return (
    <div>
      {/* Reorder toggle */}
      <div style={{ textAlign:"right", padding:"3px 8px",
        borderTop:"8px solid #f0f0f0", background:"#fafafa" }}>
        <span style={{ fontSize:9, color:"#aaa", cursor:"pointer",
          textDecoration:"underline" }}
          onClick={() => setReorderMode(v=>!v)}>
          {reorderMode ? '✓ Fertig' : '⠿ Reihenfolge ändern'}
        </span>
      </div>

      {reorderMode ? (
        <div style={{ padding:"8px", background:"#f8f8f8", border:"1px solid #eee" }}>
          {order.map(key => (
            <div key={key} {...drag.row(key)}
              style={{ display:"flex", alignItems:"center", gap:8,
                padding:"6px 10px", marginBottom:4,
                background: drag.over===key ? "#e8e8e8" : "#fff",
                border:"1px solid #ddd", borderRadius:4,
                transition:"background 0.1s" }}>
              <span {...drag.handle(key)}
                style={{ cursor:"grab", color:"#bbb", fontSize:16, userSelect:"none" }}>⠿</span>
              <span style={{ fontSize:11, color:"#444" }}>
                {getLabelForKey(key)}
              </span>
            </div>
          ))}
          <div style={{ marginTop:6, fontSize:9, color:"#bbb" }}>
            {dayIdx === 0
              ? 'Reihenfolge hier = Standard für alle anderen Dispos'
              : <span style={{ display:"flex", gap:12 }}>
                  <span style={{ cursor:"pointer", textDecoration:"underline" }}
                    onClick={() => updDispoData({ sectionOrder:
                      buildFlatItems(project.settings?.dispoSectionOrder || defaultOrder, tables) })}>
                    Projekt-Standard übernehmen
                  </span>
                  <span style={{ cursor:"pointer", textDecoration:"underline" }}
                    onClick={() => onChange({...project,
                      settings:{...project.settings, dispoSectionOrder: order}})}>
                    Als neuen Standard setzen
                  </span>
                </span>
            }
          </div>
        </div>
      ) : (
        <div>
          {order.map(key => renderKey(key))}
          {/* Add table button at bottom */}
          <div style={{ borderTop:"8px solid #f0f0f0", padding:"6px 8px" }}>
            <span style={{ cursor:"pointer", color:"#888", fontSize:10,
              textDecoration:"underline" }}
              onClick={() => {
                const cols = 2;
                const newT = { id:uid(), title:'', cols,
                  headers:Array(cols).fill(''),
                  rows:[Array(cols).fill(''), Array(cols).fill('')] };
                handleTablesChange([...tables, newT]);
              }}>+ Tabelle hinzufügen</span>
          </div>
        </div>
      )}
    </div>
  );
}


function DispoDay({ project, dayIdx, onChange }) {
  const st = project.settings;
  const day = project.shootDays[dayIdx];
  const groups = buildGroups(project.shots);
  const group = groups.find(g => {
    const linked = project.shootDays.find(d => d.id === g.divider.shootDayId);
    return linked && project.shootDays.indexOf(linked) === dayIdx;
  }) || groups[dayIdx];

  const sceneIds = group ? [...group.sceneIds] : [];
  const scenes = project.scenes.filter(sc => sceneIds.includes(sc.id));
  const crew = project.crew.filter(c => c.days.includes(dayIdx));
  // Cast für diesen Tag — eine Person pro Rolle (besetzt bevorzugt, sonst erste)
  const cast = (() => {
    const raw = project.cast.filter(c => c.days.includes(dayIdx));
    const seen = new Set(); const result = [];
    // Prefer besetzt persons first
    const sorted = [...raw].sort((a,b) => (b.castingStatus==='besetzt'?1:0) - (a.castingStatus==='besetzt'?1:0));
    sorted.forEach(p => { if(!seen.has(p.role)){seen.add(p.role);result.push(p);} });
    return result;
  })();

  let runMin = timeToMin(group?.divider?.callTime || day?.callTime || "07:00");
  const schedule = (group?.shots || []).filter(sh => !sh.hidden || sh.type === "divider").map(sh => {
    if (sh.type === "divider") {
      const dur = sh.durationMin || 0;
      const e = { isDivider: true, ...sh, start: minToTime(runMin), end: minToTime(runMin + dur) };
      runMin += dur; return e;
    }
    const dur = (sh.setupMin || 0) + (sh.shootMin || 0);
    const sc = project.scenes.find(x => x.id === sh.scene);
    const k = sc ? sc.number : "?" + "." + sh.shotNum || "?";
    const e = { isDivider: false, ...sh, sc, klappe: k, start: minToTime(runMin), end: minToTime(runMin + dur) };
    runMin += dur; return e;
  });
  const probeStart = schedule.find(s => !s.isDivider)?.start || "-";
  const drehEnd = schedule.length > 0 ? schedule[schedule.length - 1]?.end || "-" : "-";

  const dispoData = day?.dispoData || {};
  const updDispoData = patch => {
    const days = [...project.shootDays];
    days[dayIdx] = { ...days[dayIdx], dispoData: { ...dispoData, ...patch } };
    onChange({ ...project, shootDays: days });
  };

  const DEFAULT_GEWERKE = [
    { label: "Regie" }, { label: "Kamera" }, { label: "Licht" },
    { label: "Ton" }, { label: "Requisite" }, { label: "Kostüm" },
    { label: "Maske" }, { label: "Catering" }, { label: "Set-AL" },
  ];
  // Inherit arbRows from day 0 if not set for this day
  const day0DispoData = project.shootDays[0]?.dispoData || {};
  const inheritedArbRows = dayIdx === 0
    ? DEFAULT_GEWERKE.map((g, i) => ({ id: "arb_" + i, label: g.label, time: "" }))
    : (day0DispoData.arbRows || DEFAULT_GEWERKE.map((g, i) => ({ id: "arb_" + i, label: g.label, time: "" })));
  // probeStart als Zeitvorschlag (aus Shotlist)
  const probeStartSuggestion = schedule.find(s => !s.isDivider)?.start || "";
  const arbRows = dispoData.arbRows || inheritedArbRows.map(r => ({ ...r, time: "", info: "" }));
  const updArbRow = (id, patch) => updDispoData({ arbRows: arbRows.map(r => r.id === id ? { ...r, ...patch } : r) });
  const addArbRow = () => updDispoData({ arbRows: [...arbRows, { id: uid(), label: "", time: "", info: "" }] });
  const remArbRow = id => updDispoData({ arbRows: arbRows.filter(r => r.id !== id) });

  const castTimes = dispoData.castTimes || {};
  const updCastTime = (castId, field, val) => {
    const updated = { ...castTimes, [castId]: { ...(castTimes[castId] || {}), [field]: val } };
    const ct = updated[castId];
    let fahrdispo = dispoData.fahrdispo || [];
    // Auto-add fahrdispo entry when both Abholung and Ankunft are set for a cast member
    if (ct.abholung && ct.ankunft) {
      const castMember = cast.find(p => p.id === castId);
      // Check if entry already auto-created for this cast member
      const autoId = "auto_" + castId;
      const exists = fahrdispo.find(f => f.id === autoId);
      if (!exists && castMember) {
        fahrdispo = [...fahrdispo, {
          id: autoId, fahrer: "", abholungVon: castMember.name || castMember.role,
          abfahrt: ct.abholung, von: "", ankunft: ct.ankunft, an: ""
        }];
      } else if (exists) {
        // Update times if already exists
        fahrdispo = fahrdispo.map(f => f.id === autoId
          ? { ...f, abholungVon: castMember?.name || castMember?.role || f.abholungVon, abfahrt: ct.abholung, ankunft: ct.ankunft }
          : f
        );
      }
    }
    updDispoData({ castTimes: updated, fahrdispo });
  };

  const [weather, setWeather] = useState(null);
  const [sunrise, setSunrise] = useState("-");
  const [sunset, setSunset] = useState("-");

  const [weatherLoading, setWeatherLoading] = useState(false);

  // Extract a searchable city/place from an address string
  const extractCity = addr => {
    if (!addr) return "";
    // Try to find a PLZ+Stadt pattern like "10117 Berlin" or "90403 Nurnberg"
    const plzMatch = addr.match(/\d{4,5}\s+([A-Za-z\u00e4\u00f6\u00fc\u00c4\u00d6\u00dc\u00df\s-]+)/);
    if (plzMatch) return plzMatch[1].trim().split(" ")[0];
    // Try last capitalized word(s) as city
    const words = addr.trim().split(/[,\s]+/).filter(w => w.length > 2);
    return words[words.length - 1] || addr;
  };

  const fetchWeather = async () => {
    const addr = day?.locationAddress || day?.locationTitle || day?.location;
    if (!day?.date) { alert("Bitte Datum im Drehtage-Tab eintragen."); return; }
    if (!addr) { alert("Bitte Drehort-Adresse im Drehtage-Tab eintragen."); return; }
    setWeatherLoading(true);
    try {
      // Strategy: Open-Meteo geocoding only accepts city names, not full addresses.
      // Extract city name first, then geocode.
      const city = extractCity(addr);

      const geoUrl = "https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(city) + "&count=1&language=de&format=json";
      const geoRes = await fetch(geoUrl);
      if (!geoRes.ok) throw new Error("Geocoding nicht erreichbar");
      const geoData = await geoRes.json();
      if (!geoData?.results?.[0]) {
        throw new Error("Ort nicht gefunden fuer: '" + city + "'\nTipp: Trage im Drehtage-Tab die Adresse mit Stadtname ein, z.B. 'Berlin' oder '10117 Berlin'.");
      }
      const loc = geoData.results[0];
      const { latitude, longitude, timezone, name } = loc;

      // Fetch forecast + sunrise/sunset from Open-Meteo
      // Use archive API for past dates, forecast for future dates
      const shootDate = new Date(day.date + "T12:00");
      const today2 = new Date();
      today2.setHours(0,0,0,0);
      const isPast = shootDate < today2;
      const wBase = isPast
        ? "https://archive-api.open-meteo.com/v1/archive"
        : "https://api.open-meteo.com/v1/forecast";
      const dailyParams = isPast
        ? "temperature_2m_max,temperature_2m_min,precipitation_sum,sunrise,sunset"
        : "temperature_2m_max,temperature_2m_min,precipitation_probability_max,sunrise,sunset";
      const wUrl = wBase +
        "?latitude=" + latitude + "&longitude=" + longitude +
        "&daily=" + dailyParams +
        "&timezone=" + encodeURIComponent(timezone || "Europe/Berlin") +
        "&start_date=" + day.date + "&end_date=" + day.date;
      const wRes = await fetch(wUrl);
      if (!wRes.ok) throw new Error("Wetter-API Fehler: " + wRes.status + " (Datum: " + day.date + ")");
      const wData = await wRes.json();
      if (!wData?.daily) throw new Error("Keine Wetterdaten fuer dieses Datum.");
      const d = wData.daily;
      const parseSunTime = raw => {
        if (!raw) return '-';
        if (raw.includes('T')) return raw.split('T')[1].slice(0,5);
        return raw.slice(-5);
      };
      const weatherData = {
        tMax: d.temperature_2m_max?.[0] != null ? Math.round(d.temperature_2m_max[0]) : null,
        tMin: d.temperature_2m_min?.[0] != null ? Math.round(d.temperature_2m_min[0]) : null,
        rain: (d.precipitation_probability_max?.[0] ?? d.precipitation_sum?.[0]) != null ? Math.round(d.precipitation_probability_max?.[0] ?? d.precipitation_sum?.[0] ?? 0) : null,
        city: name || city,
        sunrise: parseSunTime(d.sunrise?.[0]),
        sunset: parseSunTime(d.sunset?.[0]),
      };
      setWeather(weatherData);
      setSunrise(weatherData.sunrise);
      setSunset(weatherData.sunset);
      updDispoData({ weather: weatherData });
    } catch(e) {
      alert("Wetterdaten konnten nicht geladen werden:\n" + e.message);
    } finally {
      setWeatherLoading(false);
    }
  };

  // Deduplicate drehorte by ADDRESS only (not by name - different Motive can share an address)
  // Haupt-Adresse des Drehtags
  const dayAddr = day?.locationAddress || day?.locationTitle || day?.location || "";
  // Szenen-Adressen mit Motivnamen (dedupliziert, nur wenn abweichend von Drehtag-Adresse)
  const sceneAddrMap = new Map();
  scenes.forEach(sc => {
    const addr = sc.locationAddress || sc.location || "";
    const motiv = sc.locationTitle || sc.title || "";
    if (addr && addr !== dayAddr) {
      if (!sceneAddrMap.has(addr)) sceneAddrMap.set(addr, motiv || addr);
    } else if (!addr && motiv && motiv !== dayAddr) {
      // Nur Motivname ohne Adresse
      if (!sceneAddrMap.has(motiv)) sceneAddrMap.set(motiv, motiv);
    }
  });
  const drehorts = []; // legacy - no longer used
  const sceneAddrsForDisplay = [...sceneAddrMap.entries()]; // [{addr, motiv}]

  const respPersons = st.respPersons || [
    { id: "rp1", label: "Produzent/in",       value: st.producer || "" },
    { id: "rp2", label: "Produktionsleitung", value: "" },
    { id: "rp3", label: "Regie",              value: st.director || "" },
    { id: "rp4", label: "Kamera",             value: st.dop || "" },
    { id: "rp5", label: "Szenenbild",         value: "" },
    { id: "rp6", label: "Kostümbild",        value: "" },
  ];

  const nextDay = project.shootDays[dayIdx + 1];
  const nextGroup = groups.find(g => {
    const linked = project.shootDays.find(d => d.id === g.divider.shootDayId);
    return linked && project.shootDays.indexOf(linked) === dayIdx + 1;
  }) || groups[dayIdx + 1];
  const nextScenes = project.scenes.filter(sc => nextGroup?.sceneIds?.has(sc.id));
  const nextCast = project.cast.filter(c => c.days.includes(dayIdx + 1));

  const tdS = { border: "1px solid #bbb", padding: "8px 12px", verticalAlign: "top", fontSize: 11 };
  const sectionStyle = { width: "100%", borderCollapse: "collapse", borderBottom: "1px solid #ccc", marginTop: 0 };
  const thS = { ...tdS, background: "#ddd", fontWeight: 700, fontSize: 10 };
  const editInp = { border: "none", borderBottom: "1px solid #ccc", background: "transparent", fontSize: 10, fontFamily: "inherit", padding: "1px 2px", width: "100%", outline: "none", color: "#111" };

  // Set-Liste: alle Crew die an diesem Tag dabei sind
  const crewAtDay = project.crew.filter(c => c.days.includes(dayIdx));
  const castAtDay = project.cast.filter(c => c.days.includes(dayIdx));

  return (
    <div style={{ background: "#fff", color: "#111", borderRadius: 8, border: "2px solid #aaa", margin: "0 0 32px 0", fontFamily: "'DM Mono','Courier New',monospace", fontSize: 11, overflow: "hidden" }}>
      {/* Set- und Cast-Liste ganz oben, wie in professioneller Vorlage */}
      {(crewAtDay.length > 0 || castAtDay.length > 0) && (
        <div style={{ padding: "6px 14px", borderBottom: "1px solid #ddd", fontSize: 10 }}>
          {crewAtDay.length > 0 && (
            <div style={{ marginBottom: castAtDay.length > 0 ? 3 : 0 }}>
              <strong>Set:</strong> {crewAtDay.map(p => p.name || p.role).filter(Boolean).join(", ")}
            </div>
          )}
          {castAtDay.length > 0 && (
            <div>
              <strong>Darsteller:</strong>
              {(() => {
                const seen = new Set();
                const labels = [];
                castAtDay.forEach(p => {
                  if(seen.has(p.role)) return; seen.add(p.role);
                  labels.push(p.name || p.role || '');
                });
                return ' '+labels.filter(Boolean).join(', ');
              })()}
            </div>
          )}
        </div>
      )}
      <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "2px solid #111" }}>
        <tbody><tr>
          <td style={{ padding: "8px 14px", width: "30%", verticalAlign: "middle" }}>
            {st.logo ? <img src={st.logo} alt="Logo" style={{ height: 40, objectFit: "contain" }} />
              : <div style={{ fontWeight: 700, fontSize: 13 }}>{st.company || "Produktionsfirma"}</div>}
          </td>
          <td style={{ padding: "8px 14px", textAlign: "center" }}>
            <div style={{ fontSize: 16, fontWeight: 700 }}>{st.title || "Projekttitel"}</div>
          </td>
          <td style={{ padding: "8px 14px", width: "35%", textAlign: "right", fontSize: 10 }}>
            {respPersons.map(p => p.value ? (
              <div key={p.id} style={{ display: "flex", justifyContent: "flex-end", gap: 4, marginBottom: 1, whiteSpace: "nowrap" }}>
                <span style={{ color: "#666" }}>{p.label}:</span>
                <span style={{ fontWeight: 600 }}>{p.value}</span>
              </div>
            ) : null)}
          </td>
        </tr></tbody>
      </table>

      <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "1px solid #999" }}>
        <tbody><tr style={{ background: "#222", color: "#fff" }}>
          <td style={{ padding: "5px 14px", fontWeight: 700, fontSize: 12 }}>DISPOSITION</td>
          <td style={{ padding: "5px 14px", textAlign: "center", fontWeight: 700, fontSize: 12 }}>{day?.date ? fmtDate(day.date) : "Datum TBD"}</td>
          <td style={{ padding: "5px 14px", textAlign: "right", fontWeight: 700, fontSize: 12 }}>{dayIdx + 1}. Drehtag</td>
        </tr></tbody>
      </table>

      {(() => {
        const lunchItems = schedule.filter(s => s.isDivider && s.dividerType === "lunch");
        const lunchStartMin = lunchItems.length > 0 ? timeToMin(lunchItems[0].start) : null;
        const arbTimes = arbRows.map(r => r.time).filter(Boolean).map(timeToMin);
        const earliestArbMin = arbTimes.length > 0 ? Math.min(...arbTimes) : null;
        let lunchWarning = null;
        if (lunchStartMin !== null && earliestArbMin !== null) {
          const diffH = (lunchStartMin - earliestArbMin) / 60;
          if (diffH > 6) lunchWarning = "red";
          else if (diffH > 5.5) lunchWarning = "orange";
        }
        const lunchColor = lunchWarning === "red" ? "#c03030" : lunchWarning === "orange" ? "#c07000" : "#444";
        const bS = { border: "1px solid #bbb", padding: "6px 10px", verticalAlign: "top", fontSize: 11 };
        return (
          <table style={{ width: "100%", borderCollapse: "collapse", borderBottom: "1px solid #999" }}>
            <tbody>
              {/* Row 1: DREHORTINFOS | MOTIVINFOS | ARBEITSBEGINN (rowspan 2) */}
              <tr>
                <td style={{ ...bS, width: "28%" }}>
                  <div style={{ fontSize: 9, color: "#666", fontWeight: 700, marginBottom: 3, letterSpacing: "0.1em" }}>DREHORTINFOS</div>
                  {/* Drehtag-Adresse (fett) */}
                  {dayAddr
                    ? <div style={{ fontWeight: 700, marginBottom: 4 }}>{dayAddr}</div>
                    : <div style={{ color: "#aaa" }}>–</div>}
                  {/* Abweichende Szenen-Adressen mit Motivname */}
                  {sceneAddrsForDisplay.map(([addr, motiv]) => (
                    <div key={addr} style={{ marginTop: 4, borderTop: "1px solid #eee", paddingTop: 3 }}>
                      {motiv && motiv !== addr && <div style={{ fontSize: 9, color: "#888", fontWeight: 600 }}>{motiv}</div>}
                      <div style={{ fontSize: 11 }}>{addr}</div>
                    </div>
                  ))}
                </td>
                <td style={{ ...bS, width: "30%" }}>
                  <div style={{ fontSize: 9, color: "#666", fontWeight: 700, marginBottom: 3, letterSpacing: "0.1em" }}>INFOS</div>
                  <textarea
                    rows={3}
                    style={{ border: "none", background: "transparent", fontSize: 10, fontFamily: "inherit", padding: "1px 2px", width: "100%", outline: "none", color: "#111", resize: "vertical", minHeight: 40 }}
                    value={dispoData.basis || ""}
                    placeholder="Catering, Sanitär..."
                    onChange={e => updDispoData({ basis: e.target.value })}
                  />
                  {/* Parkplätze */}
                  <div style={{ marginTop: 5, borderTop: "1px solid #ddd", paddingTop: 4 }}>

      <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0", borderBottom: "1px solid #999" }}>

            if (scenes.length === 0) return <tr><td colSpan={5} style={{ ...tdS, color: "#aaa", fontStyle: "italic" }}>Keine Szenen zugewiesen.</td></tr>;
            // Build interleaved list: scenes + Motivwechsel dividers from schedule
            const locationDividers = schedule.filter(s => s.isDivider && s.dividerType === "location");
            const rows = [];
            let si = 0;
            // Map scene IDs to their order in schedule
            const sceneOrderInSchedule = [];
            schedule.forEach(s => {
              if (!s.isDivider && s.scene && !sceneOrderInSchedule.includes(s.scene))
                sceneOrderInSchedule.push(s.scene);
            });
            const orderedScenes = sceneOrderInSchedule.map(id => scenes.find(sc => sc.id === id)).filter(Boolean);
            const extraScenes = scenes.filter(sc => !sceneOrderInSchedule.includes(sc.id));
            const allScenes = [...orderedScenes, ...extraScenes];
            allScenes.forEach((sc, idx) => {
              // Check if there's a Motivwechsel divider before this scene in schedule

                const prevSceneId = allScenes[idx - 1]?.id;
                const prevIdx = schedule.findIndex(s => !s.isDivider && s.scene === prevSceneId);
                const curIdx = schedule.findIndex(s => !s.isDivider && s.scene === sc.id);

              rows.push(
                <tr key={sc.id} style={{ background: idx % 2 === 0 ? "#fff" : "#f9f9f9", borderBottom: "1px solid #ddd" }}>

                    <div style={{ fontWeight: 700 }}>{sc.title || "-"}</div>

                  </td>
                  <td style={{ ...tdS, fontSize: 10 }}>
                    {(() => {
                      const allR = [...new Set((project.cast||[]).map(p=>p.role).filter(Boolean))];
                      const scRoles = sc.castRoles && sc.castRoles.length > 0
                        ? allR.filter(r => sc.castRoles.includes(r))
                        : allR.filter(r => (project.cast||[]).some(p=>p.role===r&&p.days.includes(dayIdx)));
                      return scRoles.map(role => {
                        const num = allR.indexOf(role)+1;
                        return (
                          <div key={role} style={{ whiteSpace:'nowrap' }}>
                            <span style={{ color:"#aaa", marginRight:2 }}>{num} -</span>
                            <span>{role}</span>
                          </div>
                        );
                      });
                    })()}
                  </td>
                  <td style={{ ...tdS, fontSize: 10, color: "#666" }}>{sc.notes || ""}</td>
                </tr>
              );
            });
            return rows;
          })()}
        </tbody>
      </table>

      <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0", borderBottom: "1px solid #999" }}>
        <thead><tr>
          {["Rolle", "Besetzung", "Abholung", "Ankunft", "Kostüm", "Maske", "Set/DF"].map(h => <th key={h} style={thS}>{h}</th>)}
        </tr></thead>
        <tbody>
          {cast.map(c => {
            const ct = castTimes[c.id] || {};
            return (
              <tr key={c.id} style={{ borderBottom: "1px solid #eee" }}>
                <td style={tdS}>{c.role}</td>

                  <td key={f} style={tdS}><input style={editInp} value={ct[f] || ""} placeholder="--:--" onChange={e => updCastTime(c.id, f, e.target.value)} /></td>

      </table>

      {/* ── Sortierbare Sektionen unterhalb der Szenen ──────────────── */}
      <DispoSections

      {nextDay && st.showVordispo !== false && (
        <table style={{ width: "100%", borderCollapse: "collapse", borderTop: "8px solid #f0f0f0" }}>
          <tbody>
            <tr style={{ background: "#444", color: "#fff" }}>
              <td colSpan={4} style={{ padding: "5px 10px", fontWeight: 700 }}>
                VORDISPO - {dayIdx + 2}. Drehtag{nextDay?.date ? " - " + fmtDate(nextDay.date) : ""}
                {nextGroup?.divider?.callTime && <span style={{ fontWeight: 400, marginLeft: 16, color: "#ccc" }}>Call: {nextGroup.divider.callTime}</span>}
              </td>

            <tr>

              <td style={{ ...tdS, fontSize: 10 }} colSpan={3}>
                {nextDay.locationTitle || nextDay.location || "-"}{nextDay.locationAddress ? " - " + nextDay.locationAddress : ""}
              </td>

            {nextScenes.length > 0 && (
              <tr>
                <td style={{ ...tdS, background: "#f5f5f5", fontWeight: 700, fontSize: 10 }}>Szenen:</td>
                <td style={{ ...tdS, fontSize: 10 }} colSpan={3}>
                  {nextScenes.map(sc => "#" + sc.number + " " + (sc.title || "") + " (" + sc.interior + "/" + (sc.dayNight ? sc.dayNight.charAt(0) : "T") + (sc.vorstopp ? " V-Stopp: " + sc.vorstopp : "") + ")").join(" | ")}
                </td>

            {nextCast.length > 0 && (
              <tr>
                <td style={{ ...tdS, background: "#f5f5f5", fontWeight: 700, fontSize: 10 }}>Darsteller:</td>
                <td style={{ ...tdS, fontSize: 10 }} colSpan={3}>
                  {nextCast.map((c, i) => i + 1 + " " + c.name + " (" + c.role + ")").join(", ")}
                </td>
              </tr>
            )}
          </tbody>
        </table>
      )}
    </div>
  );
}

function Dispos({ project, onChange }) {
  const [activeDay, setActiveDay] = useState(0);
  const [dispoExporting, setDispoExporting] = useState(false);
  const [allExporting, setAllExporting] = useState(false);
  const handleExportDispo = () => exportDispoPdf(project, activeDay, setDispoExporting);
  const handleExportAll = async () => {
    setAllExporting(true);
    try {
      for (let i = 0; i < project.shootDays.length; i++) {
        await new Promise(resolve => setTimeout(resolve, i * 800));
        exportDispoPdf(project, i, () => {});
      }
      // Wait for last download to start
      await new Promise(resolve => setTimeout(resolve, 1000));
    } finally {
      setAllExporting(false);
    }
  };
  return (
    <div>
      <div className="dispo-top-bar no-print" style={{ ...S.row, marginBottom: 20, flexWrap: "wrap", gap: 8 }}>
        <h1 style={{ ...S.h1, marginBottom: 0 }}>Tagesdispos</h1>
        <label style={{ display:"flex", alignItems:"center", gap:8, cursor:"pointer", fontSize:12, color:C.mid }}>
          <input type="checkbox"
            checked={project.settings.showVordispo !== false}
            onChange={e => onChange({ ...project, settings: { ...project.settings, showVordispo: e.target.checked } })}
            style={{ accentColor: C.accent, width:14, height:14 }} />
          Vordispo anzeigen
        </label>
        <select
          value={activeDay}
          onChange={e => setActiveDay(Number(e.target.value))}
          style={{ ...S.input, width: "auto", minWidth: 220, padding: "7px 12px", fontSize: 13, cursor: "pointer" }}>
          {project.shootDays.map((d, i) => (
            <option key={i} value={i}>
              Tag {i + 1}{d.date ? " - " + fmtDate(d.date) : ""}{d.locationTitle ? " - " + d.locationTitle : ""}
            </option>
          ))}
        </select>
        <button style={{ ...S.btn(), opacity: dispoExporting ? 0.6 : 1 }} onClick={handleExportDispo} disabled={dispoExporting}>{dispoExporting ? "Exportiere..." : "Als PDF speichern"}</button>
        <button style={{ ...S.btn(), opacity: allExporting ? 0.6 : 1, border: "1px solid #2a4060", color: "#6090c0" }} onClick={handleExportAll} disabled={allExporting}>{allExporting ? "Exportiere alle..." : "Alle Dispos exportieren"}</button>
      </div>
      {project.shootDays.length === 0
        ? <div style={{ color: C.dim }}>Bitte zuerst Drehtage anlegen.</div>
        : <div id="dispo-print-area" style={{ maxWidth: 1000, margin: "0 auto" }}>
            <DispoDay project={project} dayIdx={activeDay} onChange={onChange} />
          </div>}
    </div>
  );
}


// ─── AD-Sheet ──────────────────────────────────────────────────────────────
// Interaktives Drehtag-Sheet: Reihenfolge veränderbar, Pausen/extra Shots,
// Vergleich mit Plan, Verzögerungsanzeige. Keine Auswirkung auf die Shotlist.

function ADSheet({ project, onChange }) {
  const [dayIdx, setDayIdx] = React.useState(0);
  const shootDays = project.shootDays || [];
  const day = shootDays[dayIdx];

  // Storage: persisted in project.shootDays[dayIdx].adSheet via onChange
  const adSheet = day?.adSheet || {};
  const savedRows = adSheet.rows || null;
  const startTime = adSheet.startTime || day?.callTime || '07:00';

  const saveAdSheet = (patch) => {
    const days = [...shootDays];
    days[dayIdx] = { ...days[dayIdx], adSheet: { ...adSheet, ...patch } };
    onChange({ ...project, shootDays: days });
  };

  // Build planned rows from ALL shots in this day's group
  const plannedRows = React.useMemo(() => {
    if (!day) return [];
    const allShots = [...(project.shots||[])].sort((a,b)=>(a.shootOrder||0)-(b.shootOrder||0));
    // Find the day divider for this dayIdx
    const dayDividers = allShots.filter(s=>s.type==='divider'&&s.dividerType==='day');
    const thisDivider = dayDividers[dayIdx];
    const nextDivider = dayDividers[dayIdx+1];
    if (!thisDivider) return [];
    const startOrder = thisDivider.shootOrder||0;
    const endOrder = nextDivider?.shootOrder ?? Infinity;
    // All shots AND pause banners between this divider and the next
    const dayItems = allShots.filter(s =>
      (s.shootOrder||0) > startOrder &&
      (s.shootOrder||0) < endOrder &&
      (s.type==='shot' || (s.type==='divider' && s.dividerType!=='day'))
    );
    return dayItems.map(s => {
      if (s.type==='divider') {
        // Pause/location banner
        const label = s.dividerType==='lunch' ? 'Mittagspause'
          : s.dividerType==='location' ? 'Locationwechsel'
          : s.label || 'Pause';
        return {
          id: 'plan_'+s.id,
          shotId: s.id,
          type: 'pause',
          isPauseBanner: true,
          dividerType: s.dividerType,
          description: s.label || label,
          pauseMin: s.durationMin||45,
          done: false,
          cancelled: false,
          isPlan: true,
        };
      }
      const sc = (project.scenes||[]).find(sc=>sc.id===s.scene);
      return {
        id: 'plan_'+s.id,
        shotId: s.id,
        type: 'shot',
        hidden: !!s.hidden,
        scene: sc?.number||'',
        sceneTitle: sc?.title||'',
        shotNum: s.shotNum||'',
        shotLetter: s.shotLetter||'',
        description: s.description||'',
        setupMin: s.setupMin||0,
        shootMin: s.shootMin||0,
        notes: s.notes||'',
        isPlan: true,
        done: false,
        cancelled: false,
      };
    });
  }, [project.shots, project.scenes, shootDays, dayIdx]);

  // Get or initialize AD rows (merge saved + new shots from plan)
  const adRows = React.useMemo(() => {
    if (!savedRows || savedRows.length===0) {
      return plannedRows.map(r=>({...r, id:'ad_'+r.shotId, isPlan:false}));
    }
    const savedIds = new Set(savedRows.map(r=>r.id));
    const newItems = plannedRows
      .filter(r=>!savedIds.has('ad_'+r.shotId))
      .map(r=>({...r, id:'ad_'+r.shotId, isPlan:false}));
    return [...savedRows, ...newItems];
  }, [savedRows, plannedRows]);

  const setAdRows = (rows) => saveAdSheet({ rows });
  const setStartTime = (t) => saveAdSheet({ startTime: t });
  const resetToPlanned = () => {
    if(!window.confirm('AD-Sheet für diesen Tag zurücksetzen?')) return;
    saveAdSheet({ rows: null, startTime: day?.callTime||'07:00' });
  };

  const drag = useDrag(adRows, setAdRows);

  // Compute running schedule (exclude cancelled shots from time)
  const computeSchedule = (rows, start) => {
    let min = timeToMin(start);
    return rows.map(r => {
      const startM = min;
      const cancelled = !!r.cancelled;
      const dur = cancelled ? 0 : r.type==='pause'
        ? (r.pauseMin||30)
        : (r.setupMin||0)+(r.shootMin||0);
      min += dur;
      return {...r, _startM:startM, _endM:min, _dur:dur};
    });
  };

  const planned = computeSchedule(plannedRows, startTime);
  const scheduled = computeSchedule(adRows, startTime);

  // Delay: compare cumulative time — but only for non-pause, non-extra rows
  // Build a map: shotId → planned cumulative end
  // plannedDurByShot: planned duration per shot (for delay = duration change only)
  const plannedDurByShot = {};
  plannedRows.forEach(r => {
    if (r.type==='shot') plannedDurByShot[r.shotId] = (r.setupMin||0)+(r.shootMin||0);
    if (r.type==='pause' && r.isPauseBanner) plannedDurByShot[r.shotId] = r.pauseMin||45;
  });

  const totalDelay = (() => {
    const lastPlanned = planned[planned.length-1]?._endM;
    const lastActual = scheduled[scheduled.length-1]?._endM;
    if(lastPlanned==null||lastActual==null) return 0;
    return lastActual - lastPlanned;
  })();

  // First call: earliest of callTime AND all manually entered arbRow times
  const { firstWorkMin, firstCallDept, firstCallTime } = (() => {
    const arbRows = day?.dispoData?.arbRows || [];
    const callMin = timeToMin(day?.callTime || startTime);
    let earliest = callMin;
    let dept = 'Drehbeginn';
    let timeStr = day?.callTime || startTime;
    arbRows.forEach(r => {
      if (!r.time || !r.time.trim()) return;
      const m = timeToMin(r.time);
      if (m > 0 && m < earliest) {
        earliest = m; dept = r.label || 'Unbekannt'; timeStr = r.time;
      }
    });
    return { firstWorkMin: earliest, firstCallDept: dept, firstCallTime: timeStr };
  })();
  const lunchWarning = (() => {
    const lunch = scheduled.find(r=>r.isPauseBanner&&r.dividerType==='lunch');
    if (!lunch) return null;
    const diff = lunch._startM - firstWorkMin;
    if (diff > 6*60) return 'red';
    if (diff > 5.5*60) return 'yellow';
    return null;
  })();

  const updRow = (id, patch) => setAdRows(adRows.map(r=>r.id===id?{...r,...patch}:r));
  const remRow = (id) => { if(window.confirm('Eintrag entfernen?')) setAdRows(adRows.filter(r=>r.id!==id)); };

  const addPause = () => setAdRows([...adRows, {
    id:'pause_'+uid(), type:'pause', description:'Pause',
    pauseMin:30, done:false, cancelled:false, isPlan:false
  }]);
  const addExtraShot = () => setAdRows([...adRows, {
    id:'extra_'+uid(), type:'shot', scene:'', sceneTitle:'',
    shotNum:'X', shotLetter:'', description:'', setupMin:0, shootMin:0,
    notes:'', done:false, cancelled:false, isPlan:false, isExtra:true
  }]);

  const fmtMin = m => { const h=Math.floor(m/60)%24, mn=m%60; return pad(h)+':'+pad(mn); };

  const thS = {padding:'5px 8px', fontSize:10, fontWeight:700, color:'#555',
    background:'#f0f0f0', textAlign:'left', borderBottom:'2px solid #ccc', whiteSpace:'nowrap'};
  const tdS = {padding:'5px 8px', verticalAlign:'middle', fontSize:11};
  const inp = {border:'none', background:'transparent', fontSize:11,
    fontFamily:'inherit', outline:'none', width:'100%', color:'#222'};

  if (!shootDays.length) return <div style={{padding:32,color:'#888'}}>Bitte zuerst Drehtage anlegen.</div>;

  return (
    <div style={{background:'#f7f7f7', minHeight:'100vh'}}>
      {/* Header */}
      <div style={{background:'#222',color:'#fff',padding:'12px 20px',
        display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
        <div>
          <h1 style={{margin:0,fontSize:18,fontWeight:700,letterSpacing:1}}>AD-Sheet</h1>
          <div style={{fontSize:10,color:'#aaa',marginTop:2}}>
            Erster Call: <strong style={{color:'#fff'}}>{firstCallTime}</strong>
            {' — '}{firstCallDept}
          </div>
        </div>
        <select value={dayIdx} onChange={e=>setDayIdx(Number(e.target.value))}
          style={{background:'#444',color:'#fff',border:'1px solid #666',
            borderRadius:4,padding:'4px 8px',fontSize:12}}>
          {shootDays.map((d,i)=>(
            <option key={d.id} value={i}>Tag {i+1}{d.date?' – '+fmtDate(d.date):''}</option>
          ))}
        </select>
        <label style={{fontSize:11,display:'flex',alignItems:'center',gap:6}}>
          Drehbeginn:
          <input type="time" value={startTime} onChange={e=>setStartTime(e.target.value)}
            style={{background:'#444',color:'#fff',border:'1px solid #666',
              borderRadius:4,padding:'3px 6px',fontSize:12}}/>
        </label>
        {totalDelay!==0&&(
          <div style={{marginLeft:'auto',background:totalDelay>0?'#c44':'#2a7',
            color:'#fff',borderRadius:6,padding:'4px 12px',fontSize:12,fontWeight:700}}>
            {totalDelay>0?'+':''}{totalDelay} min Verzögerung
          </div>
        )}
        <button onClick={resetToPlanned}
          style={{marginLeft:totalDelay===0?'auto':0,
            background:'transparent',border:'1px solid #666',color:'#aaa',
            borderRadius:4,padding:'4px 10px',fontSize:11,cursor:'pointer'}}>
          ↺ Reset
        </button>
      </div>

      <div style={{padding:'12px 16px'}}>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <button onClick={addPause}
            style={{background:'#fff',border:'1px solid #ccc',borderRadius:5,
              padding:'6px 14px',fontSize:11,cursor:'pointer',color:'#555'}}>
            + Pause
          </button>
          <button onClick={addExtraShot}
            style={{background:'#fff',border:'1px solid #ccc',borderRadius:5,
              padding:'6px 14px',fontSize:11,cursor:'pointer',color:'#555'}}>
            + Extra-Shot
          </button>
          <span style={{fontSize:10,color:'#aaa',alignSelf:'center',marginLeft:8}}>
            ⠿ = verschieben · ✓ = gedreht · ✕ = gestrichen
          </span>
        </div>

        <div style={{background:'#fff',borderRadius:8,border:'1px solid #ddd',
          overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
          <table style={{width:'100%',borderCollapse:'collapse'}}>
            <thead>
              <tr>
                <th style={{...thS,width:28}}/>
                <th style={{...thS,width:52}}>Zeit</th>
                <th style={{...thS,width:48}}>Dauer</th>
                <th style={{...thS,width:38}}>Sz.</th>
                <th style={{...thS,width:55}}>Shot</th>
                <th style={thS}>Beschreibung</th>
                <th style={{...thS,width:48}}>Setup</th>
                <th style={{...thS,width:48}}>Dreh</th>
                <th style={{...thS,width:48}}>Soll</th>
                <th style={{...thS,width:48}}>±</th>
                <th style={{...thS,width:32}}>✓</th>
                <th style={{...thS,width:32}}>✕</th>
                <th style={{...thS,width:24}}/>
              </tr>
            </thead>
            <tbody>
              {scheduled.map((row,ri)=>{
                const isPause = row.type==='pause';
                const isDone = !!row.done;
                const isCancelled = !!row.cancelled;
                const isExtra = !!row.isExtra;
                // Delay: find matching planned shot for this shotId
                // Delay = only when this row's own duration changed vs plan
                const plannedDur = row.shotId ? plannedDurByShot[row.shotId] : null;
                const actualDur = row.type==='pause' ? (row.pauseMin||30) : (row.setupMin||0)+(row.shootMin||0);
                // No delay for user-added pauses/extra shots, or if cancelled
                const delay = (plannedDur!=null && !row.isExtra && !isCancelled)
                  ? actualDur - plannedDur
                  : null;
                const isPauseBanner = !!row.isPauseBanner;
                const isLunch = isPauseBanner && row.dividerType==='lunch';
                const isLocation = isPauseBanner && row.dividerType==='location';
                const lunchRowWarn = isLunch ? lunchWarning : null;
                const bg = isCancelled?'#fff5f5'
                  : isDone?'#f0fff4'
                  : isLunch&&lunchRowWarn==='red'?'#ffeaea'
                  : isLunch&&lunchRowWarn==='yellow'?'#fff8e0'
                  : isLunch?'#fff3e0'          // lunch = orange-tinted
                  : isLocation?'#e8f4ff'        // locationwechsel = light blue
                  : isPauseBanner?'#fff8f0'     // other plan pause
                  : isPause?'#fffbe6'           // user pause = yellow
                  : isExtra?'#f0f4ff'           // extra shot = blue-tinted
                  : '#fff';
                const textStyle = {
                  textDecoration: isCancelled?'line-through':isDone?'line-through':'none',
                  color: isCancelled?'#e88':isDone?'#777':'#222',
                  opacity: isCancelled?0.6:1,
                };
                return (
                  <tr key={row.id} {...drag.row(row.id)}
                    style={{borderBottom:'1px solid #eee',
                      background:drag.over===row.id?'#e8f0ff':bg,
                      transition:'background 0.1s'}}>
                    {/* Handle */}
                    <td style={{...tdS,textAlign:'center',color:'#ccc'}}>
                      <span {...drag.handle(row.id)}
                        style={{cursor:'grab',fontSize:14,userSelect:'none'}}>⠿</span>
                    </td>
                    {/* Zeit */}
                    <td style={{...tdS,fontWeight:600,color:isCancelled?'#bbb':'#444',whiteSpace:'nowrap'}}>
                      {isCancelled?<s>{fmtMin(row._startM)}</s>:fmtMin(row._startM)}
                    </td>
                    {/* Dauer */}
                    <td style={{...tdS,color:'#888'}}>
                      {isCancelled?<s>{(row.setupMin||0)+(row.shootMin||0)} min</s>:
                        isPause?(row.pauseMin||30)+' min':
                        row._dur+' min'}
                    </td>
                    {/* Szene */}
                    <td style={{...tdS,...textStyle}}>
                      {isPause?'—':
                        <input style={{...inp,...textStyle,width:36}} value={row.scene||''} placeholder="–"
                          onChange={e=>updRow(row.id,{scene:e.target.value})}/>}
                    </td>
                    {/* Shot */}
                    <td style={{...tdS,...textStyle}}>
                      {!isPause&&(
                        <span style={{display:'flex',gap:2}}>
                          <input style={{...inp,...textStyle,width:28,fontWeight:isExtra?700:400,
                            color:isExtra?'#4466cc':textStyle.color}}
                            value={row.shotNum||''} placeholder="–"
                            onChange={e=>updRow(row.id,{shotNum:e.target.value})}/>
                          <input style={{...inp,...textStyle,width:18}}
                            value={row.shotLetter||''}
                            onChange={e=>updRow(row.id,{shotLetter:e.target.value})}/>
                        </span>
                      )}
                    </td>
                    {/* Beschreibung */}
                    <td style={tdS}>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <input style={{...inp,...textStyle,
                        fontStyle:isPause?'italic':'normal',
                        color:isLunch?'#cc6600':isLocation?'#0066aa':isPause?'#aa8800':textStyle.color}}
                        value={row.description||''} placeholder={isPause?'Pause...':'Beschreibung...'}
                        onChange={e=>updRow(row.id,{description:e.target.value})}/>
                      {isLunch&&lunchRowWarn&&(
                        <span style={{
                          background:lunchRowWarn==='red'?'#c44':'#f0a500',
                          color:'#fff',borderRadius:4,padding:'1px 6px',
                          fontSize:9,fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>
                          {lunchRowWarn==='red'?'⚠ Zu spät!':'⚠ Bald 6h'}
                        </span>
                      )}
                    </div>
                    </td>
                    {/* Setup */}
                    <td style={tdS}>
                      {isPause?(
                        <input style={{...inp,width:38}} type="number"
                          value={row.pauseMin||30}
                          onChange={e=>updRow(row.id,{pauseMin:Number(e.target.value)})}/>
                      ):(
                        <input style={{...inp,width:38}} type="number" value={row.setupMin||0}
                          onChange={e=>updRow(row.id,{setupMin:Number(e.target.value)})}/>
                      )}
                    </td>
                    {/* Dreh */}
                    <td style={tdS}>
                      {!isPause&&(
                        <input style={{...inp,width:38}} type="number" value={row.shootMin||0}
                          onChange={e=>updRow(row.id,{shootMin:Number(e.target.value)})}/>
                      )}
                    </td>
                    {/* Plan-Ende */}
                    <td style={{...tdS,color:'#aaa',fontSize:10,whiteSpace:'nowrap'}}>
                      {plannedDur!=null ? plannedDur+' min' : '—'}
                    </td>
                    {/* Delay */}
                    <td style={{...tdS,fontWeight:600,whiteSpace:'nowrap',
                      color:delay==null?'#ccc':delay>0?'#c44':delay<0?'#2a7':'#888'}}>
                      {delay==null?'—':(delay>0?'+':'')+delay}
                    </td>
                    {/* Done */}
                    <td style={{...tdS,textAlign:'center'}}>
                      <input type="checkbox" checked={!!isDone} disabled={isCancelled}
                        onChange={()=>updRow(row.id,{done:!isDone,cancelled:false})}
                        style={{width:15,height:15,cursor:'pointer',accentColor:'#2a7'}}/>
                    </td>
                    {/* Cancelled */}
                    <td style={{...tdS,textAlign:'center'}}>
                      <input type="checkbox" checked={!!isCancelled} disabled={isDone}
                        onChange={()=>updRow(row.id,{cancelled:!isCancelled,done:false})}
                        style={{width:15,height:15,cursor:'pointer',accentColor:'#c44'}}/>
                    </td>
                    {/* Delete (only extra/pause) */}
                    <td style={{...tdS,textAlign:'center'}}>
                      {(isExtra||isPause)&&(
                        <span onClick={()=>remRow(row.id)}
                          style={{color:'#ccc',cursor:'pointer',fontSize:14}}>×</span>
                      )}
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {scheduled.length===0&&(
            <div style={{padding:32,textAlign:'center',color:'#aaa'}}>
              Keine Shots für diesen Drehtag in der Shotlist vorhanden.
            </div>
          )}
        </div>

        {scheduled.length>0&&(
          <div style={{marginTop:12,display:'flex',gap:20,fontSize:11,color:'#777',flexWrap:'wrap'}}>
            <span>Geplantes Ende: <strong>{fmtMin(planned[planned.length-1]?._endM||0)}</strong></span>
            <span>Aktuelles Ende: <strong>{fmtMin(scheduled[scheduled.length-1]._endM)}</strong></span>
            <span>Erledigt: <strong style={{color:'#2a7'}}>{scheduled.filter(r=>r.done).length}</strong></span>
            <span>Gestrichen: <strong style={{color:'#c44'}}>{scheduled.filter(r=>r.cancelled).length}</strong></span>
            <span>Offen: <strong>{scheduled.filter(r=>!r.done&&!r.cancelled).length}</strong></span>
          </div>
        )}
      </div>
    </div>
  );
}


// ─── Continuity / Script Supervisor Sheet ────────────────────────────────────
// Takes pro Shot: Bewertung (schlecht/gut/am besten), Continuity-Notizen,
// Fehlclips Kamera/Ton, Nurtöne, stumme Aufnahmen

function ContinuityShotCard({ shot, project, onChange, onUpdExtra, onDelExtra }) {
  const [lightbox, setLightbox] = React.useState(null); // photo src to show full-screen
  const updShot = (patch) => {
    if (onUpdExtra) { onUpdExtra(patch); return; }
    onChange({...project, shots:project.shots.map(s=>s.id===shot.id?{...s,...patch}:s)});
  };
  const [collapsed, setCollapsed] = React.useState(false);
  const sc = project.scenes.find(sc=>sc.id===shot.scene);
  // For extra shots (onUpdExtra set), read takes from shot prop directly
  const getTakes = () => {
    if (onUpdExtra) return shot.takes || [];
    return project.shots.find(s=>s.id===shot.id)?.takes || [];
  };
  const saveTakes = takes => {
    if (onUpdExtra) { onUpdExtra({takes}); return; }
    onChange({...project, shots:project.shots.map(s=>s.id===shot.id?{...s,takes}:s)});
  };

  const CLIP_TYPES = [
    { key: 'camFail',   label: 'Fehlclip Kamera', color: '#c44', bg: '#fff0f0', hasNum: false },
    { key: 'soundFail', label: 'Fehlclip Ton',     color: '#c96', bg: '#fff8f0', hasNum: false },
    { key: 'soundOnly', label: 'Nurton',            color: '#669', bg: '#f0f0ff', hasNum: true  },
    { key: 'mute',      label: 'Stumm',             color: '#888', bg: '#f5f5f5', hasNum: true  },
  ];

  // Compute take numbers: normal takes + soundOnly + mute get numbers; camFail/soundFail don't
  const computeTakeNums = takes => {
    let n = 0;
    return takes.map(t => {
      const ct = CLIP_TYPES.find(c=>c.key===t.clipType);
      const getsNum = !t.clipType || (ct && ct.hasNum);
      return {...t, _num: getsNum ? ++n : null};
    });
  };

  const RATINGS = [
    { key: 'best',    label: 'Bester Take', color: '#1a7' },
    { key: 'good',    label: 'Gut',         color: '#558' },
    { key: 'bad',     label: 'Schlecht',    color: '#c44' },
    { key: 'neutral', label: '—',           color: '#bbb' },
  ];
  const ratingOf = r => RATINGS.find(x=>x.key===r)||RATINGS[3];

  const rowBg = take => {
    if (take.clipType) return CLIP_TYPES.find(ct=>ct.key===take.clipType)?.bg||'#fff';
    return take.rating==='best'?'#e8fff4':take.rating==='good'?'#f0f0ff':take.rating==='bad'?'#fff0f0':'#fff';
  };

  const addTake = (clipType=null) => {
    const takes = getTakes();
    saveTakes([...takes, {
      id:uid(), clipType, rating:'neutral',
      note:'', continuity:'', photos:[],
    }]);
  };
  const updTake = (takeId, patch) =>
    saveTakes(getTakes().map(t=>t.id===takeId?{...t,...patch}:t));
  const remTake = takeId =>
    saveTakes(getTakes().filter(t=>t.id!==takeId));

  const addPhotos = (takeId, files) => {
    const take = getTakes().find(t=>t.id===takeId);
    const existing = take?.photos||[];
    let pending = files.length;
    const newPhotos = [...existing];
    Array.from(files).forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        newPhotos.push({ id:uid(), src:e.target.result, name:file.name });
        pending--;
        if (pending===0) updTake(takeId, {photos:newPhotos});
      };
      reader.readAsDataURL(file);
    });
  };
  const remPhoto = (takeId, photoId) => {
    const take = getTakes().find(t=>t.id===takeId);
    updTake(takeId, {photos:(take?.photos||[]).filter(p=>p.id!==photoId)});
  };

  const isCancelled = !!shot.continuityStrikethrough;
  const takes = computeTakeNums(getTakes());
  const bestTake = takes.find(t=>t.rating==='best'&&!t.clipType);

  const thS = {padding:'4px 8px',fontSize:10,fontWeight:700,color:'#555',
    background:'#f0f0f0',textAlign:'left',borderBottom:'2px solid #ccc'};
  const tdS = {padding:'5px 8px',verticalAlign:'top',fontSize:11};
  const inp = {border:'1px solid #e0e0e0',borderRadius:4,fontSize:11,
    fontFamily:'inherit',padding:'3px 6px',width:'100%',color:'#222',
    background:'#fafafa',outline:'none'};

  return (
    <div style={{background:'#fff',borderRadius:8,
      border:'1px solid '+(isCancelled?'#ffaaaa':'#ddd'),marginBottom:10,
      overflow:'hidden',boxShadow:'0 1px 4px rgba(0,0,0,0.06)',
      opacity:isCancelled?0.65:1}}>
      {/* Shot header */}
      <div style={{background:isCancelled?'#6a2a2a':'#1a1a2e',color:'#fff',
        padding:'8px 14px',display:'flex',alignItems:'center',gap:10,cursor:'pointer'}}
        onClick={()=>setCollapsed(v=>!v)}>
        <span style={{fontSize:14,color:'#aaa',userSelect:'none',flexShrink:0}}>
          {collapsed?'▶':'▼'}
        </span>
        {shot.isExtraInContinuity ? (
          /* Editable fields for extra shots */
          <span style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}
            onClick={e=>e.stopPropagation()}>
            <span style={{color:'#aaa',fontSize:11}}>Sz.</span>
            <input
              key={'snum-'+shot.id}
              defaultValue={shot.sceneNum||sc?.number||''}
              placeholder="Nr"
              style={{width:32,background:'transparent',border:'none',
                borderBottom:'1px solid #555',color:'#fff',fontSize:13,
                fontWeight:700,outline:'none',textAlign:'center',padding:'1px 2px'}}
              onBlur={e=>updShot({sceneNum:e.target.value})}/>
            <span style={{color:'#aaa',fontSize:11}}>· Shot</span>
            <input
              key={'shotnum-'+shot.id+'-'+(shot.shotNum||'')}
              defaultValue={shot.shotNum||''}
              placeholder="Num"
              style={{width:28,background:'transparent',border:'none',
                borderBottom:'1px solid #555',color:'#fff',fontSize:13,
                fontWeight:700,outline:'none',textAlign:'center',padding:'1px 2px'}}
              onBlur={e=>updShot({shotNum:e.target.value})}/>

          </span>
        ) : (
          <span style={{fontWeight:700,fontSize:13,
            textDecoration:isCancelled?'line-through':'none',flexShrink:0}}>
            Sz.{sc?.number||shot.sceneNum||'?'} · Shot {shot.shotNum||''}{shot.shotLetter||''}
          </span>
        )}
        {sc?.title&&<span style={{fontSize:11,color:'#aaa',flexShrink:0}}>{sc.title}</span>}
        {shot.isExtraInContinuity ? (
          <input
            defaultValue={shot.description||''}
            placeholder="Beschreibung..."
            style={{flex:1,background:'transparent',border:'none',
              borderBottom:'1px solid #444',color:'#aaa',fontSize:11,
              outline:'none',padding:'1px 4px',minWidth:80}}
            onClick={e=>e.stopPropagation()}
            onBlur={e=>onChange({...project,shots:project.shots.map(s=>s.id===shot.id?{...s,description:e.target.value}:s)})}/>
        ) : (
          <span style={{fontSize:11,color:'#888',flex:1,
            textDecoration:isCancelled?'line-through':'none',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {shot.description||''}
          </span>
        )}
        {bestTake&&!isCancelled&&(
          <span style={{background:'#1a7',color:'#fff',borderRadius:4,
            padding:'2px 8px',fontSize:10,fontWeight:700,flexShrink:0}}>
            ✓ T{bestTake._num} Bester Take
          </span>
        )}
        <span style={{fontSize:10,color:'#666',flexShrink:0}}>
          {takes.length} Takes
        </span>
        {shot.isExtraInContinuity&&(
          <span style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}
            onClick={e=>e.stopPropagation()}>
            <span style={{background:'#446',color:'#aaf',borderRadius:4,
              padding:'2px 6px',fontSize:10}}>Extra</span>
            {/* Spiel-Tageszeit (INT/EXT + Tageszeit) */}
            <select
              value={shot.dayNight||'TAG'}
              onChange={e=>updShot({dayNight:e.target.value})}
              style={{background:'#2a2a44',border:'1px solid #556',color:'#aaf',
                borderRadius:4,fontSize:10,padding:'1px 4px',cursor:'pointer'}}>
              {['MORG.','TAG','ABEND','ABENDDÄM.','NACHT'].map(opt=>(
                <option key={opt} value={opt}>{opt}</option>
              ))}
            </select>
            <input type="time"
              defaultValue={shot.shootTime||''}
              title="Drehtag-Uhrzeit"
              style={{background:'transparent',border:'none',
                borderBottom:'1px solid #555',color:'#aaa',fontSize:11,
                outline:'none',padding:'1px 2px',width:72}}
              onBlur={e=>updShot({shootTime:e.target.value})}/>
            {onDelExtra&&(
              <button onClick={onDelExtra}
                title="Extra-Shot löschen"
                style={{background:'#c44',border:'none',color:'#fff',
                  borderRadius:4,padding:'2px 7px',fontSize:10,cursor:'pointer'}}>
                🗑
              </button>
            )}
          </span>
        )}
        <button onClick={e=>{e.stopPropagation();
          onChange({...project,shots:project.shots.map(s=>
            s.id===shot.id?{...s,continuityStrikethrough:!isCancelled}:s)});}}
          style={{background:'transparent',border:'1px solid #555',
            color:isCancelled?'#f88':'#888',borderRadius:4,
            padding:'2px 8px',fontSize:10,cursor:'pointer',flexShrink:0}}>
          {isCancelled?'↺':'✕'}
        </button>
      </div>

      {/* Takes — collapsible */}
      {!collapsed&&(
        <>
          {/* Shot-Notizen — für alle Shots */}
          <div style={{padding:'6px 14px',borderBottom:'1px solid #f0f0f0',
            background:'#fafafa',display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:10,color:'#aaa',flexShrink:0,fontWeight:600}}>
              Shot-Notiz:
            </span>
            <input
              key={'sn-'+shot.id}
              defaultValue={shot.continuityNote||''}
              placeholder="Generelle Notizen, Änderungen, Anschluss..."
              style={{flex:1,border:'none',background:'transparent',fontSize:11,
                fontFamily:'inherit',outline:'none',color:'#444',padding:'2px 0'}}
              onBlur={e=>updShot({continuityNote:e.target.value})}/>
          </div>
          {takes.length>0&&(
            <table style={{width:'100%',borderCollapse:'collapse'}}>
              <thead>
                <tr>
                  <th style={{...thS,width:44}}>Take</th>
                  <th style={{...thS,width:115}}>Bewertung</th>
                  <th style={thS}>Notiz</th>
                  <th style={thS}>Continuity</th>
                  <th style={{...thS,width:120}}>Fotos</th>
                  <th style={{...thS,width:24}}/>
                </tr>
              </thead>
              <tbody>
                {takes.map(take=>{
                  const clipInfo = take.clipType?CLIP_TYPES.find(ct=>ct.key===take.clipType):null;
                  const photos = take.photos||[];
                  return (
                    <tr key={take.id} style={{borderBottom:'1px solid #f0f0f0',
                      background:rowBg(take)}}>
                      {/* Take nr / clip label */}
                      <td style={{...tdS,textAlign:'center',verticalAlign:'middle'}}>
                        {clipInfo ? (
